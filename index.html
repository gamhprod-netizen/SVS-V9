<!DOCTYPE html>
<html lang="fr">
<head>

  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
/* ════════════════════════════════════════════════════════════════
   CHORALE SEMEUR — Design System v8
   Palette : bleu royal, blanc pur, accents or & vert
   Typographie : serif display (titres) + sans-serif (données)
   ════════════════════════════════════════════════════════════════ */

:root {
  /* Fonds bleu & blanc */
  --cream:       #F0F6FF;
  --cream-deep:  #DCE9F8;
  --paper:       #FFFFFF;

  /* Bleu principal */
  --maroon:      #1A4F8A;
  --maroon-dark: #0F3566;
  --maroon-soft: #D6E6F8;

  /* Or accent */
  --gold:        #C9A227;
  --gold-soft:   #FEF8E3;

  /* Vert */
  --sage:        #2E7D5B;
  --sage-soft:   #D9F0E6;

  /* Texte */
  --ink:         #0D1F3C;
  --ink-soft:    #4A6080;

  /* Lignes */
  --line:        #C8DDEF;

  /* Statuts */
  --red:         #C0392B;
  --red-soft:    #FDECEA;
  --green:       #27AE60;
  --green-soft:  #E3F9ED;
  --amber:       #E67E22;
  --amber-soft:  #FEF3E2;
  --blue:        #2980B9;
  --blue-soft:   #E3F0FB;
  --purple:      #7D3C98;
  --purple-soft: #F4E6FC;

  --radius-s: 8px;
  --radius-m: 14px;
  --radius-l: 22px;

  --shadow-card: 0 2px 10px rgba(26,79,138,0.09), 0 1px 2px rgba(26,79,138,0.06);
  --shadow-pop:  0 8px 28px rgba(13,31,60,0.18);

  --font-display: 'Fraunces', 'Georgia', serif;
  --font-body:    'Inter', -apple-system, 'Segoe UI', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
  overscroll-behavior-y: contain;
  padding-bottom: env(safe-area-inset-bottom);
}

#app {
  max-width: 560px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--cream);
  position: relative;
}

/* ── Header ── */
.app-header {
  background: linear-gradient(135deg, var(--maroon) 0%, var(--maroon-dark) 100%);
  color: #FFFFFF;
  padding: 18px 18px 22px;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--shadow-card);
}
.app-header__top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.app-header__title {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: 0.01em;
  display: flex; align-items: center; gap: 8px;
  color: #FFFFFF;
}
.app-header__title .ornament { font-size: 1.1rem; color: var(--gold); }
.app-header__year {
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.65);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 999px;
  padding: 3px 10px;
  font-weight: 600;
}
.app-header__subtitle { margin-top: 4px; font-size: 0.82rem; color: rgba(255,255,255,0.7); }
.app-header::after {
  content: '';
  display: block;
  position: absolute;
  bottom: -1px; left: 50%;
  transform: translateX(-50%);
  width: 90%;
  height: 1px;
  background: repeating-linear-gradient(90deg, var(--gold) 0 6px, transparent 6px 12px);
  opacity: 0.5;
}

.app-main { flex: 1; padding: 16px 14px 90px; }

/* ── Bottom nav ── */
.app-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-width: 560px;
  margin: 0 auto;
  background: var(--paper);
  border-top: 2px solid var(--maroon-soft);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: 0 -2px 12px rgba(26,79,138,0.10);
}
.app-nav::-webkit-scrollbar { display: none; }
.nav-item {
  flex: 0 0 auto;
  min-width: 64px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 9px 10px 7px;
  font-size: 0.62rem;
  color: var(--ink-soft);
  border: none; background: none;
  font-weight: 600; letter-spacing: 0.01em;
  cursor: pointer; position: relative;
  transition: color 0.15s;
}
.nav-item__icon { font-size: 1.25rem; line-height: 1; }
.nav-item.active { color: var(--maroon); }
.nav-item.active::before {
  content: '';
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 28px; height: 3px;
  background: var(--gold);
  border-radius: 0 0 3px 3px;
}
.nav-item .badge {
  position: absolute;
  top: 4px; right: 6px;
  background: var(--red);
  color: #fff;
  font-size: 0.55rem;
  font-weight: 700;
  border-radius: 999px;
  min-width: 15px; height: 15px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 3px;
}

/* ── Sections / cards ── */
.section-title {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--maroon);
  margin: 22px 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-title:first-child { margin-top: 4px; }
.section-title .ornament { color: var(--gold); font-size: 1rem; }

.card {
  background: var(--paper);
  border-radius: var(--radius-m);
  padding: 14px;
  box-shadow: var(--shadow-card);
  border: 1px solid var(--line);
  margin-bottom: 10px;
}

.kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 4px; }
.kpi-card {
  background: var(--paper);
  border-radius: var(--radius-m);
  padding: 12px 8px;
  text-align: center;
  border: 1px solid var(--line);
  box-shadow: var(--shadow-card);
}
.kpi-card__value { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--maroon); line-height: 1.1; }
.kpi-card__label { font-size: 0.65rem; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; font-weight: 600; }
.kpi-card.accent-gold .kpi-card__value { color: var(--amber); }
.kpi-card.accent-sage .kpi-card__value { color: var(--sage); }
.kpi-card.accent-red  .kpi-card__value { color: var(--red); }
.kpi-card.accent-blue .kpi-card__value { color: var(--blue); }
.kpi-card.accent-purple .kpi-card__value { color: var(--purple); }

.alert-banner {
  border-radius: var(--radius-m);
  padding: 12px 14px;
  margin-bottom: 10px;
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 0.86rem;
  border: 1px solid;
}
.alert-banner__icon { font-size: 1.2rem; line-height: 1; }
.alert-banner.warn   { background: var(--amber-soft); border-color: #F5D5A8; color: #8C4A00; }
.alert-banner.danger { background: var(--red-soft);   border-color: #F5C6C2; color: #7B1A1A; }
.alert-banner.info   { background: var(--blue-soft);  border-color: #A8CEED; color: #0D3A5F; }
.alert-banner.success{ background: var(--green-soft); border-color: #A8E6C3; color: #1A5C35; }
.alert-banner.gold   { background: var(--gold-soft);  border-color: #EBD9A0; color: #7A5C0A; }
.alert-banner b { font-weight: 700; }

.list { background: var(--paper); border-radius: var(--radius-m); border: 1px solid var(--line); overflow: hidden; box-shadow: var(--shadow-card); }
.list-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background 0.12s; }
.list-row:last-child { border-bottom: none; }
.list-row:active { background: var(--cream-deep); }
.list-row__avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--maroon-soft); color: var(--maroon);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; flex-shrink: 0;
}
.list-row__body { flex: 1; min-width: 0; }
.list-row__title { font-weight: 600; font-size: 0.92rem; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-row__subtitle { font-size: 0.76rem; color: var(--ink-soft); margin-top: 1px; }
.list-row__meta { text-align: right; font-size: 0.78rem; color: var(--ink-soft); flex-shrink: 0; }
.list-row__chevron { color: var(--line); font-size: 1.1rem; }

.pill { display: inline-flex; align-items: center; gap: 4px; font-size: 0.68rem; font-weight: 700; padding: 3px 9px; border-radius: 999px; letter-spacing: 0.02em; }
.pill.bureau   { background: var(--gold-soft); color: #8A6D10; }
.pill.choriste { background: var(--blue-soft); color: #0D3A5F; }
.pill.integrant{ background: var(--purple-soft); color: #4D2070; }
.pill.actif    { background: var(--green-soft); color: #1A5C35; }
.pill.suspendu { background: var(--red-soft); color: #7B1A1A; }
.pill.exemplaire { background: var(--green-soft); color: #1A5C35; }
.pill.accompagner { background: var(--red-soft); color: #7B1A1A; }

.tabbar { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.tabbar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 0 0 auto; padding: 7px 14px; border-radius: 999px;
  border: 1px solid var(--line); background: var(--paper); color: var(--ink-soft);
  font-size: 0.8rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.tab-btn.active { background: var(--maroon); color: #FFFFFF; border-color: var(--maroon); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 18px; border-radius: var(--radius-s); border: none;
  font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: transform 0.08s, opacity 0.15s;
  font-family: var(--font-body);
}
.btn:active { transform: scale(0.97); }
.btn.primary { background: var(--maroon); color: #FFFFFF; }
.btn.secondary { background: var(--cream-deep); color: var(--ink); border: 1px solid var(--line); }
.btn.gold { background: var(--gold); color: var(--maroon-dark); }
.btn.sage { background: var(--sage); color: #fff; }
.btn.ghost { background: transparent; color: var(--maroon); border: 1px solid var(--maroon-soft); }
.btn.danger { background: var(--red-soft); color: #7B1A1A; }
.btn.block { width: 100%; }
.btn.sm { padding: 7px 12px; font-size: 0.78rem; }
.btn:disabled { opacity: 0.5; pointer-events: none; }

.fab {
  position: fixed; bottom: 76px; right: 18px; max-width: 560px;
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--maroon); color: #FFFFFF; border: none;
  font-size: 1.6rem; display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-pop); z-index: 90; cursor: pointer;
}
.fab:active { transform: scale(0.94); }

.field { margin-bottom: 12px; }
.field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--ink-soft); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
.field input, .field select, .field textarea {
  width: 100%; padding: 11px 12px; border-radius: var(--radius-s);
  border: 1px solid var(--line); background: var(--paper);
  font-family: var(--font-body); font-size: 0.92rem; color: var(--ink);
}
.field input:focus, .field select:focus, .field textarea:focus { outline: 2px solid var(--maroon); outline-offset: 1px; }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }

.search-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius-m);
  padding: 10px 14px; margin-bottom: 14px;
}
.search-bar input { border: none; outline: none; background: none; flex: 1; font-size: 0.9rem; color: var(--ink); font-family: var(--font-body); }
.search-bar__icon { color: var(--ink-soft); }

.sheet-overlay { position: fixed; inset: 0; background: rgba(13,31,60,0.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.sheet {
  background: var(--paper); border-radius: 20px 20px 0 0; max-width: 560px; width: 100%;
  max-height: 88vh; overflow-y: auto; padding: 18px 16px calc(20px + env(safe-area-inset-bottom));
  animation: sheet-up 0.22s ease-out;
}
@keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet__handle { width: 36px; height: 4px; background: var(--line); border-radius: 999px; margin: 0 auto 14px; }
.sheet__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.sheet__title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--maroon); }
.sheet__close { background: var(--cream-deep); border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 1rem; color: var(--ink-soft); cursor: pointer; }

.scroll-table { overflow-x: auto; border-radius: var(--radius-m); border: 1px solid var(--line); background: var(--paper); }
.scroll-table table { border-collapse: collapse; width: 100%; font-size: 0.78rem; }
.scroll-table th, .scroll-table td { padding: 8px 10px; border-bottom: 1px solid var(--line); text-align: center; white-space: nowrap; }
.scroll-table th { background: var(--cream-deep); color: var(--maroon); font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.03em; position: sticky; top: 0; }
.scroll-table td:first-child, .scroll-table th:first-child { position: sticky; left: 0; background: var(--paper); text-align: left; font-weight: 600; z-index: 2; box-shadow: 2px 0 4px rgba(0,0,0,0.04); }
.scroll-table th:first-child { background: var(--cream-deep); z-index: 3; }
.scroll-table tr:nth-child(even) td:first-child { background: var(--cream); }

.status-select { font-size: 0.7rem; border: 1px solid var(--line); border-radius: 6px; padding: 4px 4px; background: var(--paper); width: 100%; text-align: center; }
.status-present  { background: var(--green-soft) !important; color: #1A5C35; }
.status-abs-nj   { background: var(--red-soft) !important; color: #7B1A1A; }
.status-abs-j    { background: var(--gold-soft) !important; color: #8A6D10; }
.status-ret-nj   { background: #FCE4D6 !important; color: #9C4A0F; }
.status-ret-j    { background: var(--blue-soft) !important; color: #0D3A5F; }
.status-voyage   { background: var(--purple-soft) !important; color: #4D2070; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--ink-soft); }
.empty-state__icon { font-size: 2.4rem; margin-bottom: 8px; }
.empty-state__text { font-size: 0.88rem; }

.progress { height: 8px; background: var(--cream-deep); border-radius: 999px; overflow: hidden; }
.progress__fill { height: 100%; border-radius: 999px; transition: width 0.3s; }

.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: #FFFFFF; padding: 10px 20px; border-radius: 999px;
  font-size: 0.82rem; font-weight: 600; z-index: 300; box-shadow: var(--shadow-pop);
  animation: toast-pop 2.6s ease forwards; white-space: nowrap;
}
@keyframes toast-pop {
  0% { opacity: 0; transform: translate(-50%, 10px); }
  10% { opacity: 1; transform: translate(-50%, 0); }
  85% { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, 0); }
}

.flex-between { display: flex; align-items: center; justify-content: space-between; }
.text-muted { color: var(--ink-soft); }
.text-sm { font-size: 0.8rem; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.divider { height: 1px; background: var(--line); margin: 14px 0; }
.font-display { font-family: var(--font-display); }
.center { text-align: center; }

.install-banner {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  max-width: 520px; width: calc(100% - 28px);
  background: var(--maroon); color: #fff; border-radius: var(--radius-m);
  padding: 12px 14px; display: flex; align-items: center; gap: 10px;
  z-index: 400; box-shadow: var(--shadow-pop); font-size: 0.82rem;
}
.install-banner button { margin-left: auto; background: var(--gold); color: var(--maroon-dark); border: none; padding: 7px 12px; border-radius: 8px; font-weight: 700; font-size: 0.76rem; cursor: pointer; }
.install-banner .dismiss { background: none; color: rgba(255,255,255,0.6); padding: 7px 6px; }

/* ── Carte identité chorale ── */
.chorale-id-card {
  background: linear-gradient(145deg, var(--maroon) 0%, var(--maroon-dark) 100%);
  border-radius: var(--radius-l);
  padding: 20px 18px 18px;
  margin-bottom: 12px;
  color: #fff;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-pop);
}
.chorale-id-card::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
}
.chorale-id-card__header { display: flex; align-items: flex-start; gap: 14px; }
.chorale-id-card__logo {
  width: 64px; height: 64px; border-radius: var(--radius-m);
  background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; flex-shrink: 0; overflow: hidden; cursor: pointer;
  position: relative;
}
.chorale-id-card__logo img { width: 100%; height: 100%; object-fit: cover; }
.chorale-id-card__logo__edit {
  position: absolute; inset: 0; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; opacity: 0; transition: opacity 0.2s;
}
.chorale-id-card__logo:hover .chorale-id-card__logo__edit { opacity: 1; }
.chorale-id-card__info { flex: 1; min-width: 0; }
.chorale-id-card__nom {
  font-family: var(--font-display); font-size: 1.1rem; font-weight: 700;
  color: #fff; line-height: 1.3; margin-bottom: 3px;
}
.chorale-id-card__slogan { font-size: 0.78rem; color: rgba(255,255,255,0.75); font-style: italic; margin-bottom: 6px; }
.chorale-id-card__year { font-size: 0.68rem; background: rgba(255,255,255,0.15); border-radius: 999px; padding: 2px 9px; display: inline-block; font-weight: 600; }
.chorale-id-card__details { margin-top: 14px; display: flex; flex-direction: column; gap: 5px; }
.chorale-id-card__detail { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: rgba(255,255,255,0.85); }
.chorale-id-card__detail-icon { font-size: 0.9rem; flex-shrink: 0; }
.chorale-id-card__edit-btn {
  position: absolute; top: 12px; right: 12px;
  background: rgba(255,255,255,0.18); border: none; color: #fff;
  border-radius: 999px; padding: 4px 10px; font-size: 0.72rem; font-weight: 700;
  cursor: pointer; transition: background 0.15s;
}
.chorale-id-card__edit-btn:active { background: rgba(255,255,255,0.3); }

/* ── Nouvelles fonctionnalités v8 ── */
.pill.autorize   { background: var(--green-soft); color: #2E5536; }
.pill.derogation { background: var(--amber-soft); color: #7A5C0A; }
.pill.interdit   { background: var(--red-soft); color: var(--maroon-dark); }

.notif-dot {

const Utils = {
  MONTHS: ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'],
  STATUTS_PRESENCE: ['Présent','Retard justifié','Retard non justifié','Absence justifiée','Absence non justifiée','Voyage'],
  PUPITRES: ['Soprano','Alto','Ténor','Basse','Baryton','Mezzo-Soprano','Non défini'],

  genId(prefix) {
    return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  },

  fmtFCFA(n) {
    n = Number(n) || 0;
    return n.toLocaleString('fr-FR') + ' FCFA';
  },

  fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' });
  },

  fmtDateLong(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  },

  todayISO() {
    const d = new Date();
    return d.toISOString().slice(0,10);
  },

  monthKey(date) {
    const d = date ? new Date(date) : new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  },

  statusClass(status) {
    switch(status) {
      case 'Présent': return 'status-present';
      case 'Retard justifié': return 'status-ret-j';
      case 'Retard non justifié': return 'status-ret-nj';
      case 'Absence justifiée': return 'status-abs-j';
      case 'Absence non justifiée': return 'status-abs-nj';
      case 'Voyage': return 'status-voyage';
      default: return '';
    }
  },

  statusShort(status) {
    switch(status) {
      case 'Présent': return 'P';
      case 'Retard justifié': return 'RJ';
      case 'Retard non justifié': return 'RNJ';
      case 'Absence justifiée': return 'AJ';
      case 'Absence non justifiée': return 'ANJ';
      case 'Voyage': return 'V';
      default: return '—';
    }
  },

  initials(nom) {
    const parts = nom.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
    return (parts[0][0] + parts[1][0]).toUpperCase();
  },

  pct(n) {
    return Math.round((n||0) * 100) + '%';
  },

  escapeHtml(str) {
    if (str == null) return '';
    return String(str).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  },

  toast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2700);
  },

  // Show a bottom sheet modal. content = HTML string. Returns the sheet element.
  openSheet(title, contentHTML) {
    this.closeSheet();
    const overlay = document.createElement('div');
    overlay.className = 'sheet-overlay';
    overlay.id = 'active-sheet';
    overlay.innerHTML = `
      <div class="sheet">
        <div class="sheet__handle"></div>
        <div class="sheet__header">
          <div class="sheet__title">${title}</div>
          <button class="sheet__close" data-close-sheet>✕</button>
        </div>
        <div class="sheet__body">${contentHTML}</div>
      </div>
    `;
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay || e.target.closest('[data-close-sheet]')) {
        this.closeSheet();
      }
    });
    document.body.appendChild(overlay);
    return overlay;
  },

  closeSheet() {
    const el = document.getElementById('active-sheet');
    if (el) el.remove();
  },

  confirmAction(msg, onConfirm) {
    const html = `
      <p class="text-sm mt-8" style="margin-bottom:18px;">${msg}</p>
      <div class="grid-2">
        <button class="btn secondary block" data-close-sheet>Annuler</button>
        <button class="btn danger block" id="confirm-yes">Confirmer</button>
      </div>
    `;
    const sheet = this.openSheet('⚠️ Confirmation', html);
    sheet.querySelector('#confirm-yes').addEventListener('click', () => {
      this.closeSheet();
      onConfirm();
    });
  },

  // Petite courbe d'évolution (sparkline) en SVG pur, sans dépendance externe.
  // values : tableau de nombres 0-100. Réutilisable par tout module (Classements,
  // Rapports...) ayant besoin d'illustrer une tendance dans le temps.
  sparklineSVG(values, opts) {
    opts = opts || {};
    const w = opts.width || 280, h = opts.height || 56, color = opts.color || '#7A2E2E';
    if (!values || values.filter(v=>v!=null).length < 2) {
      return `<div class="text-sm text-muted center" style="padding:14px 0;">Pas encore assez d'historique pour tracer une évolution</div>`;
    }
    const max = 100, min = 0;
    const stepX = values.length > 1 ? w / (values.length - 1) : 0;
    const coords = values.map((v,i) => ({
      x: i*stepX,
      y: h - ((Math.max(min,Math.min(max,v))-min)/(max-min))*h,
    }));
    const points = coords.map(c => `${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' ');
    const last = coords[coords.length-1];
    return `
      <svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none" style="display:block;overflow:visible;">
        <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="3.5" fill="${color}"/>
      </svg>
    `;
  },
};

// ===== STORE (persistance locale) =====
// ════════════════════════════════════════════════════════════════
// STORE — Gestion centralisée des données + persistance locale
// ════════════════════════════════════════════════════════════════
//
// Architecture : toutes les données de l'application vivent dans
// Store.data et sont sauvegardées dans le localStorage du navigateur
// (clé STORAGE_KEY ci-dessous). Chaque appel à Store.save() réécrit
// immédiatement cette entrée. Les données restent donc propres à
// CET appareil/navigateur : il n'y a plus de synchronisation entre
// plusieurs appareils (cela nécessiterait un serveur central, ce qui
// a été volontairement retiré de cette version).
// ════════════════════════════════════════════════════════════════

const STORAGE_KEY = 'chorale_erp_data_v1';

// ===== FIREBASE / FIRESTORE =====
// Remplacez les valeurs ci-dessous par la configuration Web fournie dans
// Firebase Console > Parametres du projet > Vos applications > Application Web.
// Laissez apiKey vide pour utiliser uniquement le stockage local.
const FIREBASE_CONFIG = {
  apiKey: 'AIzaSyARm828relinxQ_1uoKebDHG1WOog4mRt0',
  authDomain: 'chorale-svs-app-web-v9-3.firebaseapp.com',
  projectId: 'chorale-svs-app-web-v9-3',
  storageBucket: 'chorale-svs-app-web-v9-3.firebasestorage.app',
  messagingSenderId: '497628233660',
  appId: '1:497628233660:web:f45d82e23ca07ad609b5b9',
};

const FIRESTORE_STATE_PATH = ['chorale', 'data', 'main'];

const FirebaseBridge = {
  app: null,
  db: null,
  auth: null,
  enabled: false,
  ready: false,
  unsub: null,
  saveTimer: null,
  remoteApplying: false,

  isConfigured() {
    return !!(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.projectId && window.firebase);
  },

  async init(store) {
    if (!this.isConfigured()) {
      setSyncStatus && setSyncStatus('local');
      return false;
    }

    try {
      this.app = firebase.apps && firebase.apps.length ? firebase.app() : firebase.initializeApp(FIREBASE_CONFIG);
      this.db = firebase.firestore();
      this.auth = firebase.auth ? firebase.auth() : null;
      this.enabled = true;
      setSyncStatus && setSyncStatus('syncing');

      if (this.auth && !this.auth.currentUser) {
        try { await this.auth.signInAnonymously(); }
        catch (authError) { console.warn('Connexion Firebase Auth anonyme impossible.', authError); }
      }

      await this.subscribe(store);
      return true;
    } catch (error) {
      console.error('Firebase indisponible, repli localStorage.', error);
      this.enabled = false;
      setSyncStatus && setSyncStatus('error');
      return false;
    }
  },

  docRef() {
    return this.db.collection(FIRESTORE_STATE_PATH[0]).doc(FIRESTORE_STATE_PATH[1]).collection('documents').doc(FIRESTORE_STATE_PATH[2]);
  },

  async subscribe(store) {
    const ref = this.docRef();
    const firstSnapshot = await ref.get();
    if (!firstSnapshot.exists) {
      await ref.set({ data: store.data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
    }

    this.unsub = ref.onSnapshot((snapshot) => {
      if (!snapshot.exists) return;
      const payload = snapshot.data() || {};
      if (!payload.data) return;
      this.remoteApplying = true;
      store.data = store._merge(structuredClone(SEED_DATA), payload.data);
      store.recomputeAllCotisations_silent();
      store._saveLocalOnly();
      this.remoteApplying = false;
      this.ready = true;
      setSyncStatus && setSyncStatus('synced');
      if (window.Router && document.querySelector('.app-shell')) {
        try { Router.render(); updateSuggestionsBadge(); updateNotificationsBadge(); } catch (e) { console.warn('Rendu apres synchronisation impossible.', e); }
      }
    }, (error) => {
      console.error('Ecoute Firestore interrompue.', error);
      setSyncStatus && setSyncStatus('error');
    });
  },

  scheduleSave(data) {
    if (!this.enabled || this.remoteApplying) return;
    clearTimeout(this.saveTimer);
    setSyncStatus && setSyncStatus('syncing');
    this.saveTimer = setTimeout(async () => {
      try {
        await this.docRef().set({ data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
        setSyncStatus && setSyncStatus('synced');
      } catch (error) {
        console.error('Ecriture Firestore impossible, copie locale conservee.', error);
        setSyncStatus && setSyncStatus('error');
      }
    }, 450);
  },
};

const Store = {
  data: null,
  _ready: false,

  // Charge d'abord les donnees locales pour demarrer vite, puis branche
  // Firestore en temps reel si FIREBASE_CONFIG est renseigne.
  init() {
    let stored = null;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) stored = JSON.parse(raw);
    } catch (e) {
      console.warn('Lecture localStorage impossible, repli sur les donnees de base.', e);
    }

    this.data = stored ? this._merge(structuredClone(SEED_DATA), stored) : structuredClone(SEED_DATA);
    this.recomputeAllCotisations_silent();
    this._ready = true;
    this._saveLocalOnly();
    FirebaseBridge.init(this);
    return this.data;
  },

  // Deep-ish merge: ensures new fields from SEED_DATA exist, but stored data wins
  _merge(base, remote) {
    const out = Object.assign({}, base, remote);
    // Ensure nested objects exist even if remote omitted them
    for (const key of Object.keys(base)) {
      if (remote[key] === undefined) out[key] = base[key];
      else if (
        typeof base[key] === 'object' && base[key] !== null && !Array.isArray(base[key]) &&
        typeof remote[key] === 'object' && remote[key] !== null && !Array.isArray(remote[key])
      ) {
        out[key] = Object.assign({}, base[key], remote[key]);
      }
    }
    return out;
  },

  _saveLocalOnly() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data));
    } catch (e) {
      console.error('Erreur d\'enregistrement local (localStorage plein ou indisponible)', e);
      if (window.Utils && Utils.toast) Utils.toast('Erreur d\'enregistrement local - espace navigateur peut-etre plein');
    }
  },

  // Ecrit localement puis synchronise vers Firestore quand Firebase est actif.
  save() {
    if (!this._ready) return;
    if (!this.data.meta) this.data.meta = {};
    this.data.meta.lastUpdate = new Date().toISOString();
    this._saveLocalOnly();
    if (FirebaseBridge.enabled) FirebaseBridge.scheduleSave(this.data);
    else setSyncStatus && setSyncStatus('local');
  },

  // Recalcule les cotisations sans déclencher une écriture (utilisé au chargement,
  // avant que this._ready soit passé à true).
  recomputeAllCotisations_silent() {
    const keys = new Set();
    (this.data.paiements || []).forEach(p => keys.add(p.membreId + '|' + p.monthKey));
    keys.forEach(k => {
      const [membreId, monthKey] = k.split('|');
      this._recomputeCotisations(membreId, monthKey);
    });
  },

  // ── MEMBRES ──
  getMembres(filter) {
    let list = this.data.membres;
    if (filter) {
      if (filter.statut) list = list.filter(m => m.statut === filter.statut);
      if (filter.situation) list = list.filter(m => m.situation === filter.situation);
      if (filter.search) {
        const s = filter.search.toLowerCase();
        list = list.filter(m => (m.nom + ' ' + m.prenom).toLowerCase().includes(s)
          || (Array.isArray(m.instruments) && m.instruments.join(' ').toLowerCase().includes(s)));
      }
    }
    return list;
  },

  getMembre(id) {
    return this.data.membres.find(m => m.id === id);
  },

  upsertMembre(membre) {
    const idx = this.data.membres.findIndex(m => m.id === membre.id);
    if (idx >= 0) this.data.membres[idx] = membre;
    else this.data.membres.push(membre);
    this.save();
  },

  deleteMembre(id) {
    this.data.membres = this.data.membres.filter(m => m.id !== id);
    this.save();
  },

  nextMemberId(statut) {
    const prefix = statut === 'Bureau' ? 'B' : statut === 'Intégrant' ? 'I' : 'C';
    const existing = this.data.membres
      .filter(m => m.id.startsWith(prefix))
      .map(m => parseInt(m.id.slice(1), 10))
      .filter(n => !isNaN(n));
    const max = existing.length ? Math.max(...existing) : 0;
    return prefix + String(max + 1).padStart(3, '0');
  },

  // ── SÉANCES (présences) ──
  getSeances(type) {
    let list = this.data.seances;
    if (type) list = list.filter(s => s.type === type);
    return list.sort((a,b) => b.date.localeCompare(a.date));
  },

  getSeance(id) {
    return this.data.seances.find(s => s.id === id);
  },

  upsertSeance(seance) {
    const idx = this.data.seances.findIndex(s => s.id === seance.id);
    if (idx >= 0) this.data.seances[idx] = seance;
    else this.data.seances.push(seance);
    this.save();
  },

  deleteSeance(id) {
    this.data.seances = this.data.seances.filter(s => s.id !== id);
    this.save();
  },

  // Compute consecutive-absence alert per member (samedi only)
  // Rule: 2+ consecutive 'Absence justifiée' or 'Absence non justifiée' on samedi sessions
  // Statistiques de présence aux répétitions par pupitre (additif —
  // alimente Discipline / Statistiques sans modifier le calcul existant
  // basé sur les séances samedi/dimanche).
  getRepetitionPresenceStats(membreId) {
    const reps = this.data.repetitions.filter(r => r.presences && r.presences[membreId]);
    let present = 0, absentJustifie = 0, absentNonJustifie = 0;
    reps.forEach(r => {
      const v = r.presences[membreId];
      if (v === 'Présent') present++;
      else if (v === 'Absent justifié') absentJustifie++;
      else if (v === 'Absent non justifié') absentNonJustifie++;
    });
    const total = present + absentJustifie + absentNonJustifie;
    return { total, present, absentJustifie, absentNonJustifie, tx: total > 0 ? present / total : null };
  },

  getDisciplineStats(membreId) {
    const samedis = this.getSeances('samedi').sort((a,b) => a.date.localeCompare(b.date));
    const dimanches = this.getSeances('dimanche');

    let counts = { present:0, retardJ:0, retardNJ:0, absJ:0, absNJ:0, voyage:0, total:0 };
    let consecutive = 0, maxConsecutive = 0;

    samedis.forEach(s => {
      const st = s.presences[membreId];
      if (!st || st === '—') return;
      counts.total++;
      switch(st) {
        case 'Présent': counts.present++; consecutive = 0; break;
        case 'Retard justifié': counts.retardJ++; consecutive = 0; break;
        case 'Retard non justifié': counts.retardNJ++; consecutive = 0; break;
        case 'Absence justifiée': counts.absJ++; consecutive++; break;
        case 'Absence non justifiée': counts.absNJ++; consecutive++; break;
        case 'Voyage': counts.voyage++; consecutive = 0; break;
      }
      if (consecutive > maxConsecutive) maxConsecutive = consecutive;
    });

    const txSamedi = counts.total > 0 ? counts.present / counts.total : 0;

    let dimCounts = { present:0, total:0 };
    dimanches.forEach(s => {
      const st = s.presences[membreId];
      if (!st || st === '—') return;
      dimCounts.total++;
      if (st === 'Présent') dimCounts.present++;
    });
    const txDimanche = dimCounts.total > 0 ? dimCounts.present / dimCounts.total : 0;

    let currentStreak = 0;
    for (let i = samedis.length - 1; i >= 0; i--) {
      const st = samedis[i].presences[membreId];
      if (!st || st === '—') continue;
      if (st === 'Absence justifiée' || st === 'Absence non justifiée') currentStreak++;
      else break;
    }

    return {
      ...counts,
      txSamedi, txDimanche,
      maxConsecutive,
      currentStreak,
      interdit: currentStreak >= 2,
    };
  },

  // ── ÉVALUATIONS ──
  getEvaluation(membreId) {
    return this.data.evaluations[membreId] || null;
  },
  setEvaluation(membreId, evalData) {
    this.data.evaluations[membreId] = evalData;
    this.save();
  },

  // ── COTISATIONS ──
  getCotisation(membreId, monthKey) {
    return (this.data.cotisations[membreId] || {})[monthKey] || 0;
  },
  setCotisation(membreId, monthKey, montant) {
    if (!this.data.cotisations[membreId]) this.data.cotisations[membreId] = {};
    this.data.cotisations[membreId][monthKey] = montant;
    this.save();
  },
  getCotisationDue(membre) {
    if (membre.statut === 'Bureau') return 500;
    return 250;
  },

  // ── FINANCE — PAIEMENTS (historique, statuts, validation) ────────────
  //
  // data.paiements[] est la source de vérité détaillée (qui a payé quoi,
  // quand, par quel mode, statut, qui a validé...). Chaque paiement
  // "Validé" est automatiquement répercuté dans data.cotisations[][..]
  // (montant agrégé par mois) afin que tout le code existant (IGI,
  // tableau de bord, rapports, module Trésorerie) continue de fonctionner
  // sans aucune modification.

  getPaiements(filter) {
    let list = (this.data.paiements || []).slice().sort((a,b)=> (b.datePaiement||'').localeCompare(a.datePaiement||''));
    if (filter) {
      if (filter.membreId) list = list.filter(p => p.membreId === filter.membreId);
      if (filter.statut) list = list.filter(p => p.statut === filter.statut);
      if (filter.monthKey) list = list.filter(p => p.monthKey === filter.monthKey);
    }
    return list;
  },

  getPaiement(id) {
    return (this.data.paiements || []).find(p => p.id === id);
  },

  // Déclare un paiement (par un choriste pour lui-même, ou par le bureau pour qqun)
  // Statut initial : 'En attente' sauf si déclaré directement par bureau/admin -> 'Validé'
  declarePaiement({ membreId, monthKey, montant, mode, commentaire, declarePar, autoValide }) {
    const p = {
      id: Utils.genId('pai'),
      membreId,
      monthKey,
      montant: Number(montant) || 0,
      mode: mode || 'Espèces',
      commentaire: commentaire || '',
      statut: autoValide ? 'Validé' : 'En attente',
      declarePar: declarePar || null,
      datePaiement: Utils.todayISO(),
      validePar: autoValide ? declarePar : null,
      dateValidation: autoValide ? Utils.todayISO() : null,
    };
    if (!this.data.paiements) this.data.paiements = [];
    this.data.paiements.push(p);
    if (autoValide) this._recomputeCotisations(membreId, monthKey);
    this.save();
    const m = this.getMembre(membreId);
    this.logAction('Paiement', 'Trésorerie', `${autoValide?'Validé':'En attente'} — ${m?m.nom:membreId} ${monthKey} ${Utils.fmtFCFA(Number(montant))}`);
    return p;
  },

  // Validation par bureau/admin
  validerPaiement(id, validateur) {
    const p = this.getPaiement(id);
    if (!p) return;
    Object.assign(p, { statut: 'Validé', validePar: validateur || null, dateValidation: Utils.todayISO() });
    this._recomputeCotisations(p.membreId, p.monthKey);
    this.save();
    const m = this.getMembre(p.membreId);
    this.logAction('Validation', 'Trésorerie', `Paiement validé — ${m?m.nom:p.membreId} ${p.monthKey} ${Utils.fmtFCFA(p.montant)}`);
  },

  refuserPaiement(id, validateur, motif) {
    const p = this.getPaiement(id);
    if (!p) return;
    Object.assign(p, { statut: 'Refusé', validePar: validateur || null, dateValidation: Utils.todayISO(), motifRefus: motif || '' });
    this._recomputeCotisations(p.membreId, p.monthKey);
    this.save();
    const m = this.getMembre(p.membreId);
    this.logAction('Refus', 'Trésorerie', `Paiement refusé — ${m?m.nom:p.membreId} ${p.monthKey}: ${motif||''}`);
  },

  deletePaiement(id) {
    const p = this.getPaiement(id);
    if (!p) return;
    this.data.paiements = this.data.paiements.filter(x => x.id !== id);
    this._recomputeCotisations(p.membreId, p.monthKey);
    this.save();
  },

  // Recalcule data.cotisations[membreId][monthKey] = somme des paiements VALIDÉS
  // pour ce membre/mois. Garde la compatibilité avec le code existant qui lit
  // un simple nombre.
  _recomputeCotisations(membreId, monthKey) {
    const validated = this.data.paiements
      .filter(p => p.membreId === membreId && p.monthKey === monthKey && p.statut === 'Validé')
      .reduce((sum, p) => sum + Number(p.montant || 0), 0);
    if (!this.data.cotisations[membreId]) this.data.cotisations[membreId] = {};
    this.data.cotisations[membreId][monthKey] = validated;
  },

  // Recalcule tout (utile après import de données)
  recomputeAllCotisations() {
    const keys = new Set();
    this.data.paiements.forEach(p => keys.add(p.membreId + '|' + p.monthKey));
    keys.forEach(k => {
      const [membreId, monthKey] = k.split('|');
      this._recomputeCotisations(membreId, monthKey);
    });
    this.save();
  },

  // Statut de paiement d'un membre pour un mois donné :
  // 'Payé' (>= dû), 'Partiel' (>0 et < dû), 'Impayé' (0), plus le détail
  // des paiements en attente éventuels.
  getStatutPaiement(membreId, monthKey) {
    const membre = this.getMembre(membreId);
    const due = membre ? this.getCotisationDue(membre) : 0;
    const valide = this.getCotisation(membreId, monthKey);
    const enAttente = this.data.paiements
      .filter(p => p.membreId === membreId && p.monthKey === monthKey && p.statut === 'En attente')
      .reduce((s,p)=>s+Number(p.montant||0),0);

    let statut;
    if (valide >= due && due > 0) statut = 'Payé';
    else if (valide > 0) statut = 'Partiel';
    else statut = 'Impayé';

    return { due, valide, enAttente, statut, solde: Math.max(0, due - valide) };
  },

  // ── SUGGESTIONS ── ────────────────────────────────────────────────
  getSuggestions(filter) {
    let list = (this.data.suggestions || []).slice().sort((a,b)=> (b.date||'').localeCompare(a.date||''));
    if (filter) {
      if (filter.statut)         list = list.filter(s => s.statut === filter.statut);
      if (filter.departement)    list = list.filter(s => s.departement === filter.departement);
      if (filter.auteurMembreId) list = list.filter(s => s.auteurMembreId === filter.auteurMembreId);
    }
    return list;
  },

  getSuggestion(id) {
    return (this.data.suggestions || []).find(s => s.id === id);
  },

  addSuggestion({ auteur, auteurMembreId, departement, objet, message }) {
    const s = {
      id: Utils.genId('sugg'),
      auteur, auteurMembreId,
      departement: departement || 'Administration',
      objet: objet || '',
      message: message || '',
      date: Utils.todayISO(),
      statut: 'Nouveau',
      reponse: '',
      repondantPar: null,
      dateReponse: null,
    };
    if (!this.data.suggestions) this.data.suggestions = [];
    this.data.suggestions.push(s);
    this.save();
    return s;
  },

  repondreSuggestion(id, reponse, repondant) {
    const s = this.getSuggestion(id);

  // ── SANCTIONS ──
  getSanctions() { return this.data.sanctions.slice().sort((a,b)=>b.date.localeCompare(a.date)); },
  addSanction(s) {
    if (!s.montantPaye) s.montantPaye = 0;

    }

  // Enregistre un paiement de sanction (utilisé par la Trésorerie). Synchronise
  // automatiquement le statut et conserve un historique horodaté — alimente à
  // la fois Discipline et Trésorerie sans double saisie.
  paySanction(id, montantVerse, mode) {
    const s = this.data.sanctions.find(x=>x.id===id);
    if (!s) return null;
    if (!s.historique) s.historique = [];
    const total = Number(s.montant || 0);
    const dejaVerse = Number(s.montantPaye || 0);
    const nouveauVerse = Math.min(total, dejaVerse + Number(montantVerse || 0));
    s.montantPaye = nouveauVerse;
    s.modePaiement = mode || s.modePaiement || null;
    s.datePaiement = Utils.todayISO();
    s.statut = nouveauVerse >= total ? 'Payé' : (nouveauVerse > 0 ? 'Partielle' : 'En attente');
    s.historique.push({
      date: Utils.todayISO(),
      action: s.statut === 'Payé' ? `Paiement intégral enregistré (${Utils.fmtFCFA(montantVerse)})` : `Paiement partiel enregistré (${Utils.fmtFCFA(montantVerse)})`,
      par: Permissions.role,
    });
    this.save();
    this.logAction('Paiement', 'Trésorerie', `Sanction ${s.membre} — ${Utils.fmtFCFA(montantVerse)} (${s.statut})`);
    return s;
  },
  // Indicateurs partagés Discipline / Trésorerie pour les sanctions financières.
  getSanctionsStats() {
    const all = this.data.sanctions;
    const enAttente = all.filter(s => s.statut === 'En attente' || s.statut === 'Partielle');
    const montantImpaye = enAttente.reduce((sum,s) => sum + (Number(s.montant||0) - Number(s.montantPaye||0)), 0);
    const montantEncaisse = all.reduce((sum,s) => sum + Number(s.montantPaye||0), 0);
    return { nbEnAttente: enAttente.length, montantImpaye, montantEncaisse };
  },

  // ── IGI CALCULATION ──
  calcIGI(membreId) {
    const membre = this.getMembre(membreId);
    if (!membre) return null;

    const dis = this.getDisciplineStats(membreId);
    const scoreDiscipline = Math.round(dis.txSamedi * 25 * 10) / 10;

    const monthKeys = [];
    const year = this.data.meta.annee;
    for (let m=1;m<=12;m++) monthKeys.push(`${year}-${String(m).padStart(2,'0')}`);
    const due = this.getCotisationDue(membre) * 12;
    const paid = monthKeys.reduce((sum,k)=>sum + this.getCotisation(membreId,k), 0);
    const txCotis = due > 0 ? Math.min(paid/due, 1) : 0;
    const scoreTresorerie = Math.round(txCotis * 25 * 10) / 10;

    const modCount = this.data.moderations.filter(m => m.moderateur === membre.nom).length;
    const scoreSecretariat = Math.min(Math.round(modCount * 5 * 10)/10, 25);

    const evalData = this.getEvaluation(membreId);
    let moyMusicale = 0;
    if (evalData && evalData.notes) {
      const vals = Object.values(evalData.notes);
      moyMusicale = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
    }
    const scoreMusical = Math.round((moyMusicale/20)*25*10)/10;

    const igi = Math.round((scoreDiscipline + scoreTresorerie + scoreSecretariat + scoreMusical)*10)/10;

    let categorie;
    if (igi >= 90) categorie = '🌟 Exemplaire';
    else if (igi >= 75) categorie = '⭐ Très impliqué';
    else if (igi >= 55) categorie = '✔️ Impliqué';
    else if (igi >= 35) categorie = '⚠️ Peu impliqué';
    else categorie = '🆘 À accompagner';

    return {
      scoreDiscipline, scoreTresorerie, scoreSecretariat, scoreMusical,
      igi, categorie, txSamedi: dis.txSamedi, txDimanche: dis.txDimanche,
      txCotis, moyMusicale, alertePrestation: dis.interdit,
    };
  },

  // ════════════════════════════════════════════════════════════════
  // CLASSEMENTS AUTOMATIQUES — Musical · Discipline · Trésorerie · Global
  // ────────────────────────────────────────────────────────────────
  // Système indépendant de l'IGI (qui reste inchangé et continue d'alimenter
  // le Dashboard/Rapports existants). Les classements ci-dessous répondent
  // précisément aux critères demandés pour l'étape ERP : ils sont calculés
  // à la volée à partir des données déjà présentes (présences, évaluations,
  // sanctions, cotisations, prestations) — aucune nouvelle saisie requise.
  // ════════════════════════════════════════════════════════════════

  CLASSEMENT_WEIGHTS: { musical: 0.4, discipline: 0.3, tresorerie: 0.3 },

  // ── Musical : présences, prestations, évaluations, assiduité ──
  calcScoreMusical(membreId) {
    const dis = this.getDisciplineStats(membreId);
    const tauxAssiduite = dis.txSamedi * 0.7 + dis.txDimanche * 0.3;

    const evalData = this.getEvaluation(membreId);
    let moyMusicale = 0;
    if (evalData && evalData.notes) {
      const vals = Object.values(evalData.notes);
      moyMusicale = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
    }
    const tauxEval = moyMusicale / 20;

    // Participation aux prestations réalisées (si pointage renseigné)
    const prestations = (this.data.prestations || []).filter(p => p.statut === 'Réalisée' && p.presences);
    let prestPresent = 0, prestTotal = 0;
    prestations.forEach(p => {
      const st = p.presences[membreId];
      if (!st || st === '—') return;
      prestTotal++;
      if (st === 'Présent') prestPresent++;
    });

    const composantes = [
      { v: tauxAssiduite, w: 0.45 },
      { v: tauxEval,       w: 0.40 },
    ];
    if (prestTotal > 0) composantes.push({ v: prestPresent / prestTotal, w: 0.15 });

    const sommeW = composantes.reduce((s,c)=>s+c.w, 0);
    const score = sommeW > 0 ? composantes.reduce((s,c)=>s + c.v*c.w, 0) / sommeW * 100 : 0;

    return {
      score: Math.round(score * 10) / 10,
      tauxAssiduite, moyMusicale, txSamedi: dis.txSamedi, txDimanche: dis.txDimanche,
      prestPresent, prestTotal,
    };
  },

  // ── Discipline : ponctualité, avertissements, respect des règles ──
  calcScoreDiscipline(membreId) {
    const dis = this.getDisciplineStats(membreId);
    const attendu = dis.present + dis.retardJ + dis.retardNJ;
    const ponctualite = attendu > 0 ? dis.present / attendu : 1;

    const membre = this.getMembre(membreId);
    const nbSanctions = membre ? this.data.sanctions.filter(s => s.membre === membre.nom).length : 0;
    const scoreAvertissements = Math.max(0, 100 - nbSanctions * 20) / 100;

    let respectRegles = dis.total > 0 ? 1 - (dis.absNJ / dis.total) : 1;
    if (dis.interdit) respectRegles = Math.min(respectRegles, 0.3);

    const score = (ponctualite*0.4 + scoreAvertissements*0.3 + respectRegles*0.3) * 100;

    return {
      score: Math.round(score * 10) / 10,
      ponctualite, nbSanctions, respectRegles, interdit: dis.interdit,
    };
  },

  // ── Trésorerie : cotisations, régularité des paiements, retards ──
  calcScoreTresorerie(membreId) {
    const membre = this.getMembre(membreId);
    if (!membre) return { score: 0, tauxCotis: 0, regularite: 1 };

    const year = this.data.meta.annee;
    const now = new Date();
    const moisEcoules = now.getFullYear() === year ? (now.getMonth() + 1) : (now.getFullYear() > year ? 12 : 0);

    let due = 0, paid = 0;
    for (let mo = 1; mo <= Math.max(moisEcoules, 1); mo++) {
      const key = `${year}-${String(mo).padStart(2,'0')}`;
      due += this.getCotisationDue(membre);
      paid += this.getCotisation(membreId, key);
    }
    const tauxCotis = due > 0 ? Math.min(paid/due, 1) : 1;

    const valides = this.getPaiements({ membreId, statut: 'Validé' });
    let onTime = 0;
    valides.forEach(p => {
      if (!p.datePaiement || !p.monthKey) { onTime++; return; }
      const moisPaiement = p.datePaiement.slice(0,7);
      if (moisPaiement <= p.monthKey) onTime++;
    });
    const regularite = valides.length > 0 ? onTime / valides.length : 1;

    const score = (tauxCotis*0.6 + regularite*0.4) * 100;

    return {
      score: Math.round(score * 10) / 10,
      tauxCotis, regularite, retards: valides.length - onTime,
    };
  },

  // ── Global : combinaison pondérée des 3 scores ──
  calcScoreGlobal(membreId) {
    const w = this.CLASSEMENT_WEIGHTS;
    const musical = this.calcScoreMusical(membreId);
    const discipline = this.calcScoreDiscipline(membreId);
    const tresorerie = this.calcScoreTresorerie(membreId);
    const score = musical.score*w.musical + discipline.score*w.discipline + tresorerie.score*w.tresorerie;
    return {
      score: Math.round(score * 10) / 10,
      musical, discipline, tresorerie,
    };
  },

  // Classement trié (catégorie : 'musical' | 'discipline' | 'tresorerie' | 'global')
  // Restreint aux Choristes (cœur de cible des classements de chorale).
  getClassement(categorie) {
    const choristes = this.data.membres.filter(m => m.statut === 'Choriste');
    const rows = choristes.map(m => {
      let detail;
      if (categorie === 'musical') detail = this.calcScoreMusical(m.id);
      else if (categorie === 'discipline') detail = this.calcScoreDiscipline(m.id);
      else if (categorie === 'tresorerie') detail = this.calcScoreTresorerie(m.id);
      else detail = this.calcScoreGlobal(m.id);
      return { membre: m, score: detail.score, detail };
    });
    rows.sort((a,b) => b.score - a.score);
    rows.forEach((r,i) => { r.rang = i+1; });
    return rows;
  },

  // Instantané mensuel (un seul par mois) pour tracer l'évolution des scores.
  // N'écrit que si l'utilisateur fait partie du bureau/admin (n'importe quel
  // département) afin de ne jamais déclencher d'écriture depuis un compte choriste.
  maybeSnapshotClassements() {
    if (!Permissions || !Permissions.isBureau || !Permissions.isBureau()) return;
    const monthKey = Utils.monthKey();
    if (!this.data.classementsHistorique) this.data.classementsHistorique = [];
    if (this.data.classementsHistorique.some(h => h.monthKey === monthKey)) return;

    const scores = {};
    this.data.membres.filter(m => m.statut === 'Choriste').forEach(m => {
      const g = this.calcScoreGlobal(m.id);
      scores[m.id] = {
        musical: g.musical.score, discipline: g.discipline.score,
        tresorerie: g.tresorerie.score, global: g.score,
      };
    });
    this.data.classementsHistorique.push({ date: Utils.todayISO(), monthKey, scores });
    this.save();
  },

  // Évolution des scores d'un membre (derniers instantanés, triés chronologiquement)
  getClassementEvolution(membreId, limit) {
    const hist = (this.data.classementsHistorique || [])
      .slice()
      .sort((a,b) => a.monthKey.localeCompare(b.monthKey))
      .filter(h => h.scores && h.scores[membreId])
      .map(h => ({ date: h.date, monthKey: h.monthKey, ...h.scores[membreId] }));
    return limit ? hist.slice(-limit) : hist;
  },

  // ── ANNIVERSAIRES ──
  getAnniversaireInfo(membre) {
    if (!membre.dateNaissance) return null;
    const dob = new Date(membre.dateNaissance);
    const today = new Date();
    today.setHours(0,0,0,0);

    const age = today.getFullYear() - dob.getFullYear() -
      ((today.getMonth() < dob.getMonth() || (today.getMonth()===dob.getMonth() && today.getDate()<dob.getDate())) ? 1 : 0);

    let next = new Date(today.getFullYear(), dob.getMonth(), dob.getDate());
    if (next < today) next = new Date(today.getFullYear()+1, dob.getMonth(), dob.getDate());

    const daysRemaining = Math.round((next - today) / (1000*60*60*24));
    const isToday = dob.getMonth() === today.getMonth() && dob.getDate() === today.getDate();
    const isThisMonth = dob.getMonth() === today.getMonth();
    const isThisWeek = daysRemaining >= 0 && daysRemaining <= 7;

    return { age, nextDate: next, daysRemaining, isToday, isThisMonth, isThisWeek };
  },

  // ── LIEN PROFIL LOCAL ↔ MEMBRE ──
  // Associe le profil sélectionné au démarrage (rôle + nom choisi) à un
  // membre de la BDD via son identifiant. Permet de restreindre les
  // actions des choristes à leurs propres données (paiements, etc.)
  getCurrentMembre(membreId) {

  // ── DÉROGATIONS ──
  getDerogations(membreId) {
    let list = (this.data.derogations || []).slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));
    if (membreId) list = list.filter(d => d.membreId === membreId);
    return list;
  },
  getDerogationActive(membreId) {
    const today = Utils.todayISO();
    return (this.data.derogations || []).find(d =>
      d.membreId === membreId &&
      d.statut === 'Autorisé par dérogation' &&
      d.dateExpiration >= today
    ) || null;
  },
  addDerogation(d) {
    if (!this.data.derogations) this.data.derogations = [];
    this.data.derogations.push(d);
    this.save();
  },
  deleteDerogation(id) {
    this.data.derogations = (this.data.derogations || []).filter(d => d.id !== id);
    this.save();
  },

  // ── ÉLIGIBILITÉ À LA PRESTATION (règle complète) ──
  // Retourne: { statut, motif, derogation }
  // statut: '✅ Autorisé' | '⚠️ Autorisé par dérogation' | '❌ Interdit' | '⏳ En attente'
  getEligibilitePrestation(membreId) {
    const dis = this.getDisciplineStats(membreId);
    const membre = this.getMembre(membreId);
    if (!membre) return { statut: '❌ Interdit', motif: 'Membre introuvable', derogation: null };

    // Vérifier dérogation active
    const derog = this.getDerogationActive(membreId);
    if (derog) return { statut: '⚠️ Autorisé par dérogation', motif: derog.motif, derogation: derog };

    // Vérifier décision disciplinaire en attente
    const enAttente = (this.data.derogations || []).find(d =>
      d.membreId === membreId && d.statut === 'En attente'
    );
    if (enAttente) return { statut: '⏳ En attente de décision disciplinaire', motif: enAttente.motif, derogation: enAttente };

    // Règle automatique : 2 absences consécutives
    if (dis.interdit) {
      return { statut: '❌ Interdit de prester', motif: `${dis.currentStreak} absences consécutives au samedi`, derogation: null };
    }

    // Vérifier cotisations impayées (3 mois consécutifs)
    const year = this.data.meta.annee;
    const now = new Date();
    let moisImpayesConsec = 0;
    for (let mo = now.getMonth() + 1; mo >= Math.max(1, now.getMonth() - 2); mo--) {
      const key = `${year}-${String(mo).padStart(2,'0')}`;
      const st = this.getStatutPaiement(membreId, key);
      if (st.statut === 'Impayé' && st.due > 0) moisImpayesConsec++;
      else break;
    }
    if (moisImpayesConsec >= 3) {
      return { statut: '❌ Interdit de prester', motif: `${moisImpayesConsec} mois de cotisations impayées`, derogation: null };
    }

    return { statut: '✅ Autorisé à prester', motif: 'Toutes les conditions sont remplies', derogation: null };
  },

  // ── NOTIFICATIONS ──
  getNotifications(filter) {
    let list = (this.data.notifications || []).slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));
    if (filter) {
      if (filter.lu !== undefined) list = list.filter(n => n.lu === filter.lu);
      if (filter.categorie) list = list.filter(n => n.categorie === filter.categorie);
      if (filter.destinataire) list = list.filter(n => n.destinataire === 'all' || n.destinataire === filter.destinataire);
    }
    return list;
  },
  addNotification(n) {
    if (!this.data.notifications) this.data.notifications = [];
    n.id = n.id || Utils.genId('notif');
    n.date = n.date || Utils.todayISO();
    n.lu = false;
    this.data.notifications.push(n);
    this.save();
  },
  markNotificationLue(id) {
    const n = (this.data.notifications || []).find(x => x.id === id);
    if (n) { n.lu = true; this.save(); }
  },
  markAllNotificationsLues() {
    (this.data.notifications || []).forEach(n => { n.lu = true; });
    this.save();
  },
  deleteNotification(id) {
    this.data.notifications = (this.data.notifications || []).filter(n => n.id !== id);
    this.save();
  },
  countUnreadNotifications() {
    return (this.data.notifications || []).filter(n => !n.lu).length;
  },

  // ── JOURNAL D'AUDIT ──
  logAction(action, module, detail) {
    if (!this.data.auditLog) this.data.auditLog = [];
    const now = new Date();
    this.data.auditLog.unshift({
      id: Utils.genId('log'),
      date: Utils.todayISO(),
      heure: now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
      action,
      module,
      detail: detail || '',
      auteur: (typeof Permissions !== 'undefined') ? Permissions.label() : '?',
    });
    // Garder les 500 dernières entrées
    if (this.data.auditLog.length > 500) this.data.auditLog = this.data.auditLog.slice(0, 500);
    this.save();
  },
  getAuditLog(limit) {
    const list = (this.data.auditLog || []);
    return limit ? list.slice(0, limit) : list;
  },

  // ── MESSAGES DE MOTIVATION ──
  getMotivationMessages() {
    return (this.data.motivationMessages || []).slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));
  },
  getMotivationMessageActif() {
    const msgs = (this.data.motivationMessages || []).filter(m => m.actif);
    if (!msgs.length) return null;
    return msgs.sort((a,b) => (b.date||'').localeCompare(a.date||''))[0];
  },
  addMotivationMessage(m) {
    if (!this.data.motivationMessages) this.data.motivationMessages = [];
    this.data.motivationMessages.push(m);
    this.save();
  },
  updateMotivationMessage(id, patch) {
    const m = (this.data.motivationMessages || []).find(x => x.id === id);
    if (m) { Object.assign(m, patch); this.save(); }
  },
  deleteMotivationMessage(id) {
    this.data.motivationMessages = (this.data.motivationMessages || []).filter(m => m.id !== id);
    this.save();
  },
};

// ===== ROUTER =====
// ════════════════════════════════════════════════════════════════
// ROUTER — navigation entre modules (SPA simple)
// ════════════════════════════════════════════════════════════════

const Router = {
  routes: {},
  current: null,

  register(name, renderFn) {
    this.routes[name] = renderFn;
  },

  navigate(name, params) {
    this.current = name;
    window.location.hash = '#' + name;
    this.render(params);
    this.updateNav();
    document.getElementById('app-main').scrollTop = 0;
  },

  render(params) {
    const main = document.getElementById('app-main');
    const fn = this.routes[this.current];

    // Garde-fou RBAC : un membre du bureau ne peut accéder qu'au département
    // qui lui a été attribué, plus les départements partagés/étendus qui lui
    // sont explicitement accordés (cf. SHARED_BUREAU_DEPTS / EXTRA_DEPTS_FOR).
    // Ce contrôle protège aussi contre une navigation directe par hash.
    const requiredDept = typeof DEPT_FOR_ROUTE !== 'undefined' ? DEPT_FOR_ROUTE[this.current] : null;
    if (requiredDept && Permissions.role === 'bureau' && !Permissions.isAdmin() && !Permissions._hasExtendedDeptAccess(requiredDept)) {
      const dLabel = (DEPARTEMENTS.find(d => d.key === requiredDept) || {}).label || requiredDept;
      main.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">🔒</div>
          <div class="empty-state__text">Accès restreint<br>Ce module (${dLabel}) n'est géré que par le responsable de ce département.</div>
        </div>
      `;
      return;
    }

    if (fn) {
      main.innerHTML = '';
      fn(main, params);
    } else {
      main.innerHTML = '<div class="empty-state"><div class="empty-state__icon">??</div><div class="empty-state__text">Page introuvable</div></div>';
    }
  },

  updateNav() {
    document.querySelectorAll('.nav-item').forEach(function(el) {
      el.classList.toggle('active', el.dataset.route === Router.current);
    });
  },

  init() {
    const initial = (window.location.hash || '#dashboard').slice(1);
    this.current = this.routes[initial] ? initial : 'dashboard';
    this.render();
    this.updateNav();

    window.addEventListener('hashchange', () => {
      const r = window.location.hash.slice(1);
      if (this.routes[r]) {
        this.current = r;
        this.render();
        this.updateNav();
      }
    });
  },
};

const DEPARTEMENTS = [

  { key: 'discipline',  label: 'Discipline',                       icon: '⚖️' },

];

// Routes de navigation correspondant chacune à un département ci-dessus
// (utilisé pour filtrer la navigation et bloquer l'accès direct par URL).
const DEPT_FOR_ROUTE = {
  membres: 'membres', discipline: 'discipline', tresorerie: 'tresorerie',
  secretariat: 'secretariat', direction: 'direction',

// ── Extensions de droits (additif) ──────────────────────────────────
// SHARED_BUREAU_DEPTS : départements accessibles (consultation + gestion)
// par TOUT compte Bureau, quel que soit son département attitré.
// → "Membres" : tout le bureau peut consulter, ajouter et modifier les
//   membres, en plus de la gestion de son propre département.
const SHARED_BUREAU_DEPTS = ['membres'];

// EXTRA_DEPTS_FOR : départements supplémentaires accordés au titulaire
// d'UN département précis (en plus du sien).
// → Le Bureau "Direction Technique" gère aussi entièrement les

const EXTRA_DEPTS_FOR = {

};

// ===== PROFIL LOCAL (rôle + département + identité) =====
// ════════════════════════════════════════════════════════════════
// PROFIL LOCAL — remplace l'authentification Firebase.
// Sans serveur central, il n'y a plus de compte ni de mot de passe :
// chaque utilisateur choisit simplement son profil au démarrage, sur
// SON appareil. Ce choix est mémorisé dans le localStorage de cet
// appareil (clé ci-dessous) afin de ne pas le redemander à chaque fois.
//
// ⚠️ Important : ceci n'est PAS un mécanisme de sécurité réel (n'importe
// qui ayant accès à l'appareil peut se déclarer "Administrateur"). C'est
// un simple aiguillage d'interface, adapté à un usage de confiance au
// sein d'une même chorale, sur des appareils partagés ou personnels.
// ════════════════════════════════════════════════════════════════

const PROFILE_KEY = 'chorale_erp_profile_v1';

const LocalProfile = {
  load() {
    try {
      const raw = localStorage.getItem(PROFILE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  },
  save(profile) {
    try { localStorage.setItem(PROFILE_KEY, JSON.stringify(profile)); } catch (e) {}
  },
  clear() {
    try { localStorage.removeItem(PROFILE_KEY); } catch (e) {}
  },
};

// Durée d'inactivité avant déconnexion automatique (15 minutes).
const INACTIVITY_TIMEOUT_MS = 15 * 60 * 1000;
const SESSION_KEY = 'chorale_erp_session_v1';

// ════════════════════════════════════════════════════════════════
// SESSION GUARD — Expiration réelle de la session (et non un simple
// minuteur en mémoire) : l'horodatage de dernière activité est gardé
// dans le localStorage, donc fermer l'onglet/le navigateur plus de
// 15 minutes force une reconnexion, exactement comme l'inactivité
// pendant l'utilisation.
// ════════════════════════════════════════════════════════════════
const SessionGuard = {
  touch() {
    try { localStorage.setItem(SESSION_KEY, String(Date.now())); } catch (e) {}
  },
  isExpired() {
    try {
      const last = Number(localStorage.getItem(SESSION_KEY));
      return !last || (Date.now() - last) > INACTIVITY_TIMEOUT_MS;
    } catch (e) { return true; }
  },
  clear() {
    try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
  },
};

// ===== PERMISSIONS (rôles) =====
// ════════════════════════════════════════════════════════════════
// PERMISSIONS — Rôles & contrôle d'accès (admin / bureau / choriste)
// ════════════════════════════════════════════════════════════════
//
// Rôles :
//   - admin   : contrôle total (tous les modules, tous les départements,
//               gestion des paramètres de l'application)
//   - bureau  : gestion complète, mais UNIQUEMENT du département qui lui
//               a été attribué (ex: le trésorier ne gère que la
//               Trésorerie). Lecture seule ailleurs.
//   - choriste: lecture seule partout + création de suggestions et
//               déclaration de ses propres paiements (sans validation)

const Permissions = {
  role: 'choriste',       // valeur par défaut la plus restrictive
  departement: null,      // département géré, déduit automatiquement du login Bureau
  bureauId: null,         // identifiant du compte Bureau connecté (pour changement de mot de passe)
  choristeMembreId: null, // identité individuelle du choriste connecté (additif — voir setProfile)

  // Applique un profil (déterminé par le formulaire de connexion)
  setProfile({ role, departement, bureauId, choristeMembreId }) {
    this.role = role || 'choriste';
    this.departement = role === 'bureau' ? (departement || null) : null;
    this.bureauId = role === 'bureau' ? (bureauId || null) : null;
    this.choristeMembreId = role === 'choriste' ? (choristeMembreId || null) : null;
    LocalProfile.save({ role: this.role, departement: this.departement, bureauId: this.bureauId, choristeMembreId: this.choristeMembreId });
  },

  clearProfile() {
    this.role = 'choriste';
    this.departement = null;
    this.bureauId = null;
    this.choristeMembreId = null;
    LocalProfile.clear();
  },

  // Membre (fiche) correspondant au choriste actuellement connecté.
  getChoristeMembre() {
    if (!this.choristeMembreId) return null;
    return Store.getMembre(this.choristeMembreId) || null;
  },

  isAdmin()   { return this.role === 'admin'; },
  isBureau()  { return this.role === 'bureau' || this.role === 'admin'; },
  isChoriste(){ return this.role === 'choriste'; },

  // Nom affiché pour l'utilisateur courant (profils partagés par rôle,
  // il n'y a plus d'identité individuelle liée à la connexion)
  displayName() {
    return this.label();
  },

  // Détermine si le profil courant a accès de gestion à un département
  // donné, en tenant compte : 1) de son propre département (comportement
  // d'origine), 2) des départements partagés avec tout le bureau
  // (SHARED_BUREAU_DEPTS, ex: Membres), 3) des départements supplémentaires
  // accordés à un département précis (EXTRA_DEPTS_FOR, ex: Direction
  // Technique → Prestations/Répétitions). N'enlève aucun droit existant,
  // n'en ajoute qu'aux cas explicitement prévus.
  _hasExtendedDeptAccess(dept) {
    if (this.role !== 'bureau') return false;
    if (this.departement === dept) return true;
    if (SHARED_BUREAU_DEPTS.indexOf(dept) !== -1) return true;
    const extra = EXTRA_DEPTS_FOR[this.departement];
    if (extra && extra.indexOf(dept) !== -1) return true;
    return false;
  },

  // Peut créer/modifier/supprimer les données d'un département donné.
  // Sans argument : vérifie simplement "fait partie du bureau/admin"
  // (utilisé pour des actions transverses non liées à un département
  // précis, comme la gestion générale des suggestions).
  canManageData(dept) {
    if (this.isAdmin()) return true;
    if (this.role !== 'bureau') return false;
    if (!dept) return true;
    return this._hasExtendedDeptAccess(dept);
  },

  // Peut accéder en LECTURE à un module-département donné (le bureau ne
  // voit que son propre département (+ extensions ci-dessus) ; l'admin et
  // les choristes voient tout en lecture).
  canViewDept(dept) {
    if (this.isAdmin() || this.isChoriste()) return true;
    return this._hasExtendedDeptAccess(dept);
  },

  // Bannière lecture seule — affichée en haut des modules quand un choriste
  // consulte un département dont il ne peut pas modifier les données.
  readOnlyBanner() {
    if (!this.isChoriste()) return '';
    return `<div class="alert-banner info" style="margin-bottom:10px;">
      <div class="alert-banner__icon">👁️</div>
      <div><b>Mode consultation</b> — Vous pouvez consulter ces informations mais pas les modifier.</div>
    </div>`;
  },

  // Peut valider/refuser/déclarer un paiement de cotisation pour
  // n'importe quel membre (réservé au trésorier/admin — comptes
  // partagés, il n'y a plus d'auto-déclaration individuelle "pour soi")
  canValidatePayments() {
    return this.isAdmin() || (this.role === 'bureau' && this.departement === 'tresorerie');
  },
  canDeclarePaymentFor() {
    return this.canValidatePayments();
  },

  // Gestion des suggestions : ouverte à tout le bureau (n'importe quel
  // département), car une suggestion peut concerner n'importe quel sujet.
  canReadAllSuggestions() { return this.isBureau(); },
  canManageSuggestions()  { return this.isBureau(); }, // répondre, archiver, classer
  canCreateSuggestion()   { return true; },             // tout profil

  // Gestion des paramètres globaux de l'application (réservé à l'admin)
  canManageUsers()    { return this.isAdmin(); },
  canManageSettings() { return this.isAdmin(); },

  // ── Restrictions additionnelles du rôle Choriste (accès très limité) ──
  // Un choriste ne voit que ses propres informations dans Membres,
  // Discipline et Trésorerie ; certains sous-onglets lui sont masqués
  // dans Secrétariat et Musique. N'affecte ni l'Admin ni le Bureau.
  choristeRestricted() { return this.isChoriste(); },

  // Libellé lisible
  label() {
    switch (this.role) {
      case 'admin': return '👑 Administrateur';
      case 'bureau': {
        const d = DEPARTEMENTS.find(x => x.key === this.departement);
        return '🗂️ Bureau' + (d ? ' — ' + d.label : '');
      }
      default: return '🎵 Choriste';
    }
  },

  // Affiche un message de refus standard
  denyToast() {
    Utils.toast('⛔ Action non autorisée pour votre profil (' + this.label() + ')');
  },
};

// Permet à l'Administrateur et aux comptes Bureau de changer leur propre

// modifiés : les nouveaux mots de passe sont stockés à part, dans le
// localStorage de cet appareil, et consultés en priorité à la connexion.
// (Choisir un nouveau mot de passe sur un appareil ne le change pas sur
// les autres appareils, puisqu'il n'y a pas de serveur central.)
// ════════════════════════════════════════════════════════════════

const CREDENTIALS_OVERRIDE_KEY = 'chorale_erp_credentials_v1';

const CredentialsStore = {
  _read() {
    try {
      const raw = localStorage.getItem(CREDENTIALS_OVERRIDE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) { return {}; }
  },
  _write(obj) {
    try { localStorage.setItem(CREDENTIALS_OVERRIDE_KEY, JSON.stringify(obj)); } catch (e) {}
  },
  getAdminPassword() {
    const o = this._read();
    return o.admin || ADMIN_PASSWORD;
  },
  setAdminPassword(newPassword) {
    const o = this._read();
    o.admin = newPassword;
    this._write(o);
  },
  getBureauPassword(bureauId) {
    const o = this._read();
    if (o.bureau && o.bureau[bureauId]) return o.bureau[bureauId];
    return BUREAU_ACCOUNTS[bureauId] ? BUREAU_ACCOUNTS[bureauId].password : null;
  },
  setBureauPassword(bureauId, newPassword) {
    const o = this._read();
    if (!o.bureau) o.bureau = {};
    o.bureau[bureauId] = newPassword;
    this._write(o);
  },
};

// ===== SÉCURITÉ DE CONNEXION (anti-bruteforce) =====
// ════════════════════════════════════════════════════════════════
// Limite les tentatives de connexion : 5 essais max, puis blocage de
// 5 minutes. L'état est gardé dans le localStorage (et non en mémoire)
// afin de résister à un simple rechargement de la page.
// ════════════════════════════════════════════════════════════════

const LOGIN_LOCKOUT_KEY = 'chorale_erp_login_lockout_v1';
const MAX_LOGIN_ATTEMPTS = 5;
const LOCKOUT_DURATION_MS = 5 * 60 * 1000;

const LoginSecurity = {
  _read() {
    try {
      const raw = localStorage.getItem(LOGIN_LOCKOUT_KEY);
      return raw ? JSON.parse(raw) : { attempts: 0, lockedUntil: 0 };
    } catch (e) { return { attempts: 0, lockedUntil: 0 }; }
  },
  _write(state) {
    try { localStorage.setItem(LOGIN_LOCKOUT_KEY, JSON.stringify(state)); } catch (e) {}
  },
  isLocked() {
    return this._read().lockedUntil > Date.now();
  },
  remainingLockSeconds() {
    return Math.max(0, Math.ceil((this._read().lockedUntil - Date.now()) / 1000));
  },
  attemptsLeft() {
    return Math.max(0, MAX_LOGIN_ATTEMPTS - this._read().attempts);
  },
  recordFailure() {
    const s = this._read();
    s.attempts = (s.attempts || 0) + 1;
    if (s.attempts >= MAX_LOGIN_ATTEMPTS) {
      s.lockedUntil = Date.now() + LOCKOUT_DURATION_MS;
      s.attempts = 0;
    }
    this._write(s);
  },
  recordSuccess() {
    this._write({ attempts: 0, lockedUntil: 0 });
  },
};
