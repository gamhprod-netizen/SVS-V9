  // ── IGI CALCULATION ──
  calcIGI(membreId) {
    const membre = this.getMembre(membreId);
    if (!membre) return null;

    const dis = this.getDisciplineStats(membreId);
    const scoreDiscipline = Math.round(dis.txSamedi * 25 * 10) / 10;

    const monthKeys = [];
    const year = this.data.meta.annee;
    for (let m=1;m<=12;m++) monthKeys.push(`${year}-${String(m).padStart(2,'0')}`);
    const due = this.getCotisationDueAnnuel(membre, year);
    const paid = monthKeys.reduce((sum,k)=>sum + this.getCotisation(membreId,k), 0);
    const txCotis = due > 0 ? Math.min(paid/due, 1) : 0;
    const scoreTresorerie = Math.round(txCotis * 25 * 10) / 10;

    const modCount = this.data.moderations.filter(m => m.moderateur === membre.nom).length;
    const scoreSecretariat = Math.min(Math.round(modCount * 5 * 10)/10, 25);

    const evalData = this.getEvaluation(membreId);
    let moyMusicale = 0;
    if (evalData && evalData.notes) {
      const vals = Object.values(evalData.notes);
      moyMusicale = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
    }
    const scoreMusical = Math.round((moyMusicale/20)*25*10)/10;

    const igi = Math.round((scoreDiscipline + scoreTresorerie + scoreSecretariat + scoreMusical)*10)/10;

    let categorie;
    if (igi >= 90) categorie = '🌟 Exemplaire';
    else if (igi >= 75) categorie = '⭐ Très impliqué';
    else if (igi >= 55) categorie = '✔️ Impliqué';
    else if (igi >= 35) categorie = '⚠️ Peu impliqué';
    else categorie = '🆘 À accompagner';

    return {
      scoreDiscipline, scoreTresorerie, scoreSecretariat, scoreMusical,
      igi, categorie, txSamedi: dis.txSamedi, txDimanche: dis.txDimanche,
      txCotis, moyMusicale, alertePrestation: dis.interdit,
    };
  },

  // ════════════════════════════════════════════════════════════════
  // CLASSEMENTS AUTOMATIQUES — Musical · Discipline · Trésorerie · Global
  // ────────────────────────────────────────────────────────────────
  // Système indépendant de l'IGI (qui reste inchangé et continue d'alimenter
  // le Dashboard/Rapports existants). Les classements ci-dessous répondent
  // précisément aux critères demandés pour l'étape ERP : ils sont calculés
  // à la volée à partir des données déjà présentes (présences, évaluations,
  // sanctions, cotisations, prestations) — aucune nouvelle saisie requise.
  // ════════════════════════════════════════════════════════════════

  CLASSEMENT_WEIGHTS: { musical: 0.4, discipline: 0.3, tresorerie: 0.3 },

  // ── Musical : présences, prestations, évaluations, assiduité ──
  calcScoreMusical(membreId) {
    const dis = this.getDisciplineStats(membreId);
    const tauxAssiduite = dis.txSamedi * 0.7 + dis.txDimanche * 0.3;

    const evalData = this.getEvaluation(membreId);
    let moyMusicale = 0;
    if (evalData && evalData.notes) {
      const vals = Object.values(evalData.notes);
      moyMusicale = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
    }
    const tauxEval = moyMusicale / 20;

    // Participation aux prestations réalisées (si pointage renseigné)
    const prestations = (this.data.prestations || []).filter(p => p.statut === 'Réalisée' && p.presences);
    let prestPresent = 0, prestTotal = 0;
    prestations.forEach(p => {
      const st = p.presences[membreId];
      if (!st || st === '—') return;
      prestTotal++;
      if (st === 'Présent') prestPresent++;
    });

    const composantes = [
      { v: tauxAssiduite, w: 0.45 },
      { v: tauxEval,       w: 0.40 },
    ];
    if (prestTotal > 0) composantes.push({ v: prestPresent / prestTotal, w: 0.15 });

    const sommeW = composantes.reduce((s,c)=>s+c.w, 0);
    const score = sommeW > 0 ? composantes.reduce((s,c)=>s + c.v*c.w, 0) / sommeW * 100 : 0;

    return {
      score: Math.round(score * 10) / 10,
      tauxAssiduite, moyMusicale, txSamedi: dis.txSamedi, txDimanche: dis.txDimanche,
      prestPresent, prestTotal,
    };
  },

  // ── Discipline : ponctualité, avertissements, respect des règles ──
  calcScoreDiscipline(membreId) {
    const dis = this.getDisciplineStats(membreId);
    const attendu = dis.present + dis.retardJ + dis.retardNJ;
    const ponctualite = attendu > 0 ? dis.present / attendu : 1;

    const membre = this.getMembre(membreId);
    const nbSanctions = membre ? this.data.sanctions.filter(s => s.membre === membre.nom).length : 0;
    const scoreAvertissements = Math.max(0, 100 - nbSanctions * 20) / 100;

    let respectRegles = dis.total > 0 ? 1 - (dis.absNJ / dis.total) : 1;
    if (dis.interdit) respectRegles = Math.min(respectRegles, 0.3);

    const score = (ponctualite*0.4 + scoreAvertissements*0.3 + respectRegles*0.3) * 100;

    return {
      score: Math.round(score * 10) / 10,
      ponctualite, nbSanctions, respectRegles, interdit: dis.interdit,
    };
  },

  // ── Trésorerie : cotisations, régularité des paiements, retards ──
  calcScoreTresorerie(membreId) {
    const membre = this.getMembre(membreId);
    if (!membre) return { score: 0, tauxCotis: 0, regularite: 1 };

    const year = this.data.meta.annee;
    const now = new Date();
    const moisEcoules = now.getFullYear() === year ? (now.getMonth() + 1) : (now.getFullYear() > year ? 12 : 0);

    let due = 0, paid = 0;
    for (let mo = 1; mo <= Math.max(moisEcoules, 1); mo++) {
      const key = `${year}-${String(mo).padStart(2,'0')}`;
      due += this.getCotisationDue(membre, key);
      paid += this.getCotisation(membreId, key);
    }
    const tauxCotis = due > 0 ? Math.min(paid/due, 1) : 1;

    const valides = this.getPaiements({ membreId, statut: 'Validé' });
    let onTime = 0;
    valides.forEach(p => {
      if (!p.datePaiement || !p.monthKey) { onTime++; return; }
      const moisPaiement = p.datePaiement.slice(0,7);
      if (moisPaiement <= p.monthKey) onTime++;
    });
    const regularite = valides.length > 0 ? onTime / valides.length : 1;

    const score = (tauxCotis*0.6 + regularite*0.4) * 100;

    return {
      score: Math.round(score * 10) / 10,
      tauxCotis, regularite, retards: valides.length - onTime,
    };
  },

  // ── Global : combinaison pondérée des 3 scores ──
  calcScoreGlobal(membreId) {
    const w = this.CLASSEMENT_WEIGHTS;
    const musical = this.calcScoreMusical(membreId);
    const discipline = this.calcScoreDiscipline(membreId);
    const tresorerie = this.calcScoreTresorerie(membreId);
    const score = musical.score*w.musical + discipline.score*w.discipline + tresorerie.score*w.tresorerie;
    return {
      score: Math.round(score * 10) / 10,
      musical, discipline, tresorerie,
    };
  },

  // Classement trié (catégorie : 'musical' | 'discipline' | 'tresorerie' | 'global')
  // Règles (7.3) :
  //  - Classements par département (musical/discipline/tresorerie) : Choristes
  //    + membres du Bureau, statut "Actif" uniquement ; exclut les Intégrants
  //    ainsi que le Responsable Principal et le Responsable Adjoint du
  //    département concerné (basé sur le champ "fonction").
  //  - Classement général (global) : uniquement les Choristes "Actif" ;
  //    exclut tous les Intégrants et tous les membres du Bureau.
  CLASSEMENT_EXCLUSIONS: {
    tresorerie: ['Trésorier(e) Principal(e)', 'Trésorier(e) Adjoint(e)'],
    discipline: ['Chargé(e) de Discipline Principal(e)', 'Chargé(e) de Discipline Adjoint(e)'],
    musical:    ['Directeur de Chœur Principal', 'Directeur de Chœur Adjoint(e)'],
  },
  getClassement(categorie) {
    let pool;
    if (categorie === 'global') {
      pool = this.data.membres.filter(m => m.statut === 'Choriste' && m.situation === 'Actif');
    } else {
      const excluded = this.CLASSEMENT_EXCLUSIONS[categorie] || [];
      pool = this.data.membres.filter(m =>
        (m.statut === 'Choriste' || m.statut === 'Bureau') &&
        m.situation === 'Actif' &&
        excluded.indexOf(m.fonction) === -1
      );
    }
    const rows = pool.map(m => {
      let detail;
      if (categorie === 'musical') detail = this.calcScoreMusical(m.id);
      else if (categorie === 'discipline') detail = this.calcScoreDiscipline(m.id);
      else if (categorie === 'tresorerie') detail = this.calcScoreTresorerie(m.id);
      else detail = this.calcScoreGlobal(m.id);
      return { membre: m, score: detail.score, detail };
    });
    rows.sort((a,b) => b.score - a.score);
    rows.forEach((r,i) => { r.rang = i+1; });
    return rows;
  },

  // Instantané mensuel (un seul par mois) pour tracer l'évolution des scores.
  // N'écrit que si l'utilisateur fait partie du bureau/admin (n'importe quel
  // département) afin de ne jamais déclencher d'écriture depuis un compte choriste.
  maybeSnapshotClassements() {
    if (!Permissions || !Permissions.isBureau || !Permissions.isBureau()) return;
    const monthKey = Utils.monthKey();
    if (!this.data.classementsHistorique) this.data.classementsHistorique = [];
    if (this.data.classementsHistorique.some(h => h.monthKey === monthKey)) return;

    const scores = {};
    this.data.membres.filter(m => m.statut === 'Choriste').forEach(m => {
      const g = this.calcScoreGlobal(m.id);
      scores[m.id] = {
        musical: g.musical.score, discipline: g.discipline.score,
        tresorerie: g.tresorerie.score, global: g.score,
      };
    });
    this.data.classementsHistorique.push({ date: Utils.todayISO(), monthKey, scores });
    this.save();
  },

  // Évolution des scores d'un membre (derniers instantanés, triés chronologiquement)
  getClassementEvolution(membreId, limit) {
    const hist = (this.data.classementsHistorique || [])
      .slice()
      .sort((a,b) => a.monthKey.localeCompare(b.monthKey))
      .filter(h => h.scores && h.scores[membreId])
      .map(h => ({ date: h.date, monthKey: h.monthKey, ...h.scores[membreId] }));
    return limit ? hist.slice(-limit) : hist;
  },

  // ── ANNIVERSAIRES ──
  getAnniversaireInfo(membre) {
    if (!membre.dateNaissance) return null;
    const dob = new Date(membre.dateNaissance);
    const today = new Date();
    today.setHours(0,0,0,0);

    const age = today.getFullYear() - dob.getFullYear() -
      ((today.getMonth() < dob.getMonth() || (today.getMonth()===dob.getMonth() && today.getDate()<dob.getDate())) ? 1 : 0);

    let next = new Date(today.getFullYear(), dob.getMonth(), dob.getDate());
    if (next < today) next = new Date(today.getFullYear()+1, dob.getMonth(), dob.getDate());

    const daysRemaining = Math.round((next - today) / (1000*60*60*24));
    const isToday = dob.getMonth() === today.getMonth() && dob.getDate() === today.getDate();
    const isThisMonth = dob.getMonth() === today.getMonth();
    const isThisWeek = daysRemaining >= 0 && daysRemaining <= 7;

    return { age, nextDate: next, daysRemaining, isToday, isThisMonth, isThisWeek };
  },

  // ── EXPORT / IMPORT ──
  exportJSON() {
    return JSON.stringify(this.data, null, 2);
  },
  importJSON(json) {
    try {
      const parsed = JSON.parse(json);
      this.data = this._merge(structuredClone(SEED_DATA), parsed);
      this.save();
      return true;
    } catch(e) {
      console.error('Import error', e);
      return false;
    }
  },
  resetAll() {
    this.data = structuredClone(SEED_DATA);
    this.save();
  },

  // ── IDENTITÉ DE LA CHORALE ──
  getChoraleIdentite() {
    return this.data.meta || {};
  },
  saveChoraleIdentite(patch) {
    Object.assign(this.data.meta, patch);
    this.save();
  },

  // ── LIEN PROFIL LOCAL ↔ MEMBRE ──
  // Associe le profil sélectionné au démarrage (rôle + nom choisi) à un
  // membre de la BDD via son identifiant. Permet de restreindre les
  // actions des choristes à leurs propres données (paiements, etc.)
  getCurrentMembre(membreId) {
    if (!membreId) return null;
    return this.data.membres.find(m => m.id === membreId) || null;
  },

  // ── DÉROGATIONS ──
  getDerogations(membreId) {
    let list = (this.data.derogations || []).slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));
    if (membreId) list = list.filter(d => d.membreId === membreId);
    return list;
  },
  getDerogationActive(membreId) {
    const today = Utils.todayISO();
    return (this.data.derogations || []).find(d =>
      d.membreId === membreId &&
      d.statut === 'Autorisé par dérogation' &&
      d.dateExpiration >= today
    ) || null;
  },
  addDerogation(d) {
    if (!this.data.derogations) this.data.derogations = [];
    this.data.derogations.push(d);
    this.save();
  },
  deleteDerogation(id) {
    this.data.derogations = (this.data.derogations || []).filter(d => d.id !== id);
    this.save();
  },

  // ── ÉLIGIBILITÉ À LA PRESTATION (règle complète) ──
  // Retourne: { statut, motif, derogation }
  // statut: '✅ Autorisé' | '⚠️ Autorisé par dérogation' | '❌ Interdit' | '⏳ En attente'
  getEligibilitePrestation(membreId) {
    const dis = this.getDisciplineStats(membreId);
    const membre = this.getMembre(membreId);
    if (!membre) return { statut: '❌ Interdit', motif: 'Membre introuvable', derogation: null };

    // Vérifier dérogation active
    const derog = this.getDerogationActive(membreId);
    if (derog) return { statut: '⚠️ Autorisé par dérogation', motif: derog.motif, derogation: derog };

    // Vérifier décision disciplinaire en attente
    const enAttente = (this.data.derogations || []).find(d =>
      d.membreId === membreId && d.statut === 'En attente'
    );
    if (enAttente) return { statut: '⏳ En attente de décision disciplinaire', motif: enAttente.motif, derogation: enAttente };

    // Règle automatique : 2 absences consécutives
    if (dis.interdit) {
      return { statut: '❌ Interdit de prester', motif: `${dis.currentStreak} absences consécutives au samedi`, derogation: null };
    }

    // Vérifier cotisations impayées (3 mois consécutifs)
    const year = this.data.meta.annee;
    const now = new Date();
    let moisImpayesConsec = 0;
    for (let mo = now.getMonth() + 1; mo >= Math.max(1, now.getMonth() - 2); mo--) {
      const key = `${year}-${String(mo).padStart(2,'0')}`;
      const st = this.getStatutPaiement(membreId, key);
      if (st.statut === 'Impayé' && st.due > 0) moisImpayesConsec++;
      else break;
    }
    if (moisImpayesConsec >= 3) {
      return { statut: '❌ Interdit de prester', motif: `${moisImpayesConsec} mois de cotisations impayées`, derogation: null };
    }

    return { statut: '✅ Autorisé à prester', motif: 'Toutes les conditions sont remplies', derogation: null };
  },

  // ── NOTIFICATIONS ──
  getNotifications(filter) {
    let list = (this.data.notifications || []).slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));
    if (filter) {
      if (filter.lu !== undefined) list = list.filter(n => n.lu === filter.lu);
      if (filter.categorie) list = list.filter(n => n.categorie === filter.categorie);
      if (filter.destinataire) list = list.filter(n => n.destinataire === 'all' || n.destinataire === filter.destinataire);
    }
    return list;
  },
  addNotification(n) {
    if (!this.data.notifications) this.data.notifications = [];
    n.id = n.id || Utils.genId('notif');
    n.date = n.date || Utils.todayISO();
    n.lu = false;
    this.data.notifications.push(n);
    this.save();
  },
  markNotificationLue(id) {
    const n = (this.data.notifications || []).find(x => x.id === id);
    if (n) { n.lu = true; this.save(); }
  },
  markAllNotificationsLues() {
    (this.data.notifications || []).forEach(n => { n.lu = true; });
    this.save();
  },
  deleteNotification(id) {
    this.data.notifications = (this.data.notifications || []).filter(n => n.id !== id);
    this.save();
  },
  countUnreadNotifications() {
    return (this.data.notifications || []).filter(n => !n.lu).length;
  },

  // ── JOURNAL D'AUDIT ──
  logAction(action, module, detail) {
    if (!this.data.auditLog) this.data.auditLog = [];
    const now = new Date();
    this.data.auditLog.unshift({
      id: Utils.genId('log'),
      date: Utils.todayISO(),
      heure: now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
      action,
      module,
      detail: detail || '',
      auteur: (typeof Permissions !== 'undefined') ? Permissions.label() : '?',
    });
    // Garder les 500 dernières entrées
    if (this.data.auditLog.length > 500) this.data.auditLog = this.data.auditLog.slice(0, 500);
    this.save();
  },
  getAuditLog(limit) {
    const list = (this.data.auditLog || []);
    return limit ? list.slice(0, limit) : list;
  },

  // ── MESSAGES DE MOTIVATION ──
  getMotivationMessages() {
    return (this.data.motivationMessages || []).slice().sort((a,b) => (b.date||'').localeCompare(a.date||''));
  },
  getMotivationMessageActif() {
    const msgs = (this.data.motivationMessages || []).filter(m => m.actif);
    if (!msgs.length) return null;
    return msgs.sort((a,b) => (b.date||'').localeCompare(a.date||''))[0];
  },
  addMotivationMessage(m) {
    if (!this.data.motivationMessages) this.data.motivationMessages = [];
    this.data.motivationMessages.push(m);
    this.save();
  },
  updateMotivationMessage(id, patch) {
    const m = (this.data.motivationMessages || []).find(x => x.id === id);
    if (m) { Object.assign(m, patch); this.save(); }
  },
  deleteMotivationMessage(id) {
    this.data.motivationMessages = (this.data.motivationMessages || []).filter(m => m.id !== id);
    this.save();
  },
};

// ===== ROUTER =====
// ════════════════════════════════════════════════════════════════
// ROUTER — navigation entre modules (SPA simple)
// ════════════════════════════════════════════════════════════════

const Router = {
  routes: {},
  current: null,

  register(name, renderFn) {
    this.routes[name] = renderFn;
  },

  navigate(name, params) {
    this.current = name;
    window.location.hash = '#' + name;
    this.render(params);
    this.updateNav();
    document.getElementById('app-main').scrollTop = 0;
  },

  render(params) {
    const main = document.getElementById('app-main');
    const fn = this.routes[this.current];

    // Garde-fou RBAC : un membre du bureau ne peut accéder qu'au département
    // qui lui a été attribué, plus les départements partagés/étendus qui lui
    // sont explicitement accordés (cf. SHARED_BUREAU_DEPTS / EXTRA_DEPTS_FOR).
    // Ce contrôle protège aussi contre une navigation directe par hash.
    const requiredDept = typeof DEPT_FOR_ROUTE !== 'undefined' ? DEPT_FOR_ROUTE[this.current] : null;
    if (requiredDept && Permissions.role === 'bureau' && !Permissions.isAdmin() && !Permissions._hasExtendedDeptAccess(requiredDept)) {
      const dLabel = (DEPARTEMENTS.find(d => d.key === requiredDept) || {}).label || requiredDept;
      main.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">🔒</div>
          <div class="empty-state__text">Accès restreint<br>Ce module (${dLabel}) n'est géré que par le responsable de ce département.</div>
        </div>
      `;
      return;
    }

    if (fn) {
      main.innerHTML = '';
      fn(main, params);
    } else {
      main.innerHTML = '<div class="empty-state"><div class="empty-state__icon">??</div><div class="empty-state__text">Page introuvable</div></div>';
    }
  },

  updateNav() {
    document.querySelectorAll('.nav-item').forEach(function(el) {
      el.classList.toggle('active', el.dataset.route === Router.current);
    });
  },

  init() {
    const initial = (window.location.hash || '#dashboard').slice(1);
    this.current = this.routes[initial] ? initial : 'dashboard';
    this.render();
    this.updateNav();

    window.addEventListener('hashchange', () => {
      const r = window.location.hash.slice(1);
      if (this.routes[r]) {
        this.current = r;
        this.render();
        this.updateNav();
      }
    });
  },
};

// ===== DÉPARTEMENTS (bureau) =====
// ════════════════════════════════════════════════════════════════
// Liste des départements/commissions pouvant être confiés à un membre
// du bureau. Chaque département correspond à un module de gestion :
// un membre du bureau n'a les droits d'écriture QUE sur le département
// qui lui a été attribué (RBAC). L'administrateur a accès à tout.
// ════════════════════════════════════════════════════════════════

const DEPARTEMENTS = [
  { key: 'secretariat', label: 'Secrétariat',       icon: '📅' },
  { key: 'tresorerie',  label: 'Trésorerie',        icon: '💰' },
  { key: 'discipline',  label: 'Discipline',         icon: '⚖️' },
  { key: 'direction',   label: 'Direction Technique',icon: '🎼' },
];
// NB : "Membres" n'est pas un département — c'est un accès partagé
// accordé à tout le bureau (SHARED_BUREAU_DEPTS ci-dessous).
// Prestations et Répétitions font partie de la Direction Technique
// (EXTRA_DEPTS_FOR ci-dessous).

// Routes de navigation → département responsable.
// prestations et repetitions sont sous la Direction Technique.
// membres = accès partagé tout-bureau (null = pas de restriction dept).
const DEPT_FOR_ROUTE = {
  membres:     null,
  discipline:  'discipline',
  tresorerie:  'tresorerie',
  secretariat: 'secretariat',
  direction:   'direction',
  prestations: 'direction',
  repetitions: 'direction',
};

// ── Extensions de droits (additif) ──────────────────────────────────
// SHARED_BUREAU_DEPTS : modules gérables par TOUT le bureau.
// "membres" : consultation + modification accessibles à tous les depts.
const SHARED_BUREAU_DEPTS = ['membres'];

// EXTRA_DEPTS_FOR : modules supplémentaires inclus dans un département.
// La Direction Technique couvre aussi Prestations et Répétitions.
const EXTRA_DEPTS_FOR = {
  direction: ['prestations', 'repetitions'],
};

// ===== PROFIL LOCAL (rôle + département + identité) =====
// ════════════════════════════════════════════════════════════════
// PROFIL LOCAL — remplace l'authentification Firebase.
// Sans serveur central, il n'y a plus de compte ni de mot de passe :
// chaque utilisateur choisit simplement son profil au démarrage, sur
// SON appareil. Ce choix est mémorisé dans le localStorage de cet
// appareil (clé ci-dessous) afin de ne pas le redemander à chaque fois.
//
// ⚠️ Important : ceci n'est PAS un mécanisme de sécurité réel (n'importe
// qui ayant accès à l'appareil peut se déclarer "Administrateur"). C'est
// un simple aiguillage d'interface, adapté à un usage de confiance au
// sein d'une même chorale, sur des appareils partagés ou personnels.
// ════════════════════════════════════════════════════════════════

const PROFILE_KEY = 'chorale_erp_profile_v1';

const LocalProfile = {
  load() {
    try {
      const raw = localStorage.getItem(PROFILE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  },
  save(profile) {
    try { localStorage.setItem(PROFILE_KEY, JSON.stringify(profile)); } catch (e) {}
  },
  clear() {
    try { localStorage.removeItem(PROFILE_KEY); } catch (e) {}
  },
};

// Durée d'inactivité avant déconnexion automatique (15 minutes).
const INACTIVITY_TIMEOUT_MS = 15 * 60 * 1000;
const SESSION_KEY = 'chorale_erp_session_v1';

// ════════════════════════════════════════════════════════════════
// SESSION GUARD — Expiration réelle de la session (et non un simple
// minuteur en mémoire) : l'horodatage de dernière activité est gardé
// dans le localStorage, donc fermer l'onglet/le navigateur plus de
// 15 minutes force une reconnexion, exactement comme l'inactivité
// pendant l'utilisation.
// ════════════════════════════════════════════════════════════════
const SessionGuard = {
  touch() {
    try { localStorage.setItem(SESSION_KEY, String(Date.now())); } catch (e) {}
  },
  isExpired() {
    try {
      const last = Number(localStorage.getItem(SESSION_KEY));
      return !last || (Date.now() - last) > INACTIVITY_TIMEOUT_MS;
    } catch (e) { return true; }
  },
  clear() {
    try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
  },
};

// ===== PERMISSIONS (rôles) =====
// ════════════════════════════════════════════════════════════════
// PERMISSIONS — Rôles & contrôle d'accès (admin / bureau / choriste)
// ════════════════════════════════════════════════════════════════
//
// Rôles :
//   - admin   : contrôle total (tous les modules, tous les départements,
//               gestion des paramètres de l'application)
//   - bureau  : gestion complète, mais UNIQUEMENT du département qui lui
//               a été attribué (ex: le trésorier ne gère que la
//               Trésorerie). Lecture seule ailleurs.
//   - choriste: lecture seule partout + création de suggestions et
//               déclaration de ses propres paiements (sans validation)

const Permissions = {
  role: 'choriste',       // valeur par défaut la plus restrictive
  departement: null,      // département géré, déduit automatiquement du login Bureau
  bureauId: null,         // identifiant du compte Bureau connecté (pour changement de mot de passe)
  choristeMembreId: null, // identité individuelle du choriste connecté (additif — voir setProfile)

  // Applique un profil (déterminé par le formulaire de connexion)
  setProfile({ role, departement, bureauId, choristeMembreId }) {
    this.role = role || 'choriste';
    this.departement = role === 'bureau' ? (departement || null) : null;
    this.bureauId = role === 'bureau' ? (bureauId || null) : null;
    this.choristeMembreId = role === 'choriste' ? (choristeMembreId || null) : null;
    LocalProfile.save({ role: this.role, departement: this.departement, bureauId: this.bureauId, choristeMembreId: this.choristeMembreId });
  },

  clearProfile() {
    this.role = 'choriste';
    this.departement = null;
    this.bureauId = null;
    this.choristeMembreId = null;
    LocalProfile.clear();
  },

  // Membre (fiche) correspondant au choriste actuellement connecté.
  getChoristeMembre() {
    if (!this.choristeMembreId) return null;
    return Store.getMembre(this.choristeMembreId) || null;
  },

  isAdmin()   { return this.role === 'admin'; },
  isBureau()  { return this.role === 'bureau' || this.role === 'admin'; },
  isChoriste(){ return this.role === 'choriste'; },

  // Nom affiché pour l'utilisateur courant (profils partagés par rôle,
  // il n'y a plus d'identité individuelle liée à la connexion)
  displayName() {
    return this.label();
  },

  // Détermine si le profil courant a accès de gestion à un département
  // donné, en tenant compte : 1) de son propre département (comportement
  // d'origine), 2) des départements partagés avec tout le bureau
  // (SHARED_BUREAU_DEPTS, ex: Membres), 3) des départements supplémentaires
  // accordés à un département précis (EXTRA_DEPTS_FOR, ex: Direction
  // Technique → Prestations/Répétitions). N'enlève aucun droit existant,
  // n'en ajoute qu'aux cas explicitement prévus.
  _hasExtendedDeptAccess(dept) {
    if (this.role !== 'bureau') return false;
    if (this.departement === dept) return true;
    if (SHARED_BUREAU_DEPTS.indexOf(dept) !== -1) return true;
    const extra = EXTRA_DEPTS_FOR[this.departement];
    if (extra && extra.indexOf(dept) !== -1) return true;
    return false;
  },

  // Peut créer/modifier/supprimer les données d'un département donné.
  // Sans argument : vérifie simplement "fait partie du bureau/admin"
  // (utilisé pour des actions transverses non liées à un département
  // précis, comme la gestion générale des suggestions).
  canManageData(dept) {
    if (this.isAdmin()) return true;
    if (this.role !== 'bureau') return false;
    if (!dept) return true;
    return this._hasExtendedDeptAccess(dept);
  },

  // Peut accéder en LECTURE à un module-département donné (le bureau ne
  // voit que son propre département (+ extensions ci-dessus) ; l'admin et
  // les choristes voient tout en lecture).
  canViewDept(dept) {
    if (this.isAdmin() || this.isChoriste()) return true;
    return this._hasExtendedDeptAccess(dept);
  },

  // Bannière lecture seule — affichée en haut des modules quand un choriste
  // consulte un département dont il ne peut pas modifier les données.
  readOnlyBanner() {
    if (!this.isChoriste()) return '';
    return `<div class="alert-banner info" style="margin-bottom:10px;">
      <div class="alert-banner__icon">👁️</div>
      <div><b>Mode consultation</b> — Vous pouvez consulter ces informations mais pas les modifier.</div>
    </div>`;
  },

  // Peut valider/refuser/déclarer un paiement de cotisation pour
  // n'importe quel membre (réservé au trésorier/admin — comptes
  // partagés, il n'y a plus d'auto-déclaration individuelle "pour soi")
  canValidatePayments() {
    return this.isAdmin() || (this.role === 'bureau' && this.departement === 'tresorerie');
  },
  canDeclarePaymentFor() {
    return this.canValidatePayments();
  },

  // Gestion des suggestions : ouverte à tout le bureau (n'importe quel
  // département), car une suggestion peut concerner n'importe quel sujet.
  canReadAllSuggestions() { return this.isBureau(); },
  canManageSuggestions()  { return this.isBureau(); }, // répondre, archiver, classer
  canCreateSuggestion()   { return true; },             // tout profil

  // Gestion des paramètres globaux de l'application (réservé à l'admin)
  canManageUsers()    { return this.isAdmin(); },
  canManageSettings() { return this.isAdmin(); },

  // ── Restrictions additionnelles du rôle Choriste (accès très limité) ──
  // Un choriste ne voit que ses propres informations dans Membres,
  // Discipline et Trésorerie ; certains sous-onglets lui sont masqués
  // dans Secrétariat et Musique. N'affecte ni l'Admin ni le Bureau.
  choristeRestricted() { return this.isChoriste(); },

  // Libellé lisible
  label() {
    switch (this.role) {
      case 'admin': return '👑 Administrateur';
      case 'bureau': {
        const d = DEPARTEMENTS.find(x => x.key === this.departement);
        return '🗂️ Bureau' + (d ? ' — ' + d.label : '');
      }
      default: return '🎵 Choriste';
    }
  },

  // Affiche un message de refus standard
  denyToast() {
    Utils.toast('⛔ Action non autorisée pour votre profil (' + this.label() + ')');
  },
};

// ===== SURCHARGE LOCALE DES MOTS DE PASSE (additif) =====
// ════════════════════════════════════════════════════════════════
// Permet à l'Administrateur et aux responsables de département de
// changer le mot de passe de leur département depuis l'application.
// Les mots de passe d'origine (BUREAU_DEPT_PASSWORDS) ne sont JAMAIS
// modifiés dans le code : les nouveaux mots de passe sont stockés dans
// le localStorage et consultés en priorité à la connexion.
// Un historique des modifications est conservé dans le journal d'audit.
// ════════════════════════════════════════════════════════════════

const CREDENTIALS_OVERRIDE_KEY = 'chorale_erp_credentials_v1';

const CredentialsStore = {
  _read() {
    try {
      const raw = localStorage.getItem(CREDENTIALS_OVERRIDE_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) { return {}; }
  },
  _write(obj) {
    try { localStorage.setItem(CREDENTIALS_OVERRIDE_KEY, JSON.stringify(obj)); } catch (e) {}
  },
  getAdminPassword() {
    const o = this._read();
    return o.admin || ADMIN_PASSWORD;
  },
  setAdminPassword(newPassword) {
    const o = this._read();
    o.admin = newPassword;
    this._write(o);
  },

  // ── Mots de passe des départements (par clé de département) ──
  getDeptPassword(deptKey) {
    const o = this._read();
    if (o.depts && o.depts[deptKey]) return o.depts[deptKey];
    return BUREAU_DEPT_PASSWORDS[deptKey] || null;
  },
  setDeptPassword(deptKey, newPassword) {
    const o = this._read();
    if (!o.depts) o.depts = {};
    o.depts[deptKey] = newPassword;
    this._write(o);
  },
  resetDeptPassword(deptKey) {
    // Réinitialise au mot de passe par défaut en supprimant la surcharge
    const o = this._read();
    if (o.depts && o.depts[deptKey]) {
      delete o.depts[deptKey];
      this._write(o);
    }
  },

  // Rétrocompatibilité — ancien système avec identifiant individuel
  getBureauPassword(bureauId) {
    const o = this._read();
    // Cherche d'abord par identifiant ancien format
    if (o.bureau && o.bureau[bureauId]) return o.bureau[bureauId];
    const acc = BUREAU_ACCOUNTS[bureauId];
    if (!acc) return null;
    // Tente de lire le mot de passe du département correspondant
    return this.getDeptPassword(acc.departement);
  },
  setBureauPassword(bureauId, newPassword) {
    const o = this._read();
    if (!o.bureau) o.bureau = {};
    o.bureau[bureauId] = newPassword;
    this._write(o);
  },
};

// ===== SÉCURITÉ DE CONNEXION (anti-bruteforce) =====
// ════════════════════════════════════════════════════════════════
// Limite les tentatives de connexion : 5 essais max, puis blocage de
// 5 minutes. L'état est gardé dans le localStorage (et non en mémoire)
// afin de résister à un simple rechargement de la page.
// ════════════════════════════════════════════════════════════════

const LOGIN_LOCKOUT_KEY = 'chorale_erp_login_lockout_v1';
const MAX_LOGIN_ATTEMPTS = 5;
const LOCKOUT_DURATION_MS = 5 * 60 * 1000;

const LoginSecurity = {
  _read() {
    try {
      const raw = localStorage.getItem(LOGIN_LOCKOUT_KEY);
      return raw ? JSON.parse(raw) : { attempts: 0, lockedUntil: 0 };
    } catch (e) { return { attempts: 0, lockedUntil: 0 }; }
  },
  _write(state) {
    try { localStorage.setItem(LOGIN_LOCKOUT_KEY, JSON.stringify(state)); } catch (e) {}
  },
  isLocked() {
    return this._read().lockedUntil > Date.now();
  },
  remainingLockSeconds() {
    return Math.max(0, Math.ceil((this._read().lockedUntil - Date.now()) / 1000));
  },
  attemptsLeft() {
    return Math.max(0, MAX_LOGIN_ATTEMPTS - this._read().attempts);
  },
  recordFailure() {
    const s = this._read();
    s.attempts = (s.attempts || 0) + 1;
    if (s.attempts >= MAX_LOGIN_ATTEMPTS) {
      s.lockedUntil = Date.now() + LOCKOUT_DURATION_MS;
      s.attempts = 0;
    }
    this._write(s);
  },
  recordSuccess() {
    this._write({ attempts: 0, lockedUntil: 0 });
  },
};

// ===== SÉLECTEUR DE PROFIL / CONNEXION =====
// ════════════════════════════════════════════════════════════════
// PROFILE SELECTOR UI — Écran de démarrage : 1) choix du rôle,
// 2) formulaire de connexion adapté au rôle (mot de passe seul pour
// Administrateur/Choriste, identifiant + mot de passe pour le Bureau —
// le département est déduit automatiquement de l'identifiant saisi).
// ════════════════════════════════════════════════════════════════

const ProfileSelectorUI = {
  step: 'role',
  selection: { role: null, departement: null, bureauId: null, choristeMembreId: null },
  _onComplete: null,
  _lockInterval: null,

  start(container, onComplete) {
    this._container = container;
    this._onComplete = onComplete;
    this.step = 'role';
    this.selection = { role: null, departement: null, bureauId: null, choristeMembreId: null };
    this.render();
  },

  render() {
    if (this._lockInterval) { clearInterval(this._lockInterval); this._lockInterval = null; }
    const c = this._container;
    if (this.step === 'role') return this._renderRole(c);
    if (this.step === 'login') return this._renderLogin(c);
    if (this.step === 'choriste-login') return this._renderChoristeLogin(c);
    if (this.step === 'choriste-create') return this._renderChoristeCreate(c);
  },

  _shell(title, subtitle, bodyHtml, showBack) {
    return `
      <div class="auth-screen">
        <div class="auth-card">
          <div class="auth-logo">🎵</div>
          <div class="auth-title">${title}</div>
          <div class="auth-subtitle">${subtitle}</div>
          ${bodyHtml}
          ${showBack ? `<div class="auth-links mt-16"><a href="#" id="ps-back">← Retour</a></div>` : ''}
        </div>
        <div class="auth-footer">🎵 SVS-EEI · Données stockées sur cet appareil</div>
      </div>
    `;
  },

  _renderRole(c) {
    const roles = [
      { key: 'choriste', icon: '🎵', label: 'Choriste', desc: 'Consultation des informations + envoi de suggestions' },
      { key: 'bureau',   icon: '🗂️', label: 'Membre du Bureau', desc: 'Gestion du département dont vous êtes responsable' },
      { key: 'admin',    icon: '👑', label: 'Administrateur', desc: 'Contrôle total de l\'application' },
    ];
    c.innerHTML = this._shell(
      'SVS-EEI',
      'Quel est votre rôle ?',
      `<div style="display:flex;flex-direction:column;gap:10px;text-align:left;">
        ${roles.map(r => `
          <button class="card" data-role="${r.key}" style="display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid var(--line);width:100%;text-align:left;background:var(--paper);font-family:var(--font-body);color:var(--ink);">
            <span style="font-size:1.6rem;">${r.icon}</span>
            <span>
              <div style="font-weight:700;">${r.label}</div>
              <div class="text-sm text-muted">${r.desc}</div>
            </span>
          </button>
        `).join('')}
      </div>`,
      false
    );
    c.querySelectorAll('[data-role]').forEach(btn => {
      btn.addEventListener('click', () => {
        this.selection.role = btn.dataset.role;
        this.step = btn.dataset.role === 'choriste' ? 'choriste-login' : 'login';
        this.render();
      });
    });
  },

  _renderLogin(c) {
    const role = this.selection.role;
    const roleLabel = role === 'admin' ? 'Administrateur' : role === 'bureau' ? 'Membre du Bureau' : 'Choriste';

    if (LoginSecurity.isLocked()) {
      this._renderLocked(c, roleLabel);
      return;
    }

    // ── Bureau : sélection du département puis mot de passe ──
    if (role === 'bureau') {
      this._renderBureauDeptSelect(c);
      return;
    }

    // ── Administrateur : mot de passe unique ──
    c.innerHTML = this._shell(
      roleLabel,
      'Veuillez vous connecter',
      `
        <div id="ps-login-error" class="auth-error" style="display:none;"></div>
        <form id="ps-login-form">
          <div class="field" style="text-align:left;">
            <label>Mot de passe</label>
            ${Utils.pwdInput('ps-login-pass', '••••••••', 'current-password')}
          </div>
          <button type="submit" class="btn primary block mt-8">Se connecter</button>
        </form>
      `,
      true
    );

    c.querySelector('#ps-login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      this._submitLogin(c);
    });

    Utils.initPwdToggles(c);

    c.querySelector('#ps-back').addEventListener('click', (e) => {
      e.preventDefault();
      this.step = 'role';
      this.render();
    });
  },

  // ── Bureau : étape 1 — sélection du département ──
  _renderBureauDeptSelect(c) {
    const depts = DEPARTEMENTS;
    c.innerHTML = this._shell(
      'Membre du Bureau',
      'Sélectionnez votre département',
      `
        <div style="display:flex;flex-direction:column;gap:8px;text-align:left;">
          ${depts.map(d => `
            <button class="card" data-dept="${d.key}" style="display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid var(--line);width:100%;text-align:left;background:var(--paper);font-family:var(--font-body);color:var(--ink);padding:12px 14px;border-radius:var(--radius-m);">
              <span style="font-size:1.5rem;">${d.icon}</span>
              <span style="font-weight:700;font-size:0.95rem;">${d.label}</span>
            </button>
          `).join('')}
        </div>
      `,
      true
    );

    c.querySelectorAll('[data-dept]').forEach(btn => {
      btn.addEventListener('click', () => {
        this.selection.departement = btn.dataset.dept;
        this._renderBureauDeptPassword(c);
      });
    });

    c.querySelector('#ps-back').addEventListener('click', (e) => {
      e.preventDefault();
      this.step = 'role';
      this.render();
    });
  },

  // ── Bureau : étape 2 — saisie du mot de passe du département ──
  _renderBureauDeptPassword(c) {
    if (LoginSecurity.isLocked()) {
      this._renderLocked(c, 'Membre du Bureau');
      return;
    }
    const deptKey = this.selection.departement;
    const dept = DEPARTEMENTS.find(d => d.key === deptKey);
    const deptLabel = dept ? dept.label : deptKey;
    const deptIcon  = dept ? dept.icon : '🗂️';

    c.innerHTML = this._shell(
      `${deptIcon} ${deptLabel}`,
      'Saisissez le mot de passe de votre département',
      `
        <div id="ps-login-error" class="auth-error" style="display:none;"></div>
        <form id="ps-dept-pwd-form">
          <div class="field" style="text-align:left;">
            <label>Mot de passe du département</label>
            ${Utils.pwdInput('ps-dept-pass', '••••••••', 'current-password')}
          </div>
          <button type="submit" class="btn primary block mt-8">Accéder</button>
        </form>
        <div class="auth-links mt-16">
          <a href="#" id="ps-back-dept">← Choisir un autre département</a>
        </div>
      `,
      false
    );

    c.querySelector('#ps-dept-pwd-form').addEventListener('submit', (e) => {
      e.preventDefault();
      this._submitBureauDeptLogin(c);
    });

    Utils.initPwdToggles(c);

    c.querySelector('#ps-back-dept').addEventListener('click', (e) => {
      e.preventDefault();
      this._renderBureauDeptSelect(c);
    });
  },

  // ── Bureau : validation du mot de passe de département ──
  _submitBureauDeptLogin(c) {
    const deptKey  = this.selection.departement;
    const password = c.querySelector('#ps-dept-pass').value;
    const errorEl  = c.querySelector('#ps-login-error');
    errorEl.style.display = 'none';

    const expected = CredentialsStore.getDeptPassword(deptKey);
    if (expected && password === expected) {
      LoginSecurity.recordSuccess();
      // bureauId = null dans le nouveau système (pas d'identifiant individuel)
      this.selection.bureauId = null;
      this._finish();
    } else {
      LoginSecurity.recordFailure();
      if (LoginSecurity.isLocked()) {
        this._renderLocked(c, 'Membre du Bureau');
        return;
      }
      const left = LoginSecurity.attemptsLeft();
      errorEl.textContent = `Mot de passe incorrect. ${left} tentative(s) restante(s) avant blocage temporaire.`;
      errorEl.style.display = '';
    }
  },

  _renderLocked(c, roleLabel) {
    const render = () => {
      const secs = LoginSecurity.remainingLockSeconds();
      if (secs <= 0) { this.render(); return; }
      const mm = String(Math.floor(secs / 60)).padStart(2, '0');
      const ss = String(secs % 60).padStart(2, '0');
      c.innerHTML = this._shell(
        roleLabel,
        'Trop de tentatives de connexion',
        `
          <div class="alert-banner danger" style="text-align:left;">
            <div class="alert-banner__icon">🔒</div>
            <div>Accès temporairement bloqué après 5 échecs. Réessayez dans <b>${mm}:${ss}</b>.</div>
          </div>
        `,
        true
      );
      const back = c.querySelector('#ps-back');
      if (back) back.addEventListener('click', (e) => { e.preventDefault(); this.step = 'role'; this.render(); });
    };
    render();
    this._lockInterval = setInterval(render, 1000);
  },

  _submitLogin(c) {
    const role = this.selection.role;
    const password = c.querySelector('#ps-login-pass').value;
    const errorEl = c.querySelector('#ps-login-error');
    errorEl.style.display = 'none';

    let ok = false;

    if (role === 'admin') {
      ok = password === CredentialsStore.getAdminPassword();
    }
    // Note : le cas 'bureau' est désormais traité par _submitBureauDeptLogin()

    if (ok) {
      LoginSecurity.recordSuccess();
      this._finish();
    } else {
      LoginSecurity.recordFailure();
      if (LoginSecurity.isLocked()) {
        this._renderLocked(c, role === 'admin' ? 'Administrateur' : 'Choriste');
        return;
      }
      const left = LoginSecurity.attemptsLeft();
      errorEl.textContent = `Mot de passe incorrect. ${left} tentative(s) restante(s) avant blocage temporaire.`;
      errorEl.style.display = '';
    }
  },

  // ── 2 — Compte choriste individuel : matricule + mot de passe personnel.
  // Remplace l'ancien système de sélection libre d'un nom dans une liste.
  _renderChoristeLogin(c) {
    if (LoginSecurity.isLocked()) {
      this._renderLocked(c, 'Choriste');
      return;
    }
    c.innerHTML = this._shell(
      'Choriste',
      'Connectez-vous à votre compte personnel',
      `
        <div id="ps-login-error" class="auth-error" style="display:none;"></div>
        <form id="ps-choriste-form">
          <div class="field" style="text-align:left;">
            <label>Identifiant (matricule)</label>
            <input type="text" id="ps-cl-matricule" autocomplete="off" placeholder="Ex: C012">
          </div>
          <div class="field" style="text-align:left;">
            <label>Mot de passe</label>
            ${Utils.pwdInput('ps-cl-pass', '••••••••', 'current-password')}
          </div>
          <button type="submit" class="btn primary block mt-8">Se connecter</button>
        </form>
        <div class="text-sm text-muted mt-8">Votre identifiant vous a été communiqué par l'administration. Première connexion ? Entrez votre matricule, le mot de passe sera créé à l'étape suivante.</div>
      `,
      true
    );

    c.querySelector('#ps-choriste-form').addEventListener('submit', (e) => {
      e.preventDefault();
      this._submitChoristeLogin(c);
    });
    Utils.initPwdToggles(c);
    c.querySelector('#ps-back').addEventListener('click', (e) => {
      e.preventDefault();
      this.step = 'role';
      this.render();
    });
  },

  async _submitChoristeLogin(c) {
    const matricule = c.querySelector('#ps-cl-matricule').value.trim();
    const password = c.querySelector('#ps-cl-pass').value;
    const errorEl = c.querySelector('#ps-login-error');
    errorEl.style.display = 'none';

    const membre = (Store.data.membres || []).find(m => m.id.toLowerCase() === matricule.toLowerCase() && (m.statut === 'Choriste' || m.statut === 'Intégrant'));
    if (!membre) {
      LoginSecurity.recordFailure();
      this._showChoristeLoginError(c, errorEl);
      return;
    }

    const compte = Store.getCompteChoriste(membre.id);
    if (!compte || !compte.motDePasseHash) {
      // Première connexion (ou mot de passe réinitialisé par l'Admin) :
      // on passe directement à la création du mot de passe personnel.
      this.selection.choristeMembreId = membre.id;
      this.step = 'choriste-create';
      this.render();
      return;
    }

    if (compte.statutCompte === 'Désactivé') {
      LoginSecurity.recordFailure();
      errorEl.textContent = 'Ce compte est désactivé. Contactez un administrateur.';
      errorEl.style.display = '';
      return;
    }

    const ok = await Store.verifyChoristePassword(membre.id, password);
    if (ok) {
      LoginSecurity.recordSuccess();
      Store.recordConnexionChoriste(membre.id);
      this.selection.choristeMembreId = membre.id;
      this._finish();
    } else {
      LoginSecurity.recordFailure();
      this._showChoristeLoginError(c, errorEl);
    }
  },

  _showChoristeLoginError(c, errorEl) {
    if (LoginSecurity.isLocked()) {
      this._renderLocked(c, 'Choriste');
      return;
    }
    const left = LoginSecurity.attemptsLeft();
    errorEl.textContent = `Identifiant ou mot de passe incorrect. ${left} tentative(s) restante(s) avant blocage temporaire.`;
    errorEl.style.display = '';
  },

  // Création du mot de passe personnel (1ère connexion, ou après une
  // réinitialisation effectuée par l'administrateur).
  _renderChoristeCreate(c) {
    const m = Store.getMembre(this.selection.choristeMembreId);
    c.innerHTML = this._shell(
      'Créer votre mot de passe',
      m ? `Bienvenue ${m.nom} — définissez votre mot de passe personnel` : 'Définissez votre mot de passe personnel',
      `
        <div id="ps-create-error" class="auth-error" style="display:none;"></div>
        <form id="ps-create-form">
          <div class="field" style="text-align:left;">
            <label>Nouveau mot de passe</label>
            ${Utils.pwdInput('ps-cc-pass1', 'Au moins 4 caractères', 'new-password')}
          </div>
          <div class="field" style="text-align:left;">
            <label>Confirmez le mot de passe</label>
            ${Utils.pwdInput('ps-cc-pass2', '••••••••', 'new-password')}
          </div>
          <button type="submit" class="btn primary block mt-8">Créer mon mot de passe</button>
        </form>
      `,
      true
    );

    c.querySelector('#ps-create-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const p1 = c.querySelector('#ps-cc-pass1').value;
      const p2 = c.querySelector('#ps-cc-pass2').value;
      const errorEl = c.querySelector('#ps-create-error');
      if (p1.length < 4) { errorEl.textContent = 'Le mot de passe doit contenir au moins 4 caractères.'; errorEl.style.display = ''; return; }
      if (p1 !== p2) { errorEl.textContent = 'Les deux mots de passe ne correspondent pas.'; errorEl.style.display = ''; return; }
      await Store.createCompteChoriste(this.selection.choristeMembreId, p1);
      Store.recordConnexionChoriste(this.selection.choristeMembreId);
      LoginSecurity.recordSuccess();
      this._finish();
    });

    c.querySelector('#ps-back').addEventListener('click', (e) => {
      e.preventDefault();
      this.step = 'choriste-login';
      this.render();
    });
  },

  _finish() {
    if (this._onComplete) this._onComplete(this.selection);
  },
};

// ===== MODULE: DASHBOARD =====

// DASHBOARD — Tableau de bord central

const DashboardModule = {
  render(main) {

  // ── TABLEAU DE BORD PERSONNEL DU CHORISTE (D + E) ──────────────

      this._renderChoristeInner(main);

      console.error('[Dashboard] Erreur renderChoriste :', err);

  _renderChoristeInner(main) {

          <div class="font-display" style="font-size:1.5rem;font-weight:700;color:${clsMusical?'var(--maroon)':'var(--ink-soft)'};">${clsMusical ? clsMusical.score.toFixed(1) : '—'}<span style="font-size:0.75rem;color:var(--ink-soft);">/100</span></div>
          ${clsMusical ? scoreBar(clsMusical.score, 'var(--gold)') : ''}

          <span style="font-weight:700;color:${dis.txSamedi>=0.8?'var(--green)':'var(--red)'};">${Utils.pct(dis.txSamedi)} <span style="font-weight:400;color:var(--ink-soft);">(${dis.presentSamedi}/${dis.totalSamedi})</span></span>
        </div>
        <div class="flex-between" style="padding:7px 0;border-bottom:1px solid var(--line);">
          <span class="text-sm text-muted">Absences consécutives</span>
          <span style="font-weight:700;color:${dis.absencesConsecutives>=2?'var(--red)':'var(--ink)'};">${dis.absencesConsecutives}</span>
        </div>
        <div class="flex-between" style="padding:7px 0;border-bottom:1px solid var(--line);">
          <span class="text-sm text-muted">Sanctions / avertissements</span>
          <span style="font-weight:700;color:${sanctions.length>0?'var(--amber)':'var(--green)'};">${sanctions.length}</span>
        </div>
        <div class="flex-between" style="padding:7px 0;border-bottom:1px solid var(--line);">
          <span class="text-sm text-muted">Cotisations dues (${year})</span>
          <span style="font-weight:700;">${totalDue.toLocaleString()} FCFA</span>
        </div>
        <div class="flex-between" style="padding:7px 0;border-bottom:1px solid var(--line);">
          <span class="text-sm text-muted">Cotisations payées</span>
          <span style="font-weight:700;color:var(--green);">${totalPaid.toLocaleString()} FCFA</span>
        </div>
        <div class="flex-between" style="padding:7px 0;">
          <span class="text-sm text-muted">Reste à payer / solde</span>
          <span style="font-weight:700;color:${soldePersonnel>0?'var(--red)':'var(--green)'};">${soldePersonnel>0?'+':''} ${soldePersonnel.toLocaleString()} FCFA</span>
        </div>
        ${dis.interdit ? `<div class="alert-banner danger mt-8"><div class="alert-banner__icon">⛔</div><div><b>Non autorisé à prester</b> — 2 absences consécutives aux répétitions</div></div>` : `<div class="alert-banner success mt-8"><div class="alert-banner__icon">✅</div><div>Autorisé à prester</div></div>`}
      </div>` : ''}

      <!-- ══ MES CLASSEMENTS ══ -->
      ${classementsPublies ? `
      <div class="section-title"><span class="ornament">🏆</span> Mes classements</div>
      <div class="card">
        ${clsGlobal ? `<div class="flex-between" style="padding:7px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">🏆 Rang global</span><span style="font-weight:700;color:var(--maroon);">${ClassementsModule.medal(clsGlobal.rang)} ${clsGlobal.rang}e · ${clsGlobal.score.toFixed(1)}/100</span></div>` : ''}
        ${clsDiscipline ? `<div class="flex-between" style="padding:7px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">⚖️ Rang discipline</span><span style="font-weight:700;">${ClassementsModule.medal(clsDiscipline.rang)} ${clsDiscipline.rang}e · ${clsDiscipline.score.toFixed(1)}/100</span></div>` : ''}
        ${clsTresorerie ? `<div class="flex-between" style="padding:7px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">💰 Rang trésorerie</span><span style="font-weight:700;">${ClassementsModule.medal(clsTresorerie.rang)} ${clsTresorerie.rang}e · ${clsTresorerie.score.toFixed(1)}/100</span></div>` : ''}
        ${clsMusical ? `<div class="flex-between" style="padding:7px 0;"><span class="text-sm text-muted">🎵 Rang musical</span><span style="font-weight:700;">${ClassementsModule.medal(clsMusical.rang)} ${clsMusical.rang}e · ${clsMusical.score.toFixed(1)}/100</span></div>` : ''}
        ${(!clsGlobal && !clsDiscipline && !clsTresorerie && !clsMusical) ? '<div class="text-sm text-muted center">Aucune donnée de classement disponible</div>' : ''}
        <button class="btn secondary block mt-12" data-nav="classements">🏆 Voir le classement complet</button>

      <div class="section-title"><span class="ornament">🏆</span> Mes classements</div>

      <div class="card">
        ${dernieresEvals.length ? `

          ${dernieresEvals.map(e => `

              <span class="text-sm">${Utils.fmtDate(e.date)} — ${Utils.escapeHtml(e.type||'Évaluation')}</span>
              <span style="font-weight:700;color:${Number(e.note)>=10?'var(--green)':'var(--red)'};">${e.note}/20</span>

        <div class="section-title"><span class="ornament">👘</span> Mes toges</div>

            <div class="list-row__body">

  // ── D — Espace Trésorerie du choriste ──────────────────────────
  _choristeDetailTresorerie(m, year) {
    if (!m) return;
    const clsTreso = Store.getClassement('tresorerie').find(r => r.membre.id === m.id);
    const moisLabels = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
    const lignes = [];
    let totalDue = 0, totalPaid = 0, retards = 0;
    for (let mo = 1; mo <= 12; mo++) {
      const mk = `${year}-${String(mo).padStart(2,'0')}`;
      const due  = Store.getCotisationDue(m, mk);
      const paid = Store.getCotisation(m.id, mk);
      const stat = Store.getStatutPaiement(m.id, mk);
      totalDue  += due;
      totalPaid += paid;
      if (due > 0 && paid < due) retards++;
      lignes.push({ mois: moisLabels[mo-1], due, paid, stat: stat.statut, mk });
    }
    const solde = totalDue - totalPaid;

    // Historique des paiements validés
    const paiements = (Store.data.paiements || [])
      .filter(p => p.membreId === m.id)
      .sort((a,b) => (b.date||'').localeCompare(a.date||''));

    // Sanctions financières
    const sanctionsFinancieres = (Store.data.sanctions || [])
      .filter(s => s.membreId === m.id && (s.type||'').toLowerCase().includes('financ'))
      .sort((a,b) => (b.date||'').localeCompare(a.date||''));

    const pillColor = s => s==='Payé'?'actif':s==='Partiel'?'bureau':'danger';

    const html = `
      <!-- Score & résumé -->
      <div class="card center">
        <div class="text-sm text-muted">Note financière (${year})</div>
        <div class="font-display" style="font-size:2rem;font-weight:700;color:var(--maroon);">${clsTreso ? clsTreso.score.toFixed(1) : '—'}<span style="font-size:0.9rem;color:var(--ink-soft);">/100</span></div>
        ${clsTreso ? `<div class="text-sm text-muted">Rang ${clsTreso.rang} · Taux cotis. : ${Utils.pct(clsTreso.detail.tauxCotis)} · Régularité : ${Utils.pct(clsTreso.detail.regularite)}</div>` : ''}
      </div>

      <div class="section-title"><span class="ornament">💳</span> Récapitulatif ${year}</div>
      <div class="card">
        <div class="flex-between" style="padding:7px 0;border-bottom:1px solid var(--line);">
          <span class="text-sm text-muted">Total dû</span>
          <span style="font-weight:700;">${totalDue.toLocaleString()} FCFA</span>
        </div>
        <div class="flex-between" style="padding:7px 0;border-bottom:1px solid var(--line);">
          <span class="text-sm text-muted">Total payé</span>
          <span style="font-weight:700;color:var(--green);">${totalPaid.toLocaleString()} FCFA</span>
        </div>
        <div class="flex-between" style="padding:7px 0;border-bottom:1px solid var(--line);">
          <span class="text-sm text-muted">Solde personnel</span>
          <span style="font-weight:700;color:${solde>0?'var(--red)':'var(--green)'};">${solde>0?solde.toLocaleString()+' FCFA à régler':'À jour ✅'}</span>
        </div>
        <div class="flex-between" style="padding:7px 0;">
          <span class="text-sm text-muted">Mois en retard</span>
          <span style="font-weight:700;color:${retards>0?'var(--amber)':'var(--green)'};">${retards}</span>
        </div>
      </div>

      <div class="section-title"><span class="ornament">📅</span> Cotisations mois par mois</div>
      <div class="list">${lignes.map(l => `
        <div class="list-row" style="cursor:default;">
          <div class="list-row__body">
            <div class="list-row__title">${l.mois} ${year}</div>
            <div class="list-row__subtitle">Dû : ${l.due.toLocaleString()} · Payé : ${l.paid.toLocaleString()} FCFA</div>
          </div>
          <span class="pill ${pillColor(l.stat)}">${l.stat}</span>
        </div>`).join('')}
      </div>

      ${paiements.length ? `
        <div class="section-title"><span class="ornament">💸</span> Historique des paiements (${paiements.length})</div>
        <div class="list">${paiements.slice(0,20).map(p => `
          <div class="list-row" style="cursor:default;">
            <div class="list-row__avatar" style="background:var(--sage-soft);color:var(--sage);font-size:0.9rem;">💸</div>
            <div class="list-row__body">
              <div class="list-row__title">${Utils.fmtDate(p.date)} — ${Utils.escapeHtml(p.monthKey||'')}</div>
              <div class="list-row__subtitle">${Utils.escapeHtml(p.statut||'')}${p.modePaiement?' · '+Utils.escapeHtml(p.modePaiement):''}</div>
            </div>
            <span style="font-weight:700;color:${p.statut==='Validé'?'var(--green)':'var(--amber)'};">+${Number(p.montant||0).toLocaleString()}</span>
          </div>`).join('')}
        </div>` : ''}

      ${sanctionsFinancieres.length ? `
        <div class="section-title"><span class="ornament">💢</span> Sanctions financières</div>
        <div class="list">${sanctionsFinancieres.map(s => `
          <div class="list-row" style="cursor:default;">
            <div class="list-row__avatar" style="background:var(--red-soft);color:var(--red);">💢</div>
            <div class="list-row__body">
              <div class="list-row__title">${Utils.escapeHtml(s.type)}</div>
              <div class="list-row__subtitle">${Utils.fmtDate(s.date)}${s.motif?' · '+Utils.escapeHtml(s.motif):''}</div>
            </div>
          </div>`).join('')}
        </div>` : ''}
    `;
    Utils.openSheet('💰 Ma Trésorerie', html);
  },

  // ── D — Espace Direction Technique du choriste ─────────────────
  _choristeDetailDirection(m, evals) {
    if (!m) return;
    const clsMus = Store.getClassement('musical').find(r => r.membre.id === m.id);
    const hist   = Store.getClassementEvolution(m.id, 12);
    const sparkValues = hist.map(h => h.musical);
    const moyEvals = evals.length
      ? (evals.reduce((s,e) => s + Number(e.note||0), 0) / evals.length).toFixed(1)
      : null;

    // Grouper par type d'évaluation
    const parType = {};
    evals.forEach(e => {
      const t = e.type || 'Autre';
      if (!parType[t]) parType[t] = [];
      parType[t].push(e);
    });

    // Participations aux prestations
    const prestPartic = [];
    (Store.data.prestations || []).forEach(p => {
      const pres = (p.presences || {})[m.id];
      if (pres !== undefined) prestPartic.push({ date: p.date, type: p.type, statut: pres });
    });
    prestPartic.sort((a,b) => (b.date||'').localeCompare(a.date||''));

    const html = `
      <div class="card center">
        <div class="text-sm text-muted">Score musical</div>
        <div class="font-display" style="font-size:2rem;font-weight:700;color:var(--maroon);">${clsMus ? clsMus.score.toFixed(1) : '—'}<span style="font-size:0.9rem;color:var(--ink-soft);">/100</span></div>
        ${clsMus ? `<div class="text-sm text-muted">Rang ${clsMus.rang} · Présences : ${Utils.pct(clsMus.detail.tauxAssiduite)} · Prestations : ${clsMus.detail.prestPresent}/${clsMus.detail.prestTotal||0}</div>` : ''}
        ${moyEvals !== null ? `<div class="text-sm mt-4" style="font-weight:600;">Moyenne évaluations : <span style="color:${Number(moyEvals)>=10?'var(--green)':'var(--red)'};">${moyEvals}/20</span></div>` : ''}
      </div>

      ${hist.length ? `
        <div class="section-title"><span class="ornament">📈</span> Mon évolution musicale</div>
        <div class="card">
          ${Utils.sparklineSVG(sparkValues, { color: '#1A4F8A' })}
          <div class="text-sm text-muted center mt-8">${hist[0].monthKey} → ${hist[hist.length-1].monthKey}</div>
        </div>` : ''}

      <div class="section-title"><span class="ornament">🎓</span> Toutes mes évaluations (${evals.length})</div>
      ${evals.length ? `
        ${Object.entries(parType).map(([type, evs]) => `
          <div class="card" style="margin-bottom:8px;">
            <div style="font-weight:700;color:var(--maroon);margin-bottom:8px;">📋 ${Utils.escapeHtml(type)}</div>
            ${evs.map(e => `
              <div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--line);">
                <div>
                  <div class="text-sm" style="font-weight:600;">${Utils.fmtDate(e.date)}</div>
                  ${e.appreciation ? `<div class="text-sm text-muted">"${Utils.escapeHtml(e.appreciation)}"</div>` : ''}
                  ${e.evaluateur ? `<div class="text-sm text-muted">— ${Utils.escapeHtml(e.evaluateur)}</div>` : ''}
                </div>
                <span style="font-weight:700;font-size:1.1rem;color:${Number(e.note)>=10?'var(--green)':'var(--red)'};">${e.note}/20</span>
              </div>`).join('')}
            <div class="text-sm text-muted mt-6">Moy. ${type} : <b>${(evs.reduce((s,e)=>s+Number(e.note||0),0)/evs.length).toFixed(1)}/20</b></div>
          </div>`).join('')}
      ` : '<div class="card center text-sm text-muted">Aucune évaluation enregistrée</div>'}

      ${prestPartic.length ? `
        <div class="section-title"><span class="ornament">🎤</span> Mes participations aux prestations</div>
        <div class="list">${prestPartic.map(p => `
          <div class="list-row" style="cursor:default;">
            <div class="list-row__avatar" style="font-size:0.9rem;">${p.statut==='Présent'?'✅':'❌'}</div>
            <div class="list-row__body">
              <div class="list-row__title">${Utils.fmtDate(p.date)} — ${Utils.escapeHtml(p.type||'Prestation')}</div>
              <div class="list-row__subtitle">${Utils.escapeHtml(p.statut)}</div>
            </div>
          </div>`).join('')}
        </div>` : ''}
    `;
    Utils.openSheet('🎵 Ma Direction Technique', html);
  },

  // ── Helper : toutes les évaluations d'un choriste ──────────────
  _choristeEvals(m, evals) {
    if (!m || !evals.length) return;
    const html = `
      <div class="text-sm text-muted" style="margin-bottom:10px;">${evals.length} évaluation(s) — Moyenne : <b>${(evals.reduce((s,e)=>s+Number(e.note||0),0)/evals.length).toFixed(1)}/20</b></div>
      <div class="list">${evals.map(e => `
        <div class="list-row" style="cursor:default;">
          <div class="list-row__body">
            <div class="list-row__title">${Utils.fmtDate(e.date)} — ${Utils.escapeHtml(e.type||'Évaluation')}</div>
            ${e.appreciation ? `<div class="list-row__subtitle">"${Utils.escapeHtml(e.appreciation)}"${e.evaluateur?' — '+Utils.escapeHtml(e.evaluateur):''}</div>` : ''}
          </div>
          <span style="font-weight:700;font-size:1rem;color:${Number(e.note)>=10?'var(--green)':'var(--red)'};">${e.note}/20</span>
        </div>`).join('')}
      </div>
    `;
    Utils.openSheet('📋 Toutes mes évaluations', html);

  // ── TABLEAU DE BORD BUREAU / ADMIN ──
  renderBureau(main) {
    const id = Store.getChoraleIdentite();
    const isAdmin = Permissions.isAdmin();

    // ── Carte identité ──
    const logoContent = id.choraleLogoUrl
      ? `<img src="${id.choraleLogoUrl}" alt="Logo">`
      : '🎵';
    const logoEditHint = isAdmin
      ? `<div class="chorale-id-card__logo__edit">📷</div>` : '';

    const details = [];
    if (id.choraleLocalisation) details.push({ icon: '📍', text: id.choraleLocalisation });
    if (id.choraleTelephone)    details.push({ icon: '📞', text: id.choraleTelephone });
    if (id.choraleEmail)        details.push({ icon: '✉️', text: id.choraleEmail });
    if (id.choraleParoisse)     details.push({ icon: '⛪', text: id.choraleParoisse });
    if (id.choraleReseaux)      details.push({ icon: '🌐', text: id.choraleReseaux });
    if (id.choraleDescription)  details.push({ icon: 'ℹ️', text: id.choraleDescription });

    const identiteCard = `
      <div class="chorale-id-card" id="chorale-id-card">
        ${isAdmin ? `<button class="chorale-id-card__edit-btn" id="edit-identity-btn">✏️ Modifier</button>` : ''}
        <div class="chorale-id-card__header">
          <div class="chorale-id-card__logo" id="logo-click">
            ${logoContent}
            ${logoEditHint}
            ${isAdmin ? `<input type="file" id="logo-file-input" accept="image/*" style="display:none;">` : ''}
          </div>
          <div class="chorale-id-card__info">
            <div class="chorale-id-card__nom">${Utils.escapeHtml(id.choraleNom || 'Chorale Semeur de la Vérité Spirituelle')}</div>
            ${id.choraleSlogan ? `<div class="chorale-id-card__slogan">"${Utils.escapeHtml(id.choraleSlogan)}"</div>` : ''}
            <span class="chorale-id-card__year">Année ${id.annee}</span>
            ${id.choraleAnneeCreation ? `<span class="chorale-id-card__year" style="margin-left:4px;">Fondée en ${Utils.escapeHtml(id.choraleAnneeCreation)}</span>` : ''}
          </div>
        </div>
        ${details.length ? `
          <div class="chorale-id-card__details">
            ${details.map(d => `<div class="chorale-id-card__detail"><span class="chorale-id-card__detail-icon">${d.icon}</span><span>${Utils.escapeHtml(d.text)}</span></div>`).join('')}
          </div>` : (isAdmin ? `<div style="margin-top:12px;font-size:0.75rem;color:rgba(255,255,255,0.5);text-align:center;">Touchez ✏️ Modifier pour ajouter localisation, téléphone, etc.</div>` : '')}
      </div>
    `;

    main.innerHTML = identiteCard;
    const d = Store.data;
    const membres = d.membres;
    const choristes = membres.filter(m => m.statut === 'Choriste');
    const integrants = membres.filter(m => m.statut === 'Intégrant');

    // KPIs
    const nbMembres = membres.length;
    const nbChoristes = choristes.length;
    const activitesRealisees = d.activites.filter(a => a.statut === 'Réalisée').length;
    const chantsMaitrises = d.repertoire.filter(c => c.statut === 'Maîtrisé').length;

    // Cotisations
    const year = d.meta.annee;
    let totalDue = 0, totalPaid = 0;
    membres.forEach(m => {
      const due = Store.getCotisationDueAnnuel(m, year);
      totalDue += due;
      for (let mo=1; mo<=12; mo++) {
        totalPaid += Store.getCotisation(m.id, `${year}-${String(mo).padStart(2,'0')}`);
      }
    });
    const txRecouvrement = totalDue > 0 ? totalPaid/totalDue : 0;

    // Alertes discipline
    let alertes = 0;
    choristes.concat(integrants).forEach(m => {
      const dis = Store.getDisciplineStats(m.id);
      if (dis.interdit) alertes++;
    });

    // Anniversaires
    let annivToday = [], annivWeek = [], annivMonth = 0;
    membres.forEach(m => {
      const info = Store.getAnniversaireInfo(m);
      if (!info) return;
      if (info.isToday) annivToday.push(m);
      if (info.isThisWeek && !info.isToday) annivWeek.push(m);
      if (info.isThisMonth) annivMonth++;
    });

    // IGI averages
    let igiSum = 0, igiCount = 0, exemplaires = 0, accompagner = 0;
    choristes.forEach(m => {
      const igi = Store.calcIGI(m.id);
      if (igi) {
        igiSum += igi.igi; igiCount++;
        if (igi.categorie.includes('Exemplaire')) exemplaires++;
        if (igi.categorie.includes('accompagner')) accompagner++;
      }
    });
    const igiMoyen = igiCount > 0 ? igiSum/igiCount : 0;

    // ── Statistiques ERP additionnelles ──
    const totalChants = d.repertoire.length;
    const prestationsRealisees = (d.prestations || []).filter(p => p.statut === 'Réalisée').length;
    const chantsPopulaires = Store.getChantsLesPlusUtilises(3);
    const topGlobal = Store.getClassement('global').slice(0,3);
    const topAssidus = choristes
      .map(m => ({ membre: m, taux: Store.getDisciplineStats(m.id).txSamedi }))
      .sort((a,b) => b.taux - a.taux)
      .slice(0,3);

    // Append the rest of the dashboard (don't overwrite the identity card)
    const restDiv = document.createElement('div');
    restDiv.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-card__value">${nbMembres}</div>
          <div class="kpi-card__label">Membres</div>
        </div>
        <div class="kpi-card accent-blue">
          <div class="kpi-card__value">${nbChoristes}</div>
          <div class="kpi-card__label">Choristes</div>
        </div>
        <div class="kpi-card accent-sage">
          <div class="kpi-card__value">${activitesRealisees}</div>
          <div class="kpi-card__label">Activités</div>
        </div>
        <div class="kpi-card accent-gold">
          <div class="kpi-card__value">${Utils.pct(txRecouvrement)}</div>
          <div class="kpi-card__label">Cotis. payées</div>
        </div>
        <div class="kpi-card ${alertes>0?'accent-red':''}">
          <div class="kpi-card__value">${alertes}</div>
          <div class="kpi-card__label">Alertes</div>
        </div>
        <div class="kpi-card accent-purple">
          <div class="kpi-card__value">${chantsMaitrises}</div>
          <div class="kpi-card__label">Chants maîtr.</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-card__value">${totalChants}</div>
          <div class="kpi-card__label">Chants au répertoire</div>
        </div>
        <div class="kpi-card accent-sage">
          <div class="kpi-card__value">${prestationsRealisees}</div>
          <div class="kpi-card__label">Prestations réalisées</div>
        </div>
      </div>

      ${annivToday.length ? `
        <div class="alert-banner gold">
          <div class="alert-banner__icon">🎉</div>
          <div><b>Anniversaire${annivToday.length>1?'s':''} aujourd'hui :</b> ${annivToday.map(m=>m.nom).join(', ')}</div>
        </div>` : ''}

      ${annivWeek.length ? `
        <div class="alert-banner info">
          <div class="alert-banner__icon">📅</div>
          <div><b>Anniversaires cette semaine :</b> ${annivWeek.map(m=>m.nom).join(', ')}</div>
        </div>` : ''}

      ${alertes > 0 ? `
        <div class="alert-banner danger">
          <div class="alert-banner__icon">⛔</div>
          <div><b>${alertes} membre(s)</b> non autorisé(s) à prester (2 absences consécutives au samedi). Voir module Discipline.</div>
        </div>` : `
        <div class="alert-banner success">
          <div class="alert-banner__icon">✅</div>
          <div>Aucune alerte disciplinaire — tous les choristes sont autorisés à prester.</div>
        </div>`}

      <div class="section-title"><span class="ornament">🏆</span> Indice Global d'Implication</div>
      <div class="card">
        <div class="flex-between">
          <div>
            <div class="font-display" style="font-size:2rem;font-weight:700;color:var(--maroon);">${igiMoyen.toFixed(1)}<span style="font-size:1rem;color:var(--ink-soft);">/100</span></div>
            <div class="text-sm text-muted">IGI moyen de la chorale</div>
          </div>
          <div style="text-align:right;">
            <div class="pill exemplaire">🌟 ${exemplaires} Exemplaires</div>
            <div class="mt-8 pill accompagner">🆘 ${accompagner} À accompagner</div>
          </div>
        </div>
      </div>

      <div class="section-title"><span class="ornament">📆</span> Cette semaine</div>
      <div class="card">
        ${this.renderRecentSeances()}
      </div>

      <div class="section-title"><span class="ornament">📊</span> Statistiques globales</div>
      <div class="grid-2">
        <div class="card">
          <div class="text-sm text-muted" style="margin-bottom:6px;">🎵 Chants les plus utilisés</div>
          ${chantsPopulaires.length ? chantsPopulaires.map(cp => `
            <div class="flex-between" style="padding:4px 0;">
              <span class="text-sm" style="font-weight:600;">${Utils.escapeHtml(cp.chant.titre)}</span>
              <span class="pill bureau">${cp.count}×</span>
            </div>
          `).join('') : `<div class="text-sm text-muted">Aucune prestation programmée</div>`}
        </div>
        <div class="card">
          <div class="text-sm text-muted" style="margin-bottom:6px;">👥 Choristes les plus assidus</div>
          ${topAssidus.length ? topAssidus.map(ta => `
            <div class="flex-between" style="padding:4px 0;">
              <span class="text-sm" style="font-weight:600;">${Utils.escapeHtml(ta.membre.nom)}</span>
              <span class="pill actif">${Utils.pct(ta.taux)}</span>
            </div>
          `).join('') : `<div class="text-sm text-muted">Aucune donnée</div>`}
        </div>
      </div>

      ${topGlobal.length ? `
        <div class="card">
          <div class="text-sm text-muted" style="margin-bottom:6px;">🏆 Top 3 — Classement Global</div>
          ${topGlobal.map(r => `
            <div class="flex-between" style="padding:4px 0;">
              <span class="text-sm" style="font-weight:600;">${ClassementsModule.medal(r.rang)} ${Utils.escapeHtml(r.membre.nom)}</span>
              <span style="font-weight:700;color:var(--maroon);">${r.score.toFixed(1)}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <div class="section-title"><span class="ornament">⚡</span> Accès rapide</div>

        <button class="btn sage block" data-nav="prestations">🎤 Prestations</button>
      </div>
    `;
    main.appendChild(restDiv);

    // Motivation message (Secrétariat)
    const motMsg = Store.getMotivationMessageActif();
    if (motMsg) {
      const motDiv = document.createElement('div');
      motDiv.className = 'motivation-banner';
      motDiv.innerHTML = `<div class="motivation-banner__icon">✨</div><div><div class="motivation-banner__text">${Utils.escapeHtml(motMsg.message)}</div><div class="motivation-banner__author">— ${Utils.escapeHtml(motMsg.auteur)}</div></div>`;

      if (firstAlert) main.insertBefore(motDiv, firstAlert);
      else main.insertBefore(motDiv, restDiv);
    }

    main.querySelectorAll('[data-nav]').forEach(btn => {
      btn.addEventListener('click', () => Router.navigate(btn.dataset.nav));
    });

    // ── Gestion identité (admin uniquement) ──
    if (isAdmin) {
      const editBtn = main.querySelector('#edit-identity-btn');
      if (editBtn) editBtn.addEventListener('click', () => this.openIdentityForm());

      // Upload logo
      const logoClick = main.querySelector('#logo-click');
      const logoInput = main.querySelector('#logo-file-input');
      if (logoClick && logoInput) {
        logoClick.addEventListener('click', () => logoInput.click());
        logoInput.addEventListener('change', (e) => {

          if (!file) return;
          const reader = new FileReader();

            Store.saveChoraleIdentite({ choraleLogoUrl: ev.target.result });

            Utils.toast('Logo mis à jour');
            Router.render();
          };
          reader.readAsDataURL(file);
        });

    }
  },  // end renderBureau

        choraleDescription:  sheet.querySelector('#id-desc').value.trim(),

      Store.saveChoraleIdentite(patch);

      Utils.closeSheet();
      Utils.toast('Informations enregistrées ✅');
      Router.render();
    });

  renderRecentSeances() {
    const seances = Store.data.seances.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3);
    if (!seances.length) {
      return `<div class="empty-state"><div class="empty-state__icon">📋</div><div class="empty-state__text">Aucune séance enregistrée.<br>Allez dans Discipline pour pointer les présences.</div></div>`;
    }
    return seances.map(s => {
      const presCount = Object.values(s.presences).filter(p => p === 'Présent').length;
      const total = Object.keys(s.presences).length;
      const icon = s.type === 'samedi' ? '🎹' : '⛪';
      const label = s.type === 'samedi' ? 'Répétition samedi' : 'Culte dimanche';
      return `
        <div class="flex-between" style="padding:6px 0;">
          <div>
            <div style="font-weight:600;font-size:0.88rem;">${icon} ${label}</div>
            <div class="text-sm text-muted">${Utils.fmtDate(s.date)}</div>
          </div>
          <div class="pill actif">${presCount}/${total} présents</div>
        </div>
      `;
    }).join('<div class="divider" style="margin:6px 0;"></div>');
  },
};

// ════════════════════════════════════════════════════════════════

const MembresModule = {
  filter: { statut: '', search: '' },

  render(main) {
