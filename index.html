        </div>
        <div id="member-list-self"></div>
      `;

        main.querySelector('#member-list-self').innerHTML = `<div class="empty-state"><div class="empty-state__icon">👤</div><div class="empty-state__text">Profil introuvable</div></div>`;
        return;
      }
      this.renderOwnCard(main.querySelector('#member-list-self'), me);
      return;
    }

    const tabs = [
      { key: '', label: 'Tous' },
      { key: 'Bureau', label: 'Bureau' },
      { key: 'Choriste', label: 'Choristes' },
      { key: 'Intégrant', label: 'Intégrants' },
    ];

    main.innerHTML = `
      ${Permissions.readOnlyBanner()}
      ${Permissions.isAdmin() ? this.renderDemandesBanner() : ''}

        <input type="text" placeholder="Rechercher un membre..." id="member-search" value="${Utils.escapeHtml(this.filter.search)}">
      </div>
      <div class="tabbar">
        ${tabs.map(t => `<button class="tab-btn ${this.filter.statut===t.key?'active':''}" data-statut="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div id="member-list"></div>

    const demBtn = main.querySelector('#btn-open-demandes');
    if (demBtn) demBtn.addEventListener('click', () => this.openDemandesAdmin());

    main.querySelectorAll('[data-statut]').forEach(btn => {
      btn.addEventListener('click', () => {
        this.filter.statut = btn.dataset.statut;
        this.render(main);
      });
    });

    main.querySelector('#member-search').addEventListener('input', (e) => {
      this.filter.search = e.target.value;
      this.renderList(main.querySelector('#member-list'));
    });

    this.renderList(main.querySelector('#member-list'));

    // FAB — réservé au bureau (département Membres) / admin
    if (Permissions.canManageData('membres')) {
      const fab = document.createElement('button');
      fab.className = 'fab';
      fab.innerHTML = '+';
      fab.id = 'fab-add-member';
      main.appendChild(fab);
      fab.addEventListener('click', () => this.openMemberForm());
    }
  },

  // 7.6 — Bandeau Admin signalant les demandes de modification en attente.
  renderDemandesBanner() {
    const pending = Store.getDemandesModification({ statut: 'En attente' });
    if (!pending.length) return '';
    return `
      <div class="alert-banner warn" id="btn-open-demandes" style="cursor:pointer;">
        <div class="alert-banner__icon">📨</div>
        <div><b>${pending.length} demande(s) de modification</b> en attente de validation — toucher pour examiner.</div>
      </div>
    `;
  },

  openDemandesAdmin() {
    const pending = Store.getDemandesModification({ statut: 'En attente' });
    if (!pending.length) { Utils.toast('Aucune demande en attente'); return; }
    const html = `<div class="list">${pending.map(d => {
      const m = Store.getMembre(d.membreId);
      const champsHtml = Object.keys(d.champs).map(c => {
        const ancienne = m ? (Array.isArray(m[c]) ? (m[c]||[]).join(', ') : (m[c]||'—')) : '—';
        const nouvelle = Array.isArray(d.champs[c]) ? d.champs[c].join(', ') : d.champs[c];
        return `<div style="padding:4px 0;font-size:0.85rem;"><b>${this.CHAMP_LABELS[c]||c}</b> : <span class="text-muted">${Utils.escapeHtml(String(ancienne))}</span> → <span style="color:var(--maroon);font-weight:600;">${Utils.escapeHtml(String(nouvelle))}</span></div>`;
      }).join('');
      return `
        <div class="card" data-demid="${d.id}">
          <div class="font-display" style="font-weight:700;">${m ? Utils.escapeHtml(m.nom) : d.membreId}</div>
          <div class="text-sm text-muted">${Utils.fmtDate(d.dateDemande)}</div>
          <div class="mt-8">${champsHtml}</div>
          <div class="grid-2 mt-8">
            <button class="btn danger block btn-refuser-dem" data-demid="${d.id}">❌ Refuser</button>
            <button class="btn primary block btn-valider-dem" data-demid="${d.id}">✅ Valider</button>
          </div>
        </div>
      `;
    }).join('')}</div>`;
    const sheet = Utils.openSheet('Demandes de modification', html);
    sheet.querySelectorAll('.btn-valider-dem').forEach(btn => {
      btn.addEventListener('click', () => {
        Store.traiterDemandeModification(btn.dataset.demid, true);
        Utils.closeSheet();
        Utils.toast('Demande validée — fiche mise à jour');
        Router.render();
      });
    });
    sheet.querySelectorAll('.btn-refuser-dem').forEach(btn => {
      btn.addEventListener('click', () => {
        Store.traiterDemandeModification(btn.dataset.demid, false, "Refusée par l'administrateur");
        Utils.closeSheet();
        Utils.toast('Demande refusée');
        Router.render();
      });
    });
  },

  // ── Choriste : affichage en ligne (pas de sheet) de sa propre fiche ──
  renderOwnCard(container, m) {
    const dis = Store.getDisciplineStats(m.id);
    const anniv = Store.getAnniversaireInfo(m);

    container.innerHTML = `
      <div class="card" style="text-align:center;">
        <div class="list-row__avatar" style="width:60px;height:60px;font-size:1.4rem;margin:0 auto 8px;">${Utils.initials(m.nom)}</div>
        <div class="font-display" style="font-size:1.3rem;font-weight:700;">${Utils.escapeHtml(m.nom)}</div>
        <div class="text-muted text-sm">${m.fonction || '—'} ${m.pupitre ? '· '+m.pupitre : ''}</div>
        <div class="mt-8"><span class="pill choriste">${m.statut}</span> <span class="pill actif">${m.situation}</span></div>

      <div class="grid-2">
        <div class="card center">
          <div class="text-sm text-muted">Tx Présence Sam.</div>

        </div>
        <div class="card center">
          <div class="text-sm text-muted">Tx Présence Dim.</div>
          <div class="font-display" style="font-size:1.4rem;font-weight:700;color:${dis.txDimanche>=0.8?'var(--green)':'var(--red)'};">${Utils.pct(dis.txDimanche)}</div>
        </div>
      </div>
      <div class="section-title"><span class="ornament">ℹ️</span> Mes informations</div>
      <div class="card">
        ${this.infoRow('Identifiant', m.id)}

        ${this.infoRow('Téléphone', m.telephone || '—')}
        ${this.infoRow('Adresse', m.adresse || '—')}

        ${this.infoRow("Date d'entrée", Utils.fmtDate(m.dateEntree))}
        ${this.infoRow('Cotisation/mois', Utils.fmtFCFA(Store.getCotisationDue(m)))}
        ${this.infoRow('Joue un instrument', m.jouesInstrument === 'Oui' ? 'Oui' : 'Non')}
        ${instruments ? this.infoRow('Instrument(s)', instruments) : ''}
        ${m.observations ? this.infoRow('Observations', m.observations) : ''}
      </div>
      ${anniv ? `
        <div class="card">
          <div class="flex-between">
            <span class="text-sm text-muted">🎂 Anniversaire</span>
            <span style="font-weight:700;">${Utils.fmtDate(m.dateNaissance)} (${anniv.age} ans)</span>
          </div>
          <div class="text-sm text-muted mt-8">${anniv.isToday ? "🎉 C'est aujourd'hui !" : `Dans ${anniv.daysRemaining} jour(s)`}</div>
        </div>` : ''}

      <button class="btn secondary block" id="btn-demande-modif">✏️ Proposer une modification de mes informations</button>
      <button class="btn secondary block mt-8" id="btn-changer-mdp">🔑 Changer mon mot de passe</button>

      ${(() => {
        const demandes = Store.getDemandesModification({ membreId: m.id });
        if (!demandes.length) return '';
        return `
          <div class="section-title"><span class="ornament">📨</span> Mes demandes de modification</div>
          <div class="list">${demandes.map(d => {
            const cls = d.statut==='Validée'?'actif':d.statut==='Refusée'?'suspendu':'bureau';
            const champsLabel = Object.keys(d.champs).map(c => this.CHAMP_LABELS[c]||c).join(', ');
            return `<div class="list-row" style="cursor:default;"><div class="list-row__avatar">✏️</div><div class="list-row__body"><div class="list-row__title">${champsLabel}</div><div class="list-row__subtitle">${Utils.fmtDate(d.dateDemande)}${d.motifRefus?(' · '+Utils.escapeHtml(d.motifRefus)):''}</div></div><span class="pill ${cls}">${d.statut}</span></div>`;
          }).join('')}</div>
        `;
      })()}
    `;

    container.querySelector('#btn-demande-modif').addEventListener('click', () => this.openDemandeModificationForm(m));
    container.querySelector('#btn-changer-mdp').addEventListener('click', () => this.openChangePasswordForm(m));
  },

  // 2 — Le choriste change lui-même son mot de passe (ancien requis).
  openChangePasswordForm(m) {
    const html = `
      <div id="cp-error" class="auth-error" style="display:none;"></div>
      <div class="field"><label>Mot de passe actuel</label>${Utils.pwdInput('cp-ancien','••••••••','current-password')}</div>
      <div class="field"><label>Nouveau mot de passe</label>${Utils.pwdInput('cp-nouveau1','Au moins 4 caractères','new-password')}</div>
      <div class="field"><label>Confirmez le nouveau mot de passe</label>${Utils.pwdInput('cp-nouveau2','••••••••','new-password')}</div>
      <button class="btn primary block" id="cp-save">🔑 Mettre à jour mon mot de passe</button>
    `;
    const sheet = Utils.openSheet('Changer mon mot de passe', html);
    sheet.querySelector('#cp-save').addEventListener('click', async () => {
      const ancien = sheet.querySelector('#cp-ancien').value;
      const n1 = sheet.querySelector('#cp-nouveau1').value;
      const n2 = sheet.querySelector('#cp-nouveau2').value;
      const errorEl = sheet.querySelector('#cp-error');
      errorEl.style.display = 'none';
      if (n1.length < 4) { errorEl.textContent = 'Le nouveau mot de passe doit contenir au moins 4 caractères.'; errorEl.style.display = ''; return; }
      if (n1 !== n2) { errorEl.textContent = 'Les deux nouveaux mots de passe ne correspondent pas.'; errorEl.style.display = ''; return; }
      const ok = await Store.changeChoristePassword(m.id, ancien, n1);
      if (!ok) { errorEl.textContent = 'Mot de passe actuel incorrect.'; errorEl.style.display = ''; return; }
      Utils.closeSheet();
      Utils.toast('Mot de passe mis à jour');
    });
  },

  CHAMP_LABELS: {
    dateNaissance: 'Date de naissance',
    telephone: 'Téléphone', adresse: 'Adresse', email: 'Email',
    observations: 'Observations', jouesInstrument: 'Joue un instrument', instruments: 'Instrument(s)',
  },

  // 7.6 — Le choriste propose une modification ; rien n'est appliqué tant
  // que l'Admin n'a pas validé via traiterDemandeModification().
  openDemandeModificationForm(m) {
    const instrumentsList = Array.isArray(m.instruments) ? m.instruments.join(', ') : '';
    const html = `
      <div class="alert-banner info"><div class="alert-banner__icon">ℹ️</div><div>Votre demande sera examinée par l'administrateur avant d'être appliquée à votre fiche.</div></div>
      <div class="field"><label>Date de naissance</label><input type="date" id="dm-naissance" value="${m.dateNaissance||''}"></div>
      <div class="field"><label>Téléphone</label><input type="text" id="dm-tel" value="${Utils.escapeHtml(m.telephone||'')}"></div>
      <div class="field"><label>Adresse</label><input type="text" id="dm-adresse" value="${Utils.escapeHtml(m.adresse||'')}"></div>
      <div class="field"><label>Email</label><input type="text" id="dm-email" value="${Utils.escapeHtml(m.email||'')}"></div>
      <div class="field"><label>Observations</label><textarea id="dm-obs" rows="2">${Utils.escapeHtml(m.observations||'')}</textarea></div>
      <div class="field"><label>Instrument(s) pratiqué(s) (séparés par une virgule)</label><input type="text" id="dm-instr" value="${Utils.escapeHtml(instrumentsList)}"></div>
      <button class="btn primary block" id="dm-save">📨 Envoyer la demande</button>
    `;
    const sheet = Utils.openSheet('Proposer une modification', html);
    sheet.querySelector('#dm-save').addEventListener('click', () => {
      const champs = {};
      const naissance = sheet.querySelector('#dm-naissance').value;
      const tel = sheet.querySelector('#dm-tel').value.trim();
      const adresse = sheet.querySelector('#dm-adresse').value.trim();
      const email = sheet.querySelector('#dm-email').value.trim();
      const obs = sheet.querySelector('#dm-obs').value.trim();
      const instrRaw = sheet.querySelector('#dm-instr').value.trim();
      if (naissance !== (m.dateNaissance||'')) champs.dateNaissance = naissance;
      if (tel !== (m.telephone||'')) champs.telephone = tel;
      if (adresse !== (m.adresse||'')) champs.adresse = adresse;
      if (email !== (m.email||'')) champs.email = email;
      if (obs !== (m.observations||'')) champs.observations = obs;
      const instrArr = instrRaw ? instrRaw.split(',').map(s=>s.trim()).filter(Boolean) : [];
      const currentInstr = Array.isArray(m.instruments) ? m.instruments : [];
      if (JSON.stringify(instrArr) !== JSON.stringify(currentInstr)) {
        champs.instruments = instrArr;
        champs.jouesInstrument = instrArr.length ? 'Oui' : 'Non';
      }
      if (!Object.keys(champs).length) { Utils.toast('Aucune modification détectée'); return; }
      Store.addDemandeModification({ id: Utils.genId('dem'), membreId: m.id, champs });
      Utils.closeSheet();
      Utils.toast('Demande envoyée — en attente de validation');
      Router.render();
    });
  },

  renderList(container) {
    const list = Store.getMembres({
      statut: this.filter.statut || undefined,
      search: this.filter.search || undefined,
    }).sort((a,b) => a.nom.localeCompare(b.nom));

    if (!list.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">👥</div><div class="empty-state__text">Aucun membre trouvé</div></div>`;
      return;
    }

    container.innerHTML = `<div class="list">${list.map(m => {
      const pillClass = m.statut === 'Bureau' ? 'bureau' : m.statut === 'Intégrant' ? 'integrant' : 'choriste';
      const anniv = Store.getAnniversaireInfo(m);
      const annivBadge = anniv && anniv.isToday ? ' 🎂' : '';
      const instruBadge = (m.jouesInstrument === 'Oui' && Array.isArray(m.instruments) && m.instruments.length) ? ' 🎻' : '';
      return `
        <div class="list-row" data-id="${m.id}">
          <div class="list-row__avatar">${Utils.initials(m.nom)}</div>
          <div class="list-row__body">
            <div class="list-row__title">${Utils.escapeHtml(m.nom)}${annivBadge}${instruBadge}</div>
            <div class="list-row__subtitle">${m.fonction || m.pupitre || '—'}</div>
          </div>
          <div class="list-row__meta">
            <span class="pill ${pillClass}">${m.statut}</span>
          </div>
          <span class="list-row__chevron">›</span>
        </div>
      `;
    }).join('')}</div>`;

    container.querySelectorAll('.list-row').forEach(row => {
      row.addEventListener('click', () => this.openMemberDetail(row.dataset.id));
    });
  },

  openMemberDetail(id) {
    const m = Store.getMembre(id);
    if (!m) return;
    const igi = m.statut === 'Choriste' ? Store.calcIGI(id) : null;
    const dis = Store.getDisciplineStats(id);
    const anniv = Store.getAnniversaireInfo(m);

    const html = `
      <div class="card" style="text-align:center;">
        <div class="list-row__avatar" style="width:60px;height:60px;font-size:1.4rem;margin:0 auto 8px;">${Utils.initials(m.nom)}</div>
        <div class="font-display" style="font-size:1.3rem;font-weight:700;">${Utils.escapeHtml(m.nom)}</div>
        <div class="text-muted text-sm">${m.fonction || '—'} ${m.pupitre ? '· '+m.pupitre : ''}</div>
        <div class="mt-8"><span class="pill ${m.statut==='Bureau'?'bureau':m.statut==='Intégrant'?'integrant':'choriste'}">${m.statut}</span> <span class="pill actif">${m.situation}</span></div>
      </div>

      <div class="grid-2">
        <div class="card center">
          <div class="text-sm text-muted">Tx Présence Sam.</div>
          <div class="font-display" style="font-size:1.4rem;font-weight:700;color:${dis.txSamedi>=0.8?'var(--green)':'var(--red)'};">${Utils.pct(dis.txSamedi)}</div>
        </div>
        <div class="card center">
          <div class="text-sm text-muted">Tx Présence Dim.</div>
          <div class="font-display" style="font-size:1.4rem;font-weight:700;color:${dis.txDimanche>=0.8?'var(--green)':'var(--red)'};">${Utils.pct(dis.txDimanche)}</div>
        </div>
      </div>

      ${dis.interdit ? `
        <div class="alert-banner danger">
          <div class="alert-banner__icon">⛔</div>
          <div><b>Non autorisé à prester</b> — ${dis.currentStreak} absences consécutives au samedi.</div>
        </div>` : ''}

      ${igi ? `
        <div class="card">
          <div class="flex-between">
            <span class="text-sm text-muted">Indice Global d'Implication</span>
            <span class="font-display" style="font-size:1.3rem;font-weight:700;color:var(--maroon);">${igi.igi}/100</span>
          </div>
          <div class="progress mt-8"><div class="progress__fill" style="width:${igi.igi}%;background:var(--gold);"></div></div>
          <div class="mt-8"><span class="pill ${igi.categorie.includes('Exemplaire')||igi.categorie.includes('impliqué')&&!igi.categorie.includes('Peu')?'exemplaire':igi.categorie.includes('accompagner')?'accompagner':'actif'}">${igi.categorie}</span></div>
        </div>` : ''}

      ${anniv ? `
        <div class="card">
          <div class="flex-between">
            <span class="text-sm text-muted">🎂 Anniversaire</span>
            <span style="font-weight:700;">${Utils.fmtDate(m.dateNaissance)} (${anniv.age} ans)</span>
          </div>
          <div class="text-sm text-muted mt-8">${anniv.isToday ? "🎉 C'est aujourd'hui !" : `Dans ${anniv.daysRemaining} jour(s)`}</div>
        </div>` : ''}

      ${(() => {
        // 7.1 — Le test d'intégration reste consultable même après le passage
        // au statut Choriste (la migration de l'identifiant est gérée par
        // Store.migrateTestIntegration lors de l'admission).
        const test = Store.getTestIntegration(m.id);
        if (!test) return '';
        const decClass = test.decision === 'Admis' ? 'actif' : test.decision === 'Admis sous réserve' ? 'derogation' : 'suspendu';
        return `
        <div class="section-title"><span class="ornament">📝</span> Test d'intégration</div>
        <div class="card">
          ${this.infoRow('Date du test', Utils.fmtDate(test.date))}
          ${this.infoRow('Note obtenue', (test.moyenne!=null ? test.moyenne.toFixed(2) : '—') + '/20')}
          ${test.observations ? this.infoRow('Observations du jury', test.observations) : ''}
          <div class="flex-between mt-8"><span class="text-sm text-muted">Décision finale</span><span class="pill ${decClass}">${test.decision || '—'}</span></div>
        </div>`;
      })()}

      ${(() => {
        // 2 — Sécurité du compte choriste individuel (Admin uniquement).
        if (!Permissions.isAdmin()) return '';
        if (m.statut !== 'Choriste' && m.statut !== 'Intégrant') return '';
        const compte = Store.getCompteChoriste(m.id);
        const statutCompte = compte ? compte.statutCompte : 'Non créé';
        const derniere = compte && compte.dernieresConnexions && compte.dernieresConnexions.length ? compte.dernieresConnexions[0] : null;
        return `
        <div class="section-title"><span class="ornament">🔐</span> Compte & sécurité</div>
        <div class="card">
          ${this.infoRow('Identifiant (matricule)', m.id)}
          <div class="flex-between mt-8"><span class="text-sm text-muted">Statut du compte</span><span class="pill ${statutCompte==='Actif'?'actif':statutCompte==='Désactivé'?'suspendu':'bureau'}">${statutCompte}</span></div>
          ${this.infoRow('Dernière connexion', derniere ? new Date(derniere).toLocaleString('fr-FR') : 'Jamais connecté')}
          ${compte && compte.dernieresConnexions && compte.dernieresConnexions.length > 1 ? `
            <details class="mt-8"><summary class="text-sm text-muted" style="cursor:pointer;">Historique des connexions (${compte.dernieresConnexions.length})</summary>
              <div class="mt-8">${compte.dernieresConnexions.map(d => `<div class="text-sm" style="padding:3px 0;">${new Date(d).toLocaleString('fr-FR')}</div>`).join('')}</div>
            </details>` : ''}
        </div>
        <div class="grid-2">
          <button class="btn secondary block" id="btn-reset-mdp">♻️ Réinitialiser le mot de passe</button>
          ${compte ? `<button class="btn ${statutCompte==='Désactivé'?'primary':'danger'} block" id="btn-toggle-compte">${statutCompte==='Désactivé'?'✅ Réactiver le compte':'🚫 Désactiver le compte'}</button>` : '<div></div>'}
        </div>`;
      })()}

      <div class="section-title"><span class="ornament">ℹ️</span> Informations</div>
      <div class="card">
        ${this.infoRow('Identifiant', m.id)}
        ${this.infoRow('Sexe', m.sexe === 'M' ? 'Masculin' : 'Féminin')}
        ${this.infoRow('Téléphone', m.telephone || '—')}
        ${this.infoRow('Adresse', m.adresse || '—')}
        ${this.infoRow('Email', m.email || '—')}
        ${this.infoRow("Date d'entrée", Utils.fmtDate(m.dateEntree))}
        ${this.infoRow('Cotisation/mois', Utils.fmtFCFA(Store.getCotisationDue(m)))}
        ${this.infoRow('Joue un instrument', m.jouesInstrument === 'Oui' ? 'Oui' : 'Non')}
        ${(m.jouesInstrument === 'Oui' && Array.isArray(m.instruments) && m.instruments.length) ? this.infoRow('Instrument(s)', m.instruments.join(', ')) : ''}
        ${m.observations ? this.infoRow('Observations', m.observations) : ''}
      </div>

      ${Permissions.canManageData('membres') ? `
        <div class="grid-2 mt-16">
          <button class="btn secondary block" id="edit-member">✏️ Modifier</button>
          <button class="btn danger block" id="delete-member">🗑️ Supprimer</button>
        </div>
      ` : ''}
    `;

    const sheet = Utils.openSheet(`👤 ${m.nom}`, html);
    const editBtn = sheet.querySelector('#edit-member');
    const delBtn = sheet.querySelector('#delete-member');
    const resetMdpBtn = sheet.querySelector('#btn-reset-mdp');
    const toggleCompteBtn = sheet.querySelector('#btn-toggle-compte');
    if (resetMdpBtn) resetMdpBtn.addEventListener('click', () => {
      Utils.confirmAction(`Réinitialiser le mot de passe de <b>${Utils.escapeHtml(m.nom)}</b> ? Le membre devra en recréer un à sa prochaine connexion.`, () => {
        Store.resetChoristePassword(m.id);
        Utils.closeSheet();
        Utils.toast('Mot de passe réinitialisé');
        Router.render();
      });
    });
    if (toggleCompteBtn) toggleCompteBtn.addEventListener('click', () => {
      const compte = Store.getCompteChoriste(m.id);
      const nouveauStatut = (compte && compte.statutCompte === 'Désactivé') ? 'Actif' : 'Désactivé';
      Store.toggleCompteChoristeStatut(m.id, nouveauStatut);
      Utils.closeSheet();
      Utils.toast(`Compte ${nouveauStatut === 'Actif' ? 'réactivé' : 'désactivé'}`);
      Router.render();
    });
    if (editBtn) editBtn.addEventListener('click', () => {
      Utils.closeSheet();
      this.openMemberForm(m);
    });
    if (delBtn) delBtn.addEventListener('click', () => {
      Utils.confirmAction(`Supprimer définitivement <b>${Utils.escapeHtml(m.nom)}</b> de la base de données ?`, () => {
        Store.deleteMembre(id);
        Utils.toast('Membre supprimé');
        Router.render();
      });
    });
  },

  infoRow(label, value) {
    return `<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">${label}</span><span class="text-sm" style="font-weight:600;text-align:right;max-width:60%;">${Utils.escapeHtml(value)}</span></div>`;
  },

  openMemberForm(membre) {
    const isEdit = !!membre;
    const m = membre || { id:'', nom:'', prenom:'', sexe:'F', dateNaissance:'', telephone:'', adresse:'', pupitre:'', fonction:'', statut:'Choriste', dateEntree: Utils.todayISO(), situation:'Actif', email:'', observations:'', jouesInstrument:'Non', instruments:[] };
    const INSTRUMENTS_LIST = ['Piano','Guitare','Basse','Batterie','Violon','Saxophone','Trompette','Flûte'];
    const memberInstruments = Array.isArray(m.instruments) ? m.instruments : [];
    const customInstrument = memberInstruments.find(i => INSTRUMENTS_LIST.indexOf(i) === -1) || '';

    const html = `
      <div class="field">
        <label>Nom complet *</label>
        <input type="text" id="f-nom" value="${Utils.escapeHtml(m.nom)}" placeholder="Nom du membre">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Sexe</label>
          <select id="f-sexe">
            <option value="F" ${m.sexe==='F'?'selected':''}>Féminin</option>
            <option value="M" ${m.sexe==='M'?'selected':''}>Masculin</option>
          </select>
        </div>
        <div class="field">
          <label>Statut</label>
          <select id="f-statut">
            <option value="Choriste" ${m.statut==='Choriste'?'selected':''}>Choriste</option>
            <option value="Bureau" ${m.statut==='Bureau'?'selected':''}>Bureau</option>
            <option value="Intégrant" ${m.statut==='Intégrant'?'selected':''}>Intégrant</option>
          </select>
        </div>
      </div>
      <div class="field" id="f-prise-fonction-wrap" style="display:${m.statut==='Bureau'?'':'none'};">
        <label>Date de prise de fonction (Bureau)</label>
        <input type="date" id="f-prise-fonction" value="${m.datePriseFonction || ''}">
        <div class="text-sm text-muted" style="margin-top:4px;">Avant cette date : 250 FCFA/mois · à partir de cette date : 500 FCFA/mois.</div>
      </div>
      <div class="field">
        <label>Fonction</label>
        <select id="f-fonction">
          ${Utils.FONCTIONS.map(f => {
            const isCustom = m.fonction && Utils.FONCTIONS.indexOf(m.fonction) === -1;
            const selected = isCustom ? (f === 'Autre fonction') : (m.fonction === f);
            return `<option value="${Utils.escapeHtml(f)}" ${selected?'selected':''}>${f}</option>`;
          }).join('')}
        </select>
      </div>
      <div class="field" id="f-fonction-autre-wrap" style="display:${(m.fonction && Utils.FONCTIONS.indexOf(m.fonction)===-1) || m.fonction==='Autre fonction' ?'':'none'};">
        <label>Précisez la fonction</label>
        <input type="text" id="f-fonction-autre" value="${Utils.escapeHtml((m.fonction && Utils.FONCTIONS.indexOf(m.fonction)===-1) ? m.fonction : '')}" placeholder="Ex: Chargé(e) de communication">
      </div>
      <div class="field">
        <label>Pupitre</label>
        <select id="f-pupitre">
          <option value="">—</option>
          ${Utils.PUPITRES.map(p => `<option value="${p}" ${m.pupitre===p?'selected':''}>${p}</option>`).join('')}
        </select>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Date de naissance</label>
          <input type="date" id="f-naissance" value="${m.dateNaissance || ''}">
        </div>
        <div class="field">
          <label>Téléphone</label>
          <input type="tel" id="f-tel" value="${Utils.escapeHtml(m.telephone)}" placeholder="07 00 00 00 00">
        </div>
      </div>
      <div class="field">
        <label>Adresse</label>
        <input type="text" id="f-adresse" value="${Utils.escapeHtml(m.adresse)}">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="f-email" value="${Utils.escapeHtml(m.email)}">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Date d'entrée</label>
          <input type="date" id="f-entree" value="${m.dateEntree || ''}">
        </div>
        <div class="field">
          <label>Situation</label>
          <select id="f-situation">
            ${['Actif','Suspendu','Démission','Intégré','Observateur'].map(s => `<option value="${s}" ${m.situation===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field">
        <label>🎻 Joue un instrument ?</label>
        <select id="f-joue-instrument">
          <option value="Non" ${m.jouesInstrument!=='Oui'?'selected':''}>Non</option>
          <option value="Oui" ${m.jouesInstrument==='Oui'?'selected':''}>Oui</option>
        </select>
      </div>
      <div class="field" id="f-instruments-wrap" style="display:${m.jouesInstrument==='Oui'?'':'none'};">
        <label>Instrument(s) pratiqué(s)</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${INSTRUMENTS_LIST.map(i => `
            <label style="display:flex;align-items:center;gap:4px;font-weight:400;font-size:0.85rem;">
              <input type="checkbox" class="f-instrument-cb" value="${i}" ${memberInstruments.indexOf(i)!==-1?'checked':''} style="width:auto;"> ${i}
            </label>
          `).join('')}
        </div>
        <input type="text" id="f-instrument-autre" placeholder="Autre (saisie libre)" value="${Utils.escapeHtml(customInstrument)}" style="margin-top:8px;">
      </div>
      <div class="field">
        <label>Observations</label>
        <textarea id="f-obs" rows="2">${Utils.escapeHtml(m.observations)}</textarea>
      </div>
      <button class="btn primary block" id="save-member">💾 ${isEdit?'Enregistrer':'Ajouter le membre'}</button>
    `;

    const sheet = Utils.openSheet(isEdit ? 'Modifier le membre' : 'Nouveau membre', html);
    const statutSelect = sheet.querySelector('#f-statut');
    const priseFonctionWrap = sheet.querySelector('#f-prise-fonction-wrap');
    statutSelect.addEventListener('change', () => {
      priseFonctionWrap.style.display = statutSelect.value === 'Bureau' ? '' : 'none';
    });
    const fonctionSelect = sheet.querySelector('#f-fonction');
    const fonctionAutreWrap = sheet.querySelector('#f-fonction-autre-wrap');
    fonctionSelect.addEventListener('change', () => {
      fonctionAutreWrap.style.display = fonctionSelect.value === 'Autre fonction' ? '' : 'none';
    });
    const joueSelect = sheet.querySelector('#f-joue-instrument');
    const instrWrap = sheet.querySelector('#f-instruments-wrap');
    joueSelect.addEventListener('change', () => {
      instrWrap.style.display = joueSelect.value === 'Oui' ? '' : 'none';
    });
    sheet.querySelector('#save-member').addEventListener('click', () => {
      const nom = sheet.querySelector('#f-nom').value.trim();
      if (!nom) { Utils.toast('Le nom est requis'); return; }
      const statut = sheet.querySelector('#f-statut').value;
      if (statut === 'Bureau' && !sheet.querySelector('#f-prise-fonction').value) {
        Utils.toast('La date de prise de fonction est obligatoire pour le Bureau');
        return;
      }
      let fonction = fonctionSelect.value;
      if (fonction === 'Autre fonction') {
        const autre = sheet.querySelector('#f-fonction-autre').value.trim();
        if (autre) fonction = autre;
      }
      const jouesInstrument = joueSelect.value;
      let instruments = [];
      if (jouesInstrument === 'Oui') {
        instruments = Array.from(sheet.querySelectorAll('.f-instrument-cb:checked')).map(cb => cb.value);
        const autre = sheet.querySelector('#f-instrument-autre').value.trim();
        if (autre) instruments.push(autre);
      }

      // 1.A — si le statut passe manuellement d'Intégrant à autre chose et
      // qu'aucune date d'intégration n'est encore enregistrée, on la fixe
      // à aujourd'hui (aucune cotisation rétroactive).
      let dateIntegration = m.dateIntegration || null;
      if (m.statut === 'Intégrant' && statut !== 'Intégrant' && !dateIntegration) {
        dateIntegration = Utils.todayISO();
      }

      const updated = {
        id: isEdit ? m.id : Store.nextMemberId(statut),
        nom,
        prenom: m.prenom,
        sexe: sheet.querySelector('#f-sexe').value,
        dateNaissance: sheet.querySelector('#f-naissance').value,
        telephone: sheet.querySelector('#f-tel').value,
        adresse: sheet.querySelector('#f-adresse').value,
        pupitre: sheet.querySelector('#f-pupitre').value,
        fonction,
        statut,
        dateEntree: sheet.querySelector('#f-entree').value,
        situation: sheet.querySelector('#f-situation').value,
        email: sheet.querySelector('#f-email').value,
        observations: sheet.querySelector('#f-obs').value,
        jouesInstrument,
        instruments,
        datePriseFonction: statut === 'Bureau' ? sheet.querySelector('#f-prise-fonction').value : (m.datePriseFonction || null),
        dateIntegration,
      };

      Store.upsertMembre(updated);
      Utils.closeSheet();
      Utils.toast(isEdit ? 'Membre modifié' : 'Membre ajouté');
      Router.render();
    });
  },
};

// ===== MODULE: DISCIPLINE =====
// ════════════════════════════════════════════════════════════════
// DISCIPLINE — Présences Samedis & Dimanches + Alertes + Sanctions
// ════════════════════════════════════════════════════════════════

const DisciplineModule = {
  tab: 'pointage', // pointage | stats | sanctions | indicateurs | derogations

  render(main) {
    // ── Choriste : ne voit que son propre historique disciplinaire ──
    if (Permissions.choristeRestricted()) {
      this.renderChoristeOwn(main);
      return;
    }
    const canManage = Permissions.canManageData('discipline');
    const tabs = [
      { key: 'pointage', label: '✅ Pointage' },
      { key: 'stats', label: '📊 Statistiques' },
      { key: 'indicateurs', label: '🎯 Indicateurs' },
      { key: 'sanctions', label: '💸 Sanctions' },
      { key: 'derogations', label: '🔓 Dérogations' },
      { key: 'toges', label: '👘 Toges' },
    ];

    main.innerHTML = `
      ${Permissions.readOnlyBanner()}
      <div class="tabbar">
        ${tabs.map(t => `<button class="tab-btn ${this.tab===t.key?'active':''}" data-tab="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div id="discipline-content"></div>
    `;

    main.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        this.tab = btn.dataset.tab;
        this.render(main);
      });
    });

    const content = main.querySelector('#discipline-content');
    if (this.tab === 'pointage') this.renderPointage(content);
    else if (this.tab === 'stats') this.renderStats(content);
    else if (this.tab === 'indicateurs') this.renderIndicateurs(content, main);
    else if (this.tab === 'sanctions') this.renderSanctions(content, main);
    else if (this.tab === 'toges') this.renderToges(content, main);
    else this.renderDerogations(content, main);
  },

  // ── Choriste : historique disciplinaire personnel uniquement ──
  renderChoristeOwn(main) {
    const me = Permissions.getChoristeMembre();
    main.innerHTML = `${Permissions.readOnlyBanner()}<div class="alert-banner info" style="margin-bottom:10px;"><div class="alert-banner__icon">🔒</div><div>Vous consultez uniquement <b>votre propre</b> historique disciplinaire.</div></div><div id="discipline-self"></div>`;
    const wrap = main.querySelector('#discipline-self');
    if (!me) { wrap.innerHTML = `<div class="empty-state"><div class="empty-state__icon">👤</div><div class="empty-state__text">Profil introuvable</div></div>`; return; }

    const dis = Store.getDisciplineStats(me.id);
    const sanctions = Store.getSanctions().filter(s => s.membre === me.nom);

    wrap.innerHTML = `
      <div class="grid-2">
        <div class="card center">
          <div class="text-sm text-muted">Tx Présence Sam.</div>
          <div class="font-display" style="font-size:1.4rem;font-weight:700;color:${dis.txSamedi>=0.8?'var(--green)':'var(--red)'};">${Utils.pct(dis.txSamedi)}</div>
        </div>
        <div class="card center">
          <div class="text-sm text-muted">Tx Présence Dim.</div>
          <div class="font-display" style="font-size:1.4rem;font-weight:700;color:${dis.txDimanche>=0.8?'var(--green)':'var(--red)'};">${Utils.pct(dis.txDimanche)}</div>
        </div>
      </div>
      ${dis.interdit ? `
        <div class="alert-banner danger">
          <div class="alert-banner__icon">⛔</div>
          <div><b>Non autorisé à prester</b> — ${dis.currentStreak} absences consécutives au samedi.</div>
        </div>` : `
        <div class="alert-banner success"><div class="alert-banner__icon">✅</div><div>Vous êtes en règle disciplinairement.</div></div>`}

      <div class="section-title"><span class="ornament">💸</span> Mes sanctions</div>
      ${sanctions.length ? `<div class="list">${sanctions.map(s => {
        const reste = Math.max(0, Number(s.montant||0) - Number(s.montantPaye||0));
        const statusClass = s.statut==='Payé'?'actif':s.statut==='Partielle'?'derogation':'suspendu';
        const statusLabel = s.statut==='Payé'?'Payée':s.statut==='En attente'?'En attente de paiement':s.statut;
        return `
        <div class="list-row" style="cursor:default;">
          <div class="list-row__avatar">💸</div>
          <div class="list-row__body">
            <div class="list-row__title">${Utils.escapeHtml(s.motif||'Sanction')}</div>
            <div class="list-row__subtitle">${Utils.fmtDate(s.date)} · Payé : ${Utils.fmtFCFA(s.montantPaye||0)} · Reste : ${Utils.fmtFCFA(reste)}${s.datePaiement?(' · Réglé le '+Utils.fmtDate(s.datePaiement)):''}</div>
          </div>
          <div class="list-row__meta"><span class="pill ${statusClass}">${Utils.fmtFCFA(s.montant||0)} · ${statusLabel}</span></div>
        </div>
      `;
      }).join('')}</div>` : `<div class="empty-state"><div class="empty-state__icon">✅</div><div class="empty-state__text">Aucune sanction</div></div>`}

      <div class="section-title"><span class="ornament">👘</span> Ma toge</div>
      ${(() => {
        const toge = Store.getToges().find(t => t.attribueA === me.id);
        if (!toge) return `<div class="empty-state"><div class="empty-state__icon">👘</div><div class="empty-state__text">Aucune toge attribuée pour le moment</div></div>`;
        return `<div class="card">
          ${this.infoRowToge('Type', toge.type)}
          ${this.infoRowToge('Code', toge.code)}
          ${this.infoRowToge('État', toge.etat)}
          ${toge.dateAttribution ? this.infoRowToge('Date attribution', Utils.fmtDate(toge.dateAttribution)) : ''}
        </div>`;
      })()}
    `;
  },

  // ── GESTION DES TOGES ──
  togesSubTab: 'dashboard',

  renderToges(container, main) {
    const canManage = Permissions.canManageData('discipline');
    const subTabs = [
      { key: 'dashboard', label: '📊 Tableau de bord' },
      { key: 'stock', label: '📦 Types & Stock' },
      { key: 'attribution', label: '🙋 Attribution' },
      { key: 'historique', label: '📜 Historique' },
    ];
    container.innerHTML = `
      <div class="tabbar">${subTabs.map(t=>`<button class="tab-btn ${this.togesSubTab===t.key?'active':''}" data-ttab="${t.key}">${t.label}</button>`).join('')}</div>
      <div id="toges-sub-content"></div>
    `;
    container.querySelectorAll('[data-ttab]').forEach(btn => {
      btn.addEventListener('click', () => { this.togesSubTab = btn.dataset.ttab; this.renderToges(container, main); });
    });
    const sub = container.querySelector('#toges-sub-content');
    if (this.togesSubTab === 'stock') this.renderTogesStock(sub, canManage);
    else if (this.togesSubTab === 'attribution') this.renderTogesAttribution(sub, canManage);
    else if (this.togesSubTab === 'historique') this.renderTogesHistorique(sub);
    else this.renderTogesDashboard(sub, canManage);
  },

    const alertes = Store.getTogesAlertes();

      <div class="grid-2">
        <div class="card center"><div class="text-sm text-muted">Total toges</div><div class="font-display" style="font-size:1.3rem;font-weight:700;color:var(--maroon);">${stats.total}</div></div>
        <div class="card center"><div class="text-sm text-muted">Disponibles</div><div class="font-display" style="font-size:1.3rem;font-weight:700;color:var(--green);">${stats.disponibles}</div></div>
      </div>
      <div class="grid-2">
        <div class="card center"><div class="text-sm text-muted">Attribuées</div><div class="font-display" style="font-size:1.3rem;font-weight:700;">${stats.attribuees}</div></div>
        <div class="card center"><div class="text-sm text-muted">En réparation</div><div class="font-display" style="font-size:1.3rem;font-weight:700;color:var(--amber);">${stats.reparation}</div></div>
      </div>
      <div class="grid-2">
        <div class="card center"><div class="text-sm text-muted">Mauvais état</div><div class="font-display" style="font-size:1.3rem;font-weight:700;color:var(--red);">${stats.mauvaisEtat}</div></div>
        <div class="card center"><div class="text-sm text-muted">Choristes sans toge</div><div class="font-display" style="font-size:1.3rem;font-weight:700;color:var(--red);">${stats.sansToge.length}</div></div>
      </div>
      ${alertes.length ? `
        <div class="section-title"><span class="ornament">⚠️</span> Alertes</div>
        ${alertes.map(a => `<div class="alert-banner ${a.type==='dechiree'||a.type==='hs'?'danger':'warn'}"><div class="alert-banner__icon">⚠️</div><div>${Utils.escapeHtml(a.message)}</div></div>`).join('')}

      <div class="section-title"><span class="ornament">📤</span> Rapports & exports</div>
      <button class="btn secondary block" id="exp-toges-inventaire">📦 Inventaire complet (Excel)</button>

      <button class="btn secondary block mt-8" id="exp-toges-sans">🙅 Choristes sans toge (Excel)</button>
      <button class="btn secondary block mt-8" id="exp-toges-historique">📜 Historique complet (Excel)</button>
    `;
    container.querySelector('#exp-toges-inventaire').addEventListener('click', () => {

      Utils.exportCSV('toges_inventaire', ['Type','Code','État','Attribuée à','Date attribution','Observations'], rows);
    });
    container.querySelector('#exp-toges-avec').addEventListener('click', () => {
      const rows = stats.avecToge.map(m => {
        const t = Store.getToges().find(t=>t.attribueA===m.id);

    });

    });

      Store.getToges().forEach(t => (t.historique||[]).forEach(h => rows.push([t.type, t.code, h.date, h.action, h.par||''])));
      rows.sort((a,b)=>b[2].localeCompare(a[2]));
      Utils.exportCSV('toges_historique', ['Type','Code','Date','Action','Par'], rows);
    });
  },

  // 1 — Types & Stock
  renderTogesStock(container, canManage) {
    const stats = Store.getTogesStats();
    const types = Store.getTypesToges();
    container.innerHTML = `
      <div class="card"><div class="flex-between"><span class="text-sm text-muted">Total général</span><span style="font-weight:700;font-size:1.1rem;">${stats.total}</span></div></div>
      ${types.map(type => {
        const s = stats.parType[type] || { total:0,bonEtat:0,usees:0,dechirees:0,reparation:0,disponibles:0,attribuees:0 };
        return `
        <div class="section-title"><span class="ornament">👘</span> ${type}</div>
        <div class="card">
          ${DisciplineModule.infoRowToge('Nombre total', s.total)}
          ${DisciplineModule.infoRowToge('En bon état', s.bonEtat)}
          ${DisciplineModule.infoRowToge('Usées', s.usees)}
          ${DisciplineModule.infoRowToge('Déchirées', s.dechirees)}
          ${DisciplineModule.infoRowToge('En réparation', s.reparation)}
          ${DisciplineModule.infoRowToge('Disponibles', s.disponibles)}
          ${DisciplineModule.infoRowToge('Attribuées', s.attribuees)}
        </div>`;
      }).join('')}

      ${canManage ? `
      <button class="btn secondary block mt-16" id="btn-add-type-toge">➕ Ajouter un type de toge</button>

      <button class="btn primary block" id="btn-add-toge">➕ Ajouter une toge au stock</button>
      ` : ''}
      <div class="list mt-16">${Store.getToges().map(t => {
        const etatClass = t.etat==='Disponible'||t.etat==='Utilisée' ? 'actif' : t.etat==='En réparation' ? 'derogation' : 'suspendu';
        return `
        <div class="list-row" data-id="${t.id}">
          <div class="list-row__avatar">👘</div>
          <div class="list-row__body"><div class="list-row__title">${t.type} — ${Utils.escapeHtml(t.code)}</div><div class="list-row__subtitle">${t.attribueA ? ('Attribuée à '+((Store.getMembre(t.attribueA)||{}).nom||'?')) : 'Non attribuée'}</div></div>

      }).join('')}</div>

        if (nom && nom.trim()) { Store.addTypeToge(nom.trim()); Utils.toast('Type ajouté'); Router.render(); }
      });
      container.querySelector('#btn-add-toge').addEventListener('click', () => this.openTogeForm());
    }
    container.querySelectorAll('[data-id]').forEach(row => {
      row.addEventListener('click', () => this.openTogeDetail(row.dataset.id, canManage));
    });

  infoRowToge(label, value) {
    return `<div class="flex-between" style="padding:4px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">${label}</span><span style="font-weight:700;">${value}</span></div>`;
  },

  openTogeForm() {
    const types = Store.getTypesToges();
    const html = `
      <div class="field"><label>Type</label><select id="tf-type">${types.map(t=>`<option value="${t}">${t}</option>`).join('')}</select></div>
      <div class="field"><label>Numéro / Code</label><input type="text" id="tf-code" placeholder="Ex: TV-001"></div>
      <div class="field"><label>État</label><select id="tf-etat">${Store.TOGE_ETATS.map(e=>`<option value="${e}">${e}</option>`).join('')}</select></div>
      <button class="btn primary block" id="tf-save">💾 Ajouter au stock</button>
    `;
    const sheet = Utils.openSheet('Nouvelle toge', html);
    sheet.querySelector('#tf-save').addEventListener('click', () => {
      const code = sheet.querySelector('#tf-code').value.trim();
      if (!code) { Utils.toast('Le code est requis'); return; }
      Store.addToge({ id: Utils.genId('toge'), type: sheet.querySelector('#tf-type').value, code, etat: sheet.querySelector('#tf-etat').value, attribueA: null, dateAttribution: null, observations: '' });
      Utils.closeSheet();
      Utils.toast('Toge ajoutée au stock');
      Router.render();
    });
  },

  openTogeDetail(id, canManage) {
    const t = Store.getToge(id);
    if (!t) return;
    const membre = t.attribueA ? Store.getMembre(t.attribueA) : null;
    const hist = t.historique || [];
    const html = `
      <div class="card">
        ${this.infoRowToge('Type', t.type)}
        ${this.infoRowToge('Code', t.code)}
        ${this.infoRowToge('Attribuée à', membre ? membre.nom : 'Personne')}
        ${t.dateAttribution ? this.infoRowToge('Date attribution', Utils.fmtDate(t.dateAttribution)) : ''}
        ${t.observations ? this.infoRowToge('Observations', t.observations) : ''}
      </div>
      ${canManage ? `
      <div class="field"><label>État</label><select id="td-etat">${Store.TOGE_ETATS.map(e=>`<option value="${e}" ${t.etat===e?'selected':''}>${e}</option>`).join('')}</select></div>
      <button class="btn secondary block" id="td-save-etat">✏️ Mettre à jour l'état</button>
      ${t.attribueA ? '<button class="btn danger block mt-8" id="td-restituer">↩️ Restituer cette toge</button>' : ''}
      ` : ''}
      ${hist.length ? `
        <div class="section-title"><span class="ornament">📜</span> Historique</div>
        <div class="card">${hist.slice().reverse().map(h => `<div style="padding:5px 0;border-bottom:1px solid var(--line);font-size:0.82rem;"><span class="text-muted">${Utils.fmtDate(h.date)}</span> — ${Utils.escapeHtml(h.action)}${h.par?(' <span class="text-muted">('+h.par+')</span>'):''}</div>`).join('')}</div>
      ` : ''}
    `;
    const sheet = Utils.openSheet(`${t.type} — ${t.code}`, html);
    const saveEtatBtn = sheet.querySelector('#td-save-etat');
    if (saveEtatBtn) saveEtatBtn.addEventListener('click', () => {
      const nv = sheet.querySelector('#td-etat').value;
      Store.changerEtatToge(id, nv);
      Utils.closeSheet();
      Utils.toast('État mis à jour');
      Router.render();
    });
    const restituerBtn = sheet.querySelector('#td-restituer');
    if (restituerBtn) restituerBtn.addEventListener('click', () => {
      Utils.confirmAction('Restituer cette toge ? Elle redeviendra disponible.', () => {
        Store.restituerToge(id);
        Utils.closeSheet();
        Utils.toast('Toge restituée');
        Router.render();
      });
    });
  },

  // 2 — Attribution aux choristes
  renderTogesAttribution(container, canManage) {
    const stats = Store.getTogesStats();
    container.innerHTML = `
      <div class="section-title"><span class="ornament">🙋</span> Choristes avec toge (${stats.avecToge.length})</div>
      <div class="list">${stats.avecToge.map(m => {
        const t = Store.getToges().find(t=>t.attribueA===m.id);
        return `<div class="list-row" style="cursor:default;"><div class="list-row__avatar">${Utils.initials(m.nom)}</div><div class="list-row__body"><div class="list-row__title">${Utils.escapeHtml(m.nom)}</div><div class="list-row__subtitle">${t?(t.type+' — '+t.code):''} ${t&&t.dateAttribution?(' · '+Utils.fmtDate(t.dateAttribution)):''}</div></div></div>`;
      }).join('') || '<div class="text-sm text-muted">Aucun</div>'}</div>

      <div class="section-title"><span class="ornament">🙅</span> Choristes sans toge (${stats.sansToge.length})</div>
      <div class="list">${stats.sansToge.map(m => `
        <div class="list-row" ${canManage?`data-attribuer="${m.id}"`:''} style="${canManage?'cursor:pointer;':'cursor:default;'}">
          <div class="list-row__avatar">${Utils.initials(m.nom)}</div>
          <div class="list-row__body"><div class="list-row__title">${Utils.escapeHtml(m.nom)}</div><div class="list-row__subtitle">${m.statut}${m.pupitre?(' · '+m.pupitre):''}</div></div>
          ${canManage ? '<span class="list-row__chevron">›</span>' : ''}
        </div>
      `).join('') || '<div class="text-sm text-muted">Tous les choristes ont une toge 🎉</div>'}</div>
    `;
    if (canManage) {
      container.querySelectorAll('[data-attribuer]').forEach(row => {
        row.addEventListener('click', () => this.openAttribuerTogeForm(row.dataset.attribuer));
      });
    }
  },

  openAttribuerTogeForm(membreId) {
    const m = Store.getMembre(membreId);
    const disponibles = Store.getToges({ attribuee: false }).filter(t => t.etat === 'Disponible');
    if (!disponibles.length) { Utils.toast('Aucune toge disponible — ajoutez-en au stock'); return; }
    const html = `
      <div class="field"><label>Toge à attribuer à ${Utils.escapeHtml(m.nom)}</label>
        <select id="at-toge">${disponibles.map(t=>`<option value="${t.id}">${t.type} — ${t.code}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Observations</label><textarea id="at-obs" rows="2"></textarea></div>
      <button class="btn primary block" id="at-save">✅ Attribuer</button>
    `;
    const sheet = Utils.openSheet('Attribution de toge', html);
    sheet.querySelector('#at-save').addEventListener('click', () => {
      Store.attribuerToge(sheet.querySelector('#at-toge').value, membreId, sheet.querySelector('#at-obs').value);
      Utils.closeSheet();
      Utils.toast('Toge attribuée');
      Router.render();
    });
  },

  // 5 — Historique complet des mouvements
  renderTogesHistorique(container) {
    const rows = [];
    Store.getToges().forEach(t => (t.historique||[]).forEach(h => rows.push({ ...h, type: t.type, code: t.code })));
    rows.sort((a,b)=>b.date.localeCompare(a.date));
    container.innerHTML = rows.length ? `<div class="list">${rows.map(h => `
      <div class="list-row" style="cursor:default;">
        <div class="list-row__avatar">📜</div>
        <div class="list-row__body"><div class="list-row__title">${h.type} — ${Utils.escapeHtml(h.code)}</div><div class="list-row__subtitle">${Utils.escapeHtml(h.action)}${h.par?(' · '+h.par):''}</div></div>
        <div class="text-sm text-muted">${Utils.fmtDate(h.date)}</div>
      </div>
    `).join('')}</div>` : `<div class="empty-state"><div class="empty-state__icon">📜</div><div class="empty-state__text">Aucun mouvement enregistré</div></div>`;
  },

  // ── POINTAGE ──
  renderPointage(container) {
    const seances = Store.getSeances();
    const canManage = Permissions.canManageData('discipline');
    container.innerHTML = `
      ${canManage ? `
      <div class="card">
        <div class="section-title" style="margin-top:0;"><span class="ornament">📝</span> Nouvelle séance</div>
        <div class="field-row">
          <div class="field">
            <label>Type de séance</label>
            <select id="new-type">
              <option value="samedi">🎹 Répétition Samedi</option>
              <option value="dimanche">⛪ Culte Dimanche</option>
            </select>
          </div>
          <div class="field">
            <label>Date</label>
            <input type="date" id="new-date" value="${Utils.todayISO()}">
          </div>
        </div>
        <button class="btn primary block" id="start-seance">Pointer cette séance</button>
      </div>
      ` : `
      <div class="alert-banner info">
        <div class="alert-banner__icon">ℹ️</div>
        <div>Consultation des présences (lecture seule). Seul le bureau peut pointer une nouvelle séance.</div>
      </div>
      `}

      <div class="section-title"><span class="ornament">📋</span> Séances enregistrées</div>
      <div id="seance-list"></div>
    `;

    if (canManage) {
      container.querySelector('#start-seance').addEventListener('click', () => {
        const type = container.querySelector('#new-type').value;
        const date = container.querySelector('#new-date').value;
        if (!date) { Utils.toast('Veuillez choisir une date'); return; }

        // Check if seance exists for that date+type
        let existing = Store.data.seances.find(s => s.date === date && s.type === type);
        if (!existing) {
          existing = {
            id: Utils.genId('seance'),
            date, type,
            presences: {},
          };
          // Pre-fill all members with '—'
          Store.data.membres.forEach(m => { existing.presences[m.id] = '—'; });
          Store.upsertSeance(existing);
        }
        this.openPointageSheet(existing.id);
      });
    }

    this.renderSeanceList(container.querySelector('#seance-list'), seances);
  },

  renderSeanceList(container, seances) {
    if (!seances.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">📋</div><div class="empty-state__text">Aucune séance enregistrée</div></div>`;
      return;
    }
    container.innerHTML = `<div class="list">${seances.slice(0, 20).map(s => {
      const icon = s.type === 'samedi' ? '🎹' : '⛪';
      const label = s.type === 'samedi' ? 'Répétition Samedi' : 'Culte Dimanche';
      const total = Object.keys(s.presences).length;
      const present = Object.values(s.presences).filter(p=>p==='Présent').length;
      return `
        <div class="list-row" data-id="${s.id}">
          <div class="list-row__avatar">${icon}</div>
          <div class="list-row__body">
            <div class="list-row__title">${label}</div>
            <div class="list-row__subtitle">${Utils.fmtDate(s.date)}</div>
          </div>
          <div class="list-row__meta">
            <span class="pill actif">${present}/${total}</span>
          </div>
          <span class="list-row__chevron">›</span>
        </div>
      `;
    }).join('')}</div>`;

    container.querySelectorAll('.list-row').forEach(row => {
      row.addEventListener('click', () => this.openPointageSheet(row.dataset.id));
    });
  },

  openPointageSheet(seanceId) {
    const seance = Store.getSeance(seanceId);
    if (!seance) return;
    const membres = Store.data.membres.slice().sort((a,b)=>a.nom.localeCompare(b.nom));
    const label = seance.type === 'samedi' ? '🎹 Répétition Samedi' : '⛪ Culte Dimanche';
    const canManage = Permissions.canManageData('discipline');

    const html = `
      <div class="text-sm text-muted mb-8" style="margin-bottom:10px;">${Utils.fmtDateLong(seance.date)}</div>
      ${canManage ? `
      <div class="card" style="padding:10px;">
        <div class="flex-between" style="margin-bottom:6px;">
          <span class="text-sm" style="font-weight:700;">Marquer tous :</span>
          <div style="display:flex;gap:6px;">
            <button class="btn sm sage" data-bulk="Présent">Présents</button>
            <button class="btn sm secondary" data-bulk="—">Effacer</button>
          </div>
        </div>
      </div>
      ` : ''}
      <div class="list" style="margin-top:8px;">
        ${membres.map(m => {
          const st = seance.presences[m.id] || '—';
          return `
            <div class="list-row" style="cursor:default;">
              <div class="list-row__avatar">${Utils.initials(m.nom)}</div>
              <div class="list-row__body">
                <div class="list-row__title">${Utils.escapeHtml(m.nom)}</div>
                <div class="list-row__subtitle">${m.statut}</div>
              </div>
              ${canManage ? `
                <select class="status-select ${Utils.statusClass(st)}" data-member="${m.id}" style="max-width:130px;">
                  ${['—'].concat(Utils.STATUTS_PRESENCE).map(s => `<option value="${s}" ${st===s?'selected':''}>${s}</option>`).join('')}
                </select>
              ` : `
                <span class="pill ${st==='Présent'?'actif':st==='—'?'':'suspendu'}" style="min-width:90px;text-align:center;">${st}</span>
              `}
            </div>
          `;
        }).join('')}
      </div>
      <div class="${canManage?'grid-2':''} mt-16">
        ${canManage ? '<button class="btn danger block" id="delete-seance">🗑️ Supprimer séance</button>' : ''}
        <button class="btn primary block" id="close-pointage">✅ Fermer</button>
      </div>
    `;

    const sheet = Utils.openSheet(label, html);

    if (canManage) {
      sheet.querySelectorAll('[data-member]').forEach(sel => {
        sel.addEventListener('change', () => {
          const mid = sel.dataset.member;
          seance.presences[mid] = sel.value;
          sel.className = 'status-select ' + Utils.statusClass(sel.value);
          Store.upsertSeance(seance);
        });
      });

      sheet.querySelectorAll('[data-bulk]').forEach(btn => {
        btn.addEventListener('click', () => {
          const val = btn.dataset.bulk;
          membres.forEach(m => { seance.presences[m.id] = val; });
          Store.upsertSeance(seance);
          Utils.closeSheet();
          this.openPointageSheet(seanceId);
        });
      });

      sheet.querySelector('#delete-seance').addEventListener('click', () => {
        Utils.confirmAction('Supprimer cette séance et toutes ses présences ?', () => {
          Store.deleteSeance(seanceId);
          Utils.closeSheet();
          Utils.toast('Séance supprimée');
          Router.render();
        });
      });
    }

      Utils.closeSheet();

    });
  },

    container.innerHTML = `
