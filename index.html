        </select>
      </div>
      <div class="field" id="f-instruments-wrap" style="display:${m.jouesInstrument==='Oui'?'':'none'};">
        <label>Instrument(s) pratiqué(s)</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${INSTRUMENTS_LIST.map(i => `
            <label style="display:flex;align-items:center;gap:4px;font-weight:400;font-size:0.85rem;">
              <input type="checkbox" class="f-instrument-cb" value="${i}" ${memberInstruments.indexOf(i)!==-1?'checked':''} style="width:auto;"> ${i}
            </label>
          `).join('')}
        </div>
        <input type="text" id="f-instrument-autre" placeholder="Autre (saisie libre)" value="${Utils.escapeHtml(customInstrument)}" style="margin-top:8px;">
      </div>
      <div class="field">
        <label>Observations</label>
        <textarea id="f-obs" rows="2">${Utils.escapeHtml(m.observations)}</textarea>
      </div>
      <button class="btn primary block" id="save-member">💾 ${isEdit?'Enregistrer':'Ajouter le membre'}</button>
    `;

    const sheet = Utils.openSheet(isEdit ? 'Modifier le membre' : 'Nouveau membre', html);
    const joueSelect = sheet.querySelector('#f-joue-instrument');
    const instrWrap = sheet.querySelector('#f-instruments-wrap');
    joueSelect.addEventListener('change', () => {
      instrWrap.style.display = joueSelect.value === 'Oui' ? '' : 'none';
    });
    sheet.querySelector('#save-member').addEventListener('click', () => {
      const nom = sheet.querySelector('#f-nom').value.trim();
      if (!nom) { Utils.toast('Le nom est requis'); return; }
      const statut = sheet.querySelector('#f-statut').value;
      const jouesInstrument = joueSelect.value;
      let instruments = [];
      if (jouesInstrument === 'Oui') {
        instruments = Array.from(sheet.querySelectorAll('.f-instrument-cb:checked')).map(cb => cb.value);
        const autre = sheet.querySelector('#f-instrument-autre').value.trim();
        if (autre) instruments.push(autre);
      }

      const updated = {
        id: isEdit ? m.id : Store.nextMemberId(statut),
        nom,
        prenom: m.prenom,
        sexe: sheet.querySelector('#f-sexe').value,
        dateNaissance: sheet.querySelector('#f-naissance').value,
        telephone: sheet.querySelector('#f-tel').value,
        adresse: sheet.querySelector('#f-adresse').value,
        pupitre: sheet.querySelector('#f-pupitre').value,
        fonction: sheet.querySelector('#f-fonction').value,
        statut,
        dateEntree: sheet.querySelector('#f-entree').value,
        situation: sheet.querySelector('#f-situation').value,
        email: sheet.querySelector('#f-email').value,
        observations: sheet.querySelector('#f-obs').value,
        jouesInstrument,
        instruments,
      };

      Store.upsertMembre(updated);
      Utils.closeSheet();
      Utils.toast(isEdit ? 'Membre modifié' : 'Membre ajouté');
      Router.render();
    });
  },
};

// ===== MODULE: DISCIPLINE =====
// ════════════════════════════════════════════════════════════════
// DISCIPLINE — Présences Samedis & Dimanches + Alertes + Sanctions
// ════════════════════════════════════════════════════════════════

const DisciplineModule = {
  tab: 'pointage', // pointage | stats | sanctions | indicateurs | derogations

  render(main) {
    // ── Choriste : ne voit que son propre historique disciplinaire ──
    if (Permissions.choristeRestricted()) {
      this.renderChoristeOwn(main);
      return;
    }
    const canManage = Permissions.canManageData('discipline');
    const tabs = [
      { key: 'pointage', label: '✅ Pointage' },
      { key: 'stats', label: '📊 Statistiques' },
      { key: 'indicateurs', label: '🎯 Indicateurs' },
      { key: 'sanctions', label: '💸 Sanctions' },
      { key: 'derogations', label: '🔓 Dérogations' },
    ];

    main.innerHTML = `
      ${Permissions.readOnlyBanner()}
      <div class="tabbar">
        ${tabs.map(t => `<button class="tab-btn ${this.tab===t.key?'active':''}" data-tab="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div id="discipline-content"></div>
    `;

    main.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        this.tab = btn.dataset.tab;
        this.render(main);
      });
    });

    const content = main.querySelector('#discipline-content');
    if (this.tab === 'pointage') this.renderPointage(content);
    else if (this.tab === 'stats') this.renderStats(content);
    else if (this.tab === 'indicateurs') this.renderIndicateurs(content, main);
    else if (this.tab === 'sanctions') this.renderSanctions(content, main);
    else this.renderDerogations(content, main);
  },

  // ── Choriste : historique disciplinaire personnel uniquement ──
  renderChoristeOwn(main) {
    const me = Permissions.getChoristeMembre();
    main.innerHTML = `${Permissions.readOnlyBanner()}<div class="alert-banner info" style="margin-bottom:10px;"><div class="alert-banner__icon">🔒</div><div>Vous consultez uniquement <b>votre propre</b> historique disciplinaire.</div></div><div id="discipline-self"></div>`;
    const wrap = main.querySelector('#discipline-self');
    if (!me) { wrap.innerHTML = `<div class="empty-state"><div class="empty-state__icon">👤</div><div class="empty-state__text">Profil introuvable</div></div>`; return; }

    const dis = Store.getDisciplineStats(me.id);
    const sanctions = Store.getSanctions().filter(s => s.membre === me.nom);

    wrap.innerHTML = `
      <div class="grid-2">
        <div class="card center">
          <div class="text-sm text-muted">Tx Présence Sam.</div>
          <div class="font-display" style="font-size:1.4rem;font-weight:700;color:${dis.txSamedi>=0.8?'var(--green)':'var(--red)'};">${Utils.pct(dis.txSamedi)}</div>
        </div>
        <div class="card center">
          <div class="text-sm text-muted">Tx Présence Dim.</div>
          <div class="font-display" style="font-size:1.4rem;font-weight:700;color:${dis.txDimanche>=0.8?'var(--green)':'var(--red)'};">${Utils.pct(dis.txDimanche)}</div>
        </div>
      </div>
      ${dis.interdit ? `
        <div class="alert-banner danger">
          <div class="alert-banner__icon">⛔</div>
          <div><b>Non autorisé à prester</b> — ${dis.currentStreak} absences consécutives au samedi.</div>
        </div>` : `
        <div class="alert-banner success"><div class="alert-banner__icon">✅</div><div>Vous êtes en règle disciplinairement.</div></div>`}

      <div class="section-title"><span class="ornament">💸</span> Mes sanctions</div>
      ${sanctions.length ? `<div class="list">${sanctions.map(s => {
        const reste = Math.max(0, Number(s.montant||0) - Number(s.montantPaye||0));
        const statusClass = s.statut==='Payé'?'actif':s.statut==='Partielle'?'derogation':'suspendu';
        const statusLabel = s.statut==='Payé'?'Payée':s.statut==='En attente'?'En attente de paiement':s.statut;
        return `
        <div class="list-row" style="cursor:default;">
          <div class="list-row__avatar">💸</div>
          <div class="list-row__body">
            <div class="list-row__title">${Utils.escapeHtml(s.motif||'Sanction')}</div>
            <div class="list-row__subtitle">${Utils.fmtDate(s.date)} · Payé : ${Utils.fmtFCFA(s.montantPaye||0)} · Reste : ${Utils.fmtFCFA(reste)}${s.datePaiement?(' · Réglé le '+Utils.fmtDate(s.datePaiement)):''}</div>
          </div>
          <div class="list-row__meta"><span class="pill ${statusClass}">${Utils.fmtFCFA(s.montant||0)} · ${statusLabel}</span></div>
        </div>
      `;
      }).join('')}</div>` : `<div class="empty-state"><div class="empty-state__icon">✅</div><div class="empty-state__text">Aucune sanction</div></div>`}
    `;
  },

  // ── POINTAGE ──
  renderPointage(container) {
    const seances = Store.getSeances();
    const canManage = Permissions.canManageData('discipline');
    container.innerHTML = `
      ${canManage ? `
      <div class="card">
        <div class="section-title" style="margin-top:0;"><span class="ornament">📝</span> Nouvelle séance</div>
        <div class="field-row">
          <div class="field">
            <label>Type de séance</label>
            <select id="new-type">
              <option value="samedi">🎹 Répétition Samedi</option>
              <option value="dimanche">⛪ Culte Dimanche</option>
            </select>
          </div>
          <div class="field">
            <label>Date</label>
            <input type="date" id="new-date" value="${Utils.todayISO()}">
          </div>
        </div>
        <button class="btn primary block" id="start-seance">Pointer cette séance</button>
      </div>
      ` : `
      <div class="alert-banner info">
        <div class="alert-banner__icon">ℹ️</div>
        <div>Consultation des présences (lecture seule). Seul le bureau peut pointer une nouvelle séance.</div>
      </div>
      `}

      <div class="section-title"><span class="ornament">📋</span> Séances enregistrées</div>
      <div id="seance-list"></div>
    `;

    if (canManage) {
      container.querySelector('#start-seance').addEventListener('click', () => {
        const type = container.querySelector('#new-type').value;
        const date = container.querySelector('#new-date').value;
        if (!date) { Utils.toast('Veuillez choisir une date'); return; }

        // Check if seance exists for that date+type
        let existing = Store.data.seances.find(s => s.date === date && s.type === type);
        if (!existing) {
          existing = {
            id: Utils.genId('seance'),
            date, type,
            presences: {},
          };
          // Pre-fill all members with '—'
          Store.data.membres.forEach(m => { existing.presences[m.id] = '—'; });
          Store.upsertSeance(existing);
        }
        this.openPointageSheet(existing.id);
      });
    }

    this.renderSeanceList(container.querySelector('#seance-list'), seances);
  },

  renderSeanceList(container, seances) {
    if (!seances.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">📋</div><div class="empty-state__text">Aucune séance enregistrée</div></div>`;
      return;
    }
    container.innerHTML = `<div class="list">${seances.slice(0, 20).map(s => {
      const icon = s.type === 'samedi' ? '🎹' : '⛪';
      const label = s.type === 'samedi' ? 'Répétition Samedi' : 'Culte Dimanche';
      const total = Object.keys(s.presences).length;
      const present = Object.values(s.presences).filter(p=>p==='Présent').length;
      return `
        <div class="list-row" data-id="${s.id}">
          <div class="list-row__avatar">${icon}</div>
          <div class="list-row__body">
            <div class="list-row__title">${label}</div>
            <div class="list-row__subtitle">${Utils.fmtDate(s.date)}</div>
          </div>
          <div class="list-row__meta">
            <span class="pill actif">${present}/${total}</span>
          </div>
          <span class="list-row__chevron">›</span>
        </div>
      `;
    }).join('')}</div>`;

    container.querySelectorAll('.list-row').forEach(row => {
      row.addEventListener('click', () => this.openPointageSheet(row.dataset.id));
    });
  },

  openPointageSheet(seanceId) {
    const seance = Store.getSeance(seanceId);
    if (!seance) return;
    const membres = Store.data.membres.slice().sort((a,b)=>a.nom.localeCompare(b.nom));
    const label = seance.type === 'samedi' ? '🎹 Répétition Samedi' : '⛪ Culte Dimanche';
    const canManage = Permissions.canManageData('discipline');

    const html = `
      <div class="text-sm text-muted mb-8" style="margin-bottom:10px;">${Utils.fmtDateLong(seance.date)}</div>
      ${canManage ? `
      <div class="card" style="padding:10px;">
        <div class="flex-between" style="margin-bottom:6px;">
          <span class="text-sm" style="font-weight:700;">Marquer tous :</span>
          <div style="display:flex;gap:6px;">
            <button class="btn sm sage" data-bulk="Présent">Présents</button>
            <button class="btn sm secondary" data-bulk="—">Effacer</button>
          </div>
        </div>
      </div>
      ` : ''}
      <div class="list" style="margin-top:8px;">
        ${membres.map(m => {
          const st = seance.presences[m.id] || '—';
          return `
            <div class="list-row" style="cursor:default;">
              <div class="list-row__avatar">${Utils.initials(m.nom)}</div>
              <div class="list-row__body">
                <div class="list-row__title">${Utils.escapeHtml(m.nom)}</div>
                <div class="list-row__subtitle">${m.statut}</div>
              </div>
              ${canManage ? `
                <select class="status-select ${Utils.statusClass(st)}" data-member="${m.id}" style="max-width:130px;">
                  ${['—'].concat(Utils.STATUTS_PRESENCE).map(s => `<option value="${s}" ${st===s?'selected':''}>${s}</option>`).join('')}
                </select>
              ` : `
                <span class="pill ${st==='Présent'?'actif':st==='—'?'':'suspendu'}" style="min-width:90px;text-align:center;">${st}</span>
              `}
            </div>
          `;
        }).join('')}
      </div>
      <div class="${canManage?'grid-2':''} mt-16">
        ${canManage ? '<button class="btn danger block" id="delete-seance">🗑️ Supprimer séance</button>' : ''}
        <button class="btn primary block" id="close-pointage">✅ Fermer</button>
      </div>
    `;

    const sheet = Utils.openSheet(label, html);

    if (canManage) {
      sheet.querySelectorAll('[data-member]').forEach(sel => {
        sel.addEventListener('change', () => {
          const mid = sel.dataset.member;
          seance.presences[mid] = sel.value;
          sel.className = 'status-select ' + Utils.statusClass(sel.value);
          Store.upsertSeance(seance);
        });
      });

      sheet.querySelectorAll('[data-bulk]').forEach(btn => {
        btn.addEventListener('click', () => {
          const val = btn.dataset.bulk;
          membres.forEach(m => { seance.presences[m.id] = val; });
          Store.upsertSeance(seance);
          Utils.closeSheet();
          this.openPointageSheet(seanceId);
        });
      });

      sheet.querySelector('#delete-seance').addEventListener('click', () => {
        Utils.confirmAction('Supprimer cette séance et toutes ses présences ?', () => {
          Store.deleteSeance(seanceId);
          Utils.closeSheet();
          Utils.toast('Séance supprimée');
          Router.render();
        });
      });
    }

    sheet.querySelector('#close-pointage').addEventListener('click', () => {
      Utils.closeSheet();
      Router.render();
    });
  },

  // ── STATISTIQUES ──
  renderStats(container) {
    const membres = Store.data.membres.slice().sort((a,b)=>a.nom.localeCompare(b.nom));

    container.innerHTML = `
      <div class="scroll-table">
        <table>
          <thead>
            <tr>
              <th>Membre</th>
              <th>Tx Sam.</th>
              <th>Tx Dim.</th>
              <th>Abs.NJ</th>
              <th>Consec.</th>
              <th>Prestation</th>
            </tr>
          </thead>
          <tbody>
            ${membres.map(m => {
              const dis = Store.getDisciplineStats(m.id);
              const txSamColor = dis.txSamedi>=0.8?'var(--green)':dis.txSamedi>=0.6?'var(--amber)':'var(--red)';
              const txDimColor = dis.txDimanche>=0.8?'var(--green)':dis.txDimanche>=0.6?'var(--amber)':'var(--red)';
              return `
                <tr>
                  <td>${Utils.escapeHtml(m.nom)}</td>
                  <td style="color:${txSamColor};font-weight:700;">${Utils.pct(dis.txSamedi)}</td>
                  <td style="color:${txDimColor};font-weight:700;">${Utils.pct(dis.txDimanche)}</td>
                  <td>${dis.absNJ}</td>
                  <td style="font-weight:700;color:${dis.currentStreak>=2?'var(--red)':'inherit'};">${dis.currentStreak}</td>
                  <td>${dis.interdit ? '<span class="pill suspendu">⛔</span>' : '<span class="pill actif">✅</span>'}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
      <div class="text-sm text-muted mt-16" style="text-align:center;">
        ℹ️ Règle d'alerte : 2 absences consécutives (justifiées ou non) au samedi → interdiction de prester. Une présence réinitialise le compteur.
      </div>
    `;
  },

  // ── INDICATEURS AUTOMATIQUES PAR CHORISTE ──
  renderIndicateurs(container, main) {
    const membres = Store.data.membres.filter(m => m.statut==='Choriste'||m.statut==='Intégrant').slice().sort((a,b)=>a.nom.localeCompare(b.nom));
    const aRisque = membres.filter(m => {
      const dis = Store.getDisciplineStats(m.id);
      const elig = Store.getEligibilitePrestation(m.id);
      return dis.currentStreak>=1||elig.statut.includes('❌')||elig.statut.includes('⏳');
    });
    container.innerHTML = `
      ${aRisque.length>0?`<div class="alert-banner danger"><div class="alert-banner__icon">⚠️</div><div><b>${aRisque.length} choriste(s) à risque</b> — cliquez pour voir les détails</div></div>`:`<div class="alert-banner success"><div class="alert-banner__icon">✅</div><div>Tous les choristes sont en règle disciplinairement.</div></div>`}
      <div class="section-title"><span class="ornament">🎯</span> Indicateurs par choriste</div>
      <div class="list" id="indicateurs-list"></div>
    `;
    const listEl = container.querySelector('#indicateurs-list');
    if (!membres.length) { listEl.innerHTML=`<div class="empty-state"><div class="empty-state__icon">👥</div><div class="empty-state__text">Aucun choriste</div></div>`; return; }
    listEl.innerHTML = membres.map(m => {
      const dis = Store.getDisciplineStats(m.id);
      const elig = Store.getEligibilitePrestation(m.id);
      const samedis = Store.getSeances('samedi').sort((a,b)=>b.date.localeCompare(a.date));
      const derniereSamedi = samedis.find(s=>s.presences[m.id]&&s.presences[m.id]!=='—');
      let riskLevel='low', riskLabel='✅ En règle';
      if(elig.statut.includes('❌')){riskLevel='high';riskLabel='🔴 Interdit';}
      else if(elig.statut.includes('⏳')){riskLevel='med';riskLabel='🟡 En attente';}
      else if(elig.statut.includes('⚠️')){riskLevel='med';riskLabel='🟡 Dérogation';}
      else if(dis.currentStreak>=1){riskLevel='med';riskLabel='🟠 Attention';}
      return `<div class="list-row" data-id="${m.id}"><div class="list-row__avatar">${Utils.initials(m.nom)}</div><div class="list-row__body"><div class="list-row__title">${Utils.escapeHtml(m.nom)}</div><div class="list-row__subtitle">Abs: ${dis.absJ+dis.absNJ} · Ret: ${dis.retardJ+dis.retardNJ} · Consec.: ${dis.currentStreak} · Tx Sam.: ${Utils.pct(dis.txSamedi)}</div><div class="list-row__subtitle">Dernière présence: ${derniereSamedi?Utils.fmtDate(derniereSamedi.date):'—'}</div></div><span class="risk-badge risk-${riskLevel}">${riskLabel}</span></div>`;
    }).join('');
    listEl.querySelectorAll('.list-row').forEach(row=>{row.addEventListener('click',()=>this.openIndicateurDetail(row.dataset.id));});
  },

  openIndicateurDetail(membreId) {
    const m = Store.getMembre(membreId); if(!m) return;
    const dis = Store.getDisciplineStats(m.id);
    const elig = Store.getEligibilitePrestation(m.id);
    const sanctions = Store.getSanctions().filter(s=>s.membre===m.nom);
    const derogations = Store.getDerogations(membreId);
    const samedis = Store.getSeances('samedi').sort((a,b)=>b.date.localeCompare(a.date));
    const derniereSamedi = samedis.find(s=>s.presences[m.id]&&s.presences[m.id]!=='—');
    let eligPillClass='autorize';
    if(elig.statut.includes('❌'))eligPillClass='interdit';
    else if(elig.statut.includes('⚠️'))eligPillClass='derogation';
    else if(elig.statut.includes('⏳'))eligPillClass='attente';
    const html=`
      <div class="card center"><div class="list-row__avatar" style="width:52px;height:52px;font-size:1.2rem;margin:0 auto 8px;">${Utils.initials(m.nom)}</div><div style="font-weight:700;font-size:1.05rem;">${Utils.escapeHtml(m.nom)}</div><div class="mt-8"><span class="pill ${eligPillClass}">${elig.statut}</span></div><div class="text-sm text-muted mt-8">${Utils.escapeHtml(elig.motif)}</div></div>
      <div class="section-title"><span class="ornament">📊</span> Indicateurs</div>
      <div class="card">
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Absences totales</span><span style="font-weight:700;color:${(dis.absJ+dis.absNJ)>3?'var(--red)':'var(--ink)'};">${dis.absJ+dis.absNJ} (J:${dis.absJ} / NJ:${dis.absNJ})</span></div>
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Retards totaux</span><span style="font-weight:700;">${dis.retardJ+dis.retardNJ} (J:${dis.retardJ} / NJ:${dis.retardNJ})</span></div>
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Absences consécutives</span><span style="font-weight:700;color:${dis.currentStreak>=2?'var(--red)':dis.currentStreak>=1?'var(--amber)':'var(--green)'};">${dis.currentStreak}</span></div>
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Taux présence samedis</span><span style="font-weight:700;color:${dis.txSamedi>=0.8?'var(--green)':dis.txSamedi>=0.6?'var(--amber)':'var(--red)'};">${Utils.pct(dis.txSamedi)}</span></div>
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Dernière présence</span><span style="font-weight:600;">${derniereSamedi?Utils.fmtDate(derniereSamedi.date):'—'}</span></div>
        <div class="flex-between" style="padding:5px 0;"><span class="text-sm text-muted">Statut disciplinaire</span><span class="pill ${eligPillClass}" style="font-size:0.65rem;">${elig.statut.replace(/[✅⚠️❌⏳]/g,'').trim()}</span></div>
      </div>
      ${(() => { const rep = Store.getRepetitionPresenceStats(m.id); return rep.total > 0 ? `
      <div class="section-title"><span class="ornament">🎹</span> Présence aux répétitions par pupitre</div>
      <div class="card">
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Présent</span><span style="font-weight:700;color:var(--green);">${rep.present}</span></div>
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Absent justifié</span><span style="font-weight:700;">${rep.absentJustifie}</span></div>
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Absent non justifié</span><span style="font-weight:700;color:var(--red);">${rep.absentNonJustifie}</span></div>
        <div class="flex-between" style="padding:5px 0;"><span class="text-sm text-muted">Taux de présence</span><span style="font-weight:700;">${Utils.pct(rep.tx)}</span></div>
      </div>` : ''; })()}
      ${sanctions.length?`<div class="section-title"><span class="ornament">💸</span> Historique sanctions (${sanctions.length})</div><div class="list">${sanctions.map(s=>`<div class="list-row" style="cursor:default;"><div class="list-row__avatar">💸</div><div class="list-row__body"><div class="list-row__title">${Utils.escapeHtml(s.motif)}</div><div class="list-row__subtitle">${Utils.fmtDate(s.date)} · ${Utils.fmtFCFA(s.montant)}</div></div><span class="pill ${s.statut==='Payé'?'actif':'bureau'}">${s.statut}</span></div>`).join('')}</div>`:''}
      ${derogations.length?`<div class="section-title"><span class="ornament">🔓</span> Historique dérogations (${derogations.length})</div><div class="list">${derogations.map(d=>`<div class="list-row" style="cursor:default;"><div class="list-row__avatar">🔓</div><div class="list-row__body"><div class="list-row__title">${Utils.escapeHtml(d.motif)}</div><div class="list-row__subtitle">${Utils.fmtDate(d.date)} · Exp: ${Utils.fmtDate(d.dateExpiration)} · Par: ${Utils.escapeHtml(d.responsable)}</div></div><span class="pill ${d.statut==='Autorisé par dérogation'?'derogation':d.statut==='En attente'?'attente':'interdit'}">${d.statut}</span></div>`).join('')}</div>`:''}
    `;
    Utils.openSheet(`📊 ${m.nom}`, html);
  },

  // ── DÉROGATIONS ──
  renderDerogations(container, main) {
    const canManage = Permissions.canManageData('discipline');
    const membres = Store.data.membres.slice().sort((a,b)=>a.nom.localeCompare(b.nom));
    const derogations = Store.getDerogations();
    container.innerHTML=`
      ${canManage?`<div class="alert-banner info"><div class="alert-banner__icon">🔓</div><div>En tant que responsable Discipline, vous pouvez accorder des <b>dérogations exceptionnelles</b> pour autoriser un choriste à prester malgré les règles.</div></div>`:''}
      <div class="section-title"><span class="ornament">🔓</span> Dérogations enregistrées</div>
      <div id="derog-list"></div>
    `;
    const listEl = container.querySelector('#derog-list');
    if(!derogations.length){listEl.innerHTML=`<div class="empty-state"><div class="empty-state__icon">🔓</div><div class="empty-state__text">Aucune dérogation enregistrée</div></div>`;} 
    else {
      const today=Utils.todayISO();
      listEl.innerHTML=`<div class="list">${derogations.map(d=>{
        const isExpired=d.statut==='Autorisé par dérogation'&&d.dateExpiration<today;
        let pillClass='derogation',pillLabel=d.statut;
        if(isExpired){pillClass='interdit';pillLabel='Expirée';}
        else if(d.statut==='En attente')pillClass='attente';
        else if(d.statut==='Interdit')pillClass='interdit';
        return `<div class="list-row" data-id="${d.id}"><div class="list-row__avatar">🔓</div><div class="list-row__body"><div class="list-row__title">${Utils.escapeHtml(d.membreNom)}</div><div class="list-row__subtitle">${Utils.fmtDate(d.date)} · ${Utils.escapeHtml(d.motif)}</div><div class="list-row__subtitle">Exp: ${Utils.fmtDate(d.dateExpiration)} · Par: ${Utils.escapeHtml(d.responsable)}</div></div><span class="pill ${pillClass}" style="font-size:0.62rem;">${pillLabel}</span></div>`;
      }).join('')}</div>`;
      if(canManage)listEl.querySelectorAll('.list-row').forEach(row=>{row.addEventListener('click',()=>this.openDerogationDetail(row.dataset.id));});
    }
    if(canManage){const fab=document.createElement('button');fab.className='fab';fab.innerHTML='+';fab.id='fab-add-derog';main.appendChild(fab);fab.addEventListener('click',()=>this.openDerogationForm(membres));}
  },

  openDerogationDetail(id) {
    const d=(Store.data.derogations||[]).find(x=>x.id===id); if(!d)return;
    const html=`
      <div class="card">
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Choriste</span><span style="font-weight:700;">${Utils.escapeHtml(d.membreNom)}</span></div>
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Date</span><span>${Utils.fmtDate(d.date)}</span></div>
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Motif</span><span style="font-weight:600;max-width:55%;text-align:right;">${Utils.escapeHtml(d.motif)}</span></div>
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Responsable</span><span>${Utils.escapeHtml(d.responsable)}</span></div>
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Durée</span><span>${d.dureeJours} jour(s)</span></div>
        <div class="flex-between" style="padding:5px 0;"><span class="text-sm text-muted">Expiration</span><span style="font-weight:700;color:${d.dateExpiration>=Utils.todayISO()?'var(--green)':'var(--red)'};">${Utils.fmtDate(d.dateExpiration)}</span></div>
      </div>
      <button class="btn danger block mt-16" id="del-derog">🗑️ Supprimer</button>
    `;
    const sheet=Utils.openSheet('🔓 Dérogation',html);
    sheet.querySelector('#del-derog').addEventListener('click',()=>{
      Utils.confirmAction('Supprimer cette dérogation ?',()=>{Store.deleteDerogation(id);Store.logAction('Suppression','Discipline',`Dérogation supprimée pour ${d.membreNom}`);Utils.closeSheet();Utils.toast('Dérogation supprimée');Router.render();});
    });
  },

  openDerogationForm(membres) {
    const html=`
      <div class="field"><label>Choriste concerné</label><select id="dg-membre">${membres.map(m=>`<option value="${m.id}" data-nom="${Utils.escapeHtml(m.nom)}">${Utils.escapeHtml(m.nom)}</option>`).join('')}</select></div>
      <div class="field"><label>Date</label><input type="date" id="dg-date" value="${Utils.todayISO()}"></div>
      <div class="field"><label>Motif détaillé *</label><textarea id="dg-motif" rows="3" placeholder="Raison exceptionnelle justifiant la dérogation..."></textarea></div>
      <div class="field"><label>Responsable accordant la dérogation</label><input type="text" id="dg-responsable" value="${Permissions.label()}"></div>
      <div class="field"><label>Durée de validité (jours)</label><input type="number" id="dg-duree" value="7" min="1" max="90"></div>
      <div class="field"><label>Décision</label>
        <select id="dg-statut">
          <option value="Autorisé par dérogation">⚠️ Autorisé par dérogation exceptionnelle</option>
          <option value="En attente">⏳ En attente de décision disciplinaire</option>
          <option value="Interdit">❌ Interdit de prester (confirmation)</option>
        </select>
      </div>
      <button class="btn primary block" id="save-derog">💾 Enregistrer la dérogation</button>
    `;
    const sheet=Utils.openSheet('🔓 Nouvelle dérogation',html);
    sheet.querySelector('#save-derog').addEventListener('click',()=>{
      const membreEl=sheet.querySelector('#dg-membre');
      const membreId=membreEl.value;
      const membreNom=membreEl.options[membreEl.selectedIndex].dataset.nom;
      const date=sheet.querySelector('#dg-date').value;
      const motif=sheet.querySelector('#dg-motif').value.trim();
      const responsable=sheet.querySelector('#dg-responsable').value.trim()||Permissions.label();
      const dureeJours=parseInt(sheet.querySelector('#dg-duree').value)||7;
      const statut=sheet.querySelector('#dg-statut').value;
      if(!motif){Utils.toast('Le motif est requis');return;}
      const expDate=new Date(date);expDate.setDate(expDate.getDate()+dureeJours);
      const dateExpiration=expDate.toISOString().slice(0,10);
      Store.addDerogation({id:Utils.genId('derog'),membreId,membreNom,date,motif,responsable,dureeJours,dateExpiration,statut});
      Store.logAction('Dérogation','Discipline',`${statut} pour ${membreNom} — ${motif}`);
      Store.addNotification({type:'derogation',titre:`Dérogation — ${membreNom}`,message:`${statut} : ${motif}`,categorie:'derogation',destinataire:'all'});
      Utils.closeSheet();Utils.toast('Dérogation enregistrée');Router.render();
    });
  },

  // ── SANCTIONS ──
  renderSanctions(container, main) {
    const sanctions = Store.getSanctions();
    const membres = Store.data.membres.slice().sort((a,b)=>a.nom.localeCompare(b.nom));

    const totalPaye = sanctions.filter(s=>s.statut==='Payé').reduce((sum,s)=>sum+Number(s.montant||0),0);
    const stats = Store.getSanctionsStats();
    const recentes = sanctions.slice(0, 5);

    container.innerHTML = `
      <div class="card">
        <div class="flex-between">
          <span class="text-sm text-muted">Total sanctions payées</span>
          <span class="font-display" style="font-size:1.3rem;font-weight:700;color:var(--maroon);">${Utils.fmtFCFA(totalPaye)}</span>
        </div>
      </div>
      <div class="grid-2">
        <div class="card center"><div class="text-sm text-muted">En attente de paiement</div><div class="font-display" style="font-size:1.2rem;font-weight:700;color:var(--amber);">${stats.nbEnAttente}</div></div>
        <div class="card center"><div class="text-sm text-muted">Montant impayé</div><div class="font-display" style="font-size:1.2rem;font-weight:700;color:var(--red);">${Utils.fmtFCFA(stats.montantImpaye)}</div></div>
      </div>
      <div class="card center"><div class="text-sm text-muted">Total encaissé (toutes sanctions)</div><div class="font-display" style="font-size:1.2rem;font-weight:700;color:var(--green);">${Utils.fmtFCFA(stats.montantEncaisse)}</div></div>
      ${recentes.length ? `
      <div class="section-title"><span class="ornament">🕓</span> Dernières sanctions</div>
      <div class="list">${recentes.map(s => `
        <div class="list-row" style="cursor:default;"><div class="list-row__avatar">💸</div><div class="list-row__body"><div class="list-row__title">${Utils.escapeHtml(s.membre)}</div><div class="list-row__subtitle">${s.motif} · ${Utils.fmtDate(s.date)}</div></div><span class="pill ${s.statut==='Payé'?'actif':s.statut==='Partielle'?'derogation':'bureau'}">${s.statut==='Payé'?'Payée':s.statut==='En attente'?'En attente de paiement':s.statut}</span></div>
      `).join('')}</div>` : ''}
      <div id="sanction-list"></div>
    `;

    this.renderSanctionList(container.querySelector('#sanction-list'), sanctions);

    if (Permissions.canManageData('discipline')) {
      const fab = document.createElement('button');
      fab.className = 'fab';
      fab.innerHTML = '+';
      fab.id = 'fab-add-sanction';
      main.appendChild(fab);
      fab.addEventListener('click', () => this.openSanctionForm(membres));
    }
  },

  renderSanctionList(container, sanctions) {
    if (!sanctions.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">💸</div><div class="empty-state__text">Aucune sanction enregistrée</div></div>`;
      return;
    }
    container.innerHTML = `<div class="list">${sanctions.map(s => {
      const statusClass = s.statut === 'Payé' ? 'actif' : s.statut === 'Partielle' ? 'derogation' : s.statut === 'Annulé' ? 'suspendu' : 'bureau';
      const statusLabel = s.statut === 'Payé' ? 'Payée' : s.statut === 'En attente' ? 'En attente de paiement' : s.statut;
      return `
        <div class="list-row" data-id="${s.id}">
          <div class="list-row__avatar">💸</div>
          <div class="list-row__body">
            <div class="list-row__title">${Utils.escapeHtml(s.membre)}</div>
            <div class="list-row__subtitle">${s.motif} · ${Utils.fmtDate(s.date)}</div>
          </div>
          <div class="list-row__meta">
            <div style="font-weight:700;">${Utils.fmtFCFA(s.montant)}</div>
            <span class="pill ${statusClass}">${statusLabel}</span>
          </div>
        </div>
      `;
    }).join('')}</div>`;

    container.querySelectorAll('.list-row').forEach(row => {
      row.addEventListener('click', () => {
        if (!Permissions.canManageData('discipline')) return;
        this.openSanctionDetail(row.dataset.id);
      });
      if (!Permissions.canManageData('discipline')) row.style.cursor = 'default';
    });
  },

  openSanctionDetail(id) {
    const s = Store.data.sanctions.find(x=>x.id===id);
    if (!s) return;
    const reste = Math.max(0, Number(s.montant||0) - Number(s.montantPaye||0));
    const hist = s.historique || [];
    const html = `
      <div class="card">
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Montant total</span><span style="font-weight:700;">${Utils.fmtFCFA(s.montant)}</span></div>
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Montant payé</span><span style="font-weight:700;color:var(--green);">${Utils.fmtFCFA(s.montantPaye||0)}</span></div>
        <div class="flex-between" style="padding:5px 0;"><span class="text-sm text-muted">Reste à payer</span><span style="font-weight:700;color:${reste>0?'var(--red)':'var(--green)'};">${Utils.fmtFCFA(reste)}</span></div>
      </div>
      <div class="alert-banner info"><div class="alert-banner__icon">ℹ️</div><div>Le paiement se valide depuis le module <b>Trésorerie</b> (onglet Sanctions) — le statut se met à jour automatiquement ici.</div></div>
      <div class="field">
        <label>Statut</label>
        <select id="s-statut">
          ${['En attente','Partielle','Payé','Annulé'].map(st => `<option value="${st}" ${s.statut===st?'selected':''}>${st==='Payé'?'Payée':st==='En attente'?'En attente de paiement':st}</option>`).join('')}
        </select>
      </div>
      ${hist.length ? `
      <div class="section-title"><span class="ornament">📜</span> Historique</div>
      <div class="card">${hist.slice().reverse().map(h => `
        <div style="padding:5px 0;border-bottom:1px solid var(--line);font-size:0.82rem;">
          <span class="text-muted">${Utils.fmtDate(h.date)}</span> — ${Utils.escapeHtml(h.action)} ${h.par ? `<span class="text-muted">(${h.par})</span>` : ''}
        </div>
      `).join('')}</div>` : ''}
      <div class="grid-2 mt-16">
        <button class="btn danger block" id="del-sanction">🗑️ Supprimer</button>
        <button class="btn primary block" id="save-sanction">💾 Enregistrer</button>
      </div>
    `;
    const sheet = Utils.openSheet(`${s.membre} — ${Utils.fmtFCFA(s.montant)}`, html);
    sheet.querySelector('#save-sanction').addEventListener('click', () => {
      const newStatut = sheet.querySelector('#s-statut').value;
      if (!s.historique) s.historique = [];
      if (newStatut !== s.statut) {
        s.historique.push({ date: Utils.todayISO(), action: `Statut changé manuellement → ${newStatut}`, par: Permissions.role });
      }
      Store.updateSanction(id, { statut: newStatut, historique: s.historique });
      Utils.closeSheet();
      Utils.toast('Sanction mise à jour');
      Router.render();
    });
    sheet.querySelector('#del-sanction').addEventListener('click', () => {
      Utils.confirmAction('Supprimer cette sanction ?', () => {
        Store.deleteSanction(id);
        Utils.closeSheet();
        Utils.toast('Sanction supprimée');
        Router.render();
      });
    });
  },

  openSanctionForm(membres) {
    const html = `
      <div class="field">
        <label>Membre</label>
        <select id="sf-membre">
          ${membres.map(m => `<option value="${Utils.escapeHtml(m.nom)}">${Utils.escapeHtml(m.nom)}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="sf-date" value="${Utils.todayISO()}">
      </div>
      <div class="field">
        <label>Motif</label>
        <select id="sf-motif">
          <option>Absence NJ</option>
          <option>Retard NJ</option>
          <option>Comportement</option>
          <option>Autre</option>
        </select>
      </div>
      <div class="field">
        <label>Montant (FCFA)</label>
        <input type="number" id="sf-montant" value="500" min="0" step="50">
      </div>
      <button class="btn primary block" id="save-new-sanction">💾 Enregistrer</button>
    `;
    const sheet = Utils.openSheet('Nouvelle sanction', html);
    sheet.querySelector('#save-new-sanction').addEventListener('click', () => {
      Store.addSanction({
        id: Utils.genId('sanc'),
        membre: sheet.querySelector('#sf-membre').value,
        date: sheet.querySelector('#sf-date').value,
        motif: sheet.querySelector('#sf-motif').value,
        montant: Number(sheet.querySelector('#sf-montant').value),
        statut: 'En attente',
      });
      Utils.closeSheet();
      Utils.toast('Sanction ajoutée');
      Router.render();
    });
  },
};

// ===== MODULE: TRESORERIE + FINANCE =====
// ════════════════════════════════════════════════════════════════
// TRÉSORERIE — Cotisations, Offrandes, Mouvements, Bilans
// ════════════════════════════════════════════════════════════════

const TresorerieModule = {
  tab: 'cotisations',
  selectedMonth: null,

  render(main) {
    // ── Choriste : ne voit que sa propre situation financière ──
    if (Permissions.choristeRestricted()) {
      this.renderChoristeOwn(main);
      return;
    }
    if (!this.selectedMonth) this.selectedMonth = Utils.monthKey();

    const tabs = [
      { key: 'cotisations', label: '📋 Cotisations' },
      { key: 'individuel',  label: '👤 Individuel' },
      { key: 'finance', label: '🧾 Finance (paiements)' },
      { key: 'offrandes', label: '🙏 Offrandes' },
      { key: 'mouvements', label: '📊 Mouvements' },
      { key: 'sanctions', label: '💸 Sanctions' },
      { key: 'bilan', label: '💹 Bilan' },
    ];

    main.innerHTML = `
      ${Permissions.readOnlyBanner()}
      <div class="tabbar">
        ${tabs.map(t => `<button class="tab-btn ${this.tab===t.key?'active':''}" data-tab="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div id="treso-content"></div>
    `;

    main.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        this.tab = btn.dataset.tab;
        this.render(main);
      });
    });

    const content = main.querySelector('#treso-content');
    if (this.tab === 'cotisations') this.renderCotisations(content);
    else if (this.tab === 'individuel') this.renderIndividuel(content, main);
    else if (this.tab === 'finance') this.renderFinance(content, main);
    else if (this.tab === 'offrandes') this.renderOffrandes(content, main);
    else if (this.tab === 'mouvements') this.renderMouvements(content, main);
    else if (this.tab === 'sanctions') this.renderSanctionsTreso(content, main);
    else this.renderBilan(content);
  },

  // ── Choriste : situation financière personnelle uniquement ──
  renderChoristeOwn(main) {
    const me = Permissions.getChoristeMembre();
    main.innerHTML = `${Permissions.readOnlyBanner()}<div class="alert-banner info" style="margin-bottom:10px;"><div class="alert-banner__icon">🔒</div><div>Vous consultez uniquement <b>votre propre</b> situation financière.</div></div><div id="treso-self"></div>`;
    const wrap = main.querySelector('#treso-self');
    if (!me) { wrap.innerHTML = `<div class="empty-state"><div class="empty-state__icon">👤</div><div class="empty-state__text">Profil introuvable</div></div>`; return; }

    const year = Store.data.meta.annee;
    const due12 = Store.getCotisationDue(me) * 12;
    let paid12 = 0, enAttente = 0;
    for (let mo = 1; mo <= 12; mo++) {
      const key = `${year}-${String(mo).padStart(2,'0')}`;
      const st = Store.getStatutPaiement(me.id, key);
      paid12 += st.valide;
    }
    const historique = Store.getPaiements({ membreId: me.id });
    enAttente = historique.filter(p => p.statut === 'En attente').reduce((s,p)=>s+Number(p.montant||0),0);
    const reste = Math.max(0, due12 - paid12);

    wrap.innerHTML = `
      <div class="grid-2">
        <div class="card center"><div class="text-sm text-muted">Cotisations payées</div><div class="font-display" style="font-size:1.2rem;font-weight:700;color:var(--green);">${Utils.fmtFCFA(paid12)}</div></div>
        <div class="card center"><div class="text-sm text-muted">En attente</div><div class="font-display" style="font-size:1.2rem;font-weight:700;color:var(--gold);">${Utils.fmtFCFA(enAttente)}</div></div>
      </div>
      <div class="grid-2">
        <div class="card center"><div class="text-sm text-muted">Total versé</div><div class="font-display" style="font-size:1.2rem;font-weight:700;">${Utils.fmtFCFA(paid12)}</div></div>
        <div class="card center"><div class="text-sm text-muted">Solde personnel restant</div><div class="font-display" style="font-size:1.2rem;font-weight:700;color:${reste>0?'var(--red)':'var(--green)'};">${Utils.fmtFCFA(reste)}</div></div>
      </div>
      <div class="section-title"><span class="ornament">📜</span> Historique de mes versements</div>
      ${historique.length ? `<div class="list">${historique.map(p => {
        const mLabel = Utils.MONTHS[parseInt(p.monthKey.split('-')[1],10)-1] + ' ' + p.monthKey.split('-')[0];
        return `<div class="list-row" style="cursor:default;"><div class="list-row__avatar">${p.mode==='Mobile Money'?'📱':p.mode==='Virement'?'🏦':'💵'}</div><div class="list-row__body"><div class="list-row__title">${mLabel}</div><div class="list-row__subtitle">${Utils.fmtDate(p.datePaiement)} · ${p.mode}</div></div><div class="list-row__meta"><div style="font-weight:700;">${Utils.fmtFCFA(p.montant)}</div><span class="pill ${p.statut==='Validé'?'actif':p.statut==='Refusé'?'suspendu':'bureau'}">${p.statut}</span></div></div>`;
      }).join('')}</div>` : `<div class="empty-state"><div class="empty-state__icon">📭</div><div class="empty-state__text">Aucun versement enregistré</div></div>`}

      <div class="section-title"><span class="ornament">💸</span> Mes sanctions financières</div>
      ${(() => {
        const sanctions = Store.getSanctions().filter(s => s.membre === me.nom);
        if (!sanctions.length) return `<div class="empty-state"><div class="empty-state__icon">✅</div><div class="empty-state__text">Aucune sanction</div></div>`;
        return `<div class="list">${sanctions.map(s => {
          const reste = Math.max(0, Number(s.montant||0) - Number(s.montantPaye||0));
          const statusClass = s.statut==='Payé'?'actif':s.statut==='Partielle'?'derogation':'suspendu';
          const statusLabel = s.statut==='Payé'?'Payée':s.statut==='En attente'?'En attente de paiement':s.statut;
          return `<div class="list-row" style="cursor:default;"><div class="list-row__avatar">💸</div><div class="list-row__body"><div class="list-row__title">${Utils.escapeHtml(s.motif||'Sanction')}</div><div class="list-row__subtitle">${Utils.fmtDate(s.date)} · Payé : ${Utils.fmtFCFA(s.montantPaye||0)} · Reste : ${Utils.fmtFCFA(reste)}${s.datePaiement?(' · Réglé le '+Utils.fmtDate(s.datePaiement)):''}</div></div><div class="list-row__meta"><span class="pill ${statusClass}">${Utils.fmtFCFA(s.montant||0)} · ${statusLabel}</span></div></div>`;
        }).join('')}</div>`;
      })()}
    `;
  },

  // ── GESTION FINANCIÈRE INDIVIDUELLE ──
  renderIndividuel(container, main) {
    const isManager = Permissions.canManageData('tresorerie');
    const membres = Store.data.membres.slice().sort((a,b)=>a.nom.localeCompare(b.nom));
    const year = Store.data.meta.annee;

    // Stats globales rapides
    let totalDue=0, totalPaid=0, aJour=0, retardLeger=0, retardImportant=0;
    membres.forEach(m => {
      const due = Store.getCotisationDue(m)*12;
      let paid=0;
      for(let mo=1;mo<=12;mo++) paid+=Store.getCotisation(m.id,`${year}-${String(mo).padStart(2,'0')}`);
      totalDue+=due; totalPaid+=paid;
      const pct = due>0?paid/due:1;
      if(pct>=1) aJour++;
      else if(pct>=0.5) retardLeger++;
      else retardImportant++;
    });

    container.innerHTML=`
      <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);">
        <div class="kpi-card accent-sage"><div class="kpi-card__value">${aJour}</div><div class="kpi-card__label">À jour</div></div>
        <div class="kpi-card accent-gold"><div class="kpi-card__value">${retardLeger}</div><div class="kpi-card__label">Retard léger</div></div>
        <div class="kpi-card accent-red"><div class="kpi-card__value">${retardImportant}</div><div class="kpi-card__label">Retard imp.</div></div>
      </div>
      <div class="section-title"><span class="ornament">👤</span> Situation par membre</div>
      <div class="list" id="individuel-list"></div>
    `;

    const listEl = container.querySelector('#individuel-list');
    listEl.innerHTML = membres.map(m => {
      const due = Store.getCotisationDue(m)*12;
      let paid=0;
      for(let mo=1;mo<=12;mo++) paid+=Store.getCotisation(m.id,`${year}-${String(mo).padStart(2,'0')}`);
      const pct = due>0?paid/due:1;
      const reste = Math.max(0,due-paid);
      let colorClass='cotis-green', labelClass='actif', label='À jour';
      if(pct<1&&pct>=0.5){colorClass='cotis-orange';labelClass='bureau';label='Retard léger';}
      else if(pct<0.5&&due>0){colorClass='cotis-red';labelClass='suspendu';label='Retard important';}
      return `
        <div class="list-row" data-id="${m.id}">
          <div class="list-row__avatar">${Utils.initials(m.nom)}</div>
          <div class="list-row__body">
            <div class="list-row__title">${Utils.escapeHtml(m.nom)}</div>
            <div class="cotis-bar"><div class="cotis-bar__track"><div class="cotis-bar__fill ${colorClass}" style="width:${Math.min(100,Math.round(pct*100))}%;"></div></div><span style="font-size:0.72rem;font-weight:700;color:var(--ink-soft);min-width:32px;">${Math.round(pct*100)}%</span></div>
            <div class="list-row__subtitle">${Utils.fmtFCFA(paid)} / ${Utils.fmtFCFA(due)} · Reste: ${Utils.fmtFCFA(reste)}</div>
          </div>
          <span class="pill ${labelClass}">${label}</span>
        </div>
      `;
    }).join('');

    listEl.querySelectorAll('.list-row').forEach(row=>{
      row.addEventListener('click',()=>this.openFicheIndividuelle(row.dataset.id, isManager));
    });
  },

  openFicheIndividuelle(membreId, isManager) {
    const m = Store.getMembre(membreId); if(!m) return;
    const year = Store.data.meta.annee;
    const due12 = Store.getCotisationDue(m)*12;
    let paid12=0;
    const monthDetails = [];
    for(let mo=1;mo<=12;mo++){
      const key=`${year}-${String(mo).padStart(2,'0')}`;
      const st=Store.getStatutPaiement(membreId,key);
      paid12+=st.valide;
      monthDetails.push({mo,key,label:Utils.MONTHS[mo-1],st});
    }
    const pct=due12>0?paid12/due12:1;
    const reste=Math.max(0,due12-paid12);
    let colorClass='cotis-green',statusLabel='✅ À jour',statusColor='var(--green)';
    if(pct<1&&pct>=0.5){colorClass='cotis-orange';statusLabel='🟠 Retard léger';statusColor='#E8870A';}
    else if(pct<0.5&&due12>0){colorClass='cotis-red';statusLabel='🔴 Retard important';statusColor='var(--red)';}

    const historique = Store.getPaiements({membreId});

    const html=`
      <div class="card center">
        <div class="list-row__avatar" style="width:52px;height:52px;font-size:1.2rem;margin:0 auto 8px;">${Utils.initials(m.nom)}</div>
        <div style="font-weight:700;font-size:1.05rem;">${Utils.escapeHtml(m.nom)}</div>
        <div style="font-weight:700;font-size:0.88rem;color:${statusColor};margin-top:6px;">${statusLabel}</div>
        <div class="cotis-bar mt-8"><div class="cotis-bar__track"><div class="cotis-bar__fill ${colorClass}" style="width:${Math.min(100,Math.round(pct*100))}%;"></div></div><span style="font-size:0.8rem;font-weight:700;min-width:36px;">${Math.round(pct*100)}%</span></div>
        <div class="flex-between mt-8 text-sm"><span class="text-muted">Attendu annuel</span><span style="font-weight:700;">${Utils.fmtFCFA(due12)}</span></div>
        <div class="flex-between text-sm"><span class="text-muted">Payé</span><span style="font-weight:700;color:var(--green);">${Utils.fmtFCFA(paid12)}</span></div>
        <div class="flex-between text-sm"><span class="text-muted">Restant</span><span style="font-weight:700;color:${reste>0?'var(--red)':'var(--green)'};">${Utils.fmtFCFA(reste)}</span></div>
      </div>

      <div class="section-title"><span class="ornament">📅</span> Détail mensuel ${year}</div>
      <div class="list">
        ${monthDetails.map(({mo,label,st})=>`
          <div class="list-row" style="cursor:default;">
            <div class="list-row__avatar" style="font-size:0.7rem;background:${st.statut==='Payé'?'var(--green-soft)':st.statut==='Partiel'?'var(--gold-soft)':'var(--red-soft)'};">${mo}</div>
            <div class="list-row__body"><div class="list-row__title">${label}</div><div class="list-row__subtitle">Dû: ${Utils.fmtFCFA(st.due)} · Payé: ${Utils.fmtFCFA(st.valide)}</div></div>
            <span class="pill ${st.statut==='Payé'?'actif':st.statut==='Partiel'?'integrant':'suspendu'}">${st.statut}</span>
          </div>
        `).join('')}
      </div>

      <div class="section-title"><span class="ornament">📜</span> Historique des versements</div>
      ${historique.length?`<div class="list">${historique.map(p=>{
        const mLabel=Utils.MONTHS[parseInt(p.monthKey.split('-')[1],10)-1]+' '+p.monthKey.split('-')[0];
        return `<div class="list-row" style="cursor:default;"><div class="list-row__avatar">${p.mode==='Mobile Money'?'📱':p.mode==='Virement'?'🏦':'💵'}</div><div class="list-row__body"><div class="list-row__title">${mLabel}</div><div class="list-row__subtitle">${Utils.fmtDate(p.datePaiement)} · ${p.mode}</div></div><div class="list-row__meta"><div style="font-weight:700;">${Utils.fmtFCFA(p.montant)}</div><span class="pill ${p.statut==='Validé'?'actif':p.statut==='Refusé'?'suspendu':'bureau'}">${p.statut}</span></div></div>`;
      }).join('')}</div>`:`<div class="empty-state"><div class="empty-state__icon">📭</div><div class="empty-state__text">Aucun versement enregistré</div></div>`}
      ${isManager?`<button class="btn primary block mt-16" id="add-paiement-individuel">+ Ajouter un paiement</button>`:''}
    `;
    const sheet=Utils.openSheet(`💰 ${m.nom}`,html);
    const addBtn=sheet.querySelector('#add-paiement-individuel');
    if(addBtn)addBtn.addEventListener('click',()=>{Utils.closeSheet();this.openPaiementForm([m],true);});
  },

  // ── COTISATIONS ──
  renderCotisations(container) {
    const year = Store.data.meta.annee;
    const membres = Store.data.membres.slice().sort((a,b)=>a.nom.localeCompare(b.nom));

    let totalDue = 0, totalPaid = 0;
    membres.forEach(m => {
      const due = Store.getCotisationDue(m);
      totalDue += due;
      totalPaid += Store.getCotisation(m.id, this.selectedMonth);
    });

    container.innerHTML = `
      <div class="card">
        <div class="field">
          <label>Mois sélectionné</label>
          <select id="month-select">
            ${Utils.MONTHS.map((mo,i) => {
              const key = `${year}-${String(i+1).padStart(2,'0')}`;
              return `<option value="${key}" ${this.selectedMonth===key?'selected':''}>${mo} ${year}</option>`;
            }).join('')}
          </select>
        </div>
        <div class="flex-between">
          <span class="text-sm text-muted">Attendu ce mois</span>
          <span style="font-weight:700;">${Utils.fmtFCFA(totalDue)}</span>
        </div>
        <div class="flex-between mt-8">
          <span class="text-sm text-muted">Encaissé ce mois</span>
          <span style="font-weight:700;color:var(--green);">${Utils.fmtFCFA(totalPaid)}</span>
        </div>
        <div class="progress mt-8">
          <div class="progress__fill" style="width:${Math.min(100, totalDue?totalPaid/totalDue*100:0)}%;background:${totalPaid>=totalDue?'var(--green)':'var(--gold)'};"></div>
        </div>
      </div>

      <div class="section-title"><span class="ornament">💰</span> Paiements individuels</div>
      <div class="list">
        ${membres.map(m => {
          const due = Store.getCotisationDue(m);
          const paid = Store.getCotisation(m.id, this.selectedMonth);
          const isPaid = paid >= due;
          const canEdit = Permissions.canManageData('tresorerie');
          return `
            <div class="list-row" style="cursor:default;">
              <div class="list-row__avatar">${Utils.initials(m.nom)}</div>
              <div class="list-row__body">
                <div class="list-row__title">${Utils.escapeHtml(m.nom)}</div>
                <div class="list-row__subtitle">Dû : ${Utils.fmtFCFA(due)}</div>
              </div>
              ${canEdit ? `
                <button class="btn sm ${isPaid?'sage':'secondary'}" data-toggle-cotis="${m.id}" data-due="${due}">
                  ${isPaid ? '✅ Payé' : '☐ Marquer payé'}
                </button>
              ` : `
                <span class="pill ${isPaid?'actif':'suspendu'}">${isPaid ? '✅ Payé' : '☐ Non payé'}</span>
              `}
            </div>
          `;
        }).join('')}
      </div>
      ${!Permissions.canManageData('tresorerie') ? `
        <div class="alert-banner info mt-16">
          <div class="alert-banner__icon">ℹ️</div>
          <div>Pour déclarer un paiement (avec justificatif), utilisez l'onglet <b>🧾 Finance</b>.</div>
        </div>` : ''}
    `;

    container.querySelector('#month-select').addEventListener('change', (e) => {
      this.selectedMonth = e.target.value;
      this.renderCotisations(container);
    });

    container.querySelectorAll('[data-toggle-cotis]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!Permissions.canManageData('tresorerie')) { Permissions.denyToast(); return; }
        const mid = btn.dataset.toggleCotis;
        const due = Number(btn.dataset.due);
        const current = Store.getCotisation(mid, this.selectedMonth);
        const newVal = current >= due ? 0 : due;
        Store.setCotisation(mid, this.selectedMonth, newVal);
        this.renderCotisations(container);
      });
    });
  },

  // ── FINANCE — Historique paiements, statuts, validation ──────────────
  renderFinance(container, main) {
    const year = Store.data.meta.annee;
    const isManager = Permissions.canManageData('tresorerie');

    // Profils partagés par rôle (pas d'identité individuelle) : seul le
    // département Trésorerie (et l'admin) accède au détail des cotisations.
    const membres = isManager ? Store.data.membres.slice().sort((a,b)=>a.nom.localeCompare(b.nom)) : [];

    const enAttenteTotal = Store.getPaiements({ statut: 'En attente' }).length;

    container.innerHTML = `
      ${!isManager ? `
        <div class="alert-banner info">
          <div class="alert-banner__icon">ℹ️</div>
          <div>Le détail des cotisations est réservé au département <b>Trésorerie</b>. Adressez-vous au trésorier pour toute question sur un paiement.</div>
        </div>` : ''}

      ${isManager && enAttenteTotal > 0 ? `
        <div class="alert-banner gold">
          <div class="alert-banner__icon">⏳</div>
          <div><b>${enAttenteTotal}</b> paiement(s) en attente de validation.</div>
        </div>` : ''}

      ${isManager ? `
        <div class="field">
          <label>Mois concerné</label>
          <select id="fin-month-select">
            ${Utils.MONTHS.map((mo,i) => {
              const key = `${year}-${String(i+1).padStart(2,'0')}`;
              return `<option value="${key}" ${this.selectedMonth===key?'selected':''}>${mo} ${year}</option>`;
            }).join('')}
          </select>
        </div>
      ` : ''}

      <div id="fin-list"></div>
    `;

    if (isManager) {
      container.querySelector('#fin-month-select').addEventListener('change', (e) => {
        this.selectedMonth = e.target.value;
        this.renderFinance(container, main);
      });
    }

    this._renderFinanceList(container.querySelector('#fin-list'), membres, isManager);

    // FAB — déclarer un paiement (réservé à la Trésorerie/admin)
    if (isManager) {
      const fab = document.createElement('button');
      fab.className = 'fab';
      fab.innerHTML = '+';
      fab.title = 'Déclarer un paiement';
      main.appendChild(fab);
      fab.addEventListener('click', () => {
        this.openPaiementForm(Store.data.membres.slice().sort((a,b)=>a.nom.localeCompare(b.nom)), isManager);
      });
    }
  },

  _renderFinanceList(container, membres, isManager) {
    if (!membres.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">🧾</div><div class="empty-state__text">Aucun membre à afficher</div></div>`;
      return;
    }

    container.innerHTML = `<div class="list">${membres.map(m => {
      const st = Store.getStatutPaiement(m.id, this.selectedMonth);
      const pillClass = st.statut === 'Payé' ? 'actif' : st.statut === 'Partiel' ? 'integrant' : 'suspendu';
      const enAttenteBadge = st.enAttente > 0 ? ` · ⏳ ${Utils.fmtFCFA(st.enAttente)} en attente` : '';
      return `
        <div class="list-row" data-member="${m.id}">
          <div class="list-row__avatar">${Utils.initials(m.nom)}</div>
          <div class="list-row__body">
            <div class="list-row__title">${Utils.escapeHtml(m.nom)}</div>
            <div class="list-row__subtitle">Validé : ${Utils.fmtFCFA(st.valide)} / ${Utils.fmtFCFA(st.due)}${enAttenteBadge}</div>
          </div>
          <span class="pill ${pillClass}">${st.statut}</span>
          <span class="list-row__chevron">›</span>
        </div>
      `;
    }).join('')}</div>`;

    container.querySelectorAll('.list-row').forEach(row => {
      row.addEventListener('click', () => this.openMemberPaiementHistory(row.dataset.member, isManager));
    });
  },

  openMemberPaiementHistory(membreId, isManager) {
    const m = Store.getMembre(membreId);
    if (!m) return;
    const st = Store.getStatutPaiement(membreId, this.selectedMonth);
    const historique = Store.getPaiements({ membreId });

    const html = `
      <div class="card">
        <div class="flex-between">
          <span class="text-sm text-muted">Statut ${Utils.MONTHS[parseInt(this.selectedMonth.split('-')[1],10)-1]}</span>
          <span class="pill ${st.statut==='Payé'?'actif':st.statut==='Partiel'?'integrant':'suspendu'}">${st.statut}</span>
        </div>
        <div class="progress mt-8"><div class="progress__fill" style="width:${Math.min(100, st.due?st.valide/st.due*100:0)}%;background:${st.statut==='Payé'?'var(--green)':'var(--gold)'};"></div></div>
        <div class="flex-between mt-8 text-sm">
          <span class="text-muted">Validé : ${Utils.fmtFCFA(st.valide)}</span>
          <span class="text-muted">Dû : ${Utils.fmtFCFA(st.due)}</span>
        </div>
        ${st.enAttente > 0 ? `<div class="text-sm mt-8" style="color:var(--amber);">⏳ ${Utils.fmtFCFA(st.enAttente)} en attente de validation</div>` : ''}
      </div>

      <div class="section-title"><span class="ornament">📜</span> Historique des paiements</div>
      <div id="hist-list"></div>
    `;

    const sheet = Utils.openSheet(`🧾 ${m.nom}`, html);
    this._renderHistList(sheet.querySelector('#hist-list'), historique, isManager);
  },

  _renderHistList(container, historique, isManager) {
    if (!historique.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">📭</div><div class="empty-state__text">Aucun paiement enregistré</div></div>`;
      return;
    }
    container.innerHTML = `<div class="list">${historique.map(p => {
      const statusClass = p.statut === 'Validé' ? 'actif' : p.statut === 'Refusé' ? 'suspendu' : 'bureau';
      const monthLabel = Utils.MONTHS[parseInt(p.monthKey.split('-')[1],10)-1] + ' ' + p.monthKey.split('-')[0];
      return `
        <div class="list-row" data-pid="${p.id}" style="${isManager && p.statut==='En attente' ? '' : 'cursor:default;'}">
          <div class="list-row__avatar">${p.mode==='Mobile Money'?'📱':p.mode==='Virement'?'🏦':'💵'}</div>
          <div class="list-row__body">
            <div class="list-row__title">${monthLabel}</div>
            <div class="list-row__subtitle">${Utils.fmtDate(p.datePaiement)} · ${p.mode}${p.commentaire?' · '+Utils.escapeHtml(p.commentaire):''}</div>
          </div>
          <div class="list-row__meta">
            <div style="font-weight:700;">${Utils.fmtFCFA(p.montant)}</div>
            <span class="pill ${statusClass}">${p.statut}</span>
          </div>
        </div>
      `;
    }).join('')}</div>`;

    if (isManager) {
      container.querySelectorAll('.list-row').forEach(row => {
        const p = Store.getPaiement(row.dataset.pid);
        if (p && p.statut === 'En attente') {
          row.addEventListener('click', () => this.openValidationSheet(p));
        }
      });
    }
  },

  openValidationSheet(paiement) {
    const m = Store.getMembre(paiement.membreId);
    const monthLabel = Utils.MONTHS[parseInt(paiement.monthKey.split('-')[1],10)-1] + ' ' + paiement.monthKey.split('-')[0];
    const html = `
      <div class="card center">
        <div class="text-sm text-muted">${Utils.escapeHtml(m ? m.nom : '')} — ${monthLabel}</div>
        <div class="font-display" style="font-size:1.6rem;font-weight:700;color:var(--maroon);">${Utils.fmtFCFA(paiement.montant)}</div>
        <div class="text-sm text-muted mt-8">${paiement.mode} · ${Utils.fmtDate(paiement.datePaiement)}</div>
        ${paiement.commentaire ? `<div class="text-sm mt-8">"${Utils.escapeHtml(paiement.commentaire)}"</div>` : ''}
      </div>
      <div class="grid-2 mt-16">
        <button class="btn danger block" id="refuse-pai">❌ Refuser</button>
        <button class="btn sage block" id="valide-pai">✅ Valider</button>
      </div>
      <button class="btn ghost block mt-8" id="del-pai">🗑️ Supprimer la déclaration</button>
    `;
    const sheet = Utils.openSheet('Validation du paiement', html);

    sheet.querySelector('#valide-pai').addEventListener('click', () => {
      Store.validerPaiement(paiement.id, Permissions.displayName());
      Utils.closeSheet();
      Utils.toast('✅ Paiement validé');
      Router.render();
    });
    sheet.querySelector('#refuse-pai').addEventListener('click', () => {
      Store.refuserPaiement(paiement.id, Permissions.displayName(), '');
      Utils.closeSheet();
      Utils.toast('Paiement refusé');
      Router.render();
    });
    sheet.querySelector('#del-pai').addEventListener('click', () => {
      Utils.confirmAction('Supprimer définitivement cette déclaration de paiement ?', () => {
        Store.deletePaiement(paiement.id);
        Utils.closeSheet();
        Utils.toast('Déclaration supprimée');
        Router.render();
      });
    });
  },

  openPaiementForm(membres, isManager) {
    const year = Store.data.meta.annee;
    const html = `
      ${membres.length > 1 ? `
        <div class="field">
          <label>Membre</label>
          <select id="pf-membre">
            ${membres.map(m => `<option value="${m.id}">${Utils.escapeHtml(m.nom)}</option>`).join('')}
          </select>
        </div>
      ` : `<input type="hidden" id="pf-membre" value="${membres[0].id}">`}
      <div class="field">
        <label>Mois concerné</label>
        <select id="pf-month">
          ${Utils.MONTHS.map((mo,i) => {
            const key = `${year}-${String(i+1).padStart(2,'0')}`;
            return `<option value="${key}" ${this.selectedMonth===key?'selected':''}>${mo} ${year}</option>`;
          }).join('')}
        </select>
      </div>
      <div class="field">
        <label>Montant (FCFA)</label>
        <input type="number" id="pf-montant" value="${Store.getCotisationDue(membres[0])}" min="0" step="50">
      </div>
      <div class="field">
        <label>Mode de paiement</label>
        <select id="pf-mode">
          <option>Espèces</option>
          <option>Mobile Money</option>
          <option>Virement</option>
          <option>Autre</option>
        </select>
      </div>
      <div class="field">
        <label>Commentaire / référence</label>
        <input type="text" id="pf-commentaire" placeholder="Ex: référence transaction...">
      </div>
      ${isManager ? `
        <div class="field">
          <label style="display:flex;align-items:center;gap:8px;text-transform:none;">
            <input type="checkbox" id="pf-autovalide" checked style="width:auto;"> Valider immédiatement (paiement déjà encaissé)
          </label>
        </div>
      ` : `
        <div class="alert-banner info">
          <div class="alert-banner__icon">ℹ️</div>
          <div>Votre déclaration sera <b>en attente de validation</b> par le bureau.</div>
        </div>
      `}
      <button class="btn primary block" id="save-paiement">💾 Enregistrer</button>
    `;
    const sheet = Utils.openSheet('🧾 Déclarer un paiement', html);
    sheet.querySelector('#save-paiement').addEventListener('click', () => {
      const membreId = sheet.querySelector('#pf-membre').value;
      const monthKey = sheet.querySelector('#pf-month').value;
      const montant = Number(sheet.querySelector('#pf-montant').value);
      const mode = sheet.querySelector('#pf-mode').value;
      const commentaire = sheet.querySelector('#pf-commentaire').value;
      const autoValideEl = sheet.querySelector('#pf-autovalide');
      const autoValide = isManager && autoValideEl ? autoValideEl.checked : false;

      if (!montant || montant <= 0) { Utils.toast('Montant invalide'); return; }

      Store.declarePaiement({
        membreId, monthKey, montant, mode, commentaire,
        declarePar: Permissions.displayName(),
        autoValide,
      });
      Utils.closeSheet();
      Utils.toast(autoValide ? '✅ Paiement enregistré et validé' : '⏳ Paiement déclaré, en attente de validation');
      Router.render();
    });

    // Update montant default when member changes (bureau view)
    const memberSel = sheet.querySelector('#pf-membre');
    if (memberSel.tagName === 'SELECT') {
      memberSel.addEventListener('change', () => {
        const mem = Store.getMembre(memberSel.value);
        if (mem) sheet.querySelector('#pf-montant').value = Store.getCotisationDue(mem);
      });
    }
  },
