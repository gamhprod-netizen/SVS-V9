<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SVS-EEI</title>
  <meta name="description" content="Système ERP de gestion de chorale : membres, présences, discipline, finance, suggestions. Données enregistrées localement sur l'appareil.">

  <meta name="theme-color" content="#1A4F8A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SVS-EEI">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- ═══════════════════════════════════════════════════════════════
       FIREBASE CONFIGURATION (chargée depuis un fichier séparé)
       Ne jamais déplacer ni supprimer cette ligne lors des mises à

  <style>
/* ════════════════════════════════════════════════════════════════
   CHORALE SEMEUR — Design System v8
   Palette : bleu royal, blanc pur, accents or & vert
   Typographie : serif display (titres) + sans-serif (données)
   ════════════════════════════════════════════════════════════════ */

:root {
  /* Fonds bleu & blanc */
  --cream:       #F0F6FF;
  --cream-deep:  #DCE9F8;
  --paper:       #FFFFFF;

  /* Bleu principal */
  --maroon:      #1A4F8A;
  --maroon-dark: #0F3566;
  --maroon-soft: #D6E6F8;

  /* Or accent */
  --gold:        #C9A227;
  --gold-soft:   #FEF8E3;

  /* Vert */
  --sage:        #2E7D5B;
  --sage-soft:   #D9F0E6;

  /* Texte */
  --ink:         #0D1F3C;
  --ink-soft:    #4A6080;

  /* Lignes */
  --line:        #C8DDEF;

  /* Statuts */
  --red:         #C0392B;
  --red-soft:    #FDECEA;
  --green:       #27AE60;
  --green-soft:  #E3F9ED;
  --amber:       #E67E22;
  --amber-soft:  #FEF3E2;
  --blue:        #2980B9;
  --blue-soft:   #E3F0FB;
  --purple:      #7D3C98;
  --purple-soft: #F4E6FC;

  --radius-s: 8px;
  --radius-m: 14px;
  --radius-l: 22px;

  --shadow-card: 0 2px 10px rgba(26,79,138,0.09), 0 1px 2px rgba(26,79,138,0.06);
  --shadow-pop:  0 8px 28px rgba(13,31,60,0.18);

  --font-display: 'Fraunces', 'Georgia', serif;
  --font-body:    'Inter', -apple-system, 'Segoe UI', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
  overscroll-behavior-y: contain;
  padding-bottom: env(safe-area-inset-bottom);
}

#app {
  max-width: 560px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--cream);
  position: relative;
}

/* ── Header ── */
.app-header {
  background: linear-gradient(135deg, var(--maroon) 0%, var(--maroon-dark) 100%);
  color: #FFFFFF;
  padding: 18px 18px 22px;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--shadow-card);
}
.app-header__top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.app-header__title {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: 0.01em;
  display: flex; align-items: center; gap: 8px;
  color: #FFFFFF;
}
.app-header__title .ornament { font-size: 1.1rem; color: var(--gold); }
.app-header__year {
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.65);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 999px;
  padding: 3px 10px;
  font-weight: 600;
}
.app-header__subtitle { margin-top: 4px; font-size: 0.82rem; color: rgba(255,255,255,0.7); }
.app-header::after {
  content: '';
  display: block;
  position: absolute;
  bottom: -1px; left: 50%;
  transform: translateX(-50%);
  width: 90%;
  height: 1px;
  background: repeating-linear-gradient(90deg, var(--gold) 0 6px, transparent 6px 12px);
  opacity: 0.5;
}

.app-main { flex: 1; padding: 16px 14px 90px; }

/* ── Bottom nav ── */
.app-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-width: 560px;
  margin: 0 auto;
  background: var(--paper);
  border-top: 2px solid var(--maroon-soft);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: 0 -2px 12px rgba(26,79,138,0.10);
}
.app-nav::-webkit-scrollbar { display: none; }
.nav-item {
  flex: 0 0 auto;
  min-width: 64px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 9px 10px 7px;
  font-size: 0.62rem;
  color: var(--ink-soft);
  border: none; background: none;
  font-weight: 600; letter-spacing: 0.01em;
  cursor: pointer; position: relative;
  transition: color 0.15s;
}
.nav-item__icon { font-size: 1.25rem; line-height: 1; }
.nav-item.active { color: var(--maroon); }
.nav-item.active::before {
  content: '';
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 28px; height: 3px;
  background: var(--gold);
  border-radius: 0 0 3px 3px;
}
.nav-item .badge {
  position: absolute;
  top: 4px; right: 6px;
  background: var(--red);
  color: #fff;
  font-size: 0.55rem;
  font-weight: 700;
  border-radius: 999px;
  min-width: 15px; height: 15px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 3px;
}

/* ── Sections / cards ── */
.section-title {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--maroon);
  margin: 22px 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-title:first-child { margin-top: 4px; }
.section-title .ornament { color: var(--gold); font-size: 1rem; }

.card {
  background: var(--paper);
  border-radius: var(--radius-m);
  padding: 14px;
  box-shadow: var(--shadow-card);
  border: 1px solid var(--line);
  margin-bottom: 10px;
}

.kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 4px; }
.kpi-card {
  background: var(--paper);
  border-radius: var(--radius-m);
  padding: 12px 8px;
  text-align: center;
  border: 1px solid var(--line);
  box-shadow: var(--shadow-card);
}
.kpi-card__value { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--maroon); line-height: 1.1; }
.kpi-card__label { font-size: 0.65rem; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; font-weight: 600; }
.kpi-card.accent-gold .kpi-card__value { color: var(--amber); }
.kpi-card.accent-sage .kpi-card__value { color: var(--sage); }
.kpi-card.accent-red  .kpi-card__value { color: var(--red); }
.kpi-card.accent-blue .kpi-card__value { color: var(--blue); }
.kpi-card.accent-purple .kpi-card__value { color: var(--purple); }

.alert-banner {
  border-radius: var(--radius-m);
  padding: 12px 14px;
  margin-bottom: 10px;
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 0.86rem;
  border: 1px solid;
}
.alert-banner__icon { font-size: 1.2rem; line-height: 1; }
.alert-banner.warn   { background: var(--amber-soft); border-color: #F5D5A8; color: #8C4A00; }
.alert-banner.danger { background: var(--red-soft);   border-color: #F5C6C2; color: #7B1A1A; }
.alert-banner.info   { background: var(--blue-soft);  border-color: #A8CEED; color: #0D3A5F; }
.alert-banner.success{ background: var(--green-soft); border-color: #A8E6C3; color: #1A5C35; }
.alert-banner.gold   { background: var(--gold-soft);  border-color: #EBD9A0; color: #7A5C0A; }
.alert-banner b { font-weight: 700; }

.list { background: var(--paper); border-radius: var(--radius-m); border: 1px solid var(--line); overflow: hidden; box-shadow: var(--shadow-card); }
.list-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background 0.12s; }
.list-row:last-child { border-bottom: none; }
.list-row:active { background: var(--cream-deep); }
.list-row__avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--maroon-soft); color: var(--maroon);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; flex-shrink: 0;
}
.list-row__body { flex: 1; min-width: 0; }
.list-row__title { font-weight: 600; font-size: 0.92rem; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-row__subtitle { font-size: 0.76rem; color: var(--ink-soft); margin-top: 1px; }
.list-row__meta { text-align: right; font-size: 0.78rem; color: var(--ink-soft); flex-shrink: 0; }
.list-row__chevron { color: var(--line); font-size: 1.1rem; }

.pill { display: inline-flex; align-items: center; gap: 4px; font-size: 0.68rem; font-weight: 700; padding: 3px 9px; border-radius: 999px; letter-spacing: 0.02em; }
.pill.bureau   { background: var(--gold-soft); color: #8A6D10; }
.pill.choriste { background: var(--blue-soft); color: #0D3A5F; }
.pill.integrant{ background: var(--purple-soft); color: #4D2070; }
.pill.actif    { background: var(--green-soft); color: #1A5C35; }
.pill.suspendu { background: var(--red-soft); color: #7B1A1A; }
.pill.exemplaire { background: var(--green-soft); color: #1A5C35; }
.pill.accompagner { background: var(--red-soft); color: #7B1A1A; }

.tabbar { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.tabbar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 0 0 auto; padding: 7px 14px; border-radius: 999px;
  border: 1px solid var(--line); background: var(--paper); color: var(--ink-soft);
  font-size: 0.8rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.tab-btn.active { background: var(--maroon); color: #FFFFFF; border-color: var(--maroon); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 18px; border-radius: var(--radius-s); border: none;
  font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: transform 0.08s, opacity 0.15s;
  font-family: var(--font-body);
}
.btn:active { transform: scale(0.97); }
.btn.primary { background: var(--maroon); color: #FFFFFF; }
.btn.secondary { background: var(--cream-deep); color: var(--ink); border: 1px solid var(--line); }
.btn.gold { background: var(--gold); color: var(--maroon-dark); }
.btn.sage { background: var(--sage); color: #fff; }
.btn.ghost { background: transparent; color: var(--maroon); border: 1px solid var(--maroon-soft); }
.btn.danger { background: var(--red-soft); color: #7B1A1A; }
.btn.block { width: 100%; }
.btn.sm { padding: 7px 12px; font-size: 0.78rem; }
.btn:disabled { opacity: 0.5; pointer-events: none; }

.fab {
  position: fixed; bottom: 76px; right: 18px; max-width: 560px;
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--maroon); color: #FFFFFF; border: none;
  font-size: 1.6rem; display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-pop); z-index: 90; cursor: pointer;
}
.fab:active { transform: scale(0.94); }

.field { margin-bottom: 12px; }
.field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--ink-soft); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
.field input, .field select, .field textarea {
  width: 100%; padding: 11px 12px; border-radius: var(--radius-s);
  border: 1px solid var(--line); background: var(--paper);
  font-family: var(--font-body); font-size: 0.92rem; color: var(--ink);
}
.field input:focus, .field select:focus, .field textarea:focus { outline: 2px solid var(--maroon); outline-offset: 1px; }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }

.search-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius-m);
  padding: 10px 14px; margin-bottom: 14px;
}
.search-bar input { border: none; outline: none; background: none; flex: 1; font-size: 0.9rem; color: var(--ink); font-family: var(--font-body); }
.search-bar__icon { color: var(--ink-soft); }

.sheet-overlay { position: fixed; inset: 0; background: rgba(13,31,60,0.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.sheet {
  background: var(--paper); border-radius: 20px 20px 0 0; max-width: 560px; width: 100%;
  max-height: 88vh; overflow-y: auto; padding: 18px 16px calc(20px + env(safe-area-inset-bottom));
  animation: sheet-up 0.22s ease-out;
}
@keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet__handle { width: 36px; height: 4px; background: var(--line); border-radius: 999px; margin: 0 auto 14px; }
.sheet__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.sheet__title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--maroon); }
.sheet__close { background: var(--cream-deep); border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 1rem; color: var(--ink-soft); cursor: pointer; }

.scroll-table { overflow-x: auto; border-radius: var(--radius-m); border: 1px solid var(--line); background: var(--paper); }
.scroll-table table { border-collapse: collapse; width: 100%; font-size: 0.78rem; }
.scroll-table th, .scroll-table td { padding: 8px 10px; border-bottom: 1px solid var(--line); text-align: center; white-space: nowrap; }
.scroll-table th { background: var(--cream-deep); color: var(--maroon); font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.03em; position: sticky; top: 0; }
.scroll-table td:first-child, .scroll-table th:first-child { position: sticky; left: 0; background: var(--paper); text-align: left; font-weight: 600; z-index: 2; box-shadow: 2px 0 4px rgba(0,0,0,0.04); }
.scroll-table th:first-child { background: var(--cream-deep); z-index: 3; }
.scroll-table tr:nth-child(even) td:first-child { background: var(--cream); }

.status-select { font-size: 0.7rem; border: 1px solid var(--line); border-radius: 6px; padding: 4px 4px; background: var(--paper); width: 100%; text-align: center; }
.status-present  { background: var(--green-soft) !important; color: #1A5C35; }
.status-abs-nj   { background: var(--red-soft) !important; color: #7B1A1A; }
.status-abs-j    { background: var(--gold-soft) !important; color: #8A6D10; }
.status-ret-nj   { background: #FCE4D6 !important; color: #9C4A0F; }
.status-ret-j    { background: var(--blue-soft) !important; color: #0D3A5F; }
.status-voyage   { background: var(--purple-soft) !important; color: #4D2070; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--ink-soft); }
.empty-state__icon { font-size: 2.4rem; margin-bottom: 8px; }
.empty-state__text { font-size: 0.88rem; }

.progress { height: 8px; background: var(--cream-deep); border-radius: 999px; overflow: hidden; }
.progress__fill { height: 100%; border-radius: 999px; transition: width 0.3s; }

.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: #FFFFFF; padding: 10px 20px; border-radius: 999px;
  font-size: 0.82rem; font-weight: 600; z-index: 300; box-shadow: var(--shadow-pop);
  animation: toast-pop 2.6s ease forwards; white-space: nowrap;
}
@keyframes toast-pop {
  0% { opacity: 0; transform: translate(-50%, 10px); }
  10% { opacity: 1; transform: translate(-50%, 0); }
  85% { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, 0); }
}

.flex-between { display: flex; align-items: center; justify-content: space-between; }
.text-muted { color: var(--ink-soft); }
.text-sm { font-size: 0.8rem; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

/* ── Champ mot de passe avec icône Afficher/Masquer ── */
.pwd-field { position:relative; }
.pwd-field input[type="password"],
.pwd-field input[type="text"] { padding-right: 44px !important; }
.pwd-toggle { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1.1rem; color:var(--ink-soft); padding:4px; line-height:1; }
.pwd-toggle:hover { color:var(--maroon); }
.toggle-switch { position:relative; display:inline-block; width:48px; height:26px; flex-shrink:0; cursor:pointer; }
.toggle-switch input { opacity:0; width:0; height:0; position:absolute; }
.toggle-switch__slider { position:absolute; inset:0; background:var(--cream-deep); border-radius:26px; transition:.25s; border:1px solid var(--line); }
.toggle-switch__slider::before { content:''; position:absolute; height:20px; width:20px; left:2px; bottom:2px; background:#fff; border-radius:50%; transition:.25s; box-shadow:0 1px 3px rgba(0,0,0,.25); }
.toggle-switch input:checked + .toggle-switch__slider { background:var(--green); border-color:var(--green); }
.toggle-switch input:checked + .toggle-switch__slider::before { transform:translateX(22px); }
.divider { height: 1px; background: var(--line); margin: 14px 0; }
.font-display { font-family: var(--font-display); }
.center { text-align: center; }

.install-banner {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  max-width: 520px; width: calc(100% - 28px);
  background: var(--maroon); color: #fff; border-radius: var(--radius-m);
  padding: 12px 14px; display: flex; align-items: center; gap: 10px;
  z-index: 400; box-shadow: var(--shadow-pop); font-size: 0.82rem;
}
.install-banner button { margin-left: auto; background: var(--gold); color: var(--maroon-dark); border: none; padding: 7px 12px; border-radius: 8px; font-weight: 700; font-size: 0.76rem; cursor: pointer; }
.install-banner .dismiss { background: none; color: rgba(255,255,255,0.6); padding: 7px 6px; }

/* ── Carte identité chorale ── */
.chorale-id-card {
  background: linear-gradient(145deg, var(--maroon) 0%, var(--maroon-dark) 100%);
  border-radius: var(--radius-l);
  padding: 20px 18px 18px;
  margin-bottom: 12px;
  color: #fff;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-pop);
}
.chorale-id-card::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
}
.chorale-id-card__header { display: flex; align-items: flex-start; gap: 14px; }
.chorale-id-card__logo {
  width: 64px; height: 64px; border-radius: var(--radius-m);
  background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; flex-shrink: 0; overflow: hidden; cursor: pointer;
  position: relative;
}
.chorale-id-card__logo img { width: 100%; height: 100%; object-fit: cover; }
.chorale-id-card__logo__edit {
  position: absolute; inset: 0; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; opacity: 0; transition: opacity 0.2s;
}
.chorale-id-card__logo:hover .chorale-id-card__logo__edit { opacity: 1; }
.chorale-id-card__info { flex: 1; min-width: 0; }
.chorale-id-card__nom {
  font-family: var(--font-display); font-size: 1.1rem; font-weight: 700;
  color: #fff; line-height: 1.3; margin-bottom: 3px;
}

.pill.attente    { background: var(--blue-soft); color: #2C4F66; }

.notif-dot {
  position: absolute; top: 4px; right: 6px;
  background: var(--red); color: #fff; font-size: 0.55rem; font-weight: 700;
  border-radius: 999px; min-width: 15px; height: 15px;
  display: flex; align-items: center; justify-content: center; padding: 0 3px;
}
.notif-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 14px; border-bottom: 1px solid var(--line);
  cursor: pointer; transition: background 0.12s;
}
.notif-item:last-child { border-bottom: none; }
.notif-item:active { background: var(--cream-deep); }
.notif-item.unread { background: var(--gold-soft); }
.notif-item__icon { font-size: 1.3rem; flex-shrink: 0; margin-top: 2px; }
.notif-item__body { flex: 1; min-width: 0; }
.notif-item__title { font-weight: 700; font-size: 0.88rem; color: var(--ink); }
.notif-item__text { font-size: 0.78rem; color: var(--ink-soft); margin-top: 2px; }
.notif-item__date { font-size: 0.68rem; color: var(--ink-soft); margin-top: 3px; }

.audit-row {
  display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--line);

.audit-row:last-child { border-bottom: none; }
.audit-row__time { color: var(--ink-soft); flex-shrink: 0; min-width: 90px; }
.audit-row__action { font-weight: 700; color: var(--maroon); flex-shrink: 0; min-width: 60px; }
.audit-row__detail { color: var(--ink); flex: 1; }

  display: flex; align-items: flex-start; gap: 12px;

.motivation-banner__icon { font-size: 1.5rem; flex-shrink: 0; }

.motivation-banner__author { font-size: 0.72rem; color: var(--ink-soft); margin-top: 4px; font-style: normal; }

.risk-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 999px; }
.risk-high  { background: var(--red-soft); color: var(--maroon-dark); }
.risk-med   { background: var(--amber-soft); color: #7A5C0A; }

.cotis-bar__fill { height: 100%; border-radius: 999px; transition: width 0.3s; }
.cotis-green { background: var(--green); }
.cotis-orange { background: #E8870A; }
.cotis-red { background: var(--red); }

.auth-screen {

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;

.auth-card {

  border-radius: var(--radius-l);

  width: 100%;
  max-width: 380px;

.auth-logo {
  font-size: 2.6rem;
  margin-bottom: 6px;
}
.auth-title {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--maroon);

}
.auth-subtitle {
  font-size: 0.85rem;
  color: var(--ink-soft);
  margin-bottom: 22px;
}

  font-size: 0.82rem;

  color: var(--ink-soft);
  margin-top: 14px;

.auth-links a {

  font-weight: 700;
  text-decoration: none;
  margin-left: 4px;

.auth-divider {
  height: 1px;

.auth-footer {

  font-size: 0.74rem;
  color: rgba(250,241,214,0.65);

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}
.sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #5CC97A;
  box-shadow: 0 0 0 0 rgba(92,201,122,0.6);
  animation: sync-pulse 2s infinite;
  flex-shrink: 0;
}
.sync-dot.offline {
  background: #D9534F;
  animation: none;
}

  background: var(--gold);
}
@keyframes sync-pulse {
  0% { box-shadow: 0 0 0 0 rgba(92,201,122,0.5); }
  70% { box-shadow: 0 0 0 6px rgba(92,201,122,0); }
  100% { box-shadow: 0 0 0 0 rgba(92,201,122,0); }
}
.user-btn {
  background: rgba(250,241,214,0.12);
  border: 1px solid rgba(250,241,214,0.25);
  color: var(--gold-soft);
  border-radius: 999px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  font-size: 0.8rem;
  cursor: pointer;
  font-family: var(--font-display);

.sync-status-text {
  font-size: 0.68rem;
  color: rgba(250,241,214,0.65);
  display: flex;
  align-items: center;
  gap: 5px;
}
.sync-status-text #sync-label {
  transition: color 0.3s;
}

// UTILS — fonctions partagées
// ════════════════════════════════════════════════════════════════

const Utils = {
  // Hachage du mot de passe d'un compte individuel (2 — comptes choristes).
  // Utilise SHA-256 (Web Crypto) quand disponible ; repli simple sinon afin
  // de ne jamais bloquer la connexion (ex. contexte non sécurisé).
  async hashPassword(pw) {
    try {
      if (window.crypto && window.crypto.subtle) {
        const enc = new TextEncoder().encode(String(pw));
        const buf = await window.crypto.subtle.digest('SHA-256', enc);
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
      }
    } catch (e) { /* repli ci-dessous */ }
    let hash = 0;
    const s = String(pw);
    for (let i = 0; i < s.length; i++) { hash = ((hash << 5) - hash + s.charCodeAt(i)) | 0; }
    return 'fb_' + Math.abs(hash).toString(16) + '_' + s.length;
  },

  // Export générique CSV (compatible Excel — BOM UTF-8 + séparateur ;)
  // utilisable par tous les départements pour exporter leurs données.
  exportCSV(filename, headers, rows) {
    const esc = (v) => {
      const s = (v === null || v === undefined) ? '' : String(v);
      return '"' + s.replace(/"/g, '""') + '"';
    };
    const lines = [headers.map(esc).join(';')];
    rows.forEach(row => lines.push(row.map(esc).join(';')));
    const csv = '\uFEFF' + lines.join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename.endsWith('.csv') ? filename : filename + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    this.toast('Export Excel téléchargé');
  },

  MONTHS: ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'],
  STATUTS_PRESENCE: ['Présent','Retard justifié','Retard non justifié','Absence justifiée','Absence non justifiée','Voyage'],
  PUPITRES: ['Soprano','Alto','Ténor','Basse','Baryton','Mezzo-Soprano','Non défini'],
  FONCTIONS: [
    'Président(e)', 'Secrétaire Principal', 'Directeur de Chœur Principal', 'Directeur de Chœur Adjoint(e)',
    'Trésorier(e) Principal(e)', 'Trésorier(e) Adjoint(e)', 'Chargé(e) de Discipline Principal(e)',
    'Chargé(e) de Discipline Adjoint(e)', 'Responsable Soprano', 'Responsable Soprano Adjoint(e)',
    'Responsable Alto Principal(e)', 'Responsable Alto Adjoint(e)', 'Responsable Ténor Principal(e)',
    'Responsable Ténor Adjoint(e)', 'Membre', 'Autre fonction',
  ],

  genId(prefix) {
    return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  },

  fmtFCFA(n) {
    n = Number(n) || 0;
    return n.toLocaleString('fr-FR') + ' FCFA';
  },

  fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' });
  },

  fmtDateLong(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  },

  todayISO() {
    const d = new Date();
    return d.toISOString().slice(0,10);
  },

  monthKey(date) {
    const d = date ? new Date(date) : new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  },

  statusClass(status) {
    switch(status) {
      case 'Présent': return 'status-present';
      case 'Retard justifié': return 'status-ret-j';
      case 'Retard non justifié': return 'status-ret-nj';
      case 'Absence justifiée': return 'status-abs-j';
      case 'Absence non justifiée': return 'status-abs-nj';
      case 'Voyage': return 'status-voyage';
      default: return '';
    }
  },

  statusShort(status) {
    switch(status) {
      case 'Présent': return 'P';
      case 'Retard justifié': return 'RJ';
      case 'Retard non justifié': return 'RNJ';
      case 'Absence justifiée': return 'AJ';
      case 'Absence non justifiée': return 'ANJ';
      case 'Voyage': return 'V';
      default: return '—';
    }
  },

  initials(nom) {
    const parts = nom.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
    return (parts[0][0] + parts[1][0]).toUpperCase();
  },

  pct(n) {
    return Math.round((n||0) * 100) + '%';
  },

  escapeHtml(str) {
    if (str == null) return '';
    return String(str).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  },

  // ── Wrapper HTML pour un champ mot de passe avec bouton Afficher/Masquer ──
  // Usage : dans une template string, remplacer <input type="password" id="X">
  // par Utils.pwdInput('X', 'placeholder', 'autocomplete-value')
  pwdInput(id, placeholder = '••••••••', autocomplete = 'current-password') {
    return `
      <div class="pwd-field">
        <input type="password" id="${id}" autocomplete="${autocomplete}" placeholder="${placeholder}">
        <button type="button" class="pwd-toggle" data-pwd-for="${id}" aria-label="Afficher / Masquer le mot de passe" title="Afficher / Masquer">👁️</button>
      </div>`;
  },

  // Attache les événements de toggle sur les boutons .pwd-toggle
  // Appelé automatiquement par openSheet() et dans les rendus inline.
  initPwdToggles(root) {
    (root || document).querySelectorAll('.pwd-toggle').forEach(btn => {
      if (btn._pwdBound) return;
      btn._pwdBound = true;
      btn.addEventListener('click', () => {
        const input = (root || document).querySelector('#' + btn.dataset.pwdFor);
        if (!input) return;
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.textContent = show ? '🙈' : '👁️';
        btn.title = show ? 'Masquer le mot de passe' : 'Afficher le mot de passe';
      });
    });
  },

  toast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2700);
  },

  // Show a bottom sheet modal. content = HTML string. Returns the sheet element.
  openSheet(title, contentHTML) {
    this.closeSheet();
    const overlay = document.createElement('div');
    overlay.className = 'sheet-overlay';
    overlay.id = 'active-sheet';
    overlay.innerHTML = `
      <div class="sheet">
        <div class="sheet__handle"></div>
        <div class="sheet__header">
          <div class="sheet__title">${title}</div>
          <button class="sheet__close" data-close-sheet>✕</button>
        </div>
        <div class="sheet__body">${contentHTML}</div>
      </div>
    `;
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay || e.target.closest('[data-close-sheet]')) {
        this.closeSheet();
      }
    });
    document.body.appendChild(overlay);
    const body = overlay.querySelector('.sheet__body');
    // Init password-toggle buttons injected via Utils.pwdInput()
    Utils.initPwdToggles(body);
    return overlay;
  },

  closeSheet() {
    const el = document.getElementById('active-sheet');
    if (el) el.remove();
  },

  confirmAction(msg, onConfirm) {
    const html = `
      <p class="text-sm mt-8" style="margin-bottom:18px;">${msg}</p>
      <div class="grid-2">
        <button class="btn secondary block" data-close-sheet>Annuler</button>
        <button class="btn danger block" id="confirm-yes">Confirmer</button>
      </div>
    `;
    const sheet = this.openSheet('⚠️ Confirmation', html);
    sheet.querySelector('#confirm-yes').addEventListener('click', () => {
      this.closeSheet();
      onConfirm();
    });
  },

  // Petite courbe d'évolution (sparkline) en SVG pur, sans dépendance externe.
  // values : tableau de nombres 0-100. Réutilisable par tout module (Classements,
  // Rapports...) ayant besoin d'illustrer une tendance dans le temps.
  sparklineSVG(values, opts) {
    opts = opts || {};
    const w = opts.width || 280, h = opts.height || 56, color = opts.color || '#7A2E2E';
    if (!values || values.filter(v=>v!=null).length < 2) {
      return `<div class="text-sm text-muted center" style="padding:14px 0;">Pas encore assez d'historique pour tracer une évolution</div>`;
    }
    const max = 100, min = 0;
    const stepX = values.length > 1 ? w / (values.length - 1) : 0;
    const coords = values.map((v,i) => ({
      x: i*stepX,
      y: h - ((Math.max(min,Math.min(max,v))-min)/(max-min))*h,
    }));
    const points = coords.map(c => `${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' ');
    const last = coords[coords.length-1];
    return `
      <svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none" style="display:block;overflow:visible;">
        <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="3.5" fill="${color}"/>
      </svg>
    `;
  },
};

// ===== STORE (persistance locale) =====
// ════════════════════════════════════════════════════════════════
// STORE — Gestion centralisée des données + persistance locale
// ════════════════════════════════════════════════════════════════
//
// Architecture : toutes les données de l'application vivent dans
// Store.data et sont sauvegardées dans le localStorage du navigateur
// (clé STORAGE_KEY ci-dessous). Chaque appel à Store.save() réécrit
// immédiatement cette entrée. Les données restent donc propres à
// CET appareil/navigateur : il n'y a plus de synchronisation entre
// plusieurs appareils (cela nécessiterait un serveur central, ce qui
// a été volontairement retiré de cette version).
// ════════════════════════════════════════════════════════════════

const STORAGE_KEY = 'chorale_erp_data_v1';

const Store = {
  data: null,
  _ready: false,
  _unsubscribe: null,      // listener onSnapshot actif
  _remoteWrite: false,     // true pendant qu'on traite un snapshot entrant
  _pendingSave: false,     // évite les sauvegardes en boucle

  // ════════════════════════════════════════════════════════════════
  // INIT — charge localStorage immédiatement, puis attend l'événement
  // 'firebase-ready' émis par firebase-config.js (module ES asynchrone).
  // Résout le problème de timing type="module" vs DOMContentLoaded.
  // ════════════════════════════════════════════════════════════════
  init() {
    // ── 1. localStorage → affichage immédiat ─────────────────────
    let stored = null;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) stored = JSON.parse(raw);
    } catch (e) {
      console.warn('[Store] Lecture localStorage impossible.', e);
    }
    this.data = stored
      ? this._merge(structuredClone(SEED_DATA), stored)
      : structuredClone(SEED_DATA);
    this.recomputeAllCotisations_silent();
    this._ready = true;
    setSyncStatus('local');

    // ── 2. Attendre Firebase (module ES chargé après DOMContentLoaded) ──
    const connectWhenReady = () => {
      const db = window.__firebase__ && window.__firebase__.db;
      if (db) {
        this._connectFirestore(db);
      } else {
        console.warn('[Store] firebase-ready reçu mais db absent.');
        setSyncStatus('local');
      }
    };

    if (window.__firebase__ && window.__firebase__.db) {
      // Firebase déjà prêt (cas rare : rechargement rapide)
      connectWhenReady();
    } else {
      // Cas normal : attendre l'événement custom
      window.addEventListener('firebase-ready', connectWhenReady, { once: true });
      // Sécurité : si Firebase ne répond pas en 10s → mode local définitif
      setTimeout(() => {
        if (!this._unsubscribe) {
          console.warn('[Store] Firebase non reçu après 10s — mode local.');
          setSyncStatus('local');
          window.removeEventListener('firebase-ready', connectWhenReady);
        }
      }, 10000);
    }

    return this.data;
  },

  // ── Connexion Firestore + listener onSnapshot temps réel ────────
  _connectFirestore(db) {
    setSyncStatus('connecting');
    import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js')
      .then(({ doc, setDoc, onSnapshot, serverTimestamp }) => {
        const ref = doc(db, 'chorale-svs', 'data');

        this._unsubscribe = onSnapshot(ref,
          (snap) => {
            if (snap.exists()) {
              // Firestore a des données → source de vérité absolue
              const remote = snap.data();
              delete remote._updatedAt; // champ interne Firestore
              this._remoteWrite = true;
              this.data = this._merge(structuredClone(SEED_DATA), remote);
              this.recomputeAllCotisations_silent();
              try { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data)); } catch(e) {}
              this._remoteWrite = false;
              setSyncStatus('synced');
              // Rafraîchir le module affiché pour tous les utilisateurs
              if (typeof Router !== 'undefined' && Router.current) {
                try { Router.render(Router.current); } catch(e) {}
              }
              console.info('[Store] ☁️ Données Firestore appliquées.');
            } else {
              // Firestore vide → migrer localStorage vers Firestore
              console.info('[Store] Firestore vide — migration en cours…');
              setSyncStatus('uploading');
              const payload = Object.assign({}, this.data, { _updatedAt: serverTimestamp() });
              setDoc(ref, payload)
                .then(() => { setSyncStatus('synced'); console.info('[Store] ✅ Migration Firestore réussie.'); })
                .catch(err  => { setSyncStatus('error'); console.error('[Store] ❌ Erreur migration :', err); });
            }
          },
          (err) => {
            console.error('[Store] ❌ Erreur onSnapshot :', err);
            setSyncStatus('error');
          }
        );
      })
      .catch(err => {
        console.error('[Store] Import Firestore échoué :', err);
        setSyncStatus('local');
      });
  },

  // ════════════════════════════════════════════════════════════════
  // SAVE — localStorage immédiat + Firestore asynchrone.
  // Les écritures déclenchées par onSnapshot sont ignorées (_remoteWrite)
  // pour éviter les boucles infinies.
  // ════════════════════════════════════════════════════════════════
  save() {
    if (!this._ready) return;
    if (this._remoteWrite) return;

    this.data.meta.lastUpdate = new Date().toISOString();

    // Toujours écrire dans localStorage (cache hors-ligne)
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data));
    } catch (e) {
      console.error('[Store] Erreur localStorage :', e);
      Utils.toast('⚠️ Erreur d\'enregistrement local — espace de stockage plein ?');
    }

    // Écrire dans Firestore si connecté
    const db = window.__firebase__ && window.__firebase__.db;
    if (!db) { setSyncStatus('local'); return; }

    setSyncStatus('saving');
    import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js')
      .then(({ doc, setDoc, serverTimestamp }) => {
        const payload = Object.assign({}, this.data, { _updatedAt: serverTimestamp() });
        return setDoc(doc(db, 'chorale-svs', 'data'), payload);
      })
      .then(() => setSyncStatus('synced'))
      .catch(err => {
        console.error('[Store] Erreur écriture Firestore :', err);
        setSyncStatus('error');
      });
  },

  // Deep-ish merge: ensures new fields from SEED_DATA exist, but stored data wins
  _merge(base, remote) {
    const out = Object.assign({}, base, remote);
    for (const key of Object.keys(base)) {
      if (remote[key] === undefined) out[key] = base[key];
      else if (
        typeof base[key] === 'object' && base[key] !== null && !Array.isArray(base[key]) &&
        typeof remote[key] === 'object' && remote[key] !== null && !Array.isArray(remote[key])
      ) {
        out[key] = Object.assign({}, base[key], remote[key]);
      }
    }
    return out;
  },

  // Recalcule les cotisations sans déclencher une écriture (utilisé au chargement,
  // avant que this._ready soit passé à true).
  recomputeAllCotisations_silent() {
    const keys = new Set();
    (this.data.paiements || []).forEach(p => keys.add(p.membreId + '|' + p.monthKey));
    keys.forEach(k => {
      const [membreId, monthKey] = k.split('|');
      this._recomputeCotisations(membreId, monthKey);
    });
  },

  // ── MEMBRES ──
  getMembres(filter) {
    let list = this.data.membres;
    if (filter) {
      if (filter.statut) list = list.filter(m => m.statut === filter.statut);
      if (filter.situation) list = list.filter(m => m.situation === filter.situation);
      if (filter.search) {
        const s = filter.search.toLowerCase();
        list = list.filter(m => (m.nom + ' ' + m.prenom).toLowerCase().includes(s)
          || (Array.isArray(m.instruments) && m.instruments.join(' ').toLowerCase().includes(s)));
      }
    }
    return list;
  },

  getMembre(id) {
    return this.data.membres.find(m => m.id === id);
  },

  // ── COMPTES CHORISTES INDIVIDUELS (2) ──
  getCompteChoriste(membreId) { return this.data.comptesChoristes[membreId] || null; },

  async createCompteChoriste(membreId, password) {
    const hash = await Utils.hashPassword(password);
    this.data.comptesChoristes[membreId] = {
      matricule: membreId,
      motDePasseHash: hash,
      doitChangerMotDePasse: false,
      dateCreation: Utils.todayISO(),
      dernieresConnexions: [],
      statutCompte: 'Actif',
    };
    this.save();
    this.logAction('Création', 'Membres', `Compte choriste créé — ${membreId}`);
  },

  async verifyChoristePassword(membreId, password) {
    const compte = this.getCompteChoriste(membreId);
    if (!compte || !compte.motDePasseHash) return false;
    const hash = await Utils.hashPassword(password);
    return hash === compte.motDePasseHash;
  },

  async changeChoristePassword(membreId, ancien, nouveau) {
    const ok = await this.verifyChoristePassword(membreId, ancien);
    if (!ok) return false;
    this.data.comptesChoristes[membreId].motDePasseHash = await Utils.hashPassword(nouveau);
    this.data.comptesChoristes[membreId].doitChangerMotDePasse = false;
    this.save();
    this.logAction('Modification', 'Membres', `Mot de passe changé par le choriste — ${membreId}`);
    return true;
  },

  // Réinitialisation par l'Admin : invalide le mot de passe, le choriste en
  // recrée un à sa prochaine connexion (même écran que la 1ère connexion).
  resetChoristePassword(membreId) {
    const compte = this.getCompteChoriste(membreId);
    if (compte) {
      compte.motDePasseHash = null;
      compte.doitChangerMotDePasse = true;
    } else {
      this.data.comptesChoristes[membreId] = {
        matricule: membreId, motDePasseHash: null, doitChangerMotDePasse: true,
        dateCreation: Utils.todayISO(), dernieresConnexions: [], statutCompte: 'Actif',
      };
    }
    this.save();
    this.logAction('Réinitialisation', 'Membres', `Mot de passe réinitialisé par l'administrateur — ${membreId}`);
  },

  toggleCompteChoristeStatut(membreId, statut) {
    const compte = this.getCompteChoriste(membreId);
    if (compte) { compte.statutCompte = statut; this.save(); }
  },

  recordConnexionChoriste(membreId) {
    const compte = this.getCompteChoriste(membreId);
    if (!compte) return;
    if (!compte.dernieresConnexions) compte.dernieresConnexions = [];
    compte.dernieresConnexions.unshift(new Date().toISOString());
    compte.dernieresConnexions = compte.dernieresConnexions.slice(0, 20);
    this.save();
  },

  // Conserve le compte (mot de passe, historique de connexions) lors du
  // passage Intégrant → Choriste, car le matricule (= id du membre) change.
  migrateCompteChoriste(oldId, newId) {
    const c = this.data.comptesChoristes[oldId];
    if (c) {
      c.matricule = newId;
      this.data.comptesChoristes[newId] = c;
      delete this.data.comptesChoristes[oldId];
      this.save();
    }
  },

  // ── GESTION DES TOGES (module Discipline) ──
  TOGE_ETATS: ['Disponible', 'Utilisée', 'Usée', 'Déchirée', 'En réparation', 'Hors service'],
  TOGE_SEUIL_STOCK_FAIBLE: 2, // alerte si moins de N toges disponibles pour un type

  getTypesToges() { return this.data.typesToges.slice(); },
  addTypeToge(nom) {
    if (!nom || this.data.typesToges.indexOf(nom) !== -1) return;
    this.data.typesToges.push(nom);
    this.save();
    this.logAction('Ajout', 'Discipline', `Nouveau type de toge — ${nom}`);
  },

  getToges(filter) {
    let list = this.data.toges.slice();
    if (filter) {
      if (filter.type) list = list.filter(t => t.type === filter.type);
      if (filter.etat) list = list.filter(t => t.etat === filter.etat);
      if (filter.attribuee === true) list = list.filter(t => !!t.attribueA);
      if (filter.attribuee === false) list = list.filter(t => !t.attribueA);
    }
    return list.sort((a,b) => (a.code||'').localeCompare(b.code||''));
  },
  getToge(id) { return this.data.toges.find(t => t.id === id); },

  addToge(toge) {
    if (!toge.historique) toge.historique = [{ date: Utils.todayISO(), action: 'Ajout au stock', par: Permissions.role, details: toge.etat }];
    this.data.toges.push(toge);
    this.save();
    this.logAction('Ajout', 'Discipline', `Toge ajoutée — ${toge.type} ${toge.code}`);
  },

  updateToge(id, patch) {
    const t = this.getToge(id);
    if (t) Object.assign(t, patch);
    this.save();
  },

  deleteToge(id) { this.data.toges = this.data.toges.filter(t => t.id !== id); this.save(); },

  // Change l'état d'une toge et conserve l'historique (3, 5).
  changerEtatToge(id, nouvelEtat) {
    const t = this.getToge(id);
    if (!t) return null;
    if (!t.historique) t.historique = [];
    const ancien = t.etat;
    t.etat = nouvelEtat;
    t.historique.push({ date: Utils.todayISO(), action: `Changement d'état : ${ancien} → ${nouvelEtat}`, par: Permissions.role });
    this.save();
    this.logAction('Modification', 'Discipline', `Toge ${t.code} — état : ${nouvelEtat}`);
    return t;
  },

  // Attribution à un choriste (2, 5).
  attribuerToge(togeId, membreId, observations) {
    const t = this.getToge(togeId);
    const m = this.getMembre(membreId);
    if (!t || !m) return null;
    if (!t.historique) t.historique = [];
    t.attribueA = membreId;
    t.dateAttribution = Utils.todayISO();
    t.observations = observations || '';
    t.etat = 'Utilisée';
    t.historique.push({ date: Utils.todayISO(), action: `Attribuée à ${m.nom}`, par: Permissions.role });
    this.save();
    this.logAction('Attribution', 'Discipline', `Toge ${t.code} attribuée à ${m.nom}`);

  },

  // Restitution / réattribution (5).
  restituerToge(togeId) {
    const t = this.getToge(togeId);
    if (!t) return null;
    if (!t.historique) t.historique = [];
    const ancien = t.attribueA ? (this.getMembre(t.attribueA)||{}).nom : null;
    t.historique.push({ date: Utils.todayISO(), action: `Restituée${ancien?(' par '+ancien):''}`, par: Permissions.role });
    t.attribueA = null;
    t.dateAttribution = null;
    t.etat = 'Disponible';
    this.save();
    this.logAction('Restitution', 'Discipline', `Toge ${t.code} restituée`);
    return t;
  },

  getTogesStats() {
    const all = this.data.toges;
    const parType = {};
    this.data.typesToges.forEach(type => {
      const sub = all.filter(t => t.type === type);
      parType[type] = {
        total: sub.length,
        bonEtat: sub.filter(t => t.etat==='Disponible'||t.etat==='Utilisée').length,
        usees: sub.filter(t => t.etat==='Usée').length,
        dechirees: sub.filter(t => t.etat==='Déchirée').length,
        reparation: sub.filter(t => t.etat==='En réparation').length,
        disponibles: sub.filter(t => t.etat==='Disponible').length,
        attribuees: sub.filter(t => !!t.attribueA).length,
      };
    });
    const choristesEligibles = this.data.membres.filter(m => m.statut==='Choriste' || m.statut==='Intégrant');
    const avecToge = choristesEligibles.filter(m => all.some(t => t.attribueA === m.id));
    const sansToge = choristesEligibles.filter(m => !all.some(t => t.attribueA === m.id));
    return {
      total: all.length,
      disponibles: all.filter(t=>t.etat==='Disponible').length,
      attribuees: all.filter(t=>!!t.attribueA).length,
      mauvaisEtat: all.filter(t=>t.etat==='Usée'||t.etat==='Déchirée'||t.etat==='Hors service').length,
      reparation: all.filter(t=>t.etat==='En réparation').length,
      parType,
      avecToge, sansToge,
    };
  },

  getTogesAlertes() {
    const stats = this.getTogesStats();
    const alertes = [];
    Object.keys(stats.parType).forEach(type => {
      if (stats.parType[type].disponibles < this.TOGE_SEUIL_STOCK_FAIBLE) {
        alertes.push({ type: 'stock', message: `Stock faible — ${type} (${stats.parType[type].disponibles} disponible(s))` });
      }
    });
    this.data.toges.filter(t=>t.etat==='Déchirée').forEach(t => alertes.push({ type: 'dechiree', message: `Toge déchirée — ${t.type} ${t.code}` }));
    this.data.toges.filter(t=>t.etat==='Hors service').forEach(t => alertes.push({ type: 'hs', message: `Toge hors service — ${t.type} ${t.code}` }));
    if (stats.sansToge.length) alertes.push({ type: 'sans-toge', message: `${stats.sansToge.length} choriste(s)/intégrant(s) sans toge` });
    return alertes;
  },

  // ── DEMANDES DE MODIFICATION (7.6) ──
  // Champs de la fiche membre qu'un choriste est autorisé à proposer de modifier.
  DEMANDE_CHAMPS_AUTORISES: ['dateNaissance', 'telephone', 'adresse', 'email', 'observations', 'jouesInstrument', 'instruments'],
  getDemandesModification(filter) {
    let list = this.data.demandesModification.slice().sort((a,b)=>b.dateDemande.localeCompare(a.dateDemande));
    if (filter && filter.membreId) list = list.filter(d => d.membreId === filter.membreId);
    if (filter && filter.statut) list = list.filter(d => d.statut === filter.statut);

  },
  addDemandeModification(d) {
    d.statut = 'En attente';
    d.dateDemande = Utils.todayISO();
    this.data.demandesModification.push(d);
    this.save();
    this.logAction('Ajout', 'Membres', `Demande de modification soumise par ${d.membreId}`);
  },
  // Applique la demande à la fiche membre UNIQUEMENT si validée par l'Admin —
  // aucune écriture directe sur Store.data.membres n'a lieu avant cette étape.
  traiterDemandeModification(id, accepte, motifRefus) {
    const d = this.data.demandesModification.find(x => x.id === id);
    if (!d) return null;
    if (accepte) {
      const m = this.getMembre(d.membreId);

  // ── INSTRUMENTISTES (sous-module Musique) ──
  getInstrumentistes() { return this.data.instrumentistes.slice().sort((a,b)=>a.nom.localeCompare(b.nom)); },
  getInstrumentiste(id) { return this.data.instrumentistes.find(i=>i.id===id); },
  upsertInstrumentiste(fiche) {

    this.save();
    this.logAction(idx>=0?'Modification':'Ajout', 'Musique', `Fiche instrumentiste — ${fiche.nom}`);
  },
  deleteInstrumentiste(id) { this.data.instrumentistes = this.data.instrumentistes.filter(i=>i.id!==id); this.save(); },

  getRepetitionsInstrumentales() { return this.data.repetitionsInstrumentales.slice().sort((a,b)=>b.date.localeCompare(a.date)); },
  addRepetitionInstrumentale(r) {
    this.data.repetitionsInstrumentales.push(r);
    this.save();
    this.logAction('Ajout', 'Musique', `Répétition instrumentale — ${r.date}`);
  },
  updateRepetitionInstrumentale(id, patch) {
    const r = this.data.repetitionsInstrumentales.find(x=>x.id===id);
    if (r) Object.assign(r, patch);
    this.save();
  },
  deleteRepetitionInstrumentale(id) { this.data.repetitionsInstrumentales = this.data.repetitionsInstrumentales.filter(r=>r.id!==id); this.save(); },

  // ── ARCHIVES DES ANCIENS CHORISTES (Admin uniquement) ──
  // Transfère un membre vers les archives et le retire des membres actifs —
  // il disparaît donc automatiquement des cotisations, présences et listes
  // de membres actifs, sans qu'aucune autre logique n'ait besoin d'être
  // modifiée (elles lisent toutes Store.data.membres).
  archiverMembre(membreId, { dateDepart, motifDepart }) {
    const m = this.getMembre(membreId);
    if (!m) return null;
    const anneesService = (() => {
      if (!m.dateEntree) return null;
      const d1 = new Date(m.dateEntree), d2 = new Date(dateDepart || Utils.todayISO());
      return Math.max(0, Math.round((d2-d1)/(365.25*24*3600*1000)*10)/10);
    })();
    const archive = {
      id: Utils.genId('arc'),
      nom: m.nom, prenom: m.prenom || '', sexe: m.sexe, voix: m.pupitre || '',
      photo: m.photo || '', dateEntree: m.dateEntree || '',
      dateDepart: dateDepart || Utils.todayISO(),
      motifDepart: motifDepart || 'Autre',
      services: [m.statut].filter(Boolean),
      fonctions: [m.fonction].filter(Boolean),
      anneesService,
      temoignage: '',
      galerie: [],
    };
    this.data.archives.push(archive);
    this.deleteMembre(membreId);
    this.save();
    this.logAction('Archivage', 'Membres', `${m.nom} archivé(e) — motif : ${archive.motifDepart}`);
    return archive;
  },
  getArchives() { return this.data.archives.slice().sort((a,b)=>(b.dateDepart||'').localeCompare(a.dateDepart||'')); },
  getArchive(id) { return this.data.archives.find(a=>a.id===id); },
  updateArchive(id, patch) {
    const a = this.data.archives.find(x=>x.id===id);
    if (a) Object.assign(a, patch);
    this.save();
  },
  deleteArchive(id) { this.data.archives = this.data.archives.filter(a=>a.id!==id); this.save(); },
  getArchivesStats() {
    const all = this.data.archives;
    const parMotif = {};
    const parPromotion = {};
    all.forEach(a => {
      parMotif[a.motifDepart] = (parMotif[a.motifDepart]||0) + 1;
      const promo = a.dateEntree ? a.dateEntree.slice(0,4) : 'Inconnue';
      parPromotion[promo] = (parPromotion[promo]||0) + 1;
    });
    return { total: all.length, parMotif, parPromotion };
  },


  upsertMembre(membre) {
    const idx = this.data.membres.findIndex(m => m.id === membre.id);
    if (idx >= 0) this.data.membres[idx] = membre;
    else this.data.membres.push(membre);
    this.save();
  },

  deleteMembre(id) {
    this.data.membres = this.data.membres.filter(m => m.id !== id);
    this.save();
  },

  nextMemberId(statut) {
    const prefix = statut === 'Bureau' ? 'B' : statut === 'Intégrant' ? 'I' : 'C';
    const existing = this.data.membres
      .filter(m => m.id.startsWith(prefix))
      .map(m => parseInt(m.id.slice(1), 10))
      .filter(n => !isNaN(n));
    const max = existing.length ? Math.max(...existing) : 0;
    return prefix + String(max + 1).padStart(3, '0');
  },

  // ── SÉANCES (présences) ──
  getSeances(type) {
    let list = this.data.seances;
    if (type) list = list.filter(s => s.type === type);
    return list.sort((a,b) => b.date.localeCompare(a.date));
  },

  getSeance(id) {
    return this.data.seances.find(s => s.id === id);
  },

  upsertSeance(seance) {
    const idx = this.data.seances.findIndex(s => s.id === seance.id);
    if (idx >= 0) this.data.seances[idx] = seance;
    else this.data.seances.push(seance);
    this.save();
  },

  deleteSeance(id) {
    this.data.seances = this.data.seances.filter(s => s.id !== id);
    this.save();
  },

  // Compute consecutive-absence alert per member (samedi only)
  // Rule: 2+ consecutive 'Absence justifiée' or 'Absence non justifiée' on samedi sessions
  // Statistiques de présence aux répétitions par pupitre (additif —
  // alimente Discipline / Statistiques sans modifier le calcul existant
  // basé sur les séances samedi/dimanche).
  getRepetitionPresenceStats(membreId) {
    const reps = this.data.repetitions.filter(r => r.presences && r.presences[membreId]);
    let present = 0, absentJustifie = 0, absentNonJustifie = 0;
    reps.forEach(r => {
      const v = r.presences[membreId];
      if (v === 'Présent') present++;
      else if (v === 'Absent justifié') absentJustifie++;
      else if (v === 'Absent non justifié') absentNonJustifie++;
    });
    const total = present + absentJustifie + absentNonJustifie;
    return { total, present, absentJustifie, absentNonJustifie, tx: total > 0 ? present / total : null };
  },

  getDisciplineStats(membreId) {
    const samedis = this.getSeances('samedi').sort((a,b) => a.date.localeCompare(b.date));
    const dimanches = this.getSeances('dimanche');

    let counts = { present:0, retardJ:0, retardNJ:0, absJ:0, absNJ:0, voyage:0, total:0 };
    let consecutive = 0, maxConsecutive = 0;

    samedis.forEach(s => {
      const st = s.presences[membreId];
      if (!st || st === '—') return;
      counts.total++;
      switch(st) {
        case 'Présent': counts.present++; consecutive = 0; break;
        case 'Retard justifié': counts.retardJ++; consecutive = 0; break;
        case 'Retard non justifié': counts.retardNJ++; consecutive = 0; break;
        case 'Absence justifiée': counts.absJ++; consecutive++; break;
        case 'Absence non justifiée': counts.absNJ++; consecutive++; break;
        case 'Voyage': counts.voyage++; consecutive = 0; break;
      }
      if (consecutive > maxConsecutive) maxConsecutive = consecutive;
    });

    const txSamedi = counts.total > 0 ? counts.present / counts.total : 0;

    let dimCounts = { present:0, total:0 };
    dimanches.forEach(s => {
      const st = s.presences[membreId];
      if (!st || st === '—') return;
      dimCounts.total++;
      if (st === 'Présent') dimCounts.present++;
    });
    const txDimanche = dimCounts.total > 0 ? dimCounts.present / dimCounts.total : 0;

    let currentStreak = 0;
    for (let i = samedis.length - 1; i >= 0; i--) {
      const st = samedis[i].presences[membreId];
      if (!st || st === '—') continue;
      if (st === 'Absence justifiée' || st === 'Absence non justifiée') currentStreak++;
      else break;
    }

    return {
      ...counts,
      txSamedi, txDimanche,
      maxConsecutive,
      currentStreak,
      interdit: currentStreak >= 2,
    };
  },

  // ── ÉVALUATIONS ──
  getEvaluation(membreId) {
    return this.data.evaluations[membreId] || null;
  },
  setEvaluation(membreId, evalData) {
    // Conserve un historique horodaté (notes + niveau de maîtrise musicale
    // pour les instrumentistes) sans changer la structure lue ailleurs
    // (ev.notes reste accessible exactement comme avant).
    const existing = this.data.evaluations[membreId];
    const historique = (existing && existing.historique) ? existing.historique.slice() : [];
    historique.push({ date: evalData.date || Utils.todayISO(), notes: evalData.notes, niveauMaitrise: evalData.niveauMaitrise || null });
    evalData.historique = historique;
    this.data.evaluations[membreId] = evalData;
    this.save();
  },

  // ── COTISATIONS ──
  getCotisation(membreId, monthKey) {
    return (this.data.cotisations[membreId] || {})[monthKey] || 0;
  },
  setCotisation(membreId, monthKey, montant) {
    if (!this.data.cotisations[membreId]) this.data.cotisations[membreId] = {};
    this.data.cotisations[membreId][monthKey] = montant;
    this.save();
  },
  // Cotisation due pour un mois donné (ou le mois courant si non précisé).
  // Règles (juin 2026) :
  //  - Intégrant : 0 FCFA, toujours.
  //  - Choriste : 250 FCFA/mois, sauf avant sa date d'intégration officielle
  //    (dateIntegration) s'il a été Intégrant — aucune dette rétroactive.
  //  - Bureau : 250 FCFA/mois avant sa date de prise de fonction
  //    (datePriseFonction), 500 FCFA/mois à partir de ce mois-ci. Si la date
  //    n'est pas renseignée (anciennes fiches), on garde l'ancien
  //    comportement (500 FCFA) pour ne rien casser.
  getCotisationDue(membre, monthKey) {
    if (!membre) return 0;
    if (membre.statut === 'Intégrant') return 0;

    const refMonth = monthKey || Utils.monthKey();

    if (membre.dateIntegration && refMonth < membre.dateIntegration.slice(0,7)) return 0;

    if (membre.statut === 'Bureau') {
      if (membre.datePriseFonction) {
        const priseMonth = membre.datePriseFonction.slice(0,7);
        return refMonth >= priseMonth ? 500 : 250;
      }
      return 500;
    }
    return 250;
  },

  // Total dû sur une année civile, en respectant les règles ci-dessus
  // mois par mois (remplace l'ancien calcul plat "getCotisationDue() * 12").
  getCotisationDueAnnuel(membre, year) {
    let total = 0;
    for (let mo = 1; mo <= 12; mo++) {
      total += this.getCotisationDue(membre, `${year}-${String(mo).padStart(2,'0')}`);
    }
    return total;
  },

  // ── FINANCE — PAIEMENTS (historique, statuts, validation) ────────────
  //
  // data.paiements[] est la source de vérité détaillée (qui a payé quoi,
  // quand, par quel mode, statut, qui a validé...). Chaque paiement
  // "Validé" est automatiquement répercuté dans data.cotisations[][..]
  // (montant agrégé par mois) afin que tout le code existant (IGI,
  // tableau de bord, rapports, module Trésorerie) continue de fonctionner
  // sans aucune modification.

  getPaiements(filter) {
    let list = (this.data.paiements || []).slice().sort((a,b)=> (b.datePaiement||'').localeCompare(a.datePaiement||''));
    if (filter) {
      if (filter.membreId) list = list.filter(p => p.membreId === filter.membreId);
      if (filter.statut) list = list.filter(p => p.statut === filter.statut);
      if (filter.monthKey) list = list.filter(p => p.monthKey === filter.monthKey);
    }
    return list;
  },

  getPaiement(id) {
    return (this.data.paiements || []).find(p => p.id === id);
  },

  // Déclare un paiement (par un choriste pour lui-même, ou par le bureau pour qqun)
  // Statut initial : 'En attente' sauf si déclaré directement par bureau/admin -> 'Validé'
  declarePaiement({ membreId, monthKey, montant, mode, commentaire, declarePar, autoValide }) {
    const p = {
      id: Utils.genId('pai'),
      membreId,
      monthKey,
      montant: Number(montant) || 0,
      mode: mode || 'Espèces',
      commentaire: commentaire || '',
      statut: autoValide ? 'Validé' : 'En attente',
      declarePar: declarePar || null,
      datePaiement: Utils.todayISO(),
      validePar: autoValide ? declarePar : null,
      dateValidation: autoValide ? Utils.todayISO() : null,
    };
    if (!this.data.paiements) this.data.paiements = [];
    this.data.paiements.push(p);
    if (autoValide) this._recomputeCotisations(membreId, monthKey);
    this.save();
    const m = this.getMembre(membreId);
    this.logAction('Paiement', 'Trésorerie', `${autoValide?'Validé':'En attente'} — ${m?m.nom:membreId} ${monthKey} ${Utils.fmtFCFA(Number(montant))}`);
    return p;
  },

  // Validation par bureau/admin
  validerPaiement(id, validateur) {
    const p = this.getPaiement(id);
    if (!p) return;
    Object.assign(p, { statut: 'Validé', validePar: validateur || null, dateValidation: Utils.todayISO() });
    this._recomputeCotisations(p.membreId, p.monthKey);
    this.save();
    const m = this.getMembre(p.membreId);
    this.logAction('Validation', 'Trésorerie', `Paiement validé — ${m?m.nom:p.membreId} ${p.monthKey} ${Utils.fmtFCFA(p.montant)}`);
  },

  refuserPaiement(id, validateur, motif) {
    const p = this.getPaiement(id);
    if (!p) return;
    Object.assign(p, { statut: 'Refusé', validePar: validateur || null, dateValidation: Utils.todayISO(), motifRefus: motif || '' });
    this._recomputeCotisations(p.membreId, p.monthKey);
    this.save();
    const m = this.getMembre(p.membreId);
    this.logAction('Refus', 'Trésorerie', `Paiement refusé — ${m?m.nom:p.membreId} ${p.monthKey}: ${motif||''}`);
  },

  deletePaiement(id) {
    const p = this.getPaiement(id);
    if (!p) return;
    this.data.paiements = this.data.paiements.filter(x => x.id !== id);
    this._recomputeCotisations(p.membreId, p.monthKey);
    this.save();
  },

  // Recalcule data.cotisations[membreId][monthKey] = somme des paiements VALIDÉS
  // pour ce membre/mois. Garde la compatibilité avec le code existant qui lit
  // un simple nombre.
  _recomputeCotisations(membreId, monthKey) {
    const validated = this.data.paiements
      .filter(p => p.membreId === membreId && p.monthKey === monthKey && p.statut === 'Validé')
      .reduce((sum, p) => sum + Number(p.montant || 0), 0);
    if (!this.data.cotisations[membreId]) this.data.cotisations[membreId] = {};
    this.data.cotisations[membreId][monthKey] = validated;
  },

  // Recalcule tout (utile après import de données)
  recomputeAllCotisations() {
    const keys = new Set();
    this.data.paiements.forEach(p => keys.add(p.membreId + '|' + p.monthKey));
    keys.forEach(k => {
      const [membreId, monthKey] = k.split('|');
      this._recomputeCotisations(membreId, monthKey);
    });
    this.save();
  },

  // Statut de paiement d'un membre pour un mois donné :
  // 'Payé' (>= dû), 'Partiel' (>0 et < dû), 'Impayé' (0), plus le détail
  // des paiements en attente éventuels.
  getStatutPaiement(membreId, monthKey) {
    const membre = this.getMembre(membreId);
    const due = membre ? this.getCotisationDue(membre, monthKey) : 0;
    const valide = this.getCotisation(membreId, monthKey);
    const enAttente = this.data.paiements
      .filter(p => p.membreId === membreId && p.monthKey === monthKey && p.statut === 'En attente')
      .reduce((s,p)=>s+Number(p.montant||0),0);

    let statut;
    if (valide >= due && due > 0) statut = 'Payé';
    else if (valide > 0) statut = 'Partiel';
    else statut = 'Impayé';

    return { due, valide, enAttente, statut, solde: Math.max(0, due - valide) };
  },

  // ── SUGGESTIONS ── ────────────────────────────────────────────────
  getSuggestions(filter) {

  // ── SANCTIONS ──
  getSanctions() { return this.data.sanctions.slice().sort((a,b)=>b.date.localeCompare(a.date)); },
  addSanction(s) {
    if (!s.montantPaye) s.montantPaye = 0;
    if (!s.historique) {
      s.historique = [{ date: Utils.todayISO(), action: 'Création de la sanction', par: Permissions.role }];
    }
    this.data.sanctions.push(s);
    this.save();
    this.logAction('Ajout', 'Discipline', `Sanction pour ${s.membre||'?'} — ${s.motif||''} (${Utils.fmtFCFA(s.montant)})`);
  },
  updateSanction(id, patch) {
    const s = this.data.sanctions.find(x=>x.id===id);
    if (s) Object.assign(s, patch);
    this.save();
  },
  // Enregistre un paiement de sanction (utilisé par la Trésorerie). Synchronise
  // automatiquement le statut et conserve un historique horodaté — alimente à
  // la fois Discipline et Trésorerie sans double saisie.
  paySanction(id, montantVerse, mode) {
    const s = this.data.sanctions.find(x=>x.id===id);
    if (!s) return null;
    if (!s.historique) s.historique = [];
    const total = Number(s.montant || 0);
    const dejaVerse = Number(s.montantPaye || 0);
    const nouveauVerse = Math.min(total, dejaVerse + Number(montantVerse || 0));
    s.montantPaye = nouveauVerse;
    s.modePaiement = mode || s.modePaiement || null;
    s.datePaiement = Utils.todayISO();
    s.statut = nouveauVerse >= total ? 'Payé' : (nouveauVerse > 0 ? 'Partielle' : 'En attente');
    s.historique.push({
      date: Utils.todayISO(),
      action: s.statut === 'Payé' ? `Paiement intégral enregistré (${Utils.fmtFCFA(montantVerse)})` : `Paiement partiel enregistré (${Utils.fmtFCFA(montantVerse)})`,
      par: Permissions.role,
    });
    this.save();
    this.logAction('Paiement', 'Trésorerie', `Sanction ${s.membre} — ${Utils.fmtFCFA(montantVerse)} (${s.statut})`);
    return s;
  },
  // Indicateurs partagés Discipline / Trésorerie pour les sanctions financières.
  getSanctionsStats() {
    const all = this.data.sanctions;
    const enAttente = all.filter(s => s.statut === 'En attente' || s.statut === 'Partielle');
    const montantImpaye = enAttente.reduce((sum,s) => sum + (Number(s.montant||0) - Number(s.montantPaye||0)), 0);
    const montantEncaisse = all.reduce((sum,s) => sum + Number(s.montantPaye||0), 0);
    return { nbEnAttente: enAttente.length, montantImpaye, montantEncaisse };
  },

  migrateTestIntegration(oldId, newId) {
