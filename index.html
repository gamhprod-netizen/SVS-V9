// ===== MODULE: SUGGESTIONS =====
// ════════════════════════════════════════════════════════════════
// SUGGESTIONS — Boîte à idées / remarques des choristes
// ════════════════════════════════════════════════════════════════
// Tout utilisateur connecté peut envoyer une suggestion à un
// département donné. Le bureau/admin peut lire, répondre, classer
// (changer le statut) et archiver. Un choriste ne voit que ses
// propres suggestions et les réponses reçues.

const SuggestionsModule = {
  tab: 'nouvelles', // nouvelles | repondues | archivees | toutes (bureau) — mes (choriste)
  filterDept: '',

  DEPARTEMENTS: ['Musical', 'Discipline', 'Trésorerie', 'Administration'],

  render(main) {
    const isManager = Permissions.canManageSuggestions();

    if (!isManager) {
      // Comptes partagés par rôle : il n'y a plus d'identité individuelle
      // permettant de retrouver "mes" suggestions passées. On propose
      // simplement l'envoi d'une nouvelle suggestion.
      main.innerHTML = `
        <div class="card center">
          <div style="font-size:2rem;">💡</div>
          <div class="font-display mt-8" style="font-weight:700;">Boîte à suggestions</div>
          <div class="text-sm text-muted mt-8">Partagez vos idées, remarques ou observations avec le bureau. Indiquez votre nom dans le formulaire si vous souhaitez une réponse personnalisée.</div>
        </div>
        <button class="btn primary block mt-16" id="new-sugg-btn">➕ Envoyer une suggestion</button>
      `;
      main.querySelector('#new-sugg-btn').addEventListener('click', () => this.openSuggestionForm());
      return;
    }

    const tabs = [
      { key: 'nouvelles', label: '🆕 Nouvelles' },
      { key: 'repondues', label: '✅ Répondues' },
      { key: 'archivees', label: '🗄️ Archivées' },
      { key: 'toutes', label: '📋 Toutes' },
    ];

    if (!tabs.some(t => t.key === this.tab)) this.tab = 'nouvelles';

    main.innerHTML = `
      <div class="tabbar">
        ${tabs.map(t => `<button class="tab-btn ${this.tab===t.key?'active':''}" data-tab="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div class="field" style="margin-bottom:12px;">
        <select id="dept-filter">
          <option value="">Tous les départements</option>
          ${this.DEPARTEMENTS.map(d => `<option value="${d}" ${this.filterDept===d?'selected':''}>${d}</option>`).join('')}
        </select>
      </div>
      <div id="sugg-list"></div>
    `;

    main.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => { this.tab = btn.dataset.tab; this.render(main); });
    });

    main.querySelector('#dept-filter').addEventListener('change', (e) => {
      this.filterDept = e.target.value;
      this.renderList(main.querySelector('#sugg-list'), isManager);
    });

    this.renderList(main.querySelector('#sugg-list'), isManager);

    // FAB — nouvelle suggestion (tout le monde, y compris le bureau)
    const fab = document.createElement('button');
    fab.className = 'fab';
    fab.innerHTML = '+';
    fab.title = 'Nouvelle suggestion';
    main.appendChild(fab);
    fab.addEventListener('click', () => this.openSuggestionForm());
  },

  renderList(container, isManager) {
    const filter = {};
    if (this.filterDept) filter.departement = this.filterDept;
    if (this.tab === 'repondues') filter.statut = 'Répondu';
    else if (this.tab === 'archivees') filter.statut = 'Archivé';

    let list;
    if (this.tab === 'nouvelles') {
      // inclut "Lu" dans le panier "nouvelles" (pas encore répondu/archivé)
      list = Store.getSuggestions(this.filterDept ? { departement: this.filterDept } : null)
        .filter(s => s.statut === 'Nouveau' || s.statut === 'Lu');
    } else {
      list = Store.getSuggestions(filter);
    }

    if (!list.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">💡</div><div class="empty-state__text">Aucune suggestion dans cette catégorie</div></div>`;
      return;
    }

    const deptIcons = { Musical: '🎼', Discipline: '⚖️', Trésorerie: '💰', Administration: '📋' };

    container.innerHTML = `<div class="list">${list.map(s => {
      const statusClass = s.statut === 'Nouveau' ? 'bureau' : s.statut === 'Lu' ? 'integrant' : s.statut === 'Répondu' ? 'actif' : 'suspendu';
      return `
        <div class="list-row" data-id="${s.id}">
          <div class="list-row__avatar">${deptIcons[s.departement] || '💡'}</div>
          <div class="list-row__body">
            <div class="list-row__title">${Utils.escapeHtml(s.objet || '(Sans objet)')}</div>
            <div class="list-row__subtitle">${isManager ? Utils.escapeHtml(s.auteur)+' · ' : ''}${s.departement} · ${Utils.fmtDate(s.date)}</div>
          </div>
          <span class="pill ${statusClass}">${s.statut}</span>
        </div>
      `;
    }).join('')}</div>`;

    container.querySelectorAll('.list-row').forEach(row => {
      row.addEventListener('click', () => this.openDetail(row.dataset.id, isManager));
    });
  },

  openDetail(id, isManager) {
    const s = Store.getSuggestion(id);
    if (!s) return;

    // Mark as "Lu" when bureau opens a "Nouveau" suggestion
    if (isManager && s.statut === 'Nouveau') {
      Store.setStatutSuggestion(id, 'Lu');
    }

    const deptIcons = { Musical: '🎼', Discipline: '⚖️', Trésorerie: '💰', Administration: '📋' };

    const html = `
      <div class="card">
        <div class="flex-between">
          <span class="pill bureau">${deptIcons[s.departement]||'💡'} ${s.departement}</span>
          <span class="text-sm text-muted">${Utils.fmtDate(s.date)}</span>
        </div>
        <div class="font-display mt-8" style="font-size:1.1rem;font-weight:700;color:var(--maroon);">${Utils.escapeHtml(s.objet || '(Sans objet)')}</div>
        <div class="text-sm text-muted mt-8">De : ${Utils.escapeHtml(s.auteur)}</div>
        <div class="divider"></div>
        <div class="text-sm" style="white-space:pre-wrap;">${Utils.escapeHtml(s.message)}</div>
      </div>

      ${s.reponse ? `
        <div class="section-title"><span class="ornament">💬</span> Réponse du bureau</div>
        <div class="card">
          <div class="text-sm" style="white-space:pre-wrap;">${Utils.escapeHtml(s.reponse)}</div>
          <div class="text-sm text-muted mt-8">Répondu le ${Utils.fmtDate(s.dateReponse)}</div>
        </div>
      ` : ''}

      ${isManager ? `
        <div class="section-title"><span class="ornament">✍️</span> ${s.reponse ? 'Modifier la réponse' : 'Répondre'}</div>
        <div class="field">
          <textarea id="sugg-reponse" rows="3" placeholder="Votre réponse...">${Utils.escapeHtml(s.reponse || '')}</textarea>
        </div>
        <div class="grid-2">
          <button class="btn secondary block" id="sugg-archive">${s.statut==='Archivé' ? '↩️ Désarchiver' : '🗄️ Archiver'}</button>
          <button class="btn primary block" id="sugg-repondre">💾 Enregistrer réponse</button>
        </div>
        <button class="btn danger block mt-8" id="sugg-delete">🗑️ Supprimer</button>
      ` : ''}
    `;

    const sheet = Utils.openSheet('💡 Suggestion', html);

    if (isManager) {
      sheet.querySelector('#sugg-repondre').addEventListener('click', () => {
        const reponse = sheet.querySelector('#sugg-reponse').value.trim();
        if (!reponse) { Utils.toast('Écrivez une réponse avant d\'enregistrer'); return; }
        Store.repondreSuggestion(id, reponse, Permissions.displayName());
        Utils.closeSheet();
        Utils.toast('Réponse enregistrée');
        Router.render();
      });
      sheet.querySelector('#sugg-archive').addEventListener('click', () => {
        Store.setStatutSuggestion(id, s.statut === 'Archivé' ? (s.reponse ? 'Répondu' : 'Lu') : 'Archivé');
        Utils.closeSheet();
        Utils.toast(s.statut === 'Archivé' ? 'Suggestion désarchivée' : 'Suggestion archivée');
        Router.render();
      });
      sheet.querySelector('#sugg-delete').addEventListener('click', () => {
        Utils.confirmAction('Supprimer définitivement cette suggestion ?', () => {
          Store.deleteSuggestion(id);
          Utils.closeSheet();
          Utils.toast('Suggestion supprimée');
          Router.render();
        });
      });
    } else {
      Router.render(); // refresh badge counts etc. (read-only view, no destructive action)
    }
  },

  openSuggestionForm() {
    const html = `
      <div class="field">
        <label>Votre nom</label>
        <input type="text" id="sf-auteur" placeholder="Votre nom (optionnel)">
      </div>
      <div class="field">
        <label>Département concerné</label>
        <select id="sf-dept">
          ${this.DEPARTEMENTS.map(d => `<option>${d}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Objet</label>
        <input type="text" id="sf-objet" placeholder="Résumé en quelques mots">
      </div>
      <div class="field">
        <label>Message</label>
        <textarea id="sf-message" rows="4" placeholder="Détaillez votre suggestion ou remarque..."></textarea>
      </div>
      <button class="btn primary block" id="save-sugg">📨 Envoyer au bureau</button>
    `;
    const sheet = Utils.openSheet('💡 Nouvelle suggestion', html);
    sheet.querySelector('#save-sugg').addEventListener('click', () => {
      const auteur = sheet.querySelector('#sf-auteur').value.trim();
      const objet = sheet.querySelector('#sf-objet').value.trim();
      const message = sheet.querySelector('#sf-message').value.trim();
      if (!message) { Utils.toast('Le message ne peut pas être vide'); return; }

      Store.addSuggestion({
        auteur: auteur || 'Anonyme',
        departement: sheet.querySelector('#sf-dept').value,
        objet,
        message,
      });
      Utils.closeSheet();
      Utils.toast('💡 Suggestion envoyée au bureau');
      Router.render();
    });
  },
};

// ===== MODULE: RAPPORTS =====
// ════════════════════════════════════════════════════════════════
// RAPPORTS — Génération automatique
// ════════════════════════════════════════════════════════════════

const RapportsModule = {
  render(main) {
    const d = Store.data;
    const membres = d.membres;
    const choristes = membres.filter(m=>m.statut==='Choriste');
    const integrants = membres.filter(m=>m.statut==='Intégrant');
    const year = d.meta.annee;

    // R1 — Synthèse générale
    const effectifTotal = membres.length;
    const effectifActif = membres.filter(m=>m.situation==='Actif').length;
    const activitesRealisees = d.activites.filter(a=>a.statut==='Réalisée').length;
    const repetitionsTenues = d.repetitions.filter(r=>r.statut==='Tenue').length;
    const chantsMaitrises = d.repertoire.filter(c=>c.statut==='Maîtrisé').length;

    // R2 — Discipline
    let sumTxSam=0, sumTxDim=0, interdits=0, n=0;
    let interditsNames = [];
    membres.forEach(m => {
      const dis = Store.getDisciplineStats(m.id);
      sumTxSam += dis.txSamedi; sumTxDim += dis.txDimanche; n++;
      if (dis.interdit) { interdits++; interditsNames.push(m.nom); }
    });
    const txSamMoy = n?sumTxSam/n:0, txDimMoy = n?sumTxDim/n:0;
    const sanctionsCount = d.sanctions.length;

    // R3 — Financier
    let totalDue=0, totalPaid=0, membresAJour=0, membresRetard=0;
    membres.forEach(m => {
      const due = Store.getCotisationDueAnnuel(m, year);
      let paid = 0;
      for(let mo=1;mo<=12;mo++) paid += Store.getCotisation(m.id, `${year}-${String(mo).padStart(2,'0')}`);
      totalDue += due; totalPaid += paid;
      if (paid >= due) membresAJour++; else membresRetard++;
    });
    const arrears = totalDue - totalPaid;
    const txRecouvrement = totalDue?totalPaid/totalDue:0;
    const offrandes = d.offrandes.reduce((s,o)=>s+Number(o.hommes||0)+Number(o.femmes||0),0);
    const mvts = d.mouvements;
    const entrees = mvts.filter(m=>m.type==='Entrée').reduce((s,m)=>s+Number(m.montant||0),0);
    const sorties = mvts.filter(m=>m.type==='Sortie').reduce((s,m)=>s+Number(m.montant||0),0);

    // R4 — Technique
    let sumMoyMusicale=0, nMus=0;
    let nivCounts = { excellent:0, tresbon:0, bon:0, ameliorer:0 };
    choristes.forEach(m => {
      const ev = Store.getEvaluation(m.id);
      let moy = 0;
      if (ev && ev.notes) {
        const vals = Object.values(ev.notes);
        moy = vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
      }
      sumMoyMusicale += moy; nMus++;
      if (moy>=18) nivCounts.excellent++;
      else if (moy>=15) nivCounts.tresbon++;
      else if (moy>=12) nivCounts.bon++;
      else if (moy<10) nivCounts.ameliorer++;
    });
    const moyMusicaleChorale = nMus?sumMoyMusicale/nMus:0;
    const chantsEnCours = d.repertoire.filter(c=>c.statut==='En cours').length;

    // R5 — Intégrants
    let eligibles=0, admis=0, refuses=0;
    integrants.forEach(m => {
      const dis = Store.getDisciplineStats(m.id);
      const test = Store.getTestIntegration(m.id);
      if (test && test.moyenne!=null) {
        if (test.decision === 'Non admis') refuses++; else admis++;
      } else if (dis.total>=2 && dis.txSamedi>=0.7) eligibles++;
    });

    // R6 — Anniversaires
    let annivToday=[], annivWeek=0, annivMonth=[];
    membres.forEach(m => {
      const info = Store.getAnniversaireInfo(m);
      if (!info) return;
      if (info.isToday) annivToday.push(m.nom);
      if (info.isThisWeek && !info.isToday) annivWeek++;
      if (info.isThisMonth) annivMonth.push(m.nom);
    });

    // R7 — IGI
    let igiSum=0, igiN=0, exemplaires=0, tresImpliques=0, accompagner=0;
    choristes.forEach(m => {
      const igi = Store.calcIGI(m.id);
      if (igi) {
        igiSum += igi.igi; igiN++;
        if (igi.categorie.includes('Exemplaire')) exemplaires++;
        if (igi.categorie.includes('Très impliqué')) tresImpliques++;
        if (igi.categorie.includes('accompagner')) accompagner++;
      }
    });
    const igiMoyen = igiN?igiSum/igiN:0;

    // R8 — Finance (paiements)
    const tousPaiements = Store.getPaiements();
    const enAttenteCount = tousPaiements.filter(p=>p.statut==='En attente').length;
    const valideCount = tousPaiements.filter(p=>p.statut==='Validé').length;
    const refuseCount = tousPaiements.filter(p=>p.statut==='Refusé').length;
    const montantEnAttente = tousPaiements.filter(p=>p.statut==='En attente').reduce((s,p)=>s+Number(p.montant||0),0);

    // R9 — Suggestions
    const toutesSuggestions = Store.getSuggestions();
    const suggNouvelles = toutesSuggestions.filter(s=>s.statut==='Nouveau'||s.statut==='Lu').length;
    const suggRepondues = toutesSuggestions.filter(s=>s.statut==='Répondu').length;
    const suggArchivees = toutesSuggestions.filter(s=>s.statut==='Archivé').length;
    const suggTotal = toutesSuggestions.length;

    // R10 — Classements & Prestations
    const prestationsRealisees = Store.getPrestations({ statut: 'Réalisée' }).length;
    const prestationsAvenir = Store.getPrestations({ upcoming: true }).length;
    const topGlobalRapport = Store.getClassement('global').slice(0,3);

    main.innerHTML = `
      <div class="card center">
        <div class="font-display" style="font-size:1.1rem;font-weight:700;color:var(--maroon);">📈 Rapport Automatique</div>
        <div class="text-sm text-muted">Année ${year} — Généré le ${Utils.fmtDate(Utils.todayISO())}</div>
      </div>

      <div class="section-title"><span class="ornament">📋</span> 1. Synthèse générale</div>
      <div class="card">
        ${this.row('Effectif total inscrit', effectifTotal)}
        ${this.row('Membres actifs', effectifActif)}
        ${this.row('Choristes', choristes.length)}
        ${this.row('Intégrants en cours', integrants.length)}
        ${this.row('Activités réalisées', activitesRealisees)}
        ${this.row('Répétitions tenues', repetitionsTenues)}
        ${this.row('Chants maîtrisés', chantsMaitrises)}
      </div>

      <div class="section-title"><span class="ornament">⚖️</span> 2. Rapport disciplinaire</div>
      <div class="card">
        ${this.row('Taux présence moyen — Samedis', Utils.pct(txSamMoy))}
        ${this.row('Taux présence moyen — Dimanches', Utils.pct(txDimMoy))}
        ${this.row('Membres interdits de prestation', interdits, interdits>0?'var(--red)':null)}
        ${this.row('Sanctions financières émises', sanctionsCount)}
      </div>
      ${interdits>0 ? `
        <div class="alert-banner danger">
          <div class="alert-banner__icon">⛔</div>
          <div><b>Interdits :</b> ${interditsNames.join(', ')}</div>
        </div>` : ''}

      <div class="section-title"><span class="ornament">💰</span> 3. Rapport financier</div>
      <div class="card">
        ${this.row('Cotisations attendues (annuel)', Utils.fmtFCFA(totalDue))}
        ${this.row('Cotisations encaissées', Utils.fmtFCFA(totalPaid))}
        ${this.row('Arriérés', Utils.fmtFCFA(arrears), arrears>0?'var(--red)':null)}
        ${this.row('Taux de recouvrement', Utils.pct(txRecouvrement))}
        ${this.row('Membres à jour', membresAJour)}
        ${this.row('Membres en retard', membresRetard, membresRetard>0?'var(--red)':null)}
        ${this.row('Total offrandes', Utils.fmtFCFA(offrandes))}
        ${this.row('Solde net (Entrées - Sorties)', Utils.fmtFCFA(entrees-sorties), 'var(--green)')}
      </div>

      <div class="section-title"><span class="ornament">🎼</span> 4. Rapport technique & musical</div>
      <div class="card">
        ${this.row('Moyenne musicale chorale', moyMusicaleChorale.toFixed(1)+'/20')}
        ${this.row('Choristes Excellents (≥18)', nivCounts.excellent)}
        ${this.row('Choristes Très bons (15-17)', nivCounts.tresbon)}
        ${this.row('Choristes Bons (12-14)', nivCounts.bon)}
        ${this.row('Choristes à améliorer (<10)', nivCounts.ameliorer, nivCounts.ameliorer>0?'var(--red)':null)}
        ${this.row('Chants maîtrisés', chantsMaitrises)}
        ${this.row('Chants en cours', chantsEnCours)}
      </div>

      <div class="section-title"><span class="ornament">🔍</span> 5. Rapport des intégrants</div>
      <div class="card">
        ${this.row('Intégrants en observation', integrants.length)}
        ${this.row('Éligibles au test', eligibles)}
        ${this.row('Admis', admis, 'var(--green)')}
        ${this.row('Refusés', refuses, refuses>0?'var(--red)':null)}
      </div>

      <div class="section-title"><span class="ornament">🎂</span> 6. Rapport des anniversaires</div>
      <div class="card">
        ${this.row("Aujourd'hui", annivToday.length, annivToday.length?'var(--gold)':null)}
        ${this.row('Dans les 7 prochains jours', annivWeek)}
        ${this.row('Ce mois', annivMonth.length)}
      </div>
      ${annivMonth.length ? `
        <div class="alert-banner gold">
          <div class="alert-banner__icon">🎂</div>
          <div><b>Ce mois :</b> ${annivMonth.join(', ')}</div>
        </div>` : ''}

      <div class="section-title"><span class="ornament">🏆</span> 7. Synthèse IGI</div>
      <div class="card">
        ${this.row('IGI moyen de la chorale', igiMoyen.toFixed(1)+'/100')}
        ${this.row('Choristes Exemplaires (≥90)', exemplaires, 'var(--green)')}
        ${this.row('Choristes Très impliqués (≥75)', tresImpliques)}
        ${this.row('Choristes À accompagner (<35)', accompagner, accompagner>0?'var(--red)':null)}
      </div>

      <div class="section-title"><span class="ornament">🧾</span> 8. Rapport Finance (paiements)</div>
      <div class="card">
        ${this.row('Paiements en attente de validation', enAttenteCount, enAttenteCount>0?'var(--gold)':null)}
        ${this.row('Paiements validés (total)', valideCount)}
        ${this.row('Paiements refusés', refuseCount, refuseCount>0?'var(--red)':null)}
        ${this.row('Montant en attente', Utils.fmtFCFA(montantEnAttente), montantEnAttente>0?'var(--gold)':null)}
      </div>
      ${enAttenteCount>0 ? `
        <div class="alert-banner gold">
          <div class="alert-banner__icon">⏳</div>
          <div><b>${enAttenteCount}</b> paiement(s) à valider dans Trésorerie → onglet Finance.</div>
        </div>` : ''}

      <div class="section-title"><span class="ornament">💡</span> 9. Boîte à suggestions</div>
      <div class="card">
        ${this.row('Nouvelles suggestions', suggNouvelles, suggNouvelles>0?'var(--gold)':null)}
        ${this.row('Suggestions répondues', suggRepondues)}
        ${this.row('Suggestions archivées', suggArchivees)}
        ${this.row('Total reçu', suggTotal)}
      </div>

      <div class="section-title"><span class="ornament">🏆</span> 10. Classements & Prestations</div>
      <div class="card">
        ${this.row('Prestations réalisées', prestationsRealisees)}
        ${this.row('Prestations à venir', prestationsAvenir)}
        ${this.row('Chants au répertoire', d.repertoire.length)}
        ${topGlobalRapport.length ? this.row('1er au classement global', `🥇 ${topGlobalRapport[0].membre.nom} (${topGlobalRapport[0].score.toFixed(1)}/100)`) : ''}
      </div>
      ${topGlobalRapport.length ? `
        <div class="card">
          <div class="text-sm text-muted" style="margin-bottom:6px;">Top 3 — Classement Global</div>
          ${topGlobalRapport.map(r => `
            <div class="flex-between" style="padding:4px 0;">
              <span class="text-sm" style="font-weight:600;">${ClassementsModule.medal(r.rang)} ${Utils.escapeHtml(r.membre.nom)}</span>
              <span style="font-weight:700;color:var(--maroon);">${r.score.toFixed(1)}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}

      ${Permissions.isAdmin() ? `
        <div class="grid-2 mt-16">
          <button class="btn secondary block" id="export-data">📤 Exporter (JSON)</button>
          <button class="btn ghost block" id="import-data">📥 Importer</button>
        </div>
        <button class="btn danger block mt-8" id="reset-data">🗑️ Réinitialiser les données</button>
        <input type="file" id="import-file" accept=".json" style="display:none;">

        <div class="section-title mt-16"><span class="ornament">📋</span> Journal d'audit</div>
        <div id="audit-log-container"></div>
      ` : `
        <div class="alert-banner info mt-16">
          <div class="alert-banner__icon">ℹ️</div>
          <div>L'export, l'import et la réinitialisation des données sont réservés à l'administrateur (action globale concernant tous les départements).</div>
        </div>
      `}
    `;

    if (Permissions.isAdmin()) {
      main.querySelector('#export-data').addEventListener('click', () => this.exportData());
      main.querySelector('#import-data').addEventListener('click', () => main.querySelector('#import-file').click());
      main.querySelector('#import-file').addEventListener('change', (e) => this.importData(e));
      main.querySelector('#reset-data').addEventListener('click', () => {
        Utils.confirmAction('⚠️ <b>Toutes les données seront effacées</b> et remplacées par les données initiales. Cette action est irréversible. Continuer ?', () => {
          Store.resetAll();
          Utils.toast('Données réinitialisées');
          Router.navigate('dashboard');
        });
      });
      // Render audit log
      const auditContainer = main.querySelector('#audit-log-container');
      if (auditContainer) AuditLogModule.render(auditContainer);
    }
  },

  row(label, value, color) {
    return `<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--line);">
      <span class="text-sm text-muted">${label}</span>
      <span style="font-weight:700;${color?'color:'+color+';':''}">${value}</span>
    </div>`;
  },

  exportData() {
    const json = Store.exportJSON();
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `chorale_export_${Utils.todayISO()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    Utils.toast('Export téléchargé');
  },

  importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      Utils.confirmAction('Importer ce fichier remplacera toutes les données actuelles. Continuer ?', () => {
        const ok = Store.importJSON(evt.target.result);
        if (ok) {
          Utils.toast('Données importées avec succès');
          Router.navigate('dashboard');
        } else {
          Utils.toast('Erreur : fichier invalide');
        }
      });
    };
    reader.readAsText(file);
  },
};

// ===== MODULE: CLASSEMENTS =====
// ════════════════════════════════════════════════════════════════
// CLASSEMENTS AUTOMATIQUES — Musical · Discipline · Trésorerie · Global
// Lecture seule pour tous les rôles (aucune saisie ici) : les scores sont
// calculés à partir des données déjà présentes dans les autres modules.
// ════════════════════════════════════════════════════════════════

const ClassementsModule = {
  tab: 'global',

  LABELS: {
    global:     { titre: '🏆 Classement Global',      desc: 'Combinaison pondérée : 40% Musical · 30% Discipline · 30% Trésorerie' },
    musical:    { titre: '🎵 Classement Musical',      desc: 'Présences, prestations, évaluations et assiduité' },
    discipline: { titre: '⚖️ Classement Discipline',   desc: 'Ponctualité, avertissements et respect des règles' },
    tresorerie: { titre: '💰 Classement Trésorerie',   desc: 'Cotisations, régularité des paiements et retards' },
  },

  render(main) {
    // Instantané mensuel automatique (no-op si déjà fait ce mois, ou si choriste)
    Store.maybeSnapshotClassements();

    const tabs = [
      { key: 'global', label: '🏆 Global' },
      { key: 'musical', label: '🎵 Musical' },
      { key: 'discipline', label: '⚖️ Discipline' },
      { key: 'tresorerie', label: '💰 Trésorerie' },
    ];

    main.innerHTML = `
      <div class="tabbar">
        ${tabs.map(t => `<button class="tab-btn ${this.tab===t.key?'active':''}" data-tab="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div id="class-content"></div>
    `;

    main.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        this.tab = btn.dataset.tab;
        this._shownCount = 10; // reset pagination on tab switch
        this.render(main);
      });
    });

    this.renderCategorie(main.querySelector('#class-content'), this.tab);
  },

  medal(rang) {
    if (rang === 1) return '🥇';
    if (rang === 2) return '🥈';
    if (rang === 3) return '🥉';
    return rang;
  },

  renderCategorie(container, cat) {
    const rows = Store.getClassement(cat);
    const info = this.LABELS[cat];
    const avg = rows.length ? rows.reduce((s,r)=>s+r.score,0)/rows.length : 0;

    // ── Visibilité des classements ──────────────────────────────────
    // L'admin voit toujours tout. Les autres ne voient que si publié.
    if (!Permissions.isAdmin() && !Store.isClassementVisible()) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">🔒</div>
          <div class="empty-state__text">Les classements ne sont pas encore publiés.<br>Revenez plus tard !</div>
        </div>`;
      return;
    }

    if (!rows.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">🏆</div><div class="empty-state__text">Aucun choriste à classer pour le moment</div></div>`;
      return;
    }

    // Nombre de lignes visibles (pagination)
    const PAGE = 10;
    let shown = this._shownCount || PAGE;
    const total = rows.length;
    const visible = rows.slice(0, shown);

    container.innerHTML = `
      <div class="card center">
        <div class="font-display" style="font-size:1.1rem;font-weight:700;color:var(--maroon);">${info.titre}</div>
        <div class="text-sm text-muted mt-8">${info.desc}</div>
        <div class="font-display mt-8" style="font-size:1.8rem;font-weight:700;color:var(--maroon);">${avg.toFixed(1)}<span style="font-size:1rem;color:var(--ink-soft);">/100</span></div>
        <div class="text-sm text-muted">Moyenne de la chorale</div>
      </div>

      <div class="section-title"><span class="ornament">🏅</span> Classement${shown < total ? ` — ${shown} sur ${total}` : ` complet (${total})`}</div>
      <div class="list" id="class-list">
        ${visible.map(r => `
          <div class="list-row" data-id="${r.membre.id}">
            <div class="list-row__avatar" style="${r.rang<=3?'background:var(--gold-soft);color:#8A6D10;font-size:1.1rem;':''}">${this.medal(r.rang)}</div>
            <div class="list-row__body">
              <div class="list-row__title">${Utils.escapeHtml(r.membre.nom)}</div>
              <div class="list-row__subtitle">${r.membre.pupitre || '—'}</div>
            </div>
            <div style="font-weight:700;font-size:1rem;color:var(--maroon);">${r.score.toFixed(1)}</div>
            <span class="list-row__chevron">›</span>
          </div>
        `).join('')}
      </div>

      ${shown < total ? `
        <button class="btn secondary block mt-8" id="class-voir-plus" style="border-radius:var(--radius-m);">
          ⬇️ Voir plus <span style="font-size:0.8em;opacity:0.7;">(${total - shown} restant${total - shown > 1 ? 's' : ''})</span>
        </button>
      ` : (total > PAGE ? `<div class="text-sm text-muted center mt-8">✅ Classement complet affiché (${total} membres)</div>` : '')}
    `;

    container.querySelectorAll('.list-row').forEach(row => {
      row.addEventListener('click', () => this.openDetail(row.dataset.id, cat));
    });

    const voirPlusBtn = container.querySelector('#class-voir-plus');
    if (voirPlusBtn) {
      voirPlusBtn.addEventListener('click', () => {
        this._shownCount = Math.min(shown + PAGE, total);
        this.renderCategorie(container, cat);
      });
    }
  },

  openDetail(membreId, cat) {
    const rows = Store.getClassement(cat);
    const r = rows.find(x => x.membre.id === membreId);
    if (!r) return;
    const hist = Store.getClassementEvolution(membreId, 12);
    const sparkValues = hist.map(h => h[cat]);

    let detailHtml = '';
    const d = r.detail;
    if (cat === 'musical') {
      detailHtml = `
        ${this.row('Assiduité (présences)', Utils.pct(d.tauxAssiduite))}
        ${this.row('Moyenne aux évaluations', d.moyMusicale.toFixed(1)+'/20')}
        ${this.row('Participation aux prestations', d.prestTotal>0 ? `${d.prestPresent}/${d.prestTotal}` : '—')}
      `;
    } else if (cat === 'discipline') {
      detailHtml = `
        ${this.row('Ponctualité', Utils.pct(d.ponctualite))}
        ${this.row('Avertissements (sanctions)', d.nbSanctions)}
        ${this.row('Respect des règles', Utils.pct(d.respectRegles))}
        ${d.interdit ? `<div class="alert-banner danger mt-8"><div class="alert-banner__icon">⛔</div><div>Actuellement non autorisé à prester</div></div>` : ''}
      `;
    } else if (cat === 'tresorerie') {
      detailHtml = `
        ${this.row('Taux de cotisation', Utils.pct(d.tauxCotis))}
        ${this.row('Régularité des paiements', Utils.pct(d.regularite))}
        ${this.row('Paiements en retard', d.retards)}
      `;
    } else {
      detailHtml = `
        ${this.row('Score musical', d.musical.score.toFixed(1)+'/100')}
        ${this.row('Score discipline', d.discipline.score.toFixed(1)+'/100')}
        ${this.row('Score trésorerie', d.tresorerie.score.toFixed(1)+'/100')}
      `;
    }

    const html = `
      <div class="card center">
        <div class="list-row__avatar" style="width:54px;height:54px;font-size:1.3rem;margin:0 auto 8px;">${Utils.initials(r.membre.nom)}</div>
        <div class="font-display" style="font-size:1.2rem;font-weight:700;">${Utils.escapeHtml(r.membre.nom)}</div>
        <div class="text-sm text-muted">${r.membre.pupitre || '—'}</div>
        <div class="font-display mt-8" style="font-size:1.6rem;font-weight:700;color:var(--maroon);">${this.medal(r.rang)} ${r.score.toFixed(1)}<span style="font-size:0.9rem;color:var(--ink-soft);">/100</span></div>
      </div>

      <div class="section-title"><span class="ornament">📊</span> Détail du score</div>
      <div class="card">${detailHtml}</div>

      <div class="section-title"><span class="ornament">📈</span> Évolution (instantanés mensuels)</div>
      <div class="card">
        ${Utils.sparklineSVG(sparkValues, { color: '#7A2E2E' })}
        ${hist.length ? `<div class="text-sm text-muted center mt-8">${hist[0].monthKey} → ${hist[hist.length-1].monthKey}</div>` : ''}
      </div>
    `;

    Utils.openSheet(`🏆 ${r.membre.nom}`, html);
  },

  row(label, value) {
    return `<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--line);">
      <span class="text-sm text-muted">${label}</span>
      <span style="font-weight:700;">${value}</span>
    </div>`;
  },
};

// ===== MODULE: ARCHIVES DES ANCIENS CHORISTES =====
// ════════════════════════════════════════════════════════════════
// ARCHIVES — Mémoire des membres ayant quitté la chorale (Admin uniquement)
// ════════════════════════════════════════════════════════════════

const ArchivesModule = {
  tab: 'liste', // liste | stats

  MOTIFS_DEPART: ["Fin d'études", 'Affectation professionnelle', 'Mutation', 'Raisons familiales', 'Démission', 'Autre'],

  render(main) {
    if (!Permissions.isAdmin()) {
      main.innerHTML = `<div class="alert-banner danger"><div class="alert-banner__icon">🔒</div><div>Ce module est réservé à l'Administrateur.</div></div>`;
      return;
    }
    const tabs = [
      { key: 'liste', label: '🗃️ Archives' },
      { key: 'stats', label: '📊 Statistiques' },
    ];
    main.innerHTML = `
      <div class="tabbar">${tabs.map(t=>`<button class="tab-btn ${this.tab===t.key?'active':''}" data-tab="${t.key}">${t.label}</button>`).join('')}</div>
      <div id="arch-content"></div>
    `;
    main.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => { this.tab = btn.dataset.tab; this.render(main); });
    });
    const content = main.querySelector('#arch-content');
    if (this.tab === 'stats') this.renderStats(content);
    else this.renderListe(content, main);
  },

  renderListe(container, main) {
    const archives = Store.getArchives();
    container.innerHTML = `
      <button class="btn secondary block" id="btn-archiver-membre">➕ Archiver un membre actif</button>
      ${archives.length ? `<div class="list mt-16">${archives.map(a => `
        <div class="list-row" data-id="${a.id}">
          <div class="list-row__avatar">${Utils.initials(a.nom)}</div>
          <div class="list-row__body">
            <div class="list-row__title">${Utils.escapeHtml(a.nom)} ${a.prenom?Utils.escapeHtml(a.prenom):''}</div>
            <div class="list-row__subtitle">${a.voix||'—'} · Départ : ${Utils.fmtDate(a.dateDepart)} · ${a.motifDepart}</div>
          </div>
          <span class="list-row__chevron">›</span>
        </div>
      `).join('')}</div>` : `<div class="empty-state mt-16"><div class="empty-state__icon">🗃️</div><div class="empty-state__text">Aucun ancien choriste archivé</div></div>`}
    `;
    container.querySelector('#btn-archiver-membre').addEventListener('click', () => this.openArchiverForm());
    container.querySelectorAll('[data-id]').forEach(row => {
      row.addEventListener('click', () => this.openArchiveDetail(row.dataset.id));
    });
  },

  openArchiverForm() {
    const actifs = Store.data.membres.slice().sort((a,b)=>a.nom.localeCompare(b.nom));
    if (!actifs.length) { Utils.toast('Aucun membre actif à archiver'); return; }
    const html = `
      <div class="alert-banner warn"><div class="alert-banner__icon">⚠️</div><div>Le membre sera retiré des listes actives (membres, cotisations, présences) et basculé dans les archives. Cette action n'efface aucune donnée historique (sanctions, paiements...).</div></div>
      <div class="field"><label>Membre à archiver</label>
        <select id="ar-membre">${actifs.map(m=>`<option value="${m.id}">${Utils.escapeHtml(m.nom)} (${m.statut})</option>`).join('')}</select>
      </div>
      <div class="field"><label>Date de départ</label><input type="date" id="ar-date" value="${Utils.todayISO()}"></div>
      <div class="field"><label>Motif du départ</label>
        <select id="ar-motif">${this.MOTIFS_DEPART.map(m=>`<option value="${m}">${m}</option>`).join('')}</select>
      </div>
      <button class="btn danger block" id="ar-save">🗃️ Archiver ce membre</button>
    `;
    const sheet = Utils.openSheet('Archiver un membre', html);
    sheet.querySelector('#ar-save').addEventListener('click', () => {
      const membreId = sheet.querySelector('#ar-membre').value;
      Utils.confirmAction('Confirmer l\'archivage de ce membre ? Il disparaîtra des listes actives.', () => {
        Store.archiverMembre(membreId, {
          dateDepart: sheet.querySelector('#ar-date').value,
          motifDepart: sheet.querySelector('#ar-motif').value,
        });
        Utils.closeSheet();
        Utils.toast('Membre archivé');
        Router.render();
      });
    });
  },

  openArchiveDetail(id) {
    const a = Store.getArchive(id);
    if (!a) return;
    const html = `
      <div class="card">
        ${MembresModule.infoRow('Sexe', a.sexe==='M'?'Masculin':'Féminin')}
        ${MembresModule.infoRow('Voix / Pupitre', a.voix||'—')}
        ${MembresModule.infoRow("Date d'entrée", Utils.fmtDate(a.dateEntree))}
        ${MembresModule.infoRow('Date de départ', Utils.fmtDate(a.dateDepart))}
        ${MembresModule.infoRow('Motif du départ', a.motifDepart)}
        ${MembresModule.infoRow('Années de service', (a.anneesService!=null?a.anneesService:'—') + ' an(s)')}
        ${MembresModule.infoRow('Services occupés', (a.services||[]).join(', ')||'—')}
        ${MembresModule.infoRow('Fonctions exercées', (a.fonctions||[]).join(', ')||'—')}
      </div>

      <div class="section-title"><span class="ornament">💌</span> Témoignage d'affection</div>
      <div class="field"><textarea id="ad-temoignage" rows="4" placeholder="Message de reconnaissance, souvenir, hommage...">${Utils.escapeHtml(a.temoignage||'')}</textarea></div>

      <div class="section-title"><span class="ornament">🖼️</span> Galerie souvenir (photos, documents, liens)</div>
      <div class="field"><textarea id="ad-galerie" rows="3" placeholder="Un lien par ligne (photo, document, ou autre)">${(a.galerie||[]).map(g=>g.url).join('\n')}</textarea></div>

      <div class="grid-2 mt-16">
        <button class="btn danger block" id="ad-del">🗑️ Supprimer l'archive</button>
        <button class="btn primary block" id="ad-save">💾 Enregistrer</button>
      </div>
    `;
    const sheet = Utils.openSheet(`${a.nom} — Archive`, html);
    sheet.querySelector('#ad-save').addEventListener('click', () => {
      const liens = sheet.querySelector('#ad-galerie').value.split('\n').map(s=>s.trim()).filter(Boolean);
      Store.updateArchive(id, {
        temoignage: sheet.querySelector('#ad-temoignage').value,
        galerie: liens.map(url => ({ type: 'lien', label: url, url })),
      });
      Utils.closeSheet();
      Utils.toast('Archive mise à jour');
      Router.render();
    });
    sheet.querySelector('#ad-del').addEventListener('click', () => {
      Utils.confirmAction('Supprimer définitivement cette archive ?', () => {
        Store.deleteArchive(id);
        Utils.closeSheet();
        Utils.toast('Archive supprimée');
        Router.render();
      });
    });
  },

  renderStats(container) {
    const stats = Store.getArchivesStats();
    container.innerHTML = `
      <div class="card center"><div class="text-sm text-muted">Total anciens choristes</div><div class="font-display" style="font-size:1.6rem;font-weight:700;color:var(--maroon);">${stats.total}</div></div>

      <div class="section-title"><span class="ornament">🎓</span> Répartition par promotion (année d'entrée)</div>
      <div class="card">${Object.keys(stats.parPromotion).sort().length ? Object.keys(stats.parPromotion).sort().map(p => `
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">${p}</span><span style="font-weight:700;">${stats.parPromotion[p]}</span></div>
      `).join('') : '<div class="text-sm text-muted">Aucune donnée</div>'}</div>

      <div class="section-title"><span class="ornament">📋</span> Répartition par motif de départ</div>
      <div class="card">${Object.keys(stats.parMotif).length ? Object.keys(stats.parMotif).map(m => `
        <div class="flex-between" style="padding:5px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">${m}</span><span style="font-weight:700;">${stats.parMotif[m]}</span></div>
      `).join('') : '<div class="text-sm text-muted">Aucune donnée</div>'}</div>
    `;
  },
};

  // ── Changement du mot de passe personnel (Administrateur uniquement via ce formulaire) ──
  openChangePasswordSheet() {
    const isAdmin = Permissions.isAdmin();
    const isBureau = Permissions.role === 'bureau';
    const html = `
      <div class="field">
        <label>Mot de passe actuel</label>
        ${Utils.pwdInput('cp-current', '••••••••', 'current-password')}
      </div>
      <div class="field">
        <label>Nouveau mot de passe</label>
        ${Utils.pwdInput('cp-new', '6 caractères minimum', 'new-password')}
      </div>
      <div class="field">
        <label>Confirmer le nouveau mot de passe</label>
        ${Utils.pwdInput('cp-confirm', '••••••••', 'new-password')}
      </div>
      <div id="cp-error" class="auth-error" style="display:none;"></div>
      <button class="btn primary block mt-8" id="cp-save">💾 Enregistrer le nouveau mot de passe</button>
      <div class="text-sm text-muted mt-8">⚠️ Ce changement n'est appliqué que sur cet appareil/navigateur.</div>
    `;
    const sheet = Utils.openSheet('🔑 Modifier mon mot de passe', html);
    const errorEl = sheet.querySelector('#cp-error');

    sheet.querySelector('#cp-save').addEventListener('click', () => {
      errorEl.style.display = 'none';
      const current = sheet.querySelector('#cp-current').value;
      const next    = sheet.querySelector('#cp-new').value;
      const confirm = sheet.querySelector('#cp-confirm').value;

      let currentOk = false;
      if (isAdmin) {
        currentOk = current === CredentialsStore.getAdminPassword();
      } else if (isBureau) {
        currentOk = current === CredentialsStore.getDeptPassword(Permissions.departement);
      }

      if (!currentOk) { errorEl.textContent = 'Mot de passe actuel incorrect.'; errorEl.style.display = ''; return; }
      if (!next || next.length < 6) { errorEl.textContent = 'Le nouveau mot de passe doit contenir au moins 6 caractères.'; errorEl.style.display = ''; return; }
      if (next !== confirm) { errorEl.textContent = 'Les deux mots de passe ne correspondent pas.'; errorEl.style.display = ''; return; }

      if (isAdmin) {
        CredentialsStore.setAdminPassword(next);
        Store.logAction('Modification mot de passe', 'Paramètres', 'Mot de passe Administrateur modifié');
      } else {
        const dept = DEPARTEMENTS.find(d => d.key === Permissions.departement);
        CredentialsStore.setDeptPassword(Permissions.departement, next);
        Store.logAction('Modification mot de passe', 'Paramètres', `Mot de passe département ${dept ? dept.label : Permissions.departement} modifié`);
      }
      Utils.closeSheet();
      Utils.toast('🔑 Mot de passe mis à jour');
    });
  },

  // ── Modification du mot de passe d'un département (Admin ou responsable du dept) ──
  openChangeDeptPasswordSheet(deptKey) {
    const isAdmin = Permissions.isAdmin();
    const dept = DEPARTEMENTS.find(d => d.key === deptKey);
    const deptLabel = dept ? dept.label : deptKey;

    const html = `
      <div class="alert-banner info" style="margin-bottom:12px;">
        <div class="alert-banner__icon">${dept ? dept.icon : '🗂️'}</div>
        <div>Modification du mot de passe du département <b>${Utils.escapeHtml(deptLabel)}</b>.</div>
      </div>
      <div class="field">
        <label>Mot de passe actuel du département</label>
        ${Utils.pwdInput('dp-current', '••••••••', 'current-password')}
      </div>
      <div class="field">
        <label>Nouveau mot de passe</label>
        ${Utils.pwdInput('dp-new', '6 caractères minimum', 'new-password')}
      </div>
      <div class="field">
        <label>Confirmer le nouveau mot de passe</label>
        ${Utils.pwdInput('dp-confirm', '••••••••', 'new-password')}
      </div>
      <div id="dp-error" class="auth-error" style="display:none;"></div>
      <button class="btn primary block mt-8" id="dp-save">💾 Enregistrer</button>
      <div class="text-sm text-muted mt-8">⚠️ Ce changement n'est appliqué que sur cet appareil/navigateur.</div>
    `;
    const sheet = Utils.openSheet(`🔑 Mot de passe — ${deptLabel}`, html);
    const errorEl = sheet.querySelector('#dp-error');

    sheet.querySelector('#dp-save').addEventListener('click', () => {
      errorEl.style.display = 'none';
      const current = sheet.querySelector('#dp-current').value;
      const next    = sheet.querySelector('#dp-new').value;
      const confirm = sheet.querySelector('#dp-confirm').value;

      // Vérification du mot de passe actuel
      const expected = CredentialsStore.getDeptPassword(deptKey);
      if (!expected || current !== expected) {
        errorEl.textContent = 'Mot de passe actuel incorrect.';
        errorEl.style.display = '';
        return;
      }
      if (!next || next.length < 6) {
        errorEl.textContent = 'Le nouveau mot de passe doit contenir au moins 6 caractères.';
        errorEl.style.display = '';
        return;
      }
      if (next !== confirm) {
        errorEl.textContent = 'Les deux mots de passe ne correspondent pas.';
        errorEl.style.display = '';
        return;
      }

      CredentialsStore.setDeptPassword(deptKey, next);
      Store.logAction('Modification mot de passe', 'Paramètres',
        `Mot de passe département ${deptLabel} modifié par ${Permissions.label()}`);
      Utils.closeSheet();
      Utils.toast(`🔑 Mot de passe du département ${deptLabel} mis à jour`);
    });
  },

  // ── Réinitialisation d'un mot de passe de département (Admin uniquement) ──
  // Remet le mot de passe par défaut (défini dans BUREAU_DEPT_PASSWORDS)
  openResetDeptPasswordSheet(deptKey) {
    if (!Permissions.isAdmin()) { Permissions.denyToast(); return; }
    const dept = DEPARTEMENTS.find(d => d.key === deptKey);
    const deptLabel = dept ? dept.label : deptKey;
    const defaultPwd = BUREAU_DEPT_PASSWORDS[deptKey] || '(aucun)';

    Utils.confirmAction(
      `Réinitialiser le mot de passe du département <b>${Utils.escapeHtml(deptLabel)}</b> ?<br><br>` +
      `Le mot de passe sera remis à la valeur par défaut (définie dans le code source de l'application). ` +
      `Cette action ne peut pas être annulée.`,
      () => {
        CredentialsStore.resetDeptPassword(deptKey);
        Store.logAction('Réinitialisation mot de passe', 'Paramètres',
          `Mot de passe département ${deptLabel} réinitialisé par l'Administrateur`);
        Utils.toast(`↩️ Mot de passe du département ${deptLabel} réinitialisé`);
      }
    );
  },
};

// Filtre les éléments de navigation selon le profil courant : un membre
// du bureau voit son département + les départements partagés/étendus
// (cf. SHARED_BUREAU_DEPTS / EXTRA_DEPTS_FOR) + les modules transverses
// (tableau de bord, anniversaires, suggestions, rapports, classements,
// paramètres). L'admin et les choristes voient tout (lecture seule pour
// les choristes, contrôle total pour l'admin).
function getVisibleNavItems() {
  // 5 — Archives des Anciens Choristes : réservé à l'Administrateur.
  const items = NAV_ITEMS.filter(item => item.key !== 'archives' || Permissions.isAdmin());
  if (Permissions.isAdmin() || Permissions.isChoriste()) return items;
  return items.filter(item => {
    const dept = DEPT_FOR_ROUTE[item.key];
    return !dept || Permissions._hasExtendedDeptAccess(dept);
  });
}

function buildApp() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const roleIcon = Permissions.isAdmin() ? '👑' : Permissions.isBureau() ? '🗂️' : '🎵';

  // Header
  const header = document.createElement('div');
  header.className = 'app-header';
  header.innerHTML = `
    <div class="app-header__top">
      <div class="app-header__title"><span class="ornament">🎵</span> <span id="header-title">SVS-EEI</span></div>
      <div class="header-actions">
        <div class="app-header__year">${Store.data.meta.annee}</div>
        <button class="user-btn" id="user-menu-btn" title="${Utils.escapeHtml(Permissions.displayName())}">${roleIcon}</button>
      </div>
    </div>
    <div class="flex-between" style="margin-top:4px;">
      <div class="app-header__subtitle" id="header-subtitle" style="margin-top:0;">Carnet de gestion</div>
      <div class="sync-status-text" id="sync-status"><span class="sync-dot" id="sync-dot"></span><span id="sync-label">💾 Local</span></div>
    </div>
  `;
  app.appendChild(header);

  // Main
  const main = document.createElement('div');
  main.className = 'app-main';
  main.id = 'app-main';
  app.appendChild(main);

  // Bottom nav (filtrée selon le profil)
  const visibleItems = getVisibleNavItems();
  const nav = document.createElement('div');
  nav.className = 'app-nav';
  nav.innerHTML = visibleItems.map(item => `
    <button class="nav-item" data-route="${item.key}">
      <span class="nav-item__icon">${item.icon}</span>
      <span>${item.label}</span>
    </button>
  `).join('');
  app.appendChild(nav);

  nav.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => Router.navigate(btn.dataset.route));
  });

  header.querySelector('#user-menu-btn').addEventListener('click', () => showUserMenu());

  // Register routes
  Router.register('dashboard', (m) => DashboardModule.render(m));
  Router.register('membres', (m) => MembresModule.render(m));
  Router.register('discipline', (m) => DisciplineModule.render(m));
  Router.register('tresorerie', (m) => TresorerieModule.render(m));
  Router.register('secretariat', (m) => SecretariatModule.render(m));
  Router.register('direction', (m) => DirectionModule.render(m));
  Router.register('prestations', (m) => PrestationsModule.render(m));
  Router.register('repetitions', (m) => RepetitionsModule.render(m));
  Router.register('anniversaires', (m) => AnniversairesModule.render(m));
  Router.register('notifications', (m) => NotificationsModule.render(m));
  Router.register('suggestions', (m) => SuggestionsModule.render(m));
  Router.register('rapports', (m) => RapportsModule.render(m));
  Router.register('classements', (m) => ClassementsModule.render(m));
  Router.register('archives', (m) => ArchivesModule.render(m));
  Router.register('parametres', (m) => ParametresModule.render(m));

  // Si la route mémorisée dans le hash n'est pas visible pour ce profil,
  // on revient sur le tableau de bord (toujours accessible).
  const hashRoute = (window.location.hash || '#dashboard').slice(1);
  if (!visibleItems.some(i => i.key === hashRoute)) {
    window.location.hash = '#dashboard';
  }

  // Update header on navigation
  const origRender = Router.render.bind(Router);
  Router.render = function(params) {
    origRender(params);
    const item = NAV_ITEMS.find(i => i.key === Router.current);
    if (item) {
      document.getElementById('header-title').textContent = item.title;
      document.getElementById('header-subtitle').textContent = item.subtitle;
    }
    updateSuggestionsBadge();
    updateNotificationsBadge();
  };

  Router.init();
  updateSuggestionsBadge();
  updateNotificationsBadge();

  // Connexion — journal d'audit
  Store.logAction('Connexion', 'Système', `Profil : ${Permissions.label()}`);

  // Générer automatiquement les notifications d'anniversaire du jour
  (function() {
    const todayKey = `anniv_notif_${Utils.todayISO()}`;
    try {
      if (localStorage.getItem(todayKey)) return; // déjà générées aujourd'hui
    } catch(e) {}
    const now = new Date();
    Store.data.membres.forEach(m => {
      if (!m.dateNaissance) return;
      const dob = new Date(m.dateNaissance);
      if (dob.getDate() === now.getDate() && dob.getMonth() === now.getMonth()) {
        Store.addNotification({
          titre: `🎂 Anniversaire — ${m.nom}`,
          message: `🎉 Joyeux anniversaire ${m.nom} ! Que Dieu vous bénisse abondamment, vous accorde santé, paix et réussite. Toute la chorale vous souhaite une excellente année de vie.`,
          categorie: 'anniversaire',
          destinataire: 'all',
        });
      }
    });
    try { localStorage.setItem(todayKey, '1'); } catch(e) {}
    updateNotificationsBadge();
  })();
}

      <div class="list-row__avatar" style="width:54px;height:54px;font-size:1.3rem;margin:0 auto 8px;">${Permissions.isAdmin() ? '👑' : Permissions.isBureau() ? '🗂️' : '🎵'}</div>
      <div style="font-weight:700;">${Utils.escapeHtml(Permissions.displayName())}</div>
      <div class="mt-8"><span class="pill bureau">${Permissions.label()}</span></div>
      <div class="text-sm text-muted mt-8">💾 Données enregistrées sur cet appareil</div>
    </div>
    <button class="btn danger block mt-16" id="logout-menu-btn">🚪 Se déconnecter</button>
  `;
  const sheet = Utils.openSheet('👤 Mon profil', html);
  sheet.querySelector('#logout-menu-btn').addEventListener('click', () => {
    Utils.closeSheet();

// Met à jour le badge "nouvelles suggestions" sur l'onglet de navigation
// (uniquement pertinent pour le bureau/admin : avec des comptes partagés,
// un choriste n'a plus de suggestions "personnelles" à suivre)
function updateSuggestionsBadge() {
  const navBtn = document.querySelector('.nav-item[data-route="suggestions"]');
  if (!navBtn || !Store.data) return;
  let existing = navBtn.querySelector('.badge');
  if (existing) existing.remove();

  if (!Permissions.canReadAllSuggestions()) return;
  const count = Store.getSuggestions().filter(s => s.statut === 'Nouveau').length;
  if (count > 0) {
    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = count > 9 ? '9+' : String(count);
    navBtn.appendChild(badge);
  }
}

function updateNotificationsBadge() {
  const navBtn = document.querySelector('.nav-item[data-route="notifications"]');
  if (!navBtn || !Store.data) return;
  let existing = navBtn.querySelector('.badge');
  if (existing) existing.remove();
  const count = Store.countUnreadNotifications();
  if (count > 0) {
    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = count > 9 ? '9+' : String(count);
    navBtn.appendChild(badge);
  }
}

// Stockage 100% local : il n'y a plus de "synchronisation" à proprement
// parler. Cette fonction est conservée (appelée par Store.save()) mais ne
// fait qu'afficher une confirmation visuelle discrète de l'enregistrement.
function setSyncStatus(status) {
  const label = document.getElementById('sync-label');
  if (!label) return;
  const states = {
    synced:      { icon: '☁️',  text: 'Synchronisé',   color: 'var(--green)' },
    saving:      { icon: '⬆️',  text: 'Enregistrement…',color: 'var(--amber)' },
    connecting:  { icon: '🔄',  text: 'Connexion…',    color: 'var(--amber)' },
    uploading:   { icon: '⬆️',  text: 'Migration…',    color: 'var(--amber)' },
    local:       { icon: '💾',  text: 'Local',         color: 'var(--ink-soft)' },
    error:       { icon: '⚠️',  text: 'Erreur sync',   color: 'var(--red)' },
  };
  const s = states[status] || states.local;
  label.textContent = `${s.icon} ${s.text}`;
  label.style.color = s.color;
}

// ── PWA : invite d'installation (câblage de la bannière .install-banner) ──
window.__deferredInstallPrompt__ = null;

function setupInstallPrompt() {
  let dismissedThisSession = false;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    window.__deferredInstallPrompt__ = e;
    if (!dismissedThisSession && !window.matchMedia('(display-mode: standalone)').matches) {
      showInstallBanner();
    }
  });

  window.addEventListener('appinstalled', () => {
    window.__deferredInstallPrompt__ = null;
    const b = document.getElementById('pwa-install-banner');
    if (b) b.remove();
    Utils.toast && Utils.toast('✅ Application installée');
  });

  function showInstallBanner() {
    if (document.getElementById('pwa-install-banner')) return;
    const banner = document.createElement('div');
    banner.id = 'pwa-install-banner';
    banner.className = 'install-banner';
    banner.innerHTML = `
      <span style="font-size:1.3rem;">🎵</span>
      <span>Installer l'application Chorale sur cet appareil ?</span>
      <button id="pwa-install-yes">Installer</button>
      <button class="dismiss" id="pwa-install-no">✕</button>
    `;
    document.body.appendChild(banner);
    banner.querySelector('#pwa-install-yes').addEventListener('click', async () => {
      banner.remove();
      if (window.__deferredInstallPrompt__) {
        window.__deferredInstallPrompt__.prompt();
        try { await window.__deferredInstallPrompt__.userChoice; } catch(e) {}
        window.__deferredInstallPrompt__ = null;
      }
    });
    banner.querySelector('#pwa-install-no').addEventListener('click', () => {
      dismissedThisSession = true;
      banner.remove();
    });
  }
}

function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch((e) => {
      console.warn('Service worker non enregistré (normal en aperçu local / sans HTTPS) :', e);
    });
  });
}

// ── App bootstrap ──
function startApp() {
  if (Utils.closeSheet) Utils.closeSheet();
  buildApp();
  startInactivityWatch();
}

function showProfileSelector() {
  const app = document.getElementById('app');
  app.innerHTML = '<div id="profile-selector-container"></div>';
  ProfileSelectorUI.start(document.getElementById('profile-selector-container'), (selection) => {
    Permissions.setProfile(selection);
    startApp();
  });
}

// ── Déconnexion (manuelle ou automatique après inactivité) ──
const INACTIVITY_EVENTS = ['click', 'keydown', 'touchstart', 'mousemove', 'scroll'];
let _inactivityTimer = null;
let _lastTouch = 0;

function _resetInactivityTimer() {
  // On évite d'écrire dans le localStorage à chaque pixel de souris :
  // un throttle de 20s suffit largement pour une fenêtre de 15 minutes.
  const now = Date.now();
  if (now - _lastTouch > 20000) {
    SessionGuard.touch();
    _lastTouch = now;
  }
  if (_inactivityTimer) clearTimeout(_inactivityTimer);
  _inactivityTimer = setTimeout(() => logout('inactivity'), INACTIVITY_TIMEOUT_MS);
}

function startInactivityWatch() {
  SessionGuard.touch();
  _lastTouch = Date.now();
  _resetInactivityTimer();
  INACTIVITY_EVENTS.forEach(evt => document.addEventListener(evt, _resetInactivityTimer, { passive: true }));
}

function stopInactivityWatch() {
  if (_inactivityTimer) { clearTimeout(_inactivityTimer); _inactivityTimer = null; }
  INACTIVITY_EVENTS.forEach(evt => document.removeEventListener(evt, _resetInactivityTimer));
}

function logout(reason) {
  stopInactivityWatch();
  Permissions.clearProfile();
  SessionGuard.clear();
  showProfileSelector();
  if (reason === 'inactivity') Utils.toast('🔒 Session expirée après 15 minutes d\'inactivité');
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  registerServiceWorker();
  setupInstallPrompt();

  // ── 1. Charger depuis localStorage immédiatement (affichage rapide) ──
  Store.init(); // démarre aussi le listener Firestore en arrière-plan

  // ── 2. Restaurer le profil connecté ──────────────────────────────
  const savedProfile = LocalProfile.load();

  // Rétrocompatibilité : ancien profil Bureau avec bureauId individuel
  if (savedProfile && savedProfile.role === 'bureau' && savedProfile.bureauId && !savedProfile.departement) {
    const acc = BUREAU_ACCOUNTS[savedProfile.bureauId];
    if (acc) savedProfile.departement = acc.departement;
  }

  // ── 3. Lancer l'app (le onSnapshot mettra à jour l'UI en temps réel) ──
  if (savedProfile && savedProfile.role && !SessionGuard.isExpired() &&
      (savedProfile.role !== 'choriste' || savedProfile.choristeMembreId)) {
    Permissions.setProfile(savedProfile);
    startApp();
  } else {
    Permissions.clearProfile();
    SessionGuard.clear();
    showProfileSelector();
  }
});

  </script>
