          </div>
          <span class="list-row__chevron">›</span>
        </div>
      `).join('')}</div>` : `<div class="empty-state"><div class="empty-state__icon">🗓️</div><div class="empty-state__text">Aucune répétition instrumentale enregistrée</div></div>`}
      <button class="btn primary block mt-16" id="btn-add-rep-instr">➕ Nouvelle répétition instrumentale</button>
    `;
    container.querySelector('#btn-add-rep-instr').addEventListener('click', () => this.openRepetitionInstrumentaleForm());
    container.querySelectorAll('[data-id]').forEach(row => {
      row.addEventListener('click', () => this.openRepetitionInstrumentaleForm(Store.getRepetitionsInstrumentales().find(r=>r.id===row.dataset.id)));

  openRepetitionInstrumentaleForm(rep) {
    const r = rep || { id: Utils.genId('repi'), date: Utils.todayISO(), responsable: '', presents: [], absents: [], retards: [], chantsTravailles: [], observationsTechniques: '', difficultes: '', notesTechniques: '', commentaires: '', axesAmelioration: '', ressourcesAudio: [] };
    const fiches = Store.getInstrumentistes();
    const statutFor = (nom) => r.presents.indexOf(nom)!==-1 ? 'Présent' : r.absents.indexOf(nom)!==-1 ? 'Absent' : r.retards.indexOf(nom)!==-1 ? 'Retard' : '';
    const html = `
      <div class="field"><label>Date</label><input type="date" id="ri-date" value="${r.date}"></div>
      <div class="field"><label>Responsable</label><input type="text" id="ri-resp" value="${Utils.escapeHtml(r.responsable||'')}"></div>

      <div class="section-title"><span class="ornament">✅</span> Présences</div>
      <div class="card">
        ${fiches.length ? fiches.map(f => `
          <div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--line);">
            <span style="font-weight:600;font-size:0.88rem;">${Utils.escapeHtml(f.nom)}</span>
            <select class="ri-presence-select" data-nom="${Utils.escapeHtml(f.nom)}" style="width:auto;">
              ${['', 'Présent', 'Absent', 'Retard'].map(opt => `<option value="${opt}" ${statutFor(f.nom)===opt?'selected':''}>${opt||'—'}</option>`).join('')}
            </select>
          </div>
        `).join('') : '<div class="text-sm text-muted">Aucune fiche instrumentiste — ajoutez-en dans l\'onglet Fiches.</div>'}
      </div>

      <div class="field"><label>Chants travaillés (un par ligne)</label><textarea id="ri-chants" rows="3">${(r.chantsTravailles||[]).join('\n')}</textarea></div>
      <div class="field"><label>Observations techniques</label><textarea id="ri-obs-tech" rows="2">${Utils.escapeHtml(r.observationsTechniques||'')}</textarea></div>
      <div class="field"><label>Difficultés rencontrées</label><textarea id="ri-diff" rows="2">${Utils.escapeHtml(r.difficultes||'')}</textarea></div>

      <div class="section-title"><span class="ornament">📝</span> Notes et appréciations</div>
      <div class="field"><label>Notes techniques</label><textarea id="ri-notes-tech" rows="2">${Utils.escapeHtml(r.notesTechniques||'')}</textarea></div>
      <div class="field"><label>Commentaires</label><textarea id="ri-comm" rows="2">${Utils.escapeHtml(r.commentaires||'')}</textarea></div>
      <div class="field"><label>Axes d'amélioration</label><textarea id="ri-axes" rows="2">${Utils.escapeHtml(r.axesAmelioration||'')}</textarea></div>

      <div class="section-title"><span class="ornament">🔗</span> Ressources audio</div>
      <div class="field"><label>Liens (un par ligne — Google Drive, Dropbox, etc.)</label><textarea id="ri-audio" rows="2" placeholder="https://drive.google.com/...">${(r.ressourcesAudio||[]).map(a=>a.url).join('\n')}</textarea></div>

      <div class="grid-2 mt-16">
        ${rep ? '<button class="btn danger block" id="ri-del">🗑️ Supprimer</button>' : '<div></div>'}
        <button class="btn primary block" id="ri-save">💾 Enregistrer</button>
      </div>
    `;
    const sheet = Utils.openSheet(rep ? 'Modifier la répétition' : 'Nouvelle répétition instrumentale', html);
    sheet.querySelector('#ri-save').addEventListener('click', () => {
      const presents = [], absents = [], retards = [];
      sheet.querySelectorAll('.ri-presence-select').forEach(sel => {
        if (sel.value === 'Présent') presents.push(sel.dataset.nom);
        else if (sel.value === 'Absent') absents.push(sel.dataset.nom);
        else if (sel.value === 'Retard') retards.push(sel.dataset.nom);
      });
      const chants = sheet.querySelector('#ri-chants').value.split('\n').map(s=>s.trim()).filter(Boolean);
      const audioUrls = sheet.querySelector('#ri-audio').value.split('\n').map(s=>s.trim()).filter(Boolean);
      const data = {
        date: sheet.querySelector('#ri-date').value,
        responsable: sheet.querySelector('#ri-resp').value,
        presents, absents, retards,
        chantsTravailles: chants,
        observationsTechniques: sheet.querySelector('#ri-obs-tech').value,
        difficultes: sheet.querySelector('#ri-diff').value,
        notesTechniques: sheet.querySelector('#ri-notes-tech').value,
        commentaires: sheet.querySelector('#ri-comm').value,
        axesAmelioration: sheet.querySelector('#ri-axes').value,
        ressourcesAudio: audioUrls.map(url => ({ label: url, url })),
      };
      if (rep) {
        Store.updateRepetitionInstrumentale(r.id, data);
      } else {
        Store.addRepetitionInstrumentale(Object.assign({ id: r.id }, data));
      }
      Utils.closeSheet();
      Utils.toast('Répétition enregistrée');
      Router.render();
    });
    const delBtn = sheet.querySelector('#ri-del');
    if (delBtn) delBtn.addEventListener('click', () => {
      Utils.confirmAction('Supprimer cette répétition instrumentale ?', () => {
        Store.deleteRepetitionInstrumentale(r.id);
        Utils.closeSheet();
        Utils.toast('Répétition supprimée');
        Router.render();
      });
    });
  },

  // ── RÉPERTOIRE ──
  NIVEAUX_MAITRISE: ['Non commencé','En apprentissage','Partiellement maîtrisé','Maîtrisé','Totalement maîtrisé'],
  repertoireFilter: { search: '', sort: 'recent' },

  renderRepertoire(container, main) {
    const all = Store.getRepertoire();
    const maitrises = all.filter(c=>c.statut==='Maîtrisé').length;
    const enCours = all.filter(c=>c.statut==='En cours').length;
    const canManage = Permissions.canManageData('direction');

    const f = this.repertoireFilter;
    let chants = all;
    if (f.search) {
      const s = f.search.toLowerCase();
      chants = chants.filter(c => (c.titre||'').toLowerCase().includes(s) || (c.auteur||'').toLowerCase().includes(s));
    }
    const ordreMaitrise = this.NIVEAUX_MAITRISE;
    if (f.sort === 'titre') chants = chants.slice().sort((a,b)=>(a.titre||'').localeCompare(b.titre||''));
    else if (f.sort === 'maitrise') chants = chants.slice().sort((a,b)=> ordreMaitrise.indexOf(b.niveauMaitrise||'Non commencé') - ordreMaitrise.indexOf(a.niveauMaitrise||'Non commencé'));
    else chants = chants.slice().sort((a,b)=> (b.dateAjout||b.dateApprentissage||'').localeCompare(a.dateAjout||a.dateApprentissage||''));

    container.innerHTML = `
      <div class="grid-2">
        <div class="card center">
          <div class="kpi-card__value" style="color:var(--green);">${maitrises}</div>
          <div class="kpi-card__label">Maîtrisés</div>
        </div>
        <div class="card center">
          <div class="kpi-card__value" style="color:var(--gold);">${enCours}</div>
          <div class="kpi-card__label">En cours</div>
        </div>
      </div>
      ${!canManage ? `
        <div class="alert-banner info">
          <div class="alert-banner__icon">ℹ️</div>
          <div>Consultation du répertoire en <b>lecture seule</b>. Les paroles et fichiers audio autorisés sont accessibles depuis chaque chant.</div>
        </div>
      ` : ''}
      <div class="search-bar">
        <span class="search-bar__icon">🔍</span>
        <input type="text" placeholder="Titre ou auteur..." id="chant-search" value="${Utils.escapeHtml(f.search)}">
      </div>
      <div class="field" style="margin-bottom:10px;">
        <label>Trier par</label>
        <select id="chant-sort">
          <option value="recent" ${f.sort==='recent'?'selected':''}>Date d'ajout (récent)</option>
          <option value="titre" ${f.sort==='titre'?'selected':''}>Titre (A-Z)</option>
          <option value="maitrise" ${f.sort==='maitrise'?'selected':''}>Niveau de maîtrise</option>
        </select>
      </div>
      <div id="chant-list"></div>
      ${canManage ? '<button class="btn secondary block mt-16" id="exp-repertoire-excel">📤 Exporter le répertoire (Excel)</button>' : ''}
    `;

    const expRepBtn = container.querySelector('#exp-repertoire-excel');
    if (expRepBtn) {
      expRepBtn.addEventListener('click', () => {
        const rows = all.map(c => [c.titre||'', c.auteur||'', c.statut||'', c.niveauMaitrise||'', c.dateAjout||c.dateApprentissage||'']);
        Utils.exportCSV('musique_repertoire', ['Titre','Auteur','Statut','Niveau de maîtrise','Date'], rows);
      });
    }

    if (!chants.length) {
      container.querySelector('#chant-list').innerHTML = `<div class="empty-state"><div class="empty-state__icon">🎵</div><div class="empty-state__text">Aucun chant trouvé</div></div>`;
    } else {
      container.querySelector('#chant-list').innerHTML = `<div class="list">${chants.map(c => {
        const statusClass = c.statut==='Maîtrisé'?'actif':c.statut==='À apprendre'?'suspendu':c.statut==='À réviser'?'integrant':'bureau';
        const icons = (c.paroles?'📝':'') + (c.audioUrl?'🎧':'');
        return `
          <div class="list-row" data-id="${c.id}">
            <div class="list-row__avatar">🎵</div>
            <div class="list-row__body">
              <div class="list-row__title">${Utils.escapeHtml(c.titre)} ${icons}</div>
              <div class="list-row__subtitle">${c.categorie || '—'} ${c.tonalite?'· '+Utils.escapeHtml(c.tonalite):''} ${c.niveauMaitrise?'· '+c.niveauMaitrise:''}</div>
            </div>
            <span class="pill ${statusClass}">${c.statut}</span>
          </div>
        `;
      }).join('')}</div>`;

      container.querySelectorAll('.list-row').forEach(row => {
        row.addEventListener('click', () => this.openChantDetail(row.dataset.id));
      });
    }

    container.querySelector('#chant-search').addEventListener('input', (e) => {
      this.repertoireFilter.search = e.target.value;
      this.renderRepertoire(container, main);
    });
    container.querySelector('#chant-sort').addEventListener('change', (e) => {
      this.repertoireFilter.sort = e.target.value;
      this.renderRepertoire(container, main);
    });

    if (canManage) {
      const fab = document.createElement('button');
      fab.className = 'fab';
      fab.innerHTML = '+';
      fab.id = 'fab-add-chant';
      main.appendChild(fab);
      fab.addEventListener('click', () => this.openChantForm());
    }
  },

  // Affiche les paroles dans une sous-fiche dédiée (lecture confortable plein écran)
  openParolesView(chant) {
    const html = `
      <div class="card" style="white-space:pre-wrap;line-height:1.6;font-size:0.92rem;">${Utils.escapeHtml(chant.paroles)}</div>
    `;
    Utils.openSheet(`📝 ${chant.titre}`, html);
  },

  openChantDetail(id) {
    const c = Store.data.repertoire.find(x=>x.id===id);
    if (!c) return;
    const canManage = Permissions.canManageData('direction');

    if (!canManage) {
      // ── Consultation lecture seule (choristes) ──
      const html = `
        <div class="card center">
          <div class="font-display" style="font-size:1.1rem;font-weight:700;color:var(--maroon);">${Utils.escapeHtml(c.titre)}</div>
          <div class="text-sm text-muted mt-8">${Utils.escapeHtml(c.auteur || '—')}</div>
          <div class="mt-8">
            <span class="pill ${c.statut==='Maîtrisé'?'actif':'bureau'}">${c.statut}</span>
            ${c.niveauMaitrise ? `<span class="pill choriste">${c.niveauMaitrise}</span>` : ''}
          </div>
        </div>
        <div class="card">
          ${this.infoRow('Gamme musicale', c.tonalite || '—')}
          ${this.infoRow('Catégorie', c.categorie || '—')}
          ${this.infoRow("Date d'ajout", Utils.fmtDate(c.dateAjout || c.dateApprentissage))}
          ${c.observations ? this.infoRow('Observations techniques', c.observations) : ''}
        </div>
        ${c.paroles ? `<button class="btn secondary block mt-8" id="view-paroles">📝 Voir les paroles</button>` : ''}
        ${c.audioUrl ? (c.audioPublic === false ? `
          <div class="alert-banner warn mt-8"><div class="alert-banner__icon">🔒</div><div>Fichier audio réservé à la direction technique.</div></div>
        ` : `
          <div class="card mt-8">
            <div class="text-sm text-muted" style="margin-bottom:8px;">🎧 Fichier audio</div>
            <audio controls style="width:100%;" src="${Utils.escapeHtml(c.audioUrl)}"></audio>
            <a href="${Utils.escapeHtml(c.audioUrl)}" download="${Utils.escapeHtml(c.audioNom||c.titre)}" target="_blank" rel="noopener" class="btn ghost block mt-8">⬇️ Télécharger</a>
          </div>
        `) : ''}
      `;
      const sheet = Utils.openSheet(`🎵 ${c.titre}`, html);
      const vp = sheet.querySelector('#view-paroles');
      if (vp) vp.addEventListener('click', () => this.openParolesView(c));
      return;
    }

    // ── Édition complète (bureau/admin) ──
    const html = `
      <div class="field">
        <label>Titre</label>
        <input type="text" id="c-titre" value="${Utils.escapeHtml(c.titre)}">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Auteur / Compositeur</label>
          <input type="text" id="c-auteur" value="${Utils.escapeHtml(c.auteur||'')}">
        </div>
        <div class="field">
          <label>Gamme musicale</label>
          <input type="text" id="c-tonalite" value="${Utils.escapeHtml(c.tonalite||'')}" placeholder="Ex: Ré majeur">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Statut</label>
          <select id="c-statut">
            ${['À apprendre','En cours','Maîtrisé','À réviser','Archivé'].map(s=>`<option value="${s}" ${c.statut===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Niveau de maîtrise</label>
          <select id="c-niveau-maitrise">
            ${this.NIVEAUX_MAITRISE.map(s=>`<option value="${s}" ${(c.niveauMaitrise||'Non commencé')===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field">
        <label>Date d'apprentissage</label>
        <input type="date" id="c-date-app" value="${c.dateApprentissage||''}">
      </div>
      <div class="field">
        <label>Paroles complètes</label>
        <textarea id="c-paroles" rows="5" placeholder="Coller ici les paroles du chant...">${Utils.escapeHtml(c.paroles||'')}</textarea>
      </div>
      <div class="field">
        <label>Observations techniques</label>
        <textarea id="c-obs" rows="2">${Utils.escapeHtml(c.observations||'')}</textarea>
      </div>
      <div class="field">
        <label>Fichier audio (optionnel)</label>
        ${c.audioUrl ? `<div class="text-sm mt-8" style="margin-bottom:8px;">🎧 ${Utils.escapeHtml(c.audioNom||'Lien actuel')} <button type="button" id="c-audio-del" class="btn sm danger" style="margin-left:8px;">Retirer</button></div>` : ''}
        <div class="text-sm text-muted mt-8">Collez un lien audio (hébergé ailleurs : Google Drive, Dropbox, etc.) :</div>
        <input type="text" id="c-audio-url" value="${Utils.escapeHtml(c.audioUrl||'')}" placeholder="https://...">
        <label class="text-sm mt-8" style="display:flex;align-items:center;gap:6px;text-transform:none;font-weight:400;">
          <input type="checkbox" id="c-audio-public" ${c.audioPublic===false?'':'checked'} style="width:auto;"> Téléchargement autorisé pour les choristes
        </label>
      </div>
      <div class="grid-2 mt-16">
        <button class="btn danger block" id="del-chant">🗑️ Supprimer</button>
        <button class="btn primary block" id="save-chant">💾 Enregistrer</button>
      </div>
    `;
    const sheet = Utils.openSheet(c.titre, html);
    let audioRemoved = false;
    const delAudioBtn = sheet.querySelector('#c-audio-del');
    if (delAudioBtn) delAudioBtn.addEventListener('click', () => {
      audioRemoved = true;
      delAudioBtn.closest('div').remove();
      Utils.toast('Le lien sera retiré à l\'enregistrement');
    });

    sheet.querySelector('#save-chant').addEventListener('click', () => {
      const titre = sheet.querySelector('#c-titre').value.trim();
      if (!titre) { Utils.toast('Le titre est requis'); return; }

      const patch = {
        titre,
        auteur: sheet.querySelector('#c-auteur').value,
        tonalite: sheet.querySelector('#c-tonalite').value,
        statut: sheet.querySelector('#c-statut').value,
        niveauMaitrise: sheet.querySelector('#c-niveau-maitrise').value,
        dateApprentissage: sheet.querySelector('#c-date-app').value,
        paroles: sheet.querySelector('#c-paroles').value,
        observations: sheet.querySelector('#c-obs').value,
        audioPublic: sheet.querySelector('#c-audio-public').checked,
      };

      const urlInput = sheet.querySelector('#c-audio-url').value.trim();

      if (audioRemoved) { patch.audioUrl = ''; patch.audioNom = ''; }
      else if (urlInput) { patch.audioUrl = urlInput; patch.audioNom = ''; }

      Store.updateChant(id, patch);
      Utils.closeSheet();
      Utils.toast('Chant mis à jour');
      Router.render();
    });
    sheet.querySelector('#del-chant').addEventListener('click', () => {
      Utils.confirmAction('Supprimer ce chant du répertoire ?', () => {
        Store.deleteChant(id);
        Utils.closeSheet();
        Utils.toast('Chant supprimé');
        Router.render();
      });
    });
  },

  // ── INTÉGRANTS ──
  renderIntegrants(container) {
    const integrants = Store.data.membres.filter(m=>m.statut==='Intégrant').sort((a,b)=>a.nom.localeCompare(b.nom));

    if (!integrants.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">🔍</div><div class="empty-state__text">Aucun intégrant enregistré</div></div>`;
      return;
    }

    container.innerHTML = `<div class="list">${integrants.map(m => {
      const dis = Store.getDisciplineStats(m.id);
      const test = Store.getTestIntegration(m.id);
      let result = '⏳ En observation';
      let pillClass = 'integrant';
      if (test && test.decision) {
        if (test.decision === 'Admis') { result = '✅ Admis'; pillClass = 'actif'; }
        else if (test.decision === 'Admis sous réserve') { result = '⚠️ Admis sous réserve'; pillClass = 'derogation'; }
        else { result = '❌ Non admis'; pillClass = 'suspendu'; }
      } else if (dis.total >= 2 && dis.txSamedi >= 0.7) {
        result = '✅ Éligible au test';
        pillClass = 'actif';
      }
      return `
        <div class="list-row" data-id="${m.id}">
          <div class="list-row__avatar">${Utils.initials(m.nom)}</div>
          <div class="list-row__body">
            <div class="list-row__title">${Utils.escapeHtml(m.nom)}</div>
            <div class="list-row__subtitle">Tx présence : ${Utils.pct(dis.txSamedi)} · ${dis.total} séances</div>
          </div>
          <span class="pill ${pillClass}">${result}</span>
        </div>
      `;
    }).join('')}</div>`;

    container.querySelectorAll('.list-row').forEach(row => {
      row.addEventListener('click', () => this.openTestForm(row.dataset.id));
    });
  },

  openTestForm(membreId) {
    const m = Store.getMembre(membreId);
    const test = Store.getTestIntegration(membreId) || { notes: {} };

    const html = `
      <div class="text-sm text-muted" style="margin-bottom:10px;">Test d'intégration — Notation de 0 à 20</div>
      ${this.CRIT_TEST.map((crit, i) => {
        const val = test.notes[crit] !== undefined ? test.notes[crit] : 10;
        return `
          <div class="field">
            <label>${crit} <span style="float:right;font-weight:700;color:var(--maroon);" id="tval-${i}">${val}</span></label>
            <input type="range" min="0" max="20" step="1" value="${val}" data-tcrit="${Utils.escapeHtml(crit)}" data-tidx="${i}" style="width:100%;">
          </div>
        `;
      }).join('')}
      <div class="card center mt-8">
        <div class="text-sm text-muted">Moyenne</div>
        <div class="font-display" id="test-avg" style="font-size:1.5rem;font-weight:700;color:var(--maroon);">0.0/20</div>
        <div class="text-sm mt-8" id="test-result">—</div>
      </div>
      <div class="field">
        <label>Observations du jury / Directeur de Chœur</label>
        <textarea id="test-obs" rows="3">${Utils.escapeHtml(test.observations||'')}</textarea>
      </div>
      <div class="field">
        <label>Décision finale</label>
        <select id="test-decision">
          <option value="">— À déterminer selon la moyenne —</option>
          <option value="Admis" ${test.decision==='Admis'?'selected':''}>✅ Admis</option>
          <option value="Admis sous réserve" ${test.decision==='Admis sous réserve'?'selected':''}>⚠️ Admis sous réserve</option>
          <option value="Non admis" ${test.decision==='Non admis'?'selected':''}>❌ Non admis</option>
        </select>
      </div>
      <button class="btn primary block mt-16" id="save-test">💾 Enregistrer le test</button>
    `;

    const sheet = Utils.openSheet(`📝 Test — ${m.nom}`, html);

    const updateAvg = () => {
      const sliders = sheet.querySelectorAll('[data-tcrit]');
      let sum = 0;
      sliders.forEach(s => sum += Number(s.value));
      const avg = sum / sliders.length;
      sheet.querySelector('#test-avg').textContent = avg.toFixed(2) + '/20';
      const resultEl = sheet.querySelector('#test-result');
      if (avg >= 12) {
        resultEl.innerHTML = '<span class="pill actif">✅ ADMIS (≥12/20)</span>';
      } else if (avg >= 10) {
        resultEl.innerHTML = '<span class="pill derogation">⚠️ ADMIS SOUS RÉSERVE (10-12/20)</span>';
      } else {
        resultEl.innerHTML = '<span class="pill suspendu">❌ NON ADMIS (&lt;10/20)</span>';
      }
    };

    sheet.querySelectorAll('[data-tcrit]').forEach(slider => {
      slider.addEventListener('input', () => {
        sheet.querySelector('#tval-' + slider.dataset.tidx).textContent = slider.value;
        updateAvg();
      });
    });
    updateAvg();

    sheet.querySelector('#save-test').addEventListener('click', () => {
      const notes = {};
      sheet.querySelectorAll('[data-tcrit]').forEach(s => { notes[s.dataset.tcrit] = Number(s.value); });
      const vals = Object.values(notes);
      const moyenne = vals.reduce((a,b)=>a+b,0)/vals.length;
      const observations = sheet.querySelector('#test-obs').value;
      let decision = sheet.querySelector('#test-decision').value;
      if (!decision) decision = moyenne >= 12 ? 'Admis' : (moyenne >= 10 ? 'Admis sous réserve' : 'Non admis');
      Store.setTestIntegration(membreId, { notes, moyenne, date: Utils.todayISO(), observations, decision });

      if (decision === 'Admis' || decision === 'Admis sous réserve') {
        Utils.closeSheet();
        Utils.confirmAction(`${m.nom} est ${decision.toLowerCase()} avec ${moyenne.toFixed(2)}/20. Le faire passer au statut <b>Choriste</b> ?`, () => {
          const newId = Store.nextMemberId('Choriste');
          Store.migrateTestIntegration(membreId, newId);
          Store.migrateCompteChoriste(membreId, newId);
          Store.deleteMembre(membreId);
          m.statut = 'Choriste';
          m.id = newId;
          m.dateIntegration = Utils.todayISO(); // cotisations générées uniquement à partir de cette date
          Store.upsertMembre(m);
          Utils.toast(`${m.nom} est maintenant Choriste !`);
          Router.render();
        });
      } else {
        Utils.closeSheet();
        Utils.toast('Test enregistré');
        Router.render();
      }
    });
  },
};

// ===== MODULE: PRESTATIONS =====
// ════════════════════════════════════════════════════════════════
// PRESTATIONS — Planification des événements & programme de chants
// (distinct du module Répétitions : ici on programme les chants dans
// l'ordre de passage pour un événement public/officiel donné)
// ════════════════════════════════════════════════════════════════

const PrestationsModule = {
  filter: 'avenir', // 'avenir' | 'toutes'
  TYPES: ['Culte','Concert','Répétition générale','Veillée','Activité spéciale','Autre'],

  render(main) {
    const canManage = Permissions.canManageData('prestations');
    const tabs = [
      { key: 'avenir', label: '📆 À venir' },
      { key: 'toutes', label: '📋 Toutes' },
    ];

    main.innerHTML = `
      ${Permissions.readOnlyBanner()}
      <div class="tabbar">
        ${tabs.map(t => `<button class="tab-btn ${this.filter===t.key?'active':''}" data-filter="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div id="prest-list"></div>
    `;

    main.querySelectorAll('[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => { this.filter = btn.dataset.filter; this.render(main); });
    });

    this.renderList(main.querySelector('#prest-list'));

    if (canManage) {
      const fab = document.createElement('button');
      fab.className = 'fab';
      fab.innerHTML = '+';
      fab.id = 'fab-add-prestation';
      main.appendChild(fab);
      fab.addEventListener('click', () => this.openPrestationForm());
    }
  },

  renderList(container) {
    let list = Store.getPrestations();
    if (this.filter === 'avenir') list = list.filter(p => (p.date||'') >= Utils.todayISO() && p.statut !== 'Annulée');

    if (!list.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">🎤</div><div class="empty-state__text">Aucune prestation ${this.filter==='avenir'?'à venir':'enregistrée'}</div></div>`;
      return;
    }

    const icons = { 'Culte':'⛪', 'Concert':'🎤', 'Répétition générale':'🎹', 'Veillée':'🕯️', 'Activité spéciale':'🎉', 'Autre':'📅' };

    container.innerHTML = `<div class="list">${list.map(p => {
      const statusClass = p.statut==='Réalisée'?'actif':p.statut==='Annulée'?'suspendu':p.statut==='Reportée'?'integrant':'bureau';
      const nbChants = (p.chants||[]).length;
      return `
        <div class="list-row" data-id="${p.id}">
          <div class="list-row__avatar">${icons[p.type]||'📅'}</div>
          <div class="list-row__body">
            <div class="list-row__title">${Utils.escapeHtml(p.type)}</div>
            <div class="list-row__subtitle">${Utils.fmtDate(p.date)} ${p.lieu?'· '+Utils.escapeHtml(p.lieu):''} · ${nbChants} chant(s)</div>
          </div>
          <span class="pill ${statusClass}">${p.statut}</span>
        </div>
      `;
    }).join('')}</div>`;

    container.querySelectorAll('.list-row').forEach(row => {
      row.addEventListener('click', () => this.openPrestationDetail(row.dataset.id));
    });
  },

  openPrestationDetail(id) {
    const p = Store.getPrestation(id);
    if (!p) return;
    const canManage = Permissions.canManageData('prestations');
    const chantsList = (p.chants||[]).slice().sort((a,b)=>a.ordre-b.ordre)
      .map(c => ({ ...c, chant: Store.data.repertoire.find(r=>r.id===c.chantId) }))
      .filter(c => c.chant);

    const html = `
      <div class="card">
        ${this.infoRow('Type', p.type)}
        ${this.infoRow('Date', Utils.fmtDateLong(p.date))}
        ${this.infoRow('Heure', p.heure || '—')}
        ${this.infoRow('Lieu', p.lieu || '—')}
        ${this.infoRow('Responsable', p.responsable || '—')}
        ${this.infoRow('Statut', p.statut)}
        ${p.notes ? this.infoRow('Notes', p.notes) : ''}
      </div>

      <div class="section-title"><span class="ornament">🎵</span> Programme des chants</div>
      <div id="prest-chants-list">
        ${chantsList.length ? `<div class="list">${chantsList.map((c,i) => `
          <div class="list-row" style="cursor:${c.chant.paroles?'pointer':'default'};" data-chant-id="${c.chant.id}">
            <div class="list-row__avatar">${i+1}</div>
            <div class="list-row__body">
              <div class="list-row__title">${Utils.escapeHtml(c.chant.titre)}</div>
              <div class="list-row__subtitle">${c.chant.tonalite || '—'}</div>
            </div>
            ${canManage ? `
              <div style="display:flex;gap:4px;">
                <button class="btn sm secondary" data-move="${c.chant.id}" data-dir="up">↑</button>
                <button class="btn sm secondary" data-move="${c.chant.id}" data-dir="down">↓</button>
                <button class="btn sm danger" data-remove-chant="${c.chant.id}">✕</button>
              </div>
            ` : (c.chant.paroles ? '<span class="list-row__chevron">›</span>' : '')}
          </div>
        `).join('')}</div>` : `<div class="empty-state"><div class="empty-state__icon">🎵</div><div class="empty-state__text">Aucun chant programmé</div></div>`}
      </div>

      ${canManage ? `
        <div class="field mt-16">
          <label>Ajouter un chant du répertoire</label>
          <select id="prest-add-chant">
            <option value="">— Choisir —</option>
            ${Store.getRepertoire().filter(r => !chantsList.some(c=>c.chant.id===r.id)).map(r => `<option value="${r.id}">${Utils.escapeHtml(r.titre)}</option>`).join('')}
          </select>
        </div>
        <button class="btn secondary block" id="prest-add-chant-btn">➕ Ajouter au programme</button>

        <div class="section-title"><span class="ornament">⚙️</span> Modifier la prestation</div>
        <div class="field">
          <label>Statut</label>
          <select id="p-statut">
            ${['Prévue','Réalisée','Reportée','Annulée'].map(s=>`<option value="${s}" ${p.statut===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Lieu</label>
          <input type="text" id="p-lieu" value="${Utils.escapeHtml(p.lieu||'')}">
        </div>
        <div class="field">
          <label>Notes</label>
          <textarea id="p-notes" rows="2">${Utils.escapeHtml(p.notes||'')}</textarea>
        </div>
        <button class="btn primary block" id="save-prestation">💾 Enregistrer</button>
        <button class="btn sage block mt-8" id="pointage-prestation">✅ Pointage des participants</button>
        <button class="btn danger block mt-8" id="del-prestation">🗑️ Supprimer la prestation</button>
      ` : ''}
    `;

    const sheet = Utils.openSheet(`${p.type} — ${Utils.fmtDate(p.date)}`, html);

    // Consultation des paroles (tout le monde)
    sheet.querySelectorAll('[data-chant-id]').forEach(row => {
      row.addEventListener('click', (e) => {
        if (e.target.closest('button')) return;
        const chant = Store.data.repertoire.find(r=>r.id===row.dataset.chantId);
        if (chant && chant.paroles) DirectionModule.openParolesView(chant);
      });
    });

    if (!canManage) return;

    sheet.querySelectorAll('[data-move]').forEach(btn => {
      btn.addEventListener('click', () => {
        this.moveChant(p, btn.dataset.move, btn.dataset.dir);
        Utils.closeSheet();
        this.openPrestationDetail(id);
      });
    });
    sheet.querySelectorAll('[data-remove-chant]').forEach(btn => {
      btn.addEventListener('click', () => {
        p.chants = (p.chants||[]).filter(c => c.chantId !== btn.dataset.removeChant);
        Store.updatePrestation(id, { chants: p.chants });
        Utils.closeSheet();
        this.openPrestationDetail(id);
      });
    });
    sheet.querySelector('#prest-add-chant-btn').addEventListener('click', () => {
      const chantId = sheet.querySelector('#prest-add-chant').value;
      if (!chantId) return;
      if (!p.chants) p.chants = [];
      const maxOrdre = p.chants.reduce((m,c)=>Math.max(m,c.ordre||0), 0);
      p.chants.push({ chantId, ordre: maxOrdre + 1 });
      Store.updatePrestation(id, { chants: p.chants });
      Utils.closeSheet();
      this.openPrestationDetail(id);
    });
    sheet.querySelector('#save-prestation').addEventListener('click', () => {
      Store.updatePrestation(id, {
        statut: sheet.querySelector('#p-statut').value,
        lieu: sheet.querySelector('#p-lieu').value,
        notes: sheet.querySelector('#p-notes').value,
      });
      Utils.closeSheet();
      Utils.toast('Prestation mise à jour');
      Router.render();
    });
    sheet.querySelector('#pointage-prestation').addEventListener('click', () => {
      Utils.closeSheet();
      this.openPointageSheet(id);
    });
    sheet.querySelector('#del-prestation').addEventListener('click', () => {
      Utils.confirmAction('Supprimer définitivement cette prestation ?', () => {
        Store.deletePrestation(id);
        Utils.closeSheet();
        Utils.toast('Prestation supprimée');
        Router.render();
      });
    });
  },

  moveChant(p, chantId, dir) {
    const list = (p.chants||[]).slice().sort((a,b)=>a.ordre-b.ordre);
    const idx = list.findIndex(c => c.chantId === chantId);
    const swapIdx = dir === 'up' ? idx-1 : idx+1;
    if (idx < 0 || swapIdx < 0 || swapIdx >= list.length) return;
    const tmp = list[idx].ordre;
    list[idx].ordre = list[swapIdx].ordre;
    list[swapIdx].ordre = tmp;
    Store.updatePrestation(p.id, { chants: list });
  },

  // ── Pointage des participants à la prestation (alimente le classement musical) ──
  openPointageSheet(prestationId) {
    const p = Store.getPrestation(prestationId);
    if (!p) return;
    const membres = Store.data.membres.filter(m=>['Bureau','Choriste'].includes(m.statut)).sort((a,b)=>a.nom.localeCompare(b.nom));
    if (!p.presences) p.presences = {};

    const html = `
      <div class="card" style="padding:10px;">
        <div class="flex-between">
          <span class="text-sm" style="font-weight:700;">Marquer tous :</span>
          <div style="display:flex;gap:6px;">
            <button class="btn sm sage" data-bulk="Présent">Présents</button>
            <button class="btn sm secondary" data-bulk="Absent">Absents</button>
          </div>
        </div>
      </div>
      <div class="list" style="margin-top:8px;">
        ${membres.map(m => {
          const st = p.presences[m.id] || '—';
          return `
            <div class="list-row" style="cursor:default;">
              <div class="list-row__avatar">${Utils.initials(m.nom)}</div>
              <div class="list-row__body"><div class="list-row__title">${Utils.escapeHtml(m.nom)}</div></div>
              <select class="status-select ${st==='Présent'?'status-present':st==='Absent'?'status-abs-nj':''}" data-pmember="${m.id}" style="max-width:120px;">
                ${['—','Présent','Absent'].map(s => `<option value="${s}" ${st===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
          `;
        }).join('')}
      </div>
      <button class="btn primary block mt-16" id="close-pointage-prest">✅ Fermer</button>
    `;

    const sheet = Utils.openSheet(`✅ Pointage — ${p.type}`, html);
    sheet.querySelectorAll('[data-pmember]').forEach(sel => {
      sel.addEventListener('change', () => {
        Store.setPrestationPresence(prestationId, sel.dataset.pmember, sel.value);
        sel.className = 'status-select ' + (sel.value==='Présent'?'status-present':sel.value==='Absent'?'status-abs-nj':'');
      });
    });
    sheet.querySelectorAll('[data-bulk]').forEach(btn => {
      btn.addEventListener('click', () => {
        membres.forEach(m => Store.setPrestationPresence(prestationId, m.id, btn.dataset.bulk));
        Utils.closeSheet();
        this.openPointageSheet(prestationId);
      });
    });
    sheet.querySelector('#close-pointage-prest').addEventListener('click', () => {
      Utils.closeSheet();
      Router.render();
    });
  },

  openPrestationForm() {
    const membres = Store.data.membres.slice().sort((a,b)=>a.nom.localeCompare(b.nom));
    const html = `
      <div class="field-row">
        <div class="field">
          <label>Type d'événement</label>
          <select id="pf-type">${this.TYPES.map(t=>`<option>${t}</option>`).join('')}</select>
        </div>
        <div class="field">
          <label>Statut</label>
          <select id="pf-statut"><option>Prévue</option><option>Réalisée</option><option>Reportée</option><option>Annulée</option></select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Date</label>
          <input type="date" id="pf-date" value="${Utils.todayISO()}">
        </div>
        <div class="field">
          <label>Heure</label>
          <input type="time" id="pf-heure" value="10:00">
        </div>
      </div>
      <div class="field">
        <label>Lieu</label>
        <input type="text" id="pf-lieu" placeholder="Lieu de l'événement">
      </div>
      <div class="field">
        <label>Responsable</label>
        <select id="pf-resp">
          <option value="">—</option>
          ${membres.map(m=>`<option>${Utils.escapeHtml(m.nom)}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="pf-notes" rows="2"></textarea>
      </div>
      <div class="text-sm text-muted mt-8" style="margin-bottom:8px;">Le programme des chants (ordre de passage) pourra être ajouté après la création, depuis la fiche de la prestation.</div>
      <button class="btn primary block" id="save-new-prestation">💾 Créer la prestation</button>
    `;
    const sheet = Utils.openSheet('Nouvelle prestation', html);
    sheet.querySelector('#save-new-prestation').addEventListener('click', () => {
      const date = sheet.querySelector('#pf-date').value;
      if (!date) { Utils.toast('Veuillez choisir une date'); return; }
      Store.addPrestation({
        id: Utils.genId('prest'),
        type: sheet.querySelector('#pf-type').value,
        date,
        heure: sheet.querySelector('#pf-heure').value,
        lieu: sheet.querySelector('#pf-lieu').value,
        responsable: sheet.querySelector('#pf-resp').value,
        statut: sheet.querySelector('#pf-statut').value,
        notes: sheet.querySelector('#pf-notes').value,
        chants: [],
        presences: {},
      });
      Utils.closeSheet();
      Utils.toast('Prestation créée');
      Router.render();
    });
  },

  infoRow(label, value) {
    return `<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--line);">
      <span class="text-sm text-muted">${label}</span>
      <span style="font-weight:600;font-size:0.85rem;text-align:right;max-width:60%;">${Utils.escapeHtml(String(value))}</span>
    </div>`;
  },
};

// ===== MODULE: REPETITIONS =====
// ════════════════════════════════════════════════════════════════
// RÉPÉTITIONS — Registre des séances de répétition
// ════════════════════════════════════════════════════════════════

const RepetitionsModule = {
  render(main) {
    const reps = Store.getRepetitions();
    const tenues = reps.filter(function(r){return r.statut==='Tenue';}).length;
    const annulees = reps.filter(function(r){return r.statut==='Annulée';}).length;

    main.innerHTML =
      Permissions.readOnlyBanner() +
      '<div class="grid-2">' +
        '<div class="card center"><div class="kpi-card__value" style="color:var(--green);">' + tenues + '</div><div class="kpi-card__label">Tenues</div></div>' +
        '<div class="card center"><div class="kpi-card__value" style="color:var(--red);">' + annulees + '</div><div class="kpi-card__label">Annulées</div></div>' +
      '</div>' +
      '<div id="rep-list"></div>';

    var listEl = main.querySelector('#rep-list');
    if (!reps.length) {
      listEl.innerHTML = '<div class="empty-state"><div class="empty-state__icon">🎹</div><div class="empty-state__text">Aucune répétition enregistrée</div></div>';
    } else {
      listEl.innerHTML = '<div class="list">' + reps.map(function(r) {
        var statusClass = r.statut==='Tenue'?'actif':r.statut==='Annulée'?'suspendu':'integrant';
        return '<div class="list-row" data-id="' + r.id + '">' +
          '<div class="list-row__avatar">🎹</div>' +
          '<div class="list-row__body">' +
            '<div class="list-row__title">' + Utils.escapeHtml(r.type) + '</div>' +
            '<div class="list-row__subtitle">' + Utils.fmtDate(r.date) + (r.responsable?' · '+Utils.escapeHtml(r.responsable):'') + '</div>' +
          '</div>' +
          '<span class="pill ' + statusClass + '">' + r.statut + '</span>' +
        '</div>';
      }).join('') + '</div>';

      listEl.querySelectorAll('.list-row').forEach(function(row) {
        row.addEventListener('click', function() { RepetitionsModule.openDetail(row.dataset.id); });
      });
    }

    var fab;
    if (Permissions.canManageData('repetitions')) {
      fab = document.createElement('button');
      fab.className = 'fab';
      fab.innerHTML = '+';
      main.appendChild(fab);
      fab.addEventListener('click', function() { RepetitionsModule.openForm(); });
    }
  },

  openDetail(id) {
    var r = Store.data.repetitions.find(function(x){return x.id===id;});
    if (!r) return;

    if (!Permissions.canManageData('repetitions')) {
      var roHtml =
        '<div class="card">' +
          '<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Statut</span><span style="font-weight:700;">' + r.statut + '</span></div>' +
          '<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Responsable</span><span style="font-weight:700;">' + Utils.escapeHtml(r.responsable||'—') + '</span></div>' +
          '<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Chants travaillés</span><span style="font-weight:700;text-align:right;max-width:60%;">' + Utils.escapeHtml(r.chants||'—') + '</span></div>' +
          (r.resultats ? '<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">Résultats</span><span style="font-weight:700;text-align:right;max-width:60%;">' + Utils.escapeHtml(r.resultats) + '</span></div>' : '') +
        '</div>';
      Utils.openSheet(r.type + ' — ' + Utils.fmtDate(r.date), roHtml);
      return;
    }
    var pointageHtml = '';
    if (r.pupitre) {
      var pupitreMembres = Store.data.membres.filter(function(m){ return m.pupitre === r.pupitre && (m.statut === 'Choriste' || m.statut === 'Intégrant'); }).sort(function(a,b){return a.nom.localeCompare(b.nom);});
      var presences = r.presences || {};
      pointageHtml =
        '<div class="section-title"><span class="ornament">✅</span> Pointage — Pupitre ' + Utils.escapeHtml(r.pupitre) + '</div>' +
        '<div class="card" id="rep-pointage">' +
        (pupitreMembres.length ? pupitreMembres.map(function(m) {
          var cur = presences[m.id] || '';
          return '<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--line);">' +
            '<span style="font-weight:600;font-size:0.88rem;">' + Utils.escapeHtml(m.nom) + '</span>' +
            '<select class="rep-pres-select" data-mid="' + m.id + '" style="width:auto;">' +
              ['', 'Présent', 'Absent justifié', 'Absent non justifié'].map(function(opt) {
                return '<option value="' + opt + '" ' + (cur === opt ? 'selected' : '') + '>' + (opt || '—') + '</option>';
              }).join('') +
            '</select>' +
          '</div>';
        }).join('') : '<div class="text-sm text-muted">Aucun membre dans ce pupitre</div>') +
        '</div>' +
        '<button class="btn secondary block" id="save-pointage-rep">Enregistrer le pointage</button>';
    }

    var html =
      '<div class="field"><label>Statut</label><select id="r-statut">' +
        ['Tenue','Reportée','Annulée'].map(function(s){return '<option value="'+s+'" '+(r.statut===s?'selected':'')+'>'+s+'</option>';}).join('') +
      '</select></div>' +
      '<div class="field"><label>Chants travaillés</label><input type="text" id="r-chants" value="' + Utils.escapeHtml(r.chants||'') + '"></div>' +
      '<div class="field"><label>Résultats</label><textarea id="r-resultats" rows="2">' + Utils.escapeHtml(r.resultats||'') + '</textarea></div>' +
      '<div class="field"><label>Difficultés notées</label><textarea id="r-diff" rows="2">' + Utils.escapeHtml(r.difficultes||'') + '</textarea></div>' +
      pointageHtml +
      '<div class="grid-2 mt-16">' +
        '<button class="btn danger block" id="del-rep">🗑️ Supprimer</button>' +
        '<button class="btn primary block" id="save-rep">💾 Enregistrer</button>' +
      '</div>';

    var sheet = Utils.openSheet(r.type + ' — ' + Utils.fmtDate(r.date), html);
    var pointageBtn = sheet.querySelector('#save-pointage-rep');
    if (pointageBtn) {
      pointageBtn.addEventListener('click', function() {
        var newPresences = {};
        sheet.querySelectorAll('.rep-pres-select').forEach(function(sel) {
          if (sel.value) newPresences[sel.dataset.mid] = sel.value;
        });
        Store.updateRepetition(id, { presences: newPresences });
        Utils.closeSheet();
        Utils.toast('Pointage enregistré');
        Router.render();
      });
    }
    sheet.querySelector('#save-rep').addEventListener('click', function() {
      Store.updateRepetition(id, {
        statut: sheet.querySelector('#r-statut').value,
        chants: sheet.querySelector('#r-chants').value,
        resultats: sheet.querySelector('#r-resultats').value,
        difficultes: sheet.querySelector('#r-diff').value,
      });
      Utils.closeSheet();
      Utils.toast('Répétition mise à jour');
      Router.render();
    });
    sheet.querySelector('#del-rep').addEventListener('click', function() {
      Utils.confirmAction('Supprimer cette répétition ?', function() {
        Store.deleteRepetition(id);
        Utils.closeSheet();
        Utils.toast('Répétition supprimée');
        Router.render();
      });
    });
  },

  openForm() {
    var membres = Store.data.membres.filter(function(m){return ['Bureau','Choriste'].indexOf(m.statut)>=0;}).sort(function(a,b){return a.nom.localeCompare(b.nom);});
    var html =
      '<div class="field-row">' +
        '<div class="field"><label>Date</label><input type="date" id="rf-date" value="' + Utils.todayISO() + '"></div>' +
        '<div class="field"><label>Type</label><select id="rf-type">' +
          '<option>Répétition générale</option>' +
          '<option>Répétition technique</option>' +
          '<option>Répétition par pupitre</option>' +
          '<option>Répétition instrumentale</option>' +
          "<option>Répétition d'urgence</option>" +
        '</select></div>' +
      '</div>' +
      '<div class="field"><label>Responsable</label><select id="rf-resp"><option value="">—</option>' +
        membres.map(function(m){return '<option>'+Utils.escapeHtml(m.nom)+'</option>';}).join('') +
      '</select></div>' +
      '<div class="field"><label>Lieu</label><input type="text" id="rf-lieu"></div>' +
      '<div class="field" id="rf-pupitre-wrap" style="display:none;"><label>Pupitre concerné</label><select id="rf-pupitre"><option value="">—</option>' +
        Utils.PUPITRES.map(function(p){return '<option value="'+p+'">'+p+'</option>';}).join('') +
      '</select></div>' +
      '<div class="field"><label>Objectifs</label><input type="text" id="rf-obj"></div>' +
      '<div class="field"><label>Statut</label><select id="rf-statut">' +
        '<option>Tenue</option><option>Reportée</option><option>Annulée</option>' +
      '</select></div>' +
      '<button class="btn primary block" id="save-new-rep">💾 Enregistrer</button>';

    var sheet = Utils.openSheet('Nouvelle répétition', html);
    var typeSelect = sheet.querySelector('#rf-type');
    var pupitreWrap = sheet.querySelector('#rf-pupitre-wrap');
    var togglePupitreWrap = function() {
      pupitreWrap.style.display = typeSelect.value === 'Répétition par pupitre' ? '' : 'none';
    };
    typeSelect.addEventListener('change', togglePupitreWrap);
    togglePupitreWrap();
    sheet.querySelector('#save-new-rep').addEventListener('click', function() {
      var type = typeSelect.value;
      var pupitre = type === 'Répétition par pupitre' ? sheet.querySelector('#rf-pupitre').value : '';
      Store.addRepetition({
        id: Utils.genId('rep'),
        date: sheet.querySelector('#rf-date').value,
        type: type,
        responsable: sheet.querySelector('#rf-resp').value,
        lieu: sheet.querySelector('#rf-lieu').value,
        pupitre: pupitre,
        objectifs: sheet.querySelector('#rf-obj').value,
        statut: sheet.querySelector('#rf-statut').value,
        chants: '', resultats: '', difficultes: '',
        presences: {}, // { membreId: 'Présent'|'Absent justifié'|'Absent non justifié' }
      });
      Utils.closeSheet();
      Utils.toast('Répétition ajoutée');
      Router.render();
    });
  },
};

// ===== MODULE: ANNIVERSAIRES =====
// ════════════════════════════════════════════════════════════════
// ANNIVERSAIRES — Alertes et calendrier
// ════════════════════════════════════════════════════════════════

const AnniversairesModule = {
  render(main) {
    const membres = Store.data.membres;
    const withDates = membres.filter(m => m.dateNaissance);
    const withoutDates = membres.filter(m => !m.dateNaissance);

    const today = [], week = [], byMonth = {};
    Utils.MONTHS.forEach(m => byMonth[m] = []);

    withDates.forEach(m => {
      const info = Store.getAnniversaireInfo(m);
      if (info.isToday) today.push(m);
      else if (info.isThisWeek) week.push({ m, info });
      const dob = new Date(m.dateNaissance);
      byMonth[Utils.MONTHS[dob.getMonth()]].push(m);
    });

    week.sort((a,b) => a.info.daysRemaining - b.info.daysRemaining);

    main.innerHTML = `
      ${today.length ? `
        <div class="alert-banner gold">
          <div class="alert-banner__icon">🎉</div>
          <div><b>Aujourd'hui :</b> ${today.map(m=>m.nom).join(', ')}</div>
        </div>` : `
        <div class="alert-banner info">
          <div class="alert-banner__icon">📅</div>
          <div>Aucun anniversaire aujourd'hui.</div>
        </div>`}

      <div class="section-title"><span class="ornament">📅</span> Dans les 7 prochains jours</div>
      ${week.length ? `
        <div class="list">
          ${week.map(({m,info}) => `
            <div class="list-row" style="cursor:default;">
              <div class="list-row__avatar">🎂</div>
              <div class="list-row__body">
                <div class="list-row__title">${Utils.escapeHtml(m.nom)}</div>
                <div class="list-row__subtitle">${Utils.fmtDate(m.dateNaissance)} → ${info.age+1} ans</div>
              </div>
              <div class="pill bureau">Dans ${info.daysRemaining}j</div>
            </div>
          `).join('')}
        </div>` : `<div class="empty-state"><div class="empty-state__icon">📅</div><div class="empty-state__text">Aucun anniversaire cette semaine</div></div>`}

      <div class="section-title"><span class="ornament">📆</span> Calendrier par mois</div>
      <div class="list">
        ${Utils.MONTHS.map((mo, idx) => {
          const list = byMonth[mo];
          const isCurrentMonth = new Date().getMonth() === idx;
          return `
            <div class="list-row" style="cursor:default;${isCurrentMonth?'background:var(--gold-soft);':''}">
              <div class="list-row__body">
                <div class="list-row__title">${mo} ${isCurrentMonth ? '📍' : ''}</div>
                <div class="list-row__subtitle">${list.length ? list.map(m=>m.nom + ' (' + new Date(m.dateNaissance).getDate() + ')').join(', ') : 'Aucun'}</div>
              </div>
              <div class="pill ${list.length?'actif':''}">${list.length || ''}</div>
            </div>
          `;
        }).join('')}
      </div>

      ${withoutDates.length ? `
        <div class="alert-banner warn mt-16">
          <div class="alert-banner__icon">ℹ️</div>
          <div><b>${withoutDates.length} membre(s)</b> sans date de naissance enregistrée. Complétez leur profil dans le module Membres.</div>
        </div>` : ''}
    `;
  },
};

// ===== MODULE: NOTIFICATIONS =====
// ════════════════════════════════════════════════════════════════
// NOTIFICATIONS — Centre de notifications + structure Firebase-ready
// ════════════════════════════════════════════════════════════════

const NotificationsModule = {
  filterCat: '',

  CATEGORIES: [
    { key: '', label: '📬 Toutes', icon: '📬' },
    { key: 'anniversaire', label: '🎂 Anniversaires', icon: '🎂' },
    { key: 'repetition', label: '🎹 Répétitions', icon: '🎹' },
    { key: 'prestation', label: '🎤 Prestations', icon: '🎤' },
    { key: 'reunion', label: '📅 Réunions', icon: '📅' },
    { key: 'cotisation', label: '💰 Cotisations', icon: '💰' },
    { key: 'sanction', label: '💸 Sanctions', icon: '💸' },
    { key: 'derogation', label: '🔓 Dérogations', icon: '🔓' },
    { key: 'annonce', label: '📢 Annonces', icon: '📢' },
  ],

  render(main) {
    const notifs = Store.getNotifications(this.filterCat ? { categorie: this.filterCat } : undefined);
    const unread = notifs.filter(n => !n.lu).length;

    main.innerHTML = `
      <div class="card">
        <div class="flex-between">
          <span class="text-sm text-muted">${unread > 0 ? `<b>${unread} non lu(s)</b>` : 'Tout est lu ✅'}</span>
          ${unread > 0 ? `<button class="btn sm secondary" id="mark-all-read">Tout marquer lu</button>` : ''}
        </div>
      </div>

      <div style="display:flex;gap:6px;flex-wrap:wrap;padding:0 0 12px 0;overflow-x:auto;">
        ${this.CATEGORIES.map(c => `
          <button class="btn sm ${this.filterCat===c.key?'primary':'secondary'} filter-cat-btn" data-cat="${c.key}">${c.label}</button>
        `).join('')}
      </div>

      <div id="notif-list"></div>

      ${Permissions.isBureau() ? `
        <div class="section-title mt-16"><span class="ornament">📢</span> Envoyer une annonce</div>
        <div class="card">
          <div class="field"><label>Message de l'annonce</label><textarea id="new-notif-text" rows="2" placeholder="Ex : Répétition spéciale ce samedi à 15h00..."></textarea></div>
          <button class="btn primary block" id="send-annonce">📢 Envoyer à tous</button>
        </div>
      ` : ''}

      <div class="text-sm text-muted center mt-16" style="font-size:0.72rem;">
        🔮 Structure compatible Firebase Cloud Messaging — lors de la migration, les notifications apparaîtront sur l'écran du téléphone même application fermée.
      </div>
    `;

    main.querySelectorAll('.filter-cat-btn').forEach(btn => {
      btn.addEventListener('click', () => { this.filterCat = btn.dataset.cat; this.render(main); });
    });

    const markAllBtn = main.querySelector('#mark-all-read');
    if (markAllBtn) markAllBtn.addEventListener('click', () => {
      Store.markAllNotificationsLues();
      Utils.toast('Toutes les notifications sont marquées comme lues');
      this.render(main);
      updateNotificationsBadge();
    });

    const annonceBtn = main.querySelector('#send-annonce');
    if (annonceBtn) annonceBtn.addEventListener('click', () => {
      const msg = main.querySelector('#new-notif-text').value.trim();
      if (!msg) { Utils.toast('Le message est requis'); return; }
      Store.addNotification({ titre: '📢 Annonce officielle', message: msg, categorie: 'annonce', destinataire: 'all' });
      Store.logAction('Envoi', 'Notifications', `Annonce : ${msg.slice(0,60)}`);
      main.querySelector('#new-notif-text').value = '';
      Utils.toast('Annonce envoyée');
      this.render(main);
      updateNotificationsBadge();
    });

    this.renderList(main.querySelector('#notif-list'), notifs);
  },

  renderList(container, notifs) {
    if (!notifs.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">🔔</div><div class="empty-state__text">Aucune notification</div></div>`;
      return;
    }

    const catMap = {};
    this.CATEGORIES.forEach(c => { if (c.key) catMap[c.key] = c.icon; });

    container.innerHTML = notifs.map(n => {
      const icon = catMap[n.categorie] || '🔔';
      return `
        <div class="notif-item ${!n.lu ? 'unread' : ''}" data-id="${n.id}">
          <div class="notif-item__icon">${icon}</div>
          <div class="notif-item__body">
            <div class="notif-item__title">${Utils.escapeHtml(n.titre)}</div>
            <div class="notif-item__text">${Utils.escapeHtml(n.message)}</div>
            <div class="notif-item__date">${Utils.fmtDate(n.date)}${n.lu ? ' · Lu' : ' · <b>Non lu</b>'}</div>
          </div>
          ${Permissions.isBureau() ? `<button class="btn sm secondary" data-del="${n.id}" style="flex-shrink:0;font-size:0.7rem;padding:4px 8px;">🗑️</button>` : ''}
        </div>
      `;
    }).join('');

    container.querySelectorAll('.notif-item').forEach(item => {
      item.addEventListener('click', (e) => {
        if (e.target.dataset.del) return;
        const id = item.dataset.id;
        Store.markNotificationLue(id);
        item.classList.remove('unread');
        updateNotificationsBadge();
      });
    });

    container.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        Store.deleteNotification(btn.dataset.del);
        Utils.toast('Notification supprimée');
        btn.closest('.notif-item').remove();
        updateNotificationsBadge();
      });
    });
  },
};
